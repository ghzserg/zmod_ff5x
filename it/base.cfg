[zmod]
[include ../mod_data/lang.cfg]

[skew_correction]

[firmware_retraction]
retract_length: 0.7
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

[include shell.cfg]

[gcode_macro CLEAR_NOZZLE]
description: Pulizia dell'ugello
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(230)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
    ZCONTROL_OFF

[include ff5.cfg]

[gcode_macro _TEST_MIN_MAX]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if "xyz" in printer.toolhead.homed_axes %}
        SAVE_GCODE_STATE NAME=test_min_max
        G90

        {% if printer.toolhead.position.y < client.min_y %}
            G1 Y{client.min_y} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.y > client.max_y %}
            G1 Y{client.max_y} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.x < client.min_x %}
            G1 X{client.min_x} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.x > client.max_x %}
            G1 X{client.max_x} F2000
            M400
        {% endif %}

        RESTORE_GCODE_STATE NAME=test_min_max
    {% endif %}

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
gcode:
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}

    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="info" MSG="Usando KAMP"
        _KAMP_BED_MESH_CALIBRATE
    {% else %}
        RESPOND PREFIX="info" MSG="Usando BED_MESH_CALIBRATE"
        _TEST_MIN_MAX
        _BED_MESH_CALIBRATE {rawparams}
    {% endif %}

[gcode_macro _G28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        _HOME
    {% endif %}


[gcode_macro CHECK_MD5]
description: Verifica della somma MD5 del file
gcode:
  {% if 'FILENAME' in params %}
    {% set filename = params.FILENAME|default("")|string %}
  {% else %}
    {% set filename = printer.virtual_sdcard.file_path|default("")|string  %}
  {% endif %}

  SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

  {% if filename != "" %}

    {% if 'DELETE' in params %}
      {% set delete = params.DELETE|default("False")|string %}
    {% endif %}

    RUN_SHELL_COMMAND CMD=check_md5 PARAMS={'"%s %s"' % (filename.replace("'", "\\\'").replace(" ", "\ "), delete)}
    {% for i in range(30) %}
        ZLOAD_VARIABLE
        _CHECK_MD5
    {% endfor %}

    ZLOAD_VARIABLE
    _FINAL_CHECK_MD5 FILENAME="{filename}"

  {% endif %}

[gcode_macro _CHECK_MD5]
description: In attesa del completamento della verifica
gcode:
    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}

    {% if (check_md5 == 0) %}
        G4 P{1000}
    {% endif %}

[gcode_macro _FINAL_CHECK_MD5]
description: Test finale
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set filename = params.FILENAME|default("")|string %}
    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}

    {% if (check_md5 == 0) %}
        RESPOND TYPE=error MSG="Errore: Il file '{filename}' non è stato verificato in tempo. Stampa annullata."
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 1) %}
        RESPOND TYPE=error MSG="Errore: File '{filename}' non specificato. Stampa annullata."
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 2) %}
        RESPOND TYPE="error" MSG="Errore: File {filename} non trovato. Stampa annullata."
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 3) %}
        RESPOND TYPE="error" MSG="Il file {filename} non ha checksum MD5. Abilitalo in Orca. Link: [FAQ]"
    {% endif %}
    {% if (check_md5 == 4) %}
        {% if not client.ad5x %}
            RESPOND TYPE="error" MSG="Il file {filename} contiene comandi ad arco (G2, G3). Disattivali. In Orca: Process Profile -> Arc Approximation -> Deseleziona"
            RESPOND PREFIX="info" MSG="Sostituisci Spiral/Auto Z-Hop in Orca: Profilo Stampante -> Estrusore 1 -> Tipo Z Hop"
        {% endif %}
        RESPOND PREFIX="info" MSG="File {filename} verificato con successo. Checksum MD5 corrispondente."
    {% endif %}
    {% if (check_md5 == 8) %}
        {% if not client.ad5x %}
            RESPOND TYPE="error" MSG="Il file {filename} utilizza comandi G17/G18/G19 non supportati. Sostituisci il tipo Z-Hop."
            RESPOND PREFIX="info" MSG="Mantenere istruzioni precedenti"
        {% endif %}
        RESPOND PREFIX="info" MSG="File {filename} verificato con successo. Checksum MD5 corrispondente."
    {% endif %}
    {% if (check_md5 == 5) %}
        RESPOND PREFIX="info" MSG="File {filename} verificato con successo. Checksum MD5 corrispondente."
    {% endif %}
    {% if (check_md5 == 6) %}
        RESPOND TYPE="error" MSG="Checksum MD5 non corrispondente. File eliminato. Stampa annullata"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 7) %}
        RESPOND TYPE="error" MSG="Checksum MD5 non corrispondente. Stampa annullata"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}

[gcode_macro _FINAL_STOP_MD5]
gcode:
    {action_raise_error("Verifica MD5 fallita. Stampa annullata.")}

[gcode_macro BED_LEVEL_SCREWS_TUNE]
description: Calibrazione delle viti del piatto
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(130)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    RESPOND PREFIX="info" MSG="Prima delle misurazioni, non dimenticare di pulire l'ugello con la macro CLEAR_NOZZLE"

    BED_MESH_CLEAR
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed  MINIMUM={bed_temp-2} MAXIMUM={bed_temp+3}
    TEMPERATURE_WAIT SENSOR=extruder  MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+3}

    _HOME

    LOAD_CELL_TARE

    SCREWS_TILT_CALCULATE

[gcode_macro _FULL_BED_LEVEL]
description: Calibrazione del piatto senza spegnere la temperatura
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set profile = params.PROFILE|default("auto") %}

    RESPOND PREFIX="info" MSG="Calibrazione del piatto. Profilo {profile}. Temperatura estrusore: {extruder_temp} / Piatto: {bed_temp}"

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    # Начинаем калибровку
    _BED_MESH_CALIBRATE PROFILE="{profile}"

    _UGOL_PARK

[gcode_macro AUTO_FULL_BED_LEVEL]
description: Calibrazione del piatto con spegnimento della temperatura
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set profile = params.PROFILE|default("auto") %}

    _FULL_BED_LEVEL EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} PROFILE={profile}

    # Выклчюаем обогрев
    _STOP

[include ./KAMP/KAMP_Settings.cfg]

[gcode_macro KAMP]
description: Piatto adattivo
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    _KAMP_BED_MESH_CALIBRATE

    _SMART_PARK

    M190 S{bed_temp}
    M109 S{extruder_temp}

# Калибровка PID стола
[gcode_macro PID_TUNE_BED]
description: Bed PID calibratio
gcode:
    {% set temperature = params.TEMPERATURE|default(80) %}

    _HOME

    M107

    PID_CALIBRATE HEATER=heater_bed TARGET={temperature}

    {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
    {% if znew_save_config == 1 %}
        NEW_SAVE_CONFIG
    {% else %}
        SAVE_CONFIG
    {% endif %}

# Калибровка PID экструдера
[gcode_macro PID_TUNE_EXTRUDER]
description: Calibrazione PID dell'estrusore
gcode:
    {% set temperature = params.TEMPERATURE|default(245) %}
    {% set cooler = params.COOLER|default(255) %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    _HOME

    G1 X{client.min_x+(client.max_x-client.min_x)/2} Y{client.min_y+(client.max_y-client.min_y)/2} F3000

    M106 P0 S{cooler}
    PID_CALIBRATE HEATER=extruder TARGET={temperature}
    {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
    {% if znew_save_config == 1 %}
        NEW_SAVE_CONFIG
    {% else %}
        SAVE_CONFIG
    {% endif %}

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  125
gcode:
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}

    {% set m600_temp = printer["gcode_macro M600"].zextruder_temp|float %}

    {% set extruder_temp = params.EXTRUDER_TEMP|default(m600_temp) | float %}
    {% set extrude_len   = params.EXTRUDE_LEN|default(load_distance) |float %}
    {% set speed = params.SPEED|default(450)|float %}

    RESPOND PREFIX="info" MSG="Caricamento del filamento a {extruder_temp} per {extrude_len}mm a {speed/60} mm/s"
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-1}

    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E{extrude_len} F{speed} ; extrude with 7.5mm/s
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  75
gcode:
    {% set speed = params.SPEED|default(450) %}

    {% set extruder_temp = printer["gcode_macro M600"].zextruder_temp|float %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}

    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E-{unload_distance} F{speed} ; unload
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro PURGE_FILAMENT]
variable_purge_distance:  25
gcode:
    {% set speed = params.SPEED|default(450) %}

    {% set extruder_temp = printer["gcode_macro M600"].zextruder_temp|float %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}

    SAVE_GCODE_STATE NAME=purge_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E{purge_distance} F{speed}   ; purge
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE NAME=purge_state

[gcode_macro LOAD_MATERIAL]
description: Caricamento/cambio manuale del filamento
variable_initial_target_temp: 0
gcode:
    # save gcode state
    SAVE_GCODE_STATE NAME=load_material_state
    # save heating state
    SET_GCODE_VARIABLE MACRO=LOAD_MATERIAL VARIABLE=initial_target_temp VALUE={printer["extruder"].target}

    _LOAD_MATERIAL_SELECT

[gcode_macro _LOAD_MATERIAL_SELECT]
gcode:
    {% if not printer["extruder"].target >= printer.configfile.settings['extruder'].min_extrude_temp %}
        RESPOND TYPE=command MSG="action:prompt_begin Selezione materiale"
        RESPOND TYPE=command MSG="action:prompt_text Seleziona materiale da caricare"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button PLA|_LOAD_MATERIAL_HEATUP TEMP=210|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG|_LOAD_MATERIAL_HEATUP TEMP=240|primary"
        RESPOND TYPE=command MSG="action:prompt_button ABS|_LOAD_MATERIAL_HEATUP TEMP=250|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button Annulla|_LOAD_MATERIAL_END"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={printer["extruder"].target}
        _LOAD_MATERIAL_ACTION
    {% endif %}

[gcode_macro _LOAD_MATERIAL_HEATUP]
gcode:
    {% set extruder_temp = params.TEMP|default(200)|float %}
    M104 S{extruder_temp}
    RESPOND TYPE=command MSG=action:prompt_end
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}
    _LOAD_MATERIAL_ACTION

[gcode_macro _LOAD_MATERIAL_ACTION]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Gestione del filamento"
    RESPOND TYPE=command MSG="action:prompt_text Seleziona azione"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Carica|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Scarica|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Purga|PURGE_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button OK|_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    # restore old temp
    M104 S{printer["gcode_macro LOAD_MATERIAL"].initial_target_temp}
    # restore gcode state
    RESTORE_GCODE_STATE NAME=load_material_state

[gcode_macro M600]
description: Pausa e cambio filamento
variable_zextruder_temp: 240.0
gcode:
    {% set extruder_temp = printer[printer.toolhead.extruder].target if printer.toolhead.extruder != '' else 240.0 %}
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=zextruder_temp VALUE={extruder_temp|float}

    RESPOND PREFIX="info" MSG="Temperatura ugello {extruder_temp}"

    PAUSE

    RESPOND TYPE=command MSG="action:prompt_begin Cambio filamento"
    RESPOND TYPE=command MSG="action:prompt_text Richiesto cambio filamento. Carica nuovo filamento e clicca 'Riprendi'."
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Carica|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Scarica|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Purga|PURGE_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Riprendi|_INTERACTIVE_LOAD_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _INTERACTIVE_LOAD_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESUME

[gcode_macro _SHUTDOWN]
variable_trigger_allowed: False
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if trigger_allowed %}
        {% if not client.ad5x %}
            SET_PIN PIN=clear_power_off VALUE=1
            G4 P500
            SET_PIN PIN=clear_power_off VALUE=0
        {% endif %}
        RESPOND TYPE=command MSG="action:prompt_begin Spegnere la stampante?"
        RESPOND TYPE=command MSG="action:prompt_text Spegnere la stampante?"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button Si|SHUTDOWN|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button Annulla|RESPOND TYPE=command MSG=action:prompt_end"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro SHUTDOWN]
description: Spegni stampante
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    RESPOND TYPE=command MSG="action:prompt_end"
    BED_MESH_CLEAR
    M400
    {% if not client.ad5x %}
        # Reset button state, otherwise only one trigger can occur
        SET_PIN PIN=clear_power_off VALUE=1
        # There is a deboucing circuit which needs some delay
        G4 P500
        # Disable pin again otherwise on reset the button will be triggered 1-3 times
        SET_PIN PIN=clear_power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=run_power_off
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    {% if not client.ad5x %}
        SET_PIN PIN=power_off VALUE=0
    {% endif %}
    G4 P1000
    RUN_SHELL_COMMAND CMD=poweroff

[gcode_macro REBOOT]
description: Riavvia stampante
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    BED_MESH_CLEAR
    M400
    {% if not client.ad5x %}
        # Reset button state, otherwise only one trigger can occur
        SET_PIN PIN=clear_power_off VALUE=1
        # There is a deboucing circuit which needs some delay
        G4 P500
        # Disable pin again otherwise on reset the button will be triggered 1-3 times
        SET_PIN PIN=clear_power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=reboot

[gcode_macro REMOVE_ZMOD]
description: Rimuovi zmod
gcode:
    {% set full = params.FULL|default(0)|int %}
    CLEAR_EMMC

    {% if full == 1 %}
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/FULL_REMOVE"
    {% else %}
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/REMOVE"
    {% endif %}

    RUN_SHELL_COMMAND CMD=sync
    RUN_SHELL_COMMAND CMD=reboot

[gcode_macro SKIP_ZMOD]
description: Riavvia al sistema originale (senza zmod)
gcode:
    {% set mute = params.MUTE|default(0)|int %}

    {% if mute == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Disabilitazione temporanea di ZMOD"
        RESPOND TYPE=command MSG="action:prompt_text Dopo aver cliccato su OK, la stampante verrà spenta"
        RESPOND TYPE=command MSG="action:prompt_text Devi scollegare e ricollegare il cavo di alimentazione"
        RESPOND TYPE=command MSG="action:prompt_text La stampante si avvierà nel firmware nativo"
        RESPOND TYPE=command MSG="action:prompt_footer_button OK|SKIP_ZMOD MUTE=1"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/SKIP_ZMOD"
        RUN_SHELL_COMMAND CMD=sync
        RUN_SHELL_COMMAND CMD=poweroff
    {% endif %}

[gcode_macro LED_ON]
description: Abilita retroilluminazione
gcode:
    SET_LED LED=chamber_led WHITE=1

[gcode_macro LED_OFF]
description: Disabilita retroilluminazione
gcode:
    SET_LED LED=chamber_led WHITE=0

[gcode_macro LED]
description: Abilita retroilluminazione
gcode:
    {% set S = params.S|default(50)|int %}
    SET_LED LED=chamber_led WHITE={S/100|float}

[gcode_macro DISPLAY_ON]
description: Abilita schermo nativo e riavvia
gcode:
    SAVE_VARIABLE VARIABLE=display_off VALUE=0
    RUN_SHELL_COMMAND CMD=zdisplay PARAMS="on"

[gcode_macro DISPLAY_OFF]
description: Disabilita schermo nativo
gcode:
    {% set guppy = params.GUPPY|default(1)|int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}

    SAVE_VARIABLE VARIABLE=display_off VALUE=1
    RESPOND PREFIX="info" MSG="Non disabilitare lo schermo se non comprendi appieno il livellamento del piatto, lo Z-offset e le macro START_PRINT/END_PRINT"
    RESPOND PREFIX="info" MSG="https://github.com/ghzserg/zmod/wiki/FAQ"

    {% if guppy == 1 %}
        RESPOND PREFIX="info" MSG="Caricamento di GuppyScreen"
        {% if load_zoffset == 0 %}
            RESPOND PREFIX="info" MSG="Usa caricamento Z-OFFSET dai parametri globali per controllare Z-OFFSET con GuppyScreen"
            RESPOND PREFIX="info" MSG="SAVE_ZMOD_DATA LOAD_ZOFFSET=1"
        {% endif %}
        RUN_SHELL_COMMAND CMD=zdisplay PARAMS="guppy"
        SAVE_VARIABLE VARIABLE=guppy VALUE={1|int}
    {% else %}
        RUN_SHELL_COMMAND CMD=zdisplay PARAMS="off"
        SAVE_VARIABLE VARIABLE=guppy VALUE={0|int}
    {% endif %}
    RESTART

[gcode_macro MEM]
description: Verifica l'utilizzo della memoria
gcode:
    RUN_SHELL_COMMAND CMD=zmem

[gcode_macro PLAY_MIDI]
description: Riproduci file MIDI
variable_mute: 0
gcode:
    {% if mute == 0 %}
        {% set FILE = params.FILE|default("For_Elise.mid")|string %}
        RUN_SHELL_COMMAND CMD=audio_midi PARAMS="{FILE}"
    {% endif %}

[gcode_macro MUTE]
description: Silenzia audio
gcode:
    {% set mute = params.MUTE|default(1)|int %}
    SET_GCODE_VARIABLE MACRO=PLAY_MIDI VARIABLE=mute VALUE={mute}

[gcode_macro CAMERA_ON]
description: Usa fotocamera alternativa
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set WIDTH  = params.WIDTH|default(640)|int %}
    {% set HEIGHT = params.HEIGHT|default(480)|int %}
    {% set FPS    = params.FPS|default(20)|int %}
    {% set VIDEO  = params.VIDEO|default(client.video)|string %}
    {% set FS    = params.FS|default(0)|int %}

    RESPOND PREFIX="info" MSG="Disabilita la fotocamera sullo schermo della stampante"

    RUN_SHELL_COMMAND CMD=zcamera PARAMS="on {WIDTH} {HEIGHT} {FPS} {VIDEO} {FS} RESTART"

[gcode_macro CAMERA_OFF]
description: Disabilita fotocamera alternativa
gcode:
    RESPOND PREFIX="info" MSG="Abilita la fotocamera sullo schermo della stampante"

    {% set WIDTH  = params.WIDTH|default(640)|int %}
    {% set HEIGHT = params.HEIGHT|default(480)|int %}
    {% set FPS    = params.FPS|default(20)|int %}
    {% set VIDEO  = params.VIDEO|default("video0")|string %}
    {% set FS    = params.FS|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zcamera PARAMS="off {WIDTH} {HEIGHT} {FPS} {VIDEO} {FS} RESTART"

[gcode_macro CAMERA_RESTART]
description: Riavvia fotocamera alternativa
gcode:
    RUN_SHELL_COMMAND CMD="s99camera" PARAMS="restart"

[gcode_macro DATE_GET]
description: Verifica l'ora
gcode:
    RUN_SHELL_COMMAND CMD=date

[gcode_macro DATE_SET]
description: Imposta data e ora (formato: 2024.01.01-00:00:00)
gcode:
    {% set dt = params.DT|default("2024.01.01-00:00:00")|string %}
    RUN_SHELL_COMMAND CMD=zremote PARAMS="/bin/date {dt}"

[gcode_macro WEB]
description: Cambia interfaccia web (fluidd/mainsail)
gcode:
    {% set mute = params.MUTE|default(0)|int %}

    {% if mute == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Dopo l'esecuzione della macro premi Ctrl + F5"
        RESPOND TYPE=command MSG="action:prompt_text Dopo l'esecuzione della macro premi Ctrl + F5"
        RESPOND TYPE=command MSG="action:prompt_footer_button OK|WEB MUTE=1"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RUN_SHELL_COMMAND CMD=zhttp
    {% endif %}

[gcode_macro _STOP]
description: Disabilita riscaldamento e raffreddamento
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    M400
    M220 S100               ; Скорость 100%
    M221 S100               ; Экструзия 100%
    M140 S0                 ; Отключить нагрев стола
    M104 S0                 ; Отключить нагрев экструдера
    M106 S0                 ; Отключить кулер
    M107                    ; Отключить кулер экструдера
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    {% if zmidi_end != "" %}
        PLAY_MIDI FILE={zmidi_end}
    {% endif %}
    EXCLUDE_OBJECT_DEFINE RESET=1
    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    RUN_SHELL_COMMAND CMD=znice

    {% set profile_name = printer.bed_mesh.profile_name %}
    {% if profile_name == "default" %}
        BED_MESH_CLEAR
        BED_MESH_PROFILE REMOVE=default
    {% endif %}

    ZCONTROL_OFF

    {% if client.ad5x %}
        {% if screen == False %}
            IFS_F18
            SET_GCODE_VARIABLE MACRO=END_CHANGE_FILAMENT VARIABLE=last_data VALUE="{{'restore': 0, 'temp': 0, 'fan_speed': 0, 'channel': 99, 'need_restore': 0}}"
        {% endif %}
        SDCARD_ENABLE_FFM ENABLE=0
    {% endif %}

    RESPOND PREFIX="info" MSG="Lavoro completato"

[gcode_macro CHECK_SYSTEM]
description: Verifica sistema operativo
gcode:
    {% set restore = params.RESTORE|default(0)|int %}

    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}

    {% if client.ad5x %}
        {% if restore == 1 %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="restore 0"
        {% else %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="not_restore 0"
        {% endif %}
    {% else %}
        {% if restore == 1 %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="restore {zklipper13}"
        {% else %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="not_restore {zklipper13}"
        {% endif %}
    {% endif %}

[gcode_macro SET_TIMEZONE]
description: Cambio fuso orario
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% set ZONE  = params.ZONE|default("Europe/Moscow")|string %}
    RESPOND PREFIX="info" MSG="Europe/"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/share/zoneinfo/Europe"
    {% else %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/data/.mod/.zmod/usr/share/zoneinfo/Europe"
    {% endif %}
    RESPOND PREFIX="info" MSG="Asia/"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/share/zoneinfo/Asia"
    {% else %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/data/.mod/.zmod/usr/share/zoneinfo/Asia"
    {% endif %}
    RESPOND PREFIX="info" MSG="Use SET_TIMEZONE ZONE=Asia/Yekaterinburg"
    RUN_SHELL_COMMAND CMD=rm PARAMS="/etc/localtime"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/share/zoneinfo/{ZONE} /etc/localtime"
    {% else %}
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/data/.mod/.zmod/usr/share/zoneinfo/{ZONE} /etc/localtime"
        RUN_SHELL_COMMAND CMD=rm PARAMS="/usr/data/.mod/.zmod/etc/localtime"
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/share/zoneinfo/{ZONE} /usr/data/.mod/.zmod/etc/localtime"
    {% endif %}
    RUN_SHELL_COMMAND CMD=date

[gcode_macro STOP_ZMOD]
description: Ferma fluidd/mainsail e moonraker
gcode:
    RUN_SHELL_COMMAND CMD=stop_zmod PARAMS="stop"

[gcode_macro START_ZMOD]
description: Avvia fluidd/mainsail e moonraker dopo STOP_ZMOD
gcode:
    RUN_SHELL_COMMAND CMD=stop_zmod PARAMS="up"

[gcode_macro TEST_EMMC]
description: Testa EMMC
gcode:
    {% set size    = params.SIZE|default(400)|int %}
    {% set sync    = params.SYNC|default(1)|int %}
    {% set flash   = params.FLASH|default(0)|int %}
    {% set random  = params.RANDOM|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zfs PARAMS="{size} {sync} {flash} {random}"

[gcode_macro CLEAR_EMMC]
description: Cancella EMMC
gcode:
    {% set log    = params.LOG|default(1)|int %}
    {% set any    = params.ANY|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zclear PARAMS="{log} {any}"

[gcode_macro ZSSH_ON]
description: Reindirizza moonraker e fotocamera al server SSH
gcode:
    {% set ssh_server  = params.SSH_SERVER|default("127.0.0.1")|string %}
    {% set ssh_port    = params.SSH_PORT|default(22)|int %}
    {% set ssh_user    = params.SSH_USER|default("user")|string %}
    {% set video_port  = params.VIDEO_PORT|default(8080)|int %}
    {% set moon_port   = params.MOON_PORT|default(7125)|int %}
    {% set remote_run  = params.REMOTE_RUN|default("NONE")|string %}
    RUN_SHELL_COMMAND CMD=zssh PARAMS="START {ssh_server} {ssh_port} {ssh_user} {video_port} {moon_port} '{remote_run}' RESTART"

[gcode_macro ZSSH_OFF]
description: Disabilita il forwarding della porta SSH
gcode:
    RUN_SHELL_COMMAND CMD=zssh PARAMS="STOP 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro ZSSH_RESTART]
description: Riavvio SSH
gcode:
    RUN_SHELL_COMMAND CMD=zssh PARAMS="RESTART 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro ZSSH_RELOAD]
description: Avvia SSH se non in esecuzione
gcode:
    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if screen == True %}
        RESPOND PREFIX="info" MSG="Stai usando lo schermo nativo"
    {% else %}
        RESPOND PREFIX="info" MSG="Non stai usando lo schermo nativo"
    {% endif %}

    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if zklipper13 == 1 %}
        RESPOND PREFIX="//" MSG="Usando Klipper 13"
    {% else %}
        {% if not client.ad5x %}
            RESPOND PREFIX="//" MSG="Usando Klipper nativo 11"
        {% else %}
            RESPOND PREFIX="//" MSG="Usando Klipper nativo 12"
        {% endif %}
    {% endif %}

    RUN_SHELL_COMMAND CMD=zssh PARAMS="RELOAD 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro _MESH_TEST]
description: Confronta gli estremi della griglia con l'ultima sonda
gcode:
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set mesh = printer.bed_mesh.profiles[profile_name] %}

    {% if mesh %}
        _MESH_PROBE
        _MESH_COMPARE
    {% else %}
        {action_respond_info("ATTENZIONE: Griglia del piatto non caricata!")}
    {% endif %}

[gcode_macro _MESH_PROBE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set kamp_settings = printer["gcode_macro _KAMP_Settings"] %}                                                                 # Pull variables from _KAMP_Settings
    {% set mesh_margin = kamp_settings.mesh_margin | float %}                                                                       # Pull mesh margin setting from _KAMP_Settings
    {% set fuzz_amount = kamp_settings.fuzz_amount | float %}                                                                       # Pull fuzz amount setting from _KAMP_Settings
    {% set fuzz_range = range((0) | int, (fuzz_amount * 100) | int + 1) %}                                                          # Set fuzz_range between 0 and fuzz_amount
    {% set adapted_x_min = mesh_margin + (fuzz_range | random / 100.0) %}                                                           # Adapt x_min to margin and fuzz constraints

    _G28
    _TEST_MIN_MAX

    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = G10 | string %}
        {% set UNRETRACT = G11 | string %}
    {% else %}
        {% set RETRACT = 'G1 E-.5 F2100' | string %}
        {% set UNRETRACT = 'G1 E.5 F2100' | string %}
    {% endif %}

    G92 E0
    G90
    _CLIENT_LINEAR_MOVE X=-{adapted_x_min}
    G1 Z5 F6000
    {RETRACT}
    LOAD_CELL_TARE
    PROBE
    G1 Z5 F6000
    {UNRETRACT}

[gcode_macro _MESH_COMPARE]
gcode:
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set mesh = printer.bed_mesh %}
    {% set last_probe = printer.probe.last_z_result %}

    {% if mesh and 'mesh_matrix' in mesh %}
        {% set all_z = mesh.mesh_matrix | sum(start=[]) %}
        {% set min_z = all_z | min %}
        {% set max_z = all_z | max %}

        {action_respond_info("Current profile: %s" % profile_name)}
        {action_respond_info("Minimo: %.3f mm | Delta: %.3f mm" % (min_z, max_z - min_z))}
        {action_respond_info("Massimo: %.3f mm | Ultima sonda: %.3f mm" % (max_z, last_probe))}

        {% if last_probe < min_z - 0.21 %}
            {action_respond_info("Possibile profilo errato caricato (piatto/temperatura diversi)")}
            {action_respond_info("Disabilita il controllo: MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
            {action_raise_error("ATTENZIONE: Ultima sonda SOTTO il minimo della griglia di %.3f mm!" % (min_z - last_probe))}
        {% elif last_probe > max_z + 0.21 %}
            {action_respond_info("Possibile profilo errato caricato (piatto/temperatura diversi)")}
            {action_respond_info("Disabilita il controllo: MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
            {action_raise_error("ATTENZIONE: Ultima sonda SOPRA il massimo della griglia di %.3f mm!" % (last_probe - max_z))}
        {% else %}
            {action_respond_info("OK: Sonda entro gli estremi della griglia")}
        {% endif %}

    {% else %}
        {action_respond_info("Profilo o matrice della griglia non trovati")}
    {% endif %}

[gcode_macro _START_MESH]
gcode:
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}

    {% if skip_leveling == False %}
        {% if force_kamp == True %}
            RESPOND PREFIX="//" MSG="KAMP avviato SKIP_LEVELING={skip_leveling} FORCE_KAMP={force_kamp}"

            {% set screen = printer["gcode_macro START_PRINT"].screen %}
            {% if screen == True %}
                RESPOND PREFIX="info" MSG="Sapevi che puoi abilitare KAMP globalmente?"
                RESPOND PREFIX="//" MSG="SAVE_ZMOD_DATA USE_KAMP=1 CLEAR=LINE_PURGE"
            {% endif %}
            KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}

        {% else %}
            {% if (not printer['bed_mesh'].profile_name) or force_leveling == True %}
                {% if mesh != "" %}
                    RESPOND PREFIX="!!" MSG="Creazione della griglia {mesh} (non trovata). Salvala DOPO la stampa!"
                    _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE={mesh}

                {% else %}
                    {% if force_leveling == True %}
                        RESPOND PREFIX="info" MSG="Creazione della griglia predefinita (FORCE_LEVELING={force_leveling})"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=default

                    {% else %}
                        RESPOND PREFIX="info" MSG="Creazione della griglia automatica (nessun profilo caricato)"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=auto
                    {% endif %}
                {% endif %}
            {% endif %}
            {% set cur_mesh = printer['bed_mesh'].profile_name %}
            RESPOND PREFIX="//" MSG="Nessun bisogno di livellamento. Profilo caricato: {cur_mesh}"
        {% endif %}

    {% else %}
        RESPOND PREFIX="//" MSG="Saltando il livellamento del piatto. SKIP_LEVELING={skip_leveling}"
    {% endif %}

[gcode_macro _PRINT_MESH]
gcode:
    {% set cur_mesh = printer['bed_mesh'].profile_name %}

    RESPOND PREFIX="info" MSG="Stampa con griglia del piatto: {cur_mesh}"

[gcode_macro _PREPARE_PRINT]
gcode:
    UPDATE_DELAYED_GCODE ID=_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_FAST_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_STOP_MOTOR DURATION=0
    UPDATE_DELAYED_GCODE ID=_AUTO_REBOOT DURATION=0
    UPDATE_DELAYED_GCODE ID=_PRO_POWEROFF DURATION=0
    UPDATE_DELAYED_GCODE ID=_GOTO_PAUSE DURATION=0

[gcode_macro _START_PRINT]
description: Sostituisci G-code di avvio predefinito
variable_zextruder_temp: 245.0
variable_zbed_temp: 80.0
variable_zforce_kamp: False
variable_zforce_leveling: False
variable_zskip_leveling: False
variable_zskip_zoffset: False
variable_zzoffset: 0.0
variable_zmesh: ""
gcode:
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}              ; if True it forces the KAMP bed level process
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}      ; if True it forces the bed level process
    {% set zoffset = printer["gcode_macro _START_PRINT"].zzoffset %}                    ; Установить Z offset
    {% set skip_zoffset = printer["gcode_macro _START_PRINT"].zskip_zoffset %}          ; Для печати с родного экрана не устанавливать Z offset
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}        ; Не строить карту
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}                          ; Имя профиля карты стола

    {% set filename = printer.virtual_sdcard.file_path|default("")|string  %}

    {% set force_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% set disable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% set disable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}
    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE")|string %}
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}

    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    _PREPARE_PRINT

    CLEAR_PAUSE
    ZCONTROL_ABORT
    ZCONTROL_ON
    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    ZSSH_RELOAD

    RESPOND PREFIX="info" MSG="START_PRINT BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} FORCE_LEVELING={force_leveling} FORCE_KAMP={force_kamp} Z_OFFSET={zoffset} SKIP_ZOFFSET={skip_zoffset} SKIP_LEVELING={skip_leveling} MESH={mesh}"

    RESPOND PREFIX="info" MSG="Temperatura dell'estrusore: {extruder_temp}"
    RESPOND PREFIX="info" MSG="Temperatura del piatto: {bed_temp}"

    {% if zprint_leveling == 0 %}
        {% if force_kamp == True %}
            RESPOND PREFIX="info" MSG="KAMP: abilitato"
        {% else %}
            RESPOND PREFIX="info" MSG="KAMP: disabilitato"
        {% endif %}

        {% if force_leveling == True %}
            RESPOND PREFIX="info" MSG="Livellamento forzato del piatto: abilitato"
        {% else %}
            RESPOND PREFIX="info" MSG="Livellamento forzato del piatto: disabilitato"
        {% endif %}

        {% if skip_leveling == True %}
            RESPOND PREFIX="info" MSG="Salta livellamento del piatto: abilitato"
        {% else %}
            RESPOND PREFIX="info" MSG="Salta livellamento del piatto: disabilitato"
        {% endif %}

        RESPOND PREFIX="info" MSG="Carica griglia del piatto: {mesh}"
    {% endif %}

    {% if screen == False %}
        {% if force_md5 == 1 %}
            RESPOND PREFIX="info" MSG="MD5: abilitato"
        {% else %}
            RESPOND PREFIX="info" MSG="MD5: disabilitato"
        {% endif %}
    {% endif %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="Purga dell'ugello: disabilitata"
    {% else %}
        RESPOND PREFIX="info" MSG="Purga dell'ugello: abilitata"
        RESPOND PREFIX="info" MSG="Algoritmo di purga: {zclear}"
    {% endif %}

    {% if disable_skew == 1 %}
        RESPOND PREFIX="info" MSG="SKEW: disabilitato"
    {% else %}
        RESPOND PREFIX="info" MSG="SKEW: abilitato"
    {% endif %}

    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}
    {% if ( force_md5 == 1 and check_md5 == 0 ) %}
        RESPOND PREFIX="info" MSG="Verifica MD5 avviata"
        CHECK_MD5 DELETE=True
    {% endif %}

    {% if ( (force_kamp == True) or (zuse_kamp == 1) or (zclear == "LINE_PURGE") ) and screen %}
        RESPOND PREFIX="info" MSG="Recupero dati per KAMP"
        RUN_SHELL_COMMAND CMD=zexclude PARAMS={'"%s"' % (filename.replace("'", "\\\'").replace(" ", "\ "))}
    {% endif %}

    M140 S{bed_temp}        ; start bed heating
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    {% if (load_zoffset == 1) and (screen == False) %}
        RESPOND PREFIX="info" MSG="Usando controllo globale Z-Offset. Parametri SKIP_ZOFFSET e Z_OFFSET ignorati"
        LOAD_GCODE_OFFSET
    {% else %}
        {% if (load_zoffset == 1) and (screen == True) %}
            RESPOND PREFIX="info" MSG="Caricamento globale Z-OFFSET: ignorato (lavorando con schermo)"
        {% endif %}

        {% if skip_zoffset == True %}
            RESPOND PREFIX="info" MSG="Impostazione Z-offset saltata, SKIP_ZOFFSET={skip_zoffset}"
        {% else %}
            RESPOND PREFIX="info" MSG="Impostazione Z-offset {zoffset}, SKIP_ZOFFSET={skip_zoffset}"
            SET_GCODE_OFFSET Z={zoffset}
        {% endif %}
    {% endif %}

    _G28

    {% if not client.ad5x %}
        {% set we = printer['temperature_sensor weightValue'].temperature %}
        {% if we != 0 %}
            LOAD_CELL_TARE
        {% endif %}
    {% endif %}

    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Creazione della griglia tramite schermo nativo ad ogni stampa. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% else %}
            RESPOND PREFIX="//" MSG="Creazione della griglia del piatto ad ogni stampa. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
            BED_MESH_CLEAR
            M400
            {% if zuse_kamp == 1 %}
                RESPOND PREFIX="info" MSG="Usando KAMP dalle impostazioni globali. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% else %}
                RESPOND PREFIX="info" MSG="Creazione della griglia completa del piatto. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
                _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% endif %}
        {% endif %}

        RESPOND PREFIX="//" MSG="Tutti i parametri START_PRINT per il livellamento del piatto sono ignorati"
    {% else %}
        {% if mesh != "" %}
            RESPOND PREFIX="info" MSG="Tentativo di caricare la griglia del piatto: {mesh}"
            BED_MESH_CLEAR
            M400
            {% for mesh_dt in printer['bed_mesh'].profiles %}
                {% if mesh == mesh_dt %}
                    BED_MESH_PROFILE LOAD={mesh}
                    RESPOND PREFIX="info" MSG="Griglia del piatto {mesh} caricata"
                {% endif %}
            {% endfor %}
        {% endif %}

        _START_MESH
    {% endif %}

    # load skew profile
    {% if disable_skew == 0 %}
        RESPOND PREFIX="info" MSG="Caricamento di skew_profile"
        SKEW_PROFILE LOAD=skew_profile
    {% endif %}

    G90                     ; use absolute coordinates
    {% if client.ad5x %}
        _UGOL_PARK
    {% else %}
        {% if ((zprint_leveling == 0) and (force_kamp == True)) or ((zprint_leveling == 1) and (screen == False) and (zuse_kamp == 1)) or (zclear == "LINE_PURGE") %}
            _SMART_PARK
        {% else %}
            _UGOL_PARK
        {% endif %}
    {% endif %}

    #M190 S{bed_temp}
    #M109 S{extruder_temp}

    RESPOND PREFIX="//" MSG="In attesa della normalizzazione della temperatura. Letto: {bed_temp-1}-{bed_temp+1}. Estrusore: {extruder_temp-1}-{extruder_temp+1}"
    RESPOND PREFIX="//" MSG="Se richiede molto tempo, calibrare il PID dell'estrusore e del letto"
    # Убираем стабилизацию температуры, для тех у кого не настроен PID экструдера и/или PID стола
    M140 S{bed_temp}
    # Включаем для AD5X одновременный нагрев сопла и стола
    {% if client.ad5x %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-20} MAXIMUM={bed_temp+1}
        M104 S{extruder_temp}
    {% endif %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-1} MAXIMUM={bed_temp+1}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-1} MAXIMUM={extruder_temp+1}
    RESPOND PREFIX="//" MSG="Normalizzazione della temperatura completata"

    {% if client.ad5x %}
        _PRINT_CLEAR_NOZZLE
        _SMART_PARK
    {% endif %}

    {% if printer.toolhead.position.z < 5 %}
        G1 Z5 F3000
    {% endif %}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="Purga della linea dell'ugello disabilitata. DISABLE_PRIMING={disable_priming}"
        _PRINT_MESH
        {% if zmidi_start != "" %}
            PLAY_MIDI FILE={zmidi_start}
        {% endif %}
    {% else %}
        {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
        {% if mesh_test == 0 or force_kamp == True or zprint_leveling == 1 or force_leveling == True %}
            _PRINT_MESH
        {% else %}
            _MESH_TEST
        {% endif %}

        RESPOND PREFIX="info" MSG="Purga della linea dell'ugello"
        RESPOND PREFIX="info" MSG="Algoritmo: {zclear}"

        {% if zmidi_start != "" %}
            PLAY_MIDI FILE={zmidi_start}
        {% endif %}

        {% if ( (force_kamp == True) or (zuse_kamp == 1) ) and (zclear == "_CLEAR1" or zclear == "_CLEAR2" or zclear == "_CLEAR3" or zclear == "_CLEAR4") %}
            RESPOND PREFIX="info" MSG="Stai usando KAMP. Consigliato usare LINE_PURGE: // SAVE_ZMOD_DATA CLEAR=LINE_PURGE"
            RESPOND PREFIX="info" MSG="LINE_PURGE forzato"
            LINE_PURGE
        {% else %}
            _TEST_MIN_MAX
            SAVE_GCODE_STATE NAME=CLEAR_STATE
            {zclear}
            RESTORE_GCODE_STATE NAME=CLEAR_STATE
        {% endif %}
    {% endif %}

[gcode_macro UPDATE_MCU]
description: Aggiorna MCU
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set current_klipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% set force = params.FORCE|default(0)|int %}

    RESPOND TYPE=error MSG="Aspetta la musica e spegni la stampante. Aspetta 10 secondi e riavvia. L'aggiornamento MCU inizierà."

    {% if (current_klipper13 == 1 and force == 0) or (force == 11) or (force == 12) %}
        RESPOND PREFIX="info" MSG="Flash MCU con versione originale per Klipper nativo"
        SAVE_VARIABLE VARIABLE=klipper13 VALUE={0|int}
        G4 P5000
        M400
        RUN_SHELL_COMMAND CMD=zmcu PARAMS="0"
    {% else %}
        {% if (current_klipper13 == 0 and force == 0) or (force == 13) %}
            RESPOND PREFIX="info" MSG="Flash MCU Klipper 13"
            SAVE_VARIABLE VARIABLE=klipper13 VALUE={1|int}
            G4 P5000
            M400
            RUN_SHELL_COMMAND CMD=zmcu PARAMS="1"
        {% endif %}
    {% endif %}

[gcode_macro NEW_SAVE_CONFIG]
description: Salva parametri senza bloccare lo schermo nativo
gcode:
    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if screen == False or client.ad5x %}
        SAVE_CONFIG
    {% else %}
        RESPOND PREFIX="info" MSG="NEW_SAVE_CONFIG"
        RUN_SHELL_COMMAND CMD=restart_klipper
    {% endif %}

[gcode_macro CLOSE_DIALOGS]
description: Chiudi le finestre sullo schermo nativo (lento)
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        RESPOND PREFIX="info" MSG="Chiusura delle finestre di dialogo sullo schermo nativo (lento)"
        RUN_SHELL_COMMAND CMD=close_dialogs
        RESPOND PREFIX="info" MSG="Impossibile chiudere le finestre? Usa chiusura rapida: FAST_CLOSE_DIALOGS // SAVE_ZMOD_DATA CLOSE_DIALOGS=2"
    {% else %}
        FAST_CLOSE_DIALOGS
    {% endif %}

[gcode_macro FAST_CLOSE_DIALOGS]
description: Chiudi le finestre sullo schermo nativo (veloce)
gcode:
    RESPOND PREFIX="info" MSG="Chiusura delle finestre di dialogo sullo schermo nativo (veloce)"
    RUN_SHELL_COMMAND CMD=zprint PARAMS="CLOSE CLOSE"

[delayed_gcode _STOP_MOTOR]
gcode:
    RESPOND PREFIX="info" MSG="Motori disabilitati"
    M84                     ; Выключить мотор

[delayed_gcode _GOTO_PAUSE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        G90
        RESPOND PREFIX="info" MSG="Spostamento della testa nell'angolo destro lontano"
        G1 X{client.custom_park_x} F7800
        M400
        G1 Y{client.custom_park_y} F7800
        M400
    {% else %}
        _GOTO_TRASH
    {% endif %}

[delayed_gcode _CLOSE_DIALOGS]
gcode:
    CLOSE_DIALOGS

[delayed_gcode _FAST_CLOSE_DIALOGS]
gcode:
    FAST_CLOSE_DIALOGS

[delayed_gcode _AUTO_REBOOT]
gcode:
    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    {% if (zauto_reboot == 2) and (screen == False) %}
        FIRMWARE_RESTART
    {% else %}
        REBOOT
    {% endif %}

[delayed_gcode _PRO_POWEROFF]
gcode:
    SHUTDOWN

[delayed_gcode restart_services]
initial_duration: 180
gcode:
    ZSSH_RELOAD

[delayed_gcode start_led]
initial_duration: 10
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% if client.ad5x %}
        UPDATE_FF_OFFSET
    {% endif %}

    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    SET_GCODE_VARIABLE MACRO=_SHUTDOWN VARIABLE=trigger_allowed VALUE=True
    SET_GCODE_VARIABLE MACRO=SET_LED VARIABLE=allowed VALUE=True

    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    CAMERA_RESTART

    GET_ZMOD_DATA

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    {% if zmidi_on != "" %}
        PLAY_MIDI FILE={zmidi_on}
    {% endif %}

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    LED S={zled}

[gcode_macro _COLDPULL_LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro _COLDPULL_LOAD_MATERIAL]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    RESPOND TYPE=command MSG=action:prompt_end

    _G28

    G90
    G1 X{client.min_x+(client.max_x-client.min_x)/2} F7800
    M400
    G1 Y{client.min_y+(client.max_y-client.min_y)/2} F7800
    M400

    {% set extruder_temp = params.TEMP|default(245)|float %}
    RESPOND PREFIX="info" MSG="In attesa del riscaldamento dell'ugello a {extruder_temp}"
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp} MAXIMUM={extruder_temp+10}

    RESPOND PREFIX="info" MSG="Estrusione di 10 cm di filamento"

    G92 E0
    _DISABLE_SENSOR
        G1 E100 F100
        M400
    _ENABLE_SENSOR

    {% set cold_temp = params.COLD|default(245)|float %}
    RESPOND PREFIX="info" MSG="Raffreddamento fino a {cold_temp}°C"
    M104 S{cold_temp}
    M106 P0 S255
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={cold_temp-2} MAXIMUM={cold_temp+2}

    RESPOND PREFIX="info" MSG="Tirando il filamento"

    G92 E0
    _DISABLE_SENSOR
        G1 E-70 F1500
        M400
    _ENABLE_SENSOR

    RESPOND PREFIX="info" MSG="Rimuovi manualmente il filamento rimanente"
    M107
    M104 S0
    G92 E0

[gcode_macro COLDPULL]
description: Cold pull (pulizia dell'ugello) delicatamente
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Selezione materiale per il caricamento"
    RESPOND TYPE=command MSG="action:prompt_text Seleziona materiale per pulire l'ugello"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button PETG|_COLDPULL_LOAD_MATERIAL TEMP=245 COLD=100|primary"
    RESPOND TYPE=command MSG="action:prompt_button ABS|_COLDPULL_LOAD_MATERIAL TEMP=255 COLD=105|primary"
    RESPOND TYPE=command MSG="action:prompt_button NEYLON|_COLDPULL_LOAD_MATERIAL TEMP=260 COLD=120|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Annulla|_COLDPULL_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro SAVE_ZMOD_DATA]
description: Salva parametri ZMOD
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if params.CLOSE_DIALOGS %}
        {% set zclose_dialogs = params.CLOSE_DIALOGS|default(2)|int %}
        {% if client.ad5x and zclose_dialogs == 1 %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% else %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
        {% endif %}
    {% endif %}

    {% if params.STOP_MOTOR %}
        {% set zstop_motor = params.STOP_MOTOR|default(1)|int %}
        SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.USE_SWAP %}
        {% set zuse_swap = params.USE_SWAP|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}
    {% endif %}

    {% if params.AUTO_REBOOT %}
        {% set zauto_reboot = params.AUTO_REBOOT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}
    {% endif %}

    {% if params.SAVE_RESTORE %}
        {% set save_restore = params.SAVE_RESTORE|default(1)|int %}
        SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}
    {% endif %}

    {% if params.FIX_SCV %}
        {% set fix_scv = params.FIX_SCV|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}
    {% endif %}

    {% if params.WIFI %}
        {% set wifi = params.WIFI|default(0)|int %}
        SAVE_VARIABLE VARIABLE=wifi VALUE={wifi|int}
    {% endif %}

    {% if client.ad5x %}
    {% if params.SILENT %}
        {% set silent = params.SILENT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=silent VALUE={silent|int}
    {% endif %}
    {% if params.AUTOINSERT %}
        {% set autoinsert = params.AUTOINSERT|default(1)|int %}
        SAVE_VARIABLE VARIABLE=autoinsert VALUE={autoinsert|int}
    {% endif %}
    {% if params.USE_TRASH_ON_PRINT %}
        {% set use_trash_on_print = params.USE_TRASH_ON_PRINT|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE={use_trash_on_print|int}
    {% endif %}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.MOTION_SENSOR %}
        {% set motion_sensor = params.MOTION_SENSOR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}
    {% endif %}

    {% if params.FIX_E0011 %}
        {% set fix_e0011 = params.FIX_E0011|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    {% endif %}

    {% if params.FIX_E0017 %}
        {% set fix_e0017 = params.FIX_E0017|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    {% endif %}

    {% if params.PRINT_LEVELING %}
        {% set zprint_leveling = params.PRINT_LEVELING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}
    {% endif %}

    {% if params.USE_KAMP %}
        {% set zuse_kamp = params.USE_KAMP|default(0)|int %}
        SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}
    {% endif %}

    {% if params.MESH_TEST %}
        {% set zmesh_test = params.MESH_TEST|default(1)|int %}
        SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.NEW_SAVE_CONFIG %}
        {% set znew_save_config = params.NEW_SAVE_CONFIG|default(0)|int %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% endif %}

    {% if params.PRECLEAR %}
        {% set zpreclear = params.PRECLEAR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% endif %}
    {% endif %}

    {% if params.FORCE_MD5 %}
        {% set zforce_md5 = params.FORCE_MD5|default(1)|int %}
        SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}
    {% endif %}

    {% if params.DISABLE_SKEW %}
        {% set zdisable_skew = params.DISABLE_SKEW|default(1)|int %}
        SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}
    {% endif %}

    {% if params.LOAD_ZOFFSET %}
        {% set zload_zoffset = params.LOAD_ZOFFSET|default(0)|int %}
        SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}
    {% endif %}

    {% if params.LED %}
        {% set zled = params.LED|default(50)|int %}
        SAVE_VARIABLE VARIABLE=led VALUE={zled|int}
    {% endif %}

    {% if params.DISABLE_PRIMING %}
        {% set zdisable_priming = params.DISABLE_PRIMING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}
    {% endif %}

    {% if params.CLEAR %}
        {% set zclear = params.CLEAR|default("LINE_PURGE")|string %}
        SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'
    {% endif %}

    {% if params.CHINA_CLOUD %}
        {% set zchina_cloud = params.CHINA_CLOUD|default(1)|int %}
        SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}
    {% endif %}

    {% if params.SAVE_MOONRAKER %}
        {% set save_moonraker = params.SAVE_MOONRAKER|default(0)|int %}
        SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}
    {% endif %}

    {% if params.NICE %}
        {% set znice = params.NICE|default(20)|int %}
        {% if znice > 40 %}
            SAVE_VARIABLE VARIABLE=nice VALUE={40|int}
        {% else %}
            {% if znice < 1 %}
                SAVE_VARIABLE VARIABLE=nice VALUE={1|int}
            {% else %}
                SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
            {% endif %}
        {% endif %}
    {% endif %}

    {% if params.DISPLAY_OFF_TIMEOUT %}
        {% set display_off_timeout = params.DISPLAY_OFF_TIMEOUT|default(20)|int %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% if params.PRO_POWEROFF_TIMEOUT %}
        {% set pro_poweroff_timeout = params.PRO_POWEROFF_TIMEOUT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% endif %}

    {% if params.MIDI_ON %}
        {% set zmidi_on = params.MIDI_ON|default("")|string %}
        {% if zmidi_on == "0" %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_START %}
        {% set zmidi_start = params.MIDI_START|default("")|string %}
        {% if zmidi_start == "0" %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_PAUSE %}
        {% set zmidi_pause = params.MIDI_PAUSE|default("")|string %}
        {% if zmidi_pause == "0" %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_END %}
        {% set zmidi_end = params.MIDI_END|default("")|string %}
        {% if zmidi_end == "0" %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'
        {% endif %}
    {% endif %}

    GET_ZMOD_DATA

[gcode_macro GET_ZMOD_DATA]
description: Ottieni parametri ZMOD
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    RESPOND PREFIX="info" MSG="Parametri ZMOD. Impostati tramite SAVE_ZMOD_DATA"

    {% set guppy = printer.save_variables.variables.guppy|default(1) | int %}
    SAVE_VARIABLE VARIABLE=guppy VALUE={guppy|int}

    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% if screen == True %}
        RESPOND PREFIX="info" MSG="Stai usando lo schermo nativo // DISPLAY_ON"
    {% else %}
        {% if guppy == 1 %}
            RESPOND PREFIX="info" MSG="Stai lavorando SENZA schermo nativo ma CON GuppyScreen // DISPLAY_OFF GUPPY=1"
        {% else %}
            RESPOND PREFIX="info" MSG="Stai lavorando SENZA schermo nativo // DISPLAY_OFF GUPPY=0"
        {% endif %}
    {% endif %}

    RESPOND PREFIX="info" MSG="Parametri usati all'inizio e livellamento del piatto [START_PRINT]"

    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Crea la griglia del piatto tramite lo schermo nativo ad ogni stampa. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% else %}
            RESPOND PREFIX="//" MSG="Crea la griglia del piatto ad ogni stampa. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% endif %}
    {% else %}
        RESPOND PREFIX="//" MSG="Non costruire la rete del letto su ogni stampa // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}

    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="//" MSG="Usa griglia adattiva (KAMP) dove possibile invece di griglia completa // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
    {% else %}
        RESPOND PREFIX="//" MSG="Non usare KAMP al posto di BED_MESH_CALIBRATE // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}

    {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
    {% if zmesh_test == 1 %}
        RESPOND PREFIX="//" MSG="Testa la griglia del piatto prima della stampa // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% else %}
        RESPOND PREFIX="//" MSG="Non testare la griglia del piatto prima della stampa // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}
    RESPOND PREFIX="//" MSG="Riproduci MIDI all'inizio della stampa: {zmidi_start} // SAVE_ZMOD_DATA MIDI_START={zmidi_start}"
    SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'

    {% set zmidi_pause = printer.save_variables.variables.midi_pause|default("") | string %}
    RESPOND PREFIX="//" MSG="Riproduci MIDI durante la pausa: {zmidi_pause} // SAVE_ZMOD_DATA MIDI_PAUSE={zmidi_pause}"
    SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'

    {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% if zforce_md5 == 1 %}
        RESPOND PREFIX="//" MSG="Verifica la somma di controllo MD5 del file // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% else %}
        RESPOND PREFIX="//" MSG="Non verificare la somma MD5 del file // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}

    {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% if zdisable_skew == 1 %}
        RESPOND PREFIX="//" MSG="Correzione SKEW disabilitata // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% else %}
        RESPOND PREFIX="//" MSG="Correzione SKEW abilitata. Profilo skew_profile // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}

    {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}
    {% if zload_zoffset == 1 %}
        RESPOND PREFIX="//" MSG="Carica Z-OFFSET dalle impostazioni globali // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
    {% else %}
        RESPOND PREFIX="//" MSG="Non caricare lo Z-OFFSET dalle impostazioni globali // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}

    {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% if zdisable_priming == 1 %}
        RESPOND PREFIX="//" MSG="Disabilita la purga della linea dell'ugello // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% else %}
        RESPOND PREFIX="//" MSG="Abilita la purga della linea dell'ugello // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}

    {% if not client.ad5x %}
        {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
        {% if zpreclear == 1 %}
            RESPOND PREFIX="//" MSG="Usa pre-purga dell'ugello // SAVE_ZMOD_DATA PRECLEAR={zpreclear}"
        {% else %}
            RESPOND PREFIX="//" MSG="Non usare la pre-purga dell'ugello // SAVE_ZMOD_DATA PRECLEAR={zpreclear}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% endif %}

    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE") | string %}
    RESPOND PREFIX="//" MSG="Algoritmo di purga: {zclear} // SAVE_ZMOD_DATA CLEAR={zclear}"
    SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'

    RESPOND PREFIX="info" MSG="Parametri usati alla fine e annullamento della stampa [END_PRINT]"

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    RESPOND PREFIX="//" MSG="Riproduci MIDI alla fine della stampa: {zmidi_end} // SAVE_ZMOD_DATA MIDI_END={zmidi_end}"
    SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'

    {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(2) | int %}
    SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
    {% if zclose_dialogs == 0 %}
        RESPOND PREFIX="//" MSG="Non chiudere le finestre sullo schermo nativo // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% else %}
        {% if client.ad5x %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% endif %}
    {% endif %}
    {% if zclose_dialogs == 1 %}
        RESPOND PREFIX="//" MSG="Chiudi automaticamente le finestre sullo schermo nativo dopo 20 secondi (lento) // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}
    {% if zclose_dialogs == 2 %}
        RESPOND PREFIX="//" MSG="Chiudi automaticamente le finestre sullo schermo nativo dopo 20 secondi (veloce) // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}

    {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
    {% if zstop_motor == 1 %}
        RESPOND PREFIX="//" MSG="Disattiva automaticamente i motori dopo la stampa/annullamento in 25 secondi // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% else %}
        RESPOND PREFIX="//" MSG="Non disattivare automaticamente i motori dopo la stampa/annullamento // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}

    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% if zauto_reboot == 0 %}
        RESPOND PREFIX="//" MSG="Non riavviare automaticamente la stampante // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 1 %}
        RESPOND PREFIX="//" MSG="Riavvia automaticamente la stampante dopo 1.5 minuti //SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 2 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Riavvia automaticamente la stampante dopo 1.5 minuti //SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% else %}
            RESPOND PREFIX="//" MSG="Riavvia automaticamente il firmware dopo 1.5 minuti //SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}

    {% if not client.ad5x %}
        {% set pro_poweroff_timeout = printer.save_variables.variables.pro_poweroff_timeout|default(0) | int %}
        RESPOND PREFIX="//" MSG="Spegni FF5M Pro dopo (min): {pro_poweroff_timeout} // SAVE_ZMOD_DATA PRO_POWEROFF_TIMEOUT={pro_poweroff_timeout}"
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% endif %}

    RESPOND PREFIX="info" MSG="Parametri di sistema"

    {% set save_restore = printer.save_variables.variables.save_restore|default(1) | int %}
    {% if save_restore == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Salvataggio controllato dallo schermo nativo // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="Salva dati per il recupero della stampa // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% else %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Salvataggio controllato dallo schermo nativo // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="Non salvare i dati per il recupero della stampa // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}

    {% if not client.ad5x %}
        {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
        {% if motion_sensor == 1 %}
            RESPOND PREFIX="//" MSG="Usando sensore di movimento del filamento // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
            {% if screen == True %}
                RESPOND PREFIX="//" MSG="Disabilita il sensore di filamento sullo schermo nativo"
            {% endif %}
        {% else %}
            RESPOND PREFIX="//" MSG="Usando sensore di presenza del filamento // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}

    {% if client.ad5x %}
        {% set silent = printer.save_variables.variables.silent|default(0) | int %}
        {% if silent == 0 %}
            RESPOND PREFIX="//" MSG="Non nascondere la selezione colore all'avvio della stampa // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        {% if silent == 1 %}
            RESPOND PREFIX="//" MSG="Nascondi la selezione colore, stampa con IFS // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        {% if silent == 2 %}
            RESPOND PREFIX="//" MSG="Nascondi la selezione colore, stampa senza IFS // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=silent VALUE={silent|int}

        {% set autoinsert = printer.save_variables.variables.autoinsert|default(1) | int %}
        {% if autoinsert == 0 %}
            RESPOND PREFIX="//" MSG="Non caricare filamento automaticamente // SAVE_ZMOD_DATA AUTOINSERT={autoinsert}"
        {% else %}
            RESPOND PREFIX="//" MSG="Caricare filamento automaticamente // SAVE_ZMOD_DATA AUTOINSERT={autoinsert}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=autoinsert VALUE={autoinsert|int}

        {% set use_trash_on_print = printer.save_variables.variables.use_trash_on_print|default(1) | int %}
        {% if use_trash_on_print == 0 %}
            RESPOND PREFIX="//" MSG="Non utilizzare il contenitore di spurgo durante la stampa // SAVE_ZMOD_DATA USE_TRASH_ON_PRINT={use_trash_on_print}"
        {% else %}
            RESPOND PREFIX="//" MSG="Utilizzare il contenitore di spurgo durante la stampa // SAVE_ZMOD_DATA USE_TRASH_ON_PRINT={use_trash_on_print}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE={use_trash_on_print|int}


    {% endif %}

    {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
    {% if fix_scv == 1 %}
        RESPOND PREFIX="//" MSG="Usa SCV dalla configurazione per grafici dello shaper // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% else %}
        RESPOND PREFIX="//" MSG="Usa SCV = 5 per grafici dello shaper // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}

    {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(1) | int %}
    {% if fix_e0011 == 1 %}
        RESPOND PREFIX="//" MSG="Correggi errore E0011 // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% else %}
        RESPOND PREFIX="//" MSG="Non correggere l'errore E0011 // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    RUN_SHELL_COMMAND CMD=zfix_e0011 PARAMS="{fix_e0011}"

    {% set fix_e0017 = printer.save_variables.variables.fix_e0017|default(1) | int %}
    {% if fix_e0017 == 1 %}
        RESPOND PREFIX="//" MSG="Correggi errore E0017 // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% else %}
        RESPOND PREFIX="//" MSG="Non correggere l'errore E0017 // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    RUN_SHELL_COMMAND CMD=zfix_e0017 PARAMS="{fix_e0017}"

    {% set wifi = printer.save_variables.variables.wifi|default(0) | int %}
    {% if wifi == 1 %}
        RESPOND PREFIX="//" MSG="Zmod Wifi On // SAVE_ZMOD_DATA WIFI={wifi}"
    {% else %}
        RESPOND PREFIX="//" MSG="Zmod Wifi Off // SAVE_ZMOD_DATA WIFI={wifi}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=wifi VALUE={wifi|int}

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    RESPOND PREFIX="//" MSG="Luminosità LED all'accensione: {zled} // SAVE_ZMOD_DATA LED={zled}"
    SAVE_VARIABLE VARIABLE=led VALUE={zled|int}

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    RESPOND PREFIX="//" MSG="Riproduci MIDI all'accensione: {zmidi_on} // SAVE_ZMOD_DATA MIDI_ON={zmidi_on}"
    SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'

    {% if not client.ad5x %}
        {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
        {% if znew_save_config == 1 %}
            RESPOND PREFIX="//" MSG="Usa NEW_SAVE_CONFIG alternativo // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% else %}
            RESPOND PREFIX="//" MSG="Usa SAVE_CONFIG standard // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% else %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE=0
    {% endif %}

    {% if not client.ad5x %}
        {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
        {% if zuse_swap == 0 %}
            RESPOND PREFIX="//" MSG="SWAP non utilizzato // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 1 %}
            RESPOND PREFIX="//" MSG="SWAP utilizzato su EMMC // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 2 %}
            RESPOND PREFIX="//" MSG="SWAP utilizzato su USB FLASH // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}

    {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(1) | int %}
    {% if zchina_cloud == 1 %}
        RESPOND PREFIX="//" MSG="Consenti server cinesi // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% else %}
        RESPOND PREFIX="//" MSG="Blocca i server cinesi // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}

    {% set save_moonraker = printer.save_variables.variables.save_moonraker|default(0) | int %}
    {% if save_moonraker == 1 %}
        RESPOND PREFIX="//" MSG="Salva modifiche ai pulsanti di Fluidd/Mainsail // SAVE_ZMOD_DATA SAVE_MOONRAKER={save_moonraker}"
    {% else %}
        RESPOND PREFIX="//" MSG="Usa impostazioni pulsanti Fluidd/Mainsail da ZMOD // SAVE_ZMOD_DATA SAVE_MOONRAKER={save_moonraker}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}

    {% set display_off_timeout = printer.save_variables.variables.display_off_timeout|default(20) | int %}
    {% if screen == False %}
        RESPOND PREFIX="//" MSG="Spegni schermo nativo dopo (sec): {display_off_timeout} // SAVE_ZMOD_DATA DISPLAY_OFF_TIMEOUT={display_off_timeout}"
    {% endif %}
    {% if  display_off_timeout < 5 %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE=5
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if zklipper13 == 1 %}
        RESPOND PREFIX="//" MSG="Usando Klipper 13"
    {% else %}
        {% if not client.ad5x %}
            RESPOND PREFIX="//" MSG="Usando Klipper nativo 11"
        {% else %}
            RESPOND PREFIX="//" MSG="Usando Klipper nativo 12"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=klipper13 VALUE={zklipper13}

    {% if screen == True %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=0
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=1
    {% endif %}

    {% set znice = printer.save_variables.variables.nice|default(20) | int %}
    RESPOND PREFIX="//" MSG="Priorità processo Klipper (1-min, 40-max): {znice}"
    SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
    RUN_SHELL_COMMAND CMD=znice

    ZCONTROL_STATUS
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND PREFIX="//" MSG="Lingue disponibili: en, ru, de, fr, it, es, ja, ko, zh, pt // LANG LANG={lang}"
    RUN_SHELL_COMMAND CMD=zversion

[gcode_macro SET_LED]
description: Imposta LED
rename_existing: _SET_LED
variable_allowed: False
gcode:
    {% if allowed %}
        _SET_LED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% endif %}

[gcode_macro SET_GCODE_OFFSET]
description: Salva Z-Offset
rename_existing: _SET_GCODE_OFFSET
gcode:
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
    {% else %}
        {% set offsets = {'z': None} %}
    {% endif %}

    {% set ns = namespace(offsets={'z': offsets.z}) %}

    _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}

    {% if 'Z' in params %}
        {% set null = ns.offsets.update({'z': params.Z}) %}
    {% endif %}

    {% if 'Z_ADJUST' in params %}
        {% if ns.offsets.z == None %}
            {% set null = ns.offsets.update({'z': 0}) %}
        {% endif %}
        {% set null = ns.offsets.update({'z': (ns.offsets.z | float) + (params.Z_ADJUST | float)}) %}
    {% endif %}

    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% if screen == False %}
        SAVE_VARIABLE VARIABLE=gcode_offsets VALUE="{ns.offsets}"
    {% endif %}

[gcode_macro LOAD_GCODE_OFFSET]
description: Ripristina Z-Offset
gcode:
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
        _SET_GCODE_OFFSET {% for axis, offset in offsets.items() if offsets[axis] %}{ "%s=%s " % (axis, offset) }{% endfor %}
        {% for axis, offset in offsets.items() if offsets[axis] %}
            { action_respond_info("Offset caricato dalle impostazioni globali %s=%.4f " % (axis|upper, offset|float)) }
        {% endfor %}
    {% endif %}

[gcode_macro SET_FAN_SPEED]
description: Controllo ventole
rename_existing: _SET_FAN_SPEED
gcode:
    {% set fan = params.FAN|string %}
    {% set speed = params.SPEED|default(0)|float %}

    {% if fan != 'pcb_fan' and fan != 'external_fan' and fan != 'internal_fan' %}
        _SET_FAN_SPEED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% else %}
        {% if fan == 'external_fan' %}
            _SET_FAN_SPEED FAN=internal SPEED={speed}
        {% else %}
            {% if fan == 'internal_fan' %}
                _SET_FAN_SPEED FAN=external SPEED={speed}
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro _SVG28]
gcode:
    SET_GCODE_VARIABLE MACRO=G28 VARIABLE=z VALUE={printer.toolhead.position.z}

[gcode_macro SET_IDLE_TIMEOUT]
rename_existing: SET_IDLE_TIMEOUT_ORIG
gcode:
    {% set tm = params.TIMEOUT|default(1801)|float %}

    {% if (not printer.pause_resume.is_paused) and (tm == 1800) %}
        ZCONTROL_ON
    {% endif %}

    SET_IDLE_TIMEOUT_ORIG TIMEOUT={tm}

[gcode_macro _Z_G28]
gcode:

[gcode_macro _PRE_Z_G28]
gcode:
    G28.1 Z
    M400
    _SVG28


[gcode_macro G28]
rename_existing: G28.1
variable_z: 220
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not 'X' in params and not 'Y' in params and not 'Z' in params %}
        _HOME
    {% else %}
        {% if client.ad5x %}
            _FIX_G28
        {% endif %}
        {% if 'Z' in params or not('X' in params or 'Y' in params or 'Z' in params) %}
            _PRE_Z_G28
        {% endif %}
        {% if 'X' in params or not('X' in params or 'Y' in params or 'Z' in params) or ('Y' in params and ("x" not in printer.toolhead.homed_axes)) %}
            G28.1 X
            M400
        {% endif %}
        {% if 'Y' in params or not('X' in params or 'Y' in params or 'Z' in params) %}
            G28.1 Y
            M400
        {% endif %}
        {% if 'Z' in params or not('X' in params or 'Y' in params or 'Z' in params) %}
            _Z_G28
        {% endif %}

    {% endif %}

[gcode_macro _CANCEL_PRINT]
variable_cancel_send: 0
gcode:

[gcode_macro _CLIENT_LINEAR_MOVE]
description: Movimento lineare con salvataggio/ripristino dello stato gcode
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set e_move = "E" ~ params.E if params.E is defined else "" %}
    {% set rate = "F" ~ params.F if params.F is defined else "" %}
    {% set ABSOLUTE = params.ABSOLUTE | default(0) | int != 0 %}
    {% set z_max = [ printer['gcode_macro G28'].z | default(220), 220 ] | min %}
    {% if ABSOLUTE %}
        {% set x_move = "X" ~ ([ [params.X|float, client.max_x]  |min, client.min_x]| max) if params.X is defined else "" %}
        {% set y_move = "Y" ~ ([ [params.Y|float, client.max_y]  |min, client.min_y]| max) if params.Y is defined else "" %}
        {% set z_move = "Z" ~ ([ [params.Z|float, z_max]|min, 0   ]| max) if params.Z is defined else "" %}
    {% else %}
        {% set pos = printer.toolhead.position %}
        {% if params.X is defined %}
            {% set x_move = "X" ~ ([client.min_x - pos.x, [client.max_x - pos.x, params.X|float]| min]| max) %}
        {% else %}
            {% set x_move = "" %}
        {% endif %}
        {% if params.Y is defined %}
            {% set y_move = "Y" ~ ([client.min_y - pos.y, [client.max_y - pos.y, params.Y|float]| min]| max) %}
        {% else %}
            {% set y_move = "" %}
        {% endif %}
        {% if params.Z is defined %}
            {% set z_move = "Z" ~ ([- pos.z, [z_max - pos.z, params.Z|float]| min]| max) %}
        {% else %}
            {% set z_move = "" %}
        {% endif %}
    {% endif %}

    SAVE_GCODE_STATE NAME=_client_movement

    # Не двигаем головой во время печати
    {% if state != 'printing' %}
        {% set ABSOLUTE_E = params.ABSOLUTE_E | default(0) | int != 0 %}


        {% if x_move or y_move or z_move %}
            G9{ 0 if ABSOLUTE else 1 }
        {% endif %}
        {% if e_move %}
            M8{ 2 if ABSOLUTE_E else 3 }
        {% endif %}

        RESPOND PREFIX="//" MSG="G1 { x_move } { y_move } { z_move } { e_move } { rate }"
        G1 { x_move } { y_move } { z_move } { e_move } { rate }
    {% else %}
        RESPOND PREFIX="info" MSG="Stampa in corso. Movimento disabilitato."
    {% endif %}

    RESTORE_GCODE_STATE NAME=_client_movement

[gcode_macro _ZSDCARD_PRINT_FILE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set force_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% set silent = printer.save_variables.variables.silent|default(0) | int %}
    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}

    _PREPARE_PRINT

    {% if 'FILENAME' in params %}
        {% set filename = params.FILENAME|default("")|string %}
    {% else %}
        {action_raise_error("Errore! Nome file non specificato.")}
    {% endif %}

    {% if force_md5 == 1 %}
        {% set path = printer.configfile.settings.virtual_sdcard.path %}

        RESPOND PREFIX="info" MSG="Avviata verifica MD5 {filename}"
        CHECK_MD5 DELETE=True FILENAME="{path}{filename}"
    {% endif %}

    {% if not client.ad5x %}
        SDCARD_PRINT_FILE FILENAME="{filename}"
    {% else %}
        SET_ZCOLOR FILENAME="{filename}" SILENT={silent} LEVELING={zprint_leveling}
    {% endif %}

[gcode_macro SDCARD_PRINT_FILE]
rename_existing: BASE_SDCARD_PRINT_FILE
gcode:
    {% set filename = params.FILENAME|default("")|string %}

    ZCONTROL_ABORT
    ZCONTROL_ON
    _G28
    M400
    G1 Z50 F3000
    M400
    BASE_SDCARD_PRINT_FILE {rawparams}
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="info" MSG="Recupero dati per KAMP"
        RUN_SHELL_COMMAND CMD=zexclude PARAMS={'"%s"' % (filename.replace("'", "\\\'").replace(" ", "\ "))}
    {% endif %}

[gcode_macro SDCARD_RESET_FILE]
rename_existing: BASE_SDCARD_RESET_FILE
gcode:
    ZCONTROL_OFF
    BASE_SDCARD_RESET_FILE

[gcode_macro BELTS_SHAPER_CALIBRATION]
description: Test semi-asse CoreXY per l'analisi della frequenza delle cinghie
gcode:
    {% set spectrogram = params.SPECTROGRAM|default(0)|int %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        RESPOND PREFIX="!!" MSG="Richiede 256MB RAM + SWAP abilitato. !!"
        _GUPPY_BELTS_SHAPER_CALIBRATION SPECTROGRAM={spectrogram} PNG_WIDTH=10 PNG_HEIGHT=10 PNG_OUT_PATH="/opt/config/mod_data/belts_calibration_full.png"
    {% else %}
        _GUPPY_BELTS_SHAPER_CALIBRATION SPECTROGRAM=0 PNG_WIDTH=10 PNG_HEIGHT=10 PNG_OUT_PATH="/opt/config/mod_data/belts_calibration_full.png"
    {% endif %}

[gcode_macro _GUPPY_BELTS_SHAPER_CALIBRATION]
description: Test semi-asse CoreXY per l'analisi della frequenza delle cinghie
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}

    {% set min_freq = params.FREQ_START|default(5)|float %}
    {% set max_freq = params.FREQ_END|default(100)|float %}
    {% set hz_per_sec = params.HZ_PER_SEC|default(1)|float %}
    {% set png_out_path = params.PNG_OUT_PATH|default("/opt/config/mod_data/belts_calibration.png") %}
    {% set png_width = params.PNG_WIDTH|default(8)|float %}
    {% set png_height = params.PNG_HEIGHT|default(4.8)|float %}
    {% set spectrogram = params.SPECTROGRAM|default(0)|int %}

    TEST_RESONANCES AXIS=1,1 OUTPUT=raw_data NAME=b FREQ_START={min_freq} FREQ_END={max_freq} HZ_PER_SEC={hz_per_sec}
    M400

    TEST_RESONANCES AXIS=1,-1 OUTPUT=raw_data NAME=a FREQ_START={min_freq} FREQ_END={max_freq} HZ_PER_SEC={hz_per_sec}
    M400

    RESPOND MSG="Generazione del profilo di frequenza delle cinghie..."
    RESPOND MSG="Ci vorrà del tempo (3-5 minuti)"

    {% set klipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if klipper13 == 1 %}
        {% set fname = "/tmp/raw_data_axis=1.000,-1.000,0.000_a.csv /tmp/raw_data_axis=1.000,1.000,0.000_b.csv" %}
    {% else %}
        {% set fname = "/tmp/raw_data_axis=1.000,-1.000_a.csv /tmp/raw_data_axis=1.000,1.000_b.csv" %}
    {% endif %}

    {% if spectrogram == 1 %}
        RUN_SHELL_COMMAND CMD=guppy_belts_calibration PARAMS="-w {png_width} -l {png_height} -o {png_out_path} -k /usr/share/klipper {fname} --{lang}"
    {% else %}
        RUN_SHELL_COMMAND CMD=guppy_belts_calibration PARAMS="-w {png_width} -l {png_height} -n -o {png_out_path} -k /usr/share/klipper {fname} --{lang}"
    {% endif %}

    RESPOND PREFIX="info" MSG="Immagine salvata: {png_out_path}. Configurazione -> mod_data"
    RESPOND PREFIX="//" MSG="Command {guppy_belts_calibration} finished"

[gcode_macro _GUPPY_EXCITATE_AXIS_AT_FREQ]
description: Mantieni la frequenza per la diagnosi delle vibrazioni
gcode:
    {% set frequency = params.FREQUENCY|default(25)|int %}
    {% set time = params.TIME|default(10)|int %}
    {% set axis = params.AXIS|default("x")|string|lower %}

    {% if axis not in ["x", "y", "a", "b"] %}
      { action_raise_error("AXIS selection invalid. Should be either x, y, a or b!") }
    {% endif %}

    {% if axis == "a" %}
        {% set axis = "1,-1" %}
    {% elif axis == "b" %}
        {% set axis = "1,1" %}
    {% endif %}

    TEST_RESONANCES OUTPUT=raw_data AXIS={axis} FREQ_START={frequency-1} FREQ_END={frequency+1} HZ_PER_SEC={1/(time/3)}
    M400

[gcode_macro _GUPPY_MACRO]
description: Pulsante personalizzato Guppy
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if client.ad5x %}
        COLOR
    {% else %}
        PLAY_MIDI
        RESPOND TYPE=command MSG="action:prompt_begin Questa è una macro di prova"
        RESPOND TYPE=command MSG="action:prompt_text Aggiungi _GUPPY_MACRO a mod_data/user.cfg"
        RESPOND TYPE=command MSG="action:prompt_text Un esempio di _GUPPY_MACRO si trova in mod/base.cfg"

        RESPOND TYPE=command MSG="action:prompt_footer_button Ok|RESPOND TYPE=command MSG=action:prompt_end|info"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro ZSHAPER]
description: Calibrazione dello shaper di ingresso
gcode:
    {% set x = params.X|default(1)|int %}
    {% set y = params.Y|default(1)|int %}

    _G28
    {% if x == 1 %}
        RESPOND PREFIX="info" MSG="Raccolta dei dati dell'asse X"
        TEST_RESONANCES AXIS=X NAME=X
        M400
    {% endif %}
    {% if y == 1 %}
        RESPOND PREFIX="info" MSG="Raccolta dei dati dell'asse Y"
        TEST_RESONANCES AXIS=Y NAME=Y
        M400
    {% endif %}
    {% if x == 1 %}
        RUN_SHELL_COMMAND CMD=zshaper_new PARAMS="X"
    {% endif %}
    {% if y == 1 %}
        RUN_SHELL_COMMAND CMD=zshaper_new PARAMS="Y"
    {% endif %}

[gcode_macro _SPEED_SET]
description: Imposta velocità 1/4->1/2->1 per 60s alla ripresa della stampa
variable_speed1: 100
variable_speed2: 100
gcode:
    {% set zspeed = params.SPEED|default(100)|int %}
    RESPOND PREFIX="info" MSG="Speed0: {zspeed/4}"

    SET_GCODE_VARIABLE MACRO=_SPEED_SET VARIABLE=speed1 VALUE={zspeed/2}
    SET_GCODE_VARIABLE MACRO=_SPEED_SET VARIABLE=speed2 VALUE={zspeed}
    M220 S{zspeed/4}
    UPDATE_DELAYED_GCODE ID=_SET_SPEED1 DURATION=60
    UPDATE_DELAYED_GCODE ID=_SET_SPEED2 DURATION=120

[delayed_gcode _SET_SPEED1]
initial_duration: 0
gcode:
    {% set speed = printer["gcode_macro _SPEED_SET"].speed1 %}
    RESPOND PREFIX="info" MSG="Speed1: {speed}"
    M220 S{speed}

[delayed_gcode _SET_SPEED2]
initial_duration: 0
gcode:
    {% set speed = printer["gcode_macro _SPEED_SET"].speed2 %}
    RESPOND PREFIX="info" MSG="Speed2: {speed}"
    M220 S{speed}

[gcode_macro ZRESTORE]
description: Riprendi stampa interrotta
gcode:
    {% set test = params.TEST|default(0)|int %}

    {% set state = printer.print_stats.state %}
    {% set filename = printer.print_stats.filename %}
    {% set progress = printer.display_status.progress * 100 %}

    {% if test == 2 %}
        RESPOND PREFIX="info" MSG="Dati salvati eliminati"
        RUN_SHELL_COMMAND CMD=rm PARAMS="/opt/config/mod_data/klipper_data.json"
    {% else %}
        {% if test == 1 and state != 'printing' and state != 'paused' %}
            RUN_SHELL_COMMAND CMD=zrestore PARAMS="test"
        {% else %}
            {% if state == 'printing' %}
                RESPOND PREFIX="info" MSG="In stampa: {filename} ({progress | round(1)}%), recupero impossibile"
            {% elif state == 'paused' %}
                RESPOND PREFIX="info" MSG="In pausa: {filename}, recupero impossibile"
            {% elif state == 'complete' %}
                RESPOND PREFIX="info" MSG="Stampa completata"
                RUN_SHELL_COMMAND CMD=zrestore
            {% elif state == 'error' %}
                RESPOND PREFIX="info" MSG="Errore: {printer.print_stats.message}"
                RUN_SHELL_COMMAND CMD=zrestore
            {% else %}
                RESPOND PREFIX="info" MSG="Stato: {state}"
                RUN_SHELL_COMMAND CMD=zrestore
            {% endif %}
        {% endif %}
    {% endif %}

[delayed_gcode _TEST_RESTORE]
initial_duration: 0
gcode:
    ZRESTORE TEST=1

[gcode_macro _ZRESTORE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Stampa interrotta rilevata"
    RESPOND TYPE=command MSG="action:prompt_text Passa alla console per visualizzare le fasi di recupero"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Ripristina|_ZRESTORE_OK|primary"
    RESPOND TYPE=command MSG="action:prompt_button Elimina dati|_ZRESTORE_DEL|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Annulla|_ZRESTORE_CANCEL"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _ZRESTORE_OK]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    ZRESTORE

[gcode_macro _ZRESTORE_DEL]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    ZRESTORE TEST=2

[gcode_macro _ZRESTORE_CANCEL]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro _ZRESTORE_MESH_TEST]
gcode:
    {% set cur_mesh = printer['bed_mesh'].profile_name %}
    {% set mesh = params.MESH|default("auto") %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    {% if cur_mesh != mesh %}
        {% if screen == True %}
            RESPOND PREFIX="info" MSG="Griglia del piatto {mesh} non trovata. Caricato profilo MESH_DATA"
            BED_MESH_PROFILE LOAD=MESH_DATA
        {% else %}
            RESPOND PREFIX="info" MSG="Griglia del piatto {mesh} non trovata. Caricato profilo automatico"
            BED_MESH_PROFILE LOAD=auto
        {% endif %}
    {% endif %}

[gcode_macro _ZRESTORE_MESH_LOAD]
gcode:
    {% set mesh = params.MESH|default("auto") %}

    BED_MESH_CLEAR
    M400
    {% for mesh_dt in printer['bed_mesh'].profiles %}
        {% if mesh == mesh_dt %}
            BED_MESH_PROFILE LOAD={mesh}
            RESPOND PREFIX="info" MSG="Griglia del piatto {mesh} caricata"
        {% endif %}
    {% endfor %}
    _ZRESTORE_MESH_TEST MESH={mesh}

# Использование: SET_PAUSE_NEXT_LAYER [ENABLE=[0 | 1]] [MACRO=<name>]
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Abilita pausa al prossimo strato
gcode:
    {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
    {% set ENABLE = params.ENABLE | default(1)|int != 0 %}
    {% set MACRO = params.MACRO | default(pause_next_layer.call, True) %}
    SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

# Usage: SET_PAUSE_AT_LAYER [ENABLE=[0 | 1]] [LAYER=<number>] [MACRO=<name>]
[gcode_macro SET_PAUSE_AT_LAYER]
description: Abilita/disabilita pausa a uno specifico strato
gcode:
    {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
    {% set ENABLE = params.ENABLE | int != 0 if params.ENABLE is defined
             else params.LAYER is defined %}
    {% set LAYER = params.LAYER | default(pause_at_layer.layer) | int %}
    {% set MACRO = params.MACRO | default(pause_at_layer.call, True) %}
    SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

# Использование: SET_PRINT_STATS_INFO [TOTAL_LAYER=<total_layer_count>] [CURRENT_LAYER= <current_layer>]
[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Sovrascrivi per ottenere le funzioni pause_next_layer e pause_at_layer
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
    {% if pause_next_layer.enable %}
        RESPOND TYPE=echo MSG='{"%s, SET_PAUSE_AT_LAYER " % pause_next_layer.call}'
        {pause_next_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
        SET_PAUSE_NEXT_LAYER ENABLE=0
    {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER | int == pause_at_layer.layer %}
        RESPOND TYPE=echo MSG='{"%s, pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
        {pause_at_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
        SET_PAUSE_AT_LAYER ENABLE=0
    {% endif %}
    SET_PRINT_STATS_INFO_BASE {rawparams}

[gcode_macro ZFLASH]
description: Aggiorna stampante tramite USB
gcode:
    RUN_SHELL_COMMAND CMD=zflash

[gcode_macro _DISABLE_SENSOR]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    {% if client.runout_sensor | default("") != "" %}
        {% if printer[client.runout_sensor].enabled %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed VALUE=True
            {% if client.ad5x %}
                SET_FILAMENT_SENSOR SENSOR=head_switch_sensor ENABLE=0
            {% else %}
                SET_FILAMENT_SENSOR SENSOR=e0_sensor ENABLE=0
            {% endif %}
        {% else %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed VALUE=False
        {% endif %}
    {% endif %}

    {% if client.runout_sensor2 | default("") != "" %}
        {% if screen == False and printer[client.runout_sensor2].enabled %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed2 VALUE=True
            SET_FILAMENT_SENSOR SENSOR=ifs_motion_sensor ENABLE=0
        {% else %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed2 VALUE=False
        {% endif %}
    {% endif %}

[gcode_macro _ENABLE_SENSOR]
variable_allowed: False
variable_allowed2: False
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    {% if allowed %}
        {% if client.ad5x %}
            SET_FILAMENT_SENSOR SENSOR=head_switch_sensor ENABLE=1
        {% else %}
            SET_FILAMENT_SENSOR SENSOR=e0_sensor ENABLE=1
        {% endif %}
    {% endif %}

    {% if screen == False and allowed2 %}
        SET_FILAMENT_SENSOR SENSOR=ifs_motion_sensor ENABLE=1
    {% endif %}

