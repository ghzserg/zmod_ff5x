[zmod_ifs]
debug=True

[printer]
max_velocity: 500
max_accel: 10000
square_corner_velocity: 9

[probe]                                             
samples: 2
samples_tolerance:0.05
samples_tolerance_retries:6
lift_speed:15
sample_retract_dist:2

[bed_mesh]                         
speed: 300                         
horizontal_move_z:2  

[delayed_gcode _IFS_INIT]
initial_duration:1
gcode:
    IFS_F18
    {% for var in printer['gcode_macro _IFS_VARS'] if printer.save_variables.variables['ifs_'+var] is defined %}
        {% if not var|lower in ['config', 'settings'] %}
            SET_GCODE_VARIABLE MACRO=_IFS_VARS VARIABLE={var} VALUE="{printer.save_variables.variables['ifs_'+var]}"
        {% endif %}
    {% endfor %}

[zmod_ifs_switch_sensor head_switch_sensor]
pause_on_runout: False
runout_gcode:
    _RUNOUT_HEAD

[zmod_ifs_motion_sensor ifs_motion_sensor]
pause_on_runout: False
runout_gcode:
    _RUNOUT_MOTION

[zmod_ifs_motion_sensor _ifs_motion_sensor_1]
pause_on_runout: False
port:1

[zmod_ifs_motion_sensor _ifs_motion_sensor_2]
pause_on_runout: False
port:2

[zmod_ifs_motion_sensor _ifs_motion_sensor_3]
pause_on_runout: False
port:3

[zmod_ifs_motion_sensor _ifs_motion_sensor_4]
pause_on_runout: False
port:4

[zmod_ifs_switch_sensor _ifs_port_sensor_1]
pause_on_runout: False
type:port
port:1
runout_gcode:
    _RUNOUT_PORT PORT=1
insert_gcode:
    _IFS_INSERT PORT=1

[zmod_ifs_switch_sensor _ifs_port_sensor_2]
pause_on_runout: False
type:port
port:2
runout_gcode:
    _RUNOUT_PORT PORT=2
insert_gcode:
    _IFS_INSERT PORT=2

[zmod_ifs_switch_sensor _ifs_port_sensor_3]
pause_on_runout: False
type:port
port:3
runout_gcode:
    _RUNOUT_PORT PORT=3
insert_gcode:
    _IFS_INSERT PORT=3

[zmod_ifs_switch_sensor _ifs_port_sensor_4]
pause_on_runout: False
type:port
port:4
runout_gcode:
    _RUNOUT_PORT PORT=4
insert_gcode:
    _IFS_INSERT PORT=4

[gcode_macro _RUNOUT_MOTION]
gcode:
    {% if printer.print_stats.state == "printing" %}
        RESPOND PREFIX="info" MSG="Jam detected, pausing..."
        PAUSE
    {% endif %}

[gcode_macro _RUNOUT_HEAD]
gcode:
    {% if printer.print_stats.state == "printing" %}
        RESPOND PREFIX="info" MSG="Run out filament (Head), pausing..."
        SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=consume VALUE=0
        PAUSE
    {% endif %}

[gcode_macro _RUNOUT_PORT]
gcode:
    {% set port = params.PORT|default(0)|int %}

    {% if printer.print_stats.state == "printing" %}
        {% if port > 0 %}
            {% if printer['filament_motion_sensor _ifs_motion_sensor_'+port|string].filament_detected %}
                RESPOND PREFIX="info" MSG="Filament run out in the IFS, we continue printing until it runs out in the extruder or there is a filament change"
                # it was moving, so we disable motion sensor
                SET_FILAMENT_SENSOR SENSOR=ifs_motion_sensor ENABLE=0
                SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=consume VALUE={port}
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro _IFS_INSERT]
gcode:
    {% if not printer.print_stats.state == "printing" %}
        {% set port = params.PORT|default(0)|int %}
        {% set filament_tube_length   = params.FILAMENT_TUBE_LENGTH|default(1000)|int %}
        {% set filament_autoinsert_full_length   = params.FILAMENT_AUTOINSERT_FULL_LENGTH|default(550)|int %}

        RESPOND PREFIX="info" MSG="Auto insert: {port}"
        IFS_F24 PRUTOK={port}
        IFS_F10 PRUTOK={port} LEN={filament_autoinsert_full_length} SPEED=1800
        {% if not printer['filament_switch_sensor head_switch_sensor'].filament_detected %}
            IFS_F10 PRUTOK={port} LEN={filament_tube_length} SPEED=600 CHECK=1 # Homering the filament no printing
            IFS_F11 PRUTOK={port} LEN=90 SPEED=1800
        {% endif %}
        IFS_F39 PRUTOK={port}
    {% endif %}

[gcode_macro _CONSUME]
gcode:
    {% set consume = printer['gcode_macro _INSERT_PRUTOK_IFS'].consume %}

    {% if consume > 0 %}
        # Disable HEAD sensor because it will activate PAUSE
        SET_FILAMENT_SENSOR SENSOR=ifs_switch_sensor ENABLE=0 
        {% for i in range(20) %}
            # We extrude 50 mm * 20 = 1 meter or less if the filament in the head runs out
     		_CONSUME_CHECK_AND_POOP # We need this call to check the sensor in Head every so often
     	{% endfor %}
        SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE=0
        SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=consume VALUE=0
    {% endif %}


[gcode_macro _CONSUME_CHECK_AND_POOP]
gcode:
    {% if printer['filament_switch_sensor head_switch_sensor'].filament_detected %}
        {% set flush_length = 50  %}
     	_GOTO_TRASH
     	G92 E0
        G1 E{flush_length * 0.02} F300
        G1 E{flush_length * 0.23} F450
        G1 E{flush_length * 0.02} F300
        G1 E{flush_length * 0.23} F450
        G1 E{flush_length * 0.02} F300
        G1 E{flush_length * 0.23} F450
        G1 E{flush_length * 0.02} F300
        G1 E{flush_length * 0.23} F450
     	G92 E0
     	G1 E-2 F1800
     	_SBROS_TRASH
    {% endif %}

[gcode_macro EXTRUDER_PRUTOK_INFO]
gcode:
    {% set extruder_prutok = printer['gcode_macro _INSERT_PRUTOK_IFS'].extruder_prutok %}

    RESPOND PREFIX="info" MSG="Extruder prutok: {extruder_prutok}"

[gcode_macro _CHECK_FILAMENT]
variable_check_0: 0

gcode:
    SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE=0
    {% if printer['filament_switch_sensor head_switch_sensor'].filament_detected %}
        SET_GCODE_VARIABLE MACRO=_CHECK_FILAMENT VARIABLE=check_0 VALUE=1
        # We pulled each slot a little bit in case one of them was just activating the sensor without being gripped by the extruder.    
        IFS_F24 PRUTOK=1
        IFS_F11 PRUTOK=1 LEN=20 SPEED=600
        IFS_F24 PRUTOK=2
        IFS_F11 PRUTOK=2 LEN=20 SPEED=600
        IFS_F24 PRUTOK=3
        IFS_F11 PRUTOK=3 LEN=20 SPEED=600
        IFS_F24 PRUTOK=4
        IFS_F11 PRUTOK=4 LEN=20 SPEED=600
        IFS_F39 PRUTOK=4
        _CHECK_FILAMENT_0 #required: check the sensor head in other macro, not in this
        _CHECK_FILAMENT_1 #required: check the sensor head in other macro, not in this
        _CHECK_FILAMENT_2 #required: check the _ifs_motion_sensor_x in other macro, not in this
    {% endif %}
    EXTRUDER_PRUTOK_INFO

[gcode_macro _CHECK_FILAMENT_0]
gcode:
    {% if not printer['filament_switch_sensor head_switch_sensor'].filament_detected and printer['gcode_macro _CHECK_FILAMENT'].check_0 %}
        IFS_F24 PRUTOK=1
        IFS_F11 PRUTOK=1 LEN=45 SPEED=600
        IFS_F24 PRUTOK=2
        IFS_F11 PRUTOK=2 LEN=45 SPEED=600
        IFS_F24 PRUTOK=3
        IFS_F11 PRUTOK=3 LEN=45 SPEED=600
        IFS_F24 PRUTOK=4
        IFS_F11 PRUTOK=4 LEN=45 SPEED=600
        IFS_F39 PRUTOK=4
    {% endif %}
[gcode_macro _CHECK_FILAMENT_1]
gcode:
    {% if printer['filament_switch_sensor head_switch_sensor'].filament_detected %}
        {% set temp = (printer.extruder.target or 240)|int %}
        _G28
        _GOTO_TRASH
        RESPOND PREFIX="info" MSG="Heating the nozzle to {temp} degrees"
        M109 S{temp}
        _DISABLE_SENSOR
        M106 S128
        M83
        G1 E50 F300 #poop
        G1 E-2 F300
        _SBROS_TRASH
        M106 S0
        M400
        _ENABLE_SENSOR
    {% endif %}

[gcode_macro _CHECK_FILAMENT_2]
gcode:
    {% if printer['filament_switch_sensor head_switch_sensor'].filament_detected %}
    {% if printer['filament_motion_sensor _ifs_motion_sensor_1'].filament_detected %}
        SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE=1
    {% endif %}
    {% if printer['filament_motion_sensor _ifs_motion_sensor_2'].filament_detected %}
        SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE=2
    {% endif %}
    {% if printer['filament_motion_sensor _ifs_motion_sensor_3'].filament_detected %}
        SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE=3
    {% endif %}
    {% if printer['filament_motion_sensor _ifs_motion_sensor_4'].filament_detected %}
        SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE=4
    {% endif %} 
    {% endif %}

[gcode_macro _IFS_COLORS_CANCEL]
gcode:
  CLEAR_PAUSE
  CANCEL_PRINT
  RESPOND type="command" msg="action:prompt_end"

[gcode_macro _IFS_COLORS_PRINT]
gcode:
    RESUME
    RESPOND type="command" msg="action:prompt_end"


#_IFS_COLORS_ASSIGN COLOR=1 PORT=2 TOOLS=0,1,2,3       T0 -> PORT 2
[gcode_macro _IFS_COLORS_ASSIGN]
