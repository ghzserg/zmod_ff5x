[gcode_macro _T]
gcode:
    {% set prutok = params.PRUTOK|default(1)|int %}
    {% set extruder_prutok = printer['gcode_macro _INSERT_PRUTOK_IFS'].extruder_prutok %}
    {% set ifs = printer['gcode_macro _IFS_VARS'] %}

    {% set prutok = ifs.tools[prutok] %}

    SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=current_prutok VALUE={prutok} # currently selected tool
    
    {% if extruder_prutok > 0 and not printer['filament_switch_sensor head_switch_sensor'].filament_detected %}
        {% set extruder_prutok = 0 %}
        SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE=0
    {% endif %}
    {% if prutok > 0 %}
        RESPOND PREFIX="info" MSG="Loading filament {prutok}"
        {% if extruder_prutok == -1 %}
            _CHECK_FILAMENT # We need to extrude to find out which slot is in the extruder
        {% endif %}
        # if there is a filament in the IFS (port) and it is a different port than the extruder one
        {% if printer['filament_switch_sensor _ifs_port_sensor_'+prutok|string].filament_detected and extruder_prutok != prutok %}
            _CONSUME #check if we need to extrude the leftover filament because run out in the IFS
            _INSERT_PRUTOK_IFS PRUTOK={prutok}
        {% else %}
          RESPOND PREFIX="info" MSG="IFS Port {prutok} empty, please insert filament, pausing..."
          PAUSE
        {% endif %}
    {% endif %}
    # slicer set the temp for new filament [new_filament_temp] we save here
    SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_temp VALUE={printer.extruder.target or 240}

[gcode_macro _INSERT_PRUTOK_IFS]
variable_extruder_prutok: -1 
variable_current_prutok: 0
variable_extruder_temp: 0
variable_consume: 0
description: 
gcode:
    {% set ifs = printer['gcode_macro _IFS_VARS'] %}
    {% set prutok                 = params.PRUTOK|default(1)|int %}
    {% set filament_load_speed    = params.FILAMENT_LOAD_SPEED|default(ifs.filament_load_speed)|int %}
    {% set filament_tube_length   = params.FILAMENT_TUBE_LENGTH|default(ifs.filament_tube_length)|int %}
    {% set filament_drop_length   = params.FILAMENT_DROP_LENGTH|default(ifs.filament_drop_length)|int %}
    {% set extruder_temp          = (printer.extruder.target or printer['gcode_macro _INSERT_PRUTOK_IFS'].extruder_temp or 240)|int %}
    {% set extruder_prutok        = printer['gcode_macro _INSERT_PRUTOK_IFS'].extruder_prutok %}
    {% set consume                = printer['gcode_macro _INSERT_PRUTOK_IFS'].consume %}

    M106 S0
    
    _G28
    {% if not printer.print_stats.state == "printing" %}
        _GOTO_TRASH
    {% endif %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+4}
    
    #UNLOAD (CUT and PULL back from IFS)
    {% if extruder_prutok > 0 %}
        _IFS_REMOVE_PRUTOK
    {% endif %}

    #LOAD
    
    IFS_F24 PRUTOK={prutok}
    IFS_F10 PRUTOK={prutok} LEN={filament_tube_length} SPEED=600 CHECK=1 # Homering the filament requires a safe and fixed speed

    _GOTO_TRASH  # If we are printing and did not need to cut, then now we will go to TRASH
    
    G92 E0
    _DISABLE_SENSOR
    #for  20mm retraction before cut, 33mm are needed to fill the hotend without material oozing out
    # 1/3 of filament_drop_length for the extruder catch the filament
    G1 E{filament_drop_length/3} F{filament_load_speed} # filament_load_speed/2: slow to last longer than the next command
    IFS_F10 PRUTOK={prutok} LEN={(filament_drop_length/3)|int} SPEED={filament_load_speed} #  (filament_drop_length/3+10): to ensure that it captures
    IFS_F39 PRUTOK={prutok}

    IFS_F23 PRUTOK={prutok} #this set chan = prutok in the IFS
    SET_EXTRUDER_SLOT SLOT={prutok} #this set_cur_port(zmod_ifs.py) so ifs_motion_sensor read the current port

    # 2/3 of filament_drop_length for check if motion sensor detects move.
    G1 E{filament_drop_length/3*2} F{filament_load_speed}
    M400
    _CHECK_MOTION
    _ENABLE_SENSOR

    G92 E0

[gcode_macro _REZGEM_PRUTOK]
description: Отрезаем пруток
gcode:
    {% set ifs = printer['gcode_macro _IFS_VARS'] %}
    {% set filament_unload_before_cutting  = params.FILAMENT_UNLOAD_BEFORE_CUTTING|default(ifs.filament_unload_before_cutting)|float %}
    {% set filament_unload_after_cutting   = params.FILAMENT_UNLOAD_AFTER_CUTTING|default(ifs.filament_unload_after_cutting)|float %}
    {% set filament_unload_speed           = params.FILAMENT_UNLOAD_SPEED|default(ifs.filament_unload_speed)|float %}

    RESPOND PREFIX="info" MSG="Cutting the filament"
    {% if printer.toolhead.position.x < 20 %}
        G1 X20
    {% endif %}
    
    G92 E0
    _DISABLE_SENSOR
    # move to cut position and retract (filament_unload_before_cutting) at the same time
    G1 Y10 E-{filament_unload_before_cutting/3} F18000
    G1 Y-7.70 E-{filament_unload_before_cutting/3} F1800
    G1 X20 E-{filament_unload_before_cutting/3} F12000
    _ENABLE_SENSOR
    G1 X-2.00 F600 #Cut
    M400
    G92 E0
    _DISABLE_SENSOR
    G1 E-{filament_unload_after_cutting} F{filament_unload_speed}
    G92 E0
    M400
    _ENABLE_SENSOR
    G1 F18000

[gcode_macro _IFS_REMOVE_PRUTOK]
gcode:
    {% set ifs = printer['gcode_macro _IFS_VARS'] %}
    {% set extruder_prutok = printer['gcode_macro _INSERT_PRUTOK_IFS'].extruder_prutok %}
    {% if extruder_prutok > 0 %}

    {% set filament_unload_speed           = params.FILAMENT_UNLOAD_SPEED|default(ifs.filament_unload_speed)|int %}
    {% set nozzle_cleaning_length          = params.NOZZLE_CLEANING_LENGTH|default(ifs.nozzle_cleaning_length)|int %}

    _REZGEM_PRUTOK FILAMENT_UNLOAD_SPEED={filament_unload_speed}
    _GOTO_TRASH
    G92 E0

    RESPOND PREFIX="info" MSG="Unloading filament {extruder_prutok}"
    _DISABLE_SENSOR
    IFS_F24 PRUTOK={extruder_prutok}
    G1 E-{nozzle_cleaning_length} F{filament_unload_speed}
    IFS_F11 PRUTOK={extruder_prutok} LEN={nozzle_cleaning_length} SPEED={filament_unload_speed}
    M400
    _ENABLE_SENSOR
    SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE=0
    {% endif %}

[gcode_macro _CHECK_MOTION]
gcode:
    {% set current_prutok = printer['gcode_macro _INSERT_PRUTOK_IFS'].current_prutok|int %}
    
    {% if not printer['filament_motion_sensor _ifs_motion_sensor_'+current_prutok|string].filament_detected %}
        IFS_F24 PRUTOK={current_prutok}
        G1 E-90 F300 #UNLOAD
        IFS_F11 PRUTOK={current_prutok} LEN=90 SPEED=300  #UNLOAD
        IFS_F39 PRUTOK={current_prutok}
        RESPOND PREFIX="info" MSG="Jam detected loading filament, pausing..."
        PAUSE CHECKING=1
    {% else %}
    SET_GCODE_VARIABLE MACRO=_INSERT_PRUTOK_IFS VARIABLE=extruder_prutok VALUE={current_prutok}
    {% endif %}

[idle_timeout]
  timeout = 300 #5 Minutes
gcode:
  {% if printer.pause_resume.is_paused %}
    RESPOND PREFIX="info" MSG="Timeout ignored because printer state == paused."
    M104 S0 # Cool only the hotend after a 5-minute pause
  {% else %}
    M84
    TURN_OFF_HEATERS
    M107
   {% endif %}

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
    {% if printer.print_stats.state=="paused" or printer.print_stats.state == "printing" %}
        END_PRINT
    {% endif %}
    CANCEL_PRINT_BASE

[gcode_macro END_PRINT]
description: End G-code
gcode:
    
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    M107 ; turn off fan
    
    {% if "xyz" in printer.toolhead.homed_axes %}
      G91 ;Relative positioning
      G1 F1800 E-2 ; Retract filament 10 mm to prevent oozing
      G1 F3000 Z2 ; Move Z Axis up 10 mm to allow filament ooze freely
      G90
      _IFS_REMOVE_PRUTOK
      _GOTO_TRASH
      G1 Z220 F600
    {% endif %}
    IFS_F18 WAIT=0
    M106 S0 ;Turn-off fan
    M104 S0 ;Turn-off hotend
    M140 S0 ;Turn-off bed                 
    M84                     ; turn off steppers
    M117
    


[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
    {% if printer.print_stats.state == "printing" %}
    M106 S0
    {% set checking = params.CHECKING|default(0)|int %}

    {% if "xyz" in printer.toolhead.homed_axes %}
      {% set z_max = 220 %}
      {% set pos_act = printer.gcode_move.gcode_position %} #absolute position
      {% if pos_act.z < (z_max - 2) %}
        {% set z_safe = pos_act.z + 2 %}
      {% else %}
        {% set z_safe = z_max %}
      {% endif %}
    {% endif %}
    # extruder temp is store after each filament change (see _T command)
    # extruder temp go to 0 after 5 minutes paused (see [timeout] section)
    PAUSE_BASE
    _DISABLE_SENSOR
    {% if not checking %}
        # We are printing so we park
        {% if "xyz" in printer.toolhead.homed_axes %}
          SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=x_act VALUE={pos_act.x}
          SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=y_act VALUE={pos_act.y}
          SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=z_act VALUE={pos_act.z}
          G1 E-2 F300
          G92 E0
          G1 Z{z_safe} F900 #absolute position
          _GOTO_TRASH
        {% endif %}
        RESPOND PREFIX="info" MSG="Pause: printing"
    {% else %}
        # We are checking motion and we PAUSE then we are already in trash position, we dont need parking
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=x_act VALUE=0
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=y_act VALUE=0
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=z_act VALUE=0
        RESPOND PREFIX="info" MSG="Pause: checking"
    {% endif %}
    {% endif %}
    
[gcode_macro _PRINT_IFS_MOTION]
gcode:
    #disabled

[gcode_macro RESUME]
variable_x_act:0
variable_y_act:0
variable_z_act:0
rename_existing: RESUME_BASE
gcode:
    {% if printer.print_stats.state == "paused" %}
    {% set current_prutok = printer['gcode_macro _INSERT_PRUTOK_IFS'].current_prutok|int %}

    # restore extruder temp
    M109 S{printer['gcode_macro _INSERT_PRUTOK_IFS'].extruder_temp|default(240)|int}
    _ENABLE_SENSOR
    {% if current_prutok > 0 %}
        _T PRUTOK={current_prutok}
        _GOTO_TRASH
        M106 S102
        G92 E0
        G1 E50 F300 #Poop
        G92 E0
        G1 E-2 F300 #retract to cut the poop 
        _SBROS_TRASH
        M106 S0
    {% endif %}
    
    {% set z_act = printer['gcode_macro RESUME'].z_act %}
    {% if z_act > 0 %}
        {% set x_act = printer['gcode_macro RESUME'].x_act %}
        {% set y_act = printer['gcode_macro RESUME'].y_act %}
        # We restore X and Y first, then Z, to avoid collisions
        {% if printer.toolhead.position.y > 220 %}
            G1 Y220 F12000
        {% endif %}
        G1 X{x_act} Y{y_act} F12000
        G1 Z{z_act} F300 
    {% endif %}
    RESUME_BASE # this will restore XYZ but we have already done so
    
    {% endif %}

[gcode_macro TEST2]
gcode:
    {% set prutok = params.PRUTOK|default(1)|int %}
    M83
    _DISABLE_SENSOR
    IFS_F24 PRUTOK={prutok} 
    IFS_F10 PRUTOK={prutok} LEN=700 SPEED=600 CHECK=1 #check sensor head
    G1 E10 F300 #
    IFS_F10 PRUTOK={prutok} LEN=10 SPEED=300 #catch by extruder
    IFS_F39 PRUTOK={prutok}  # IFS released filament
    G1 E10 F300 # push by extruder only, this runs after IFS_F39 has finished, which is ideal.
    G4 P3000 # wait nothing
    IFS_F24 PRUTOK={prutok} # The IFS grips the filament
    G1 E-30 F600  #retract by extruder and pull by IFS (next command) at the same time
    IFS_F11 PRUTOK={prutok} LEN=100 SPEED=600 WAIT=1 #pull by IFS
    IFS_F39 PRUTOK={prutok} # IFS released filament
    _ENABLE_SENSOR
    
    

[gcode_macro _GOTO_TRASH]
description: Go to trash
gcode:
    # do nothing if it is already in the trash position 
    {% if not (printer.toolhead.position.x == 52.50 and printer.toolhead.position.y == 229.6) %}
        RESPOND PREFIX="info" MSG="Go to trash"
        G90
        {% if printer.toolhead.position.x != 52.50 %}
            {% if printer.toolhead.position.y > 220.00 %}
                G1 Y220 F12000
                #M400
            {% endif %}
            G1 X52.50 F12000
            #M400
        {% endif %}
        G1 Y220 F12000 #fast to 220, no effect if it is already in 220
        G1 Y229.6 F3000
        G1 F12000
        #M400
    {% endif %}

[gcode_macro _SBROS_TRASH]
description: Сброс через какашник без выдавливания
gcode:
    {% if printer.toolhead.position.x == 52.50 %}
    G1 Y222 F12000      ; Выход из какашника
    G1 Y229.6 F3000    ; Вход в какашник
    G1 Y222 F12000      ; Выход из какашника
    G1 Y229.6 F3000    ; Вход в какашник
    G1 Y222 F12000      ; Выход из какашника
    
    # We end up in a trash position, so there is an extra swing when go back to printing
    G1 Y229.6 F3000    ; Вход в какашник
    G1 F12000
    {% endif %}

[gcode_macro _CLEAR_REZINA]
description: Чистка об резинку
gcode:
     RESPOND PREFIX="info" MSG="Cleaning the nozzle on rubber"

    G1 Y220 F3000
    G1 X65              ; 1/2 резинки по X
    G1 Y228.8           ; заезд на резинку по Y
    G1 X73              ; 1/2 резинки по X
    G1 X65              ; 1/4 резинки по X
    G1 X73              ; 1/2 резинки по X
    G1 X65              ; 1/4 резинки по X
    G1 X73              ; 1/2 резинки по X
    G1 X65              ; 1/4 резинки по X
    # and stay in the silicone
    
    G1 F12000 #fast again
    #M400

[gcode_macro _PRINT_CLEAR_NOZZLE] # _ORIG_CLEAR_NOZZLE is enough with FORCE_KAMP=True
gcode:
    #disable
    
[gcode_macro _ORIG_CLEAR_NOZZLE] 
# 0 confidence in _CLEAR_BOARD, I don't like it rubbing against the bed to clean the nozzle.
#Also, the tool head collides with the bed handle when it is turned to the other side.
# so we poop into trash at the same time we cool down the nozzle, wait for 180ºC and _SBROS_TRASH 
# and them CLEAR_REZINA and wait for 140ºC in the silicone
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set ignore_temp = params.IGNORE_TEMP|default(0)|int %}
    {% set preclear = params.PRECLEAR|default(0)|int %}

    {% if ignore_temp == 0%}
        RESPOND PREFIX="info" MSG="Running native nozzle cleaning {extruder_temp}/{bed_temp}"
    {% else %}
        RESPOND PREFIX="info" MSG="Nozzle pre-cleaning"
    {% endif %}

    _G28
    G1 Z5 F600
    _GOTO_TRASH
    M140 S{bed_temp}        
    M104 S{extruder_temp} T0
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}
    M104 S{140}
    M106 S102
    G92 E0
    G1 E25 F150
    G92 E0
    G1 E25 F150
    G92 E0
    G1 E-3 F300
    G92 E0
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={180}
    _SBROS_TRASH
    _CLEAR_REZINA
    M106 S{255/100*80}
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={142}
    M106 S0
    
[gcode_macro _UGOL_PARK]
# this macro do go to trash and run after _smart_park in KAMP macro when with FORCE_KAMP=True, so _smart_park in KAMP is useless
gcode:
    #disabled
  
[gcode_macro KAMP]
description: Adaptive bed
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    _KAMP_BED_MESH_CALIBRATE

    _SMART_PARK
    M140 S{bed_temp} #This heats both at the same time
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+4}
    M190 S{bed_temp}
    
