    {% set tools = params.TOOLS %}
    {% set colors = params.COLORS %}
    {% set tool = params.TOOL|int %}
    {% set port = params.PORT|int %}

    {% if tool == 0 %}
    {% set port1 = port %}
    {% else %}
        {% set port1 = ifs.tools[0] %}
    {% endif %}

    {% if tool == 1 %}
        {% set port2 = port %}
    {% else %}
        {% set port2 = ifs.tools[1] %}
    {% endif %}

    {% if tool == 2 %}
        {% set port3 = port %}
    {% else %}
        {% set port3 = ifs.tools[2] %}
    {% endif %}

    {% if tool == 3 %}
        {% set port4 = port %}
    {% else %}
        {% set port4 = ifs.tools[3] %}
    {% endif %}

    {% if tool == 4 %}
        {% set port5 = port %}
    {% else %}
        {% set port5 = ifs.tools[4] %}
    {% endif %}

    {% if tool == 5 %}
        {% set port6 = port %}
    {% else %}
        {% set port6 = ifs.tools[5] %}
    {% endif %}

    {% if tool == 6 %}
        {% set port7 = port %}
    {% else %}
        {% set port7 = ifs.tools[6] %}
    {% endif %}

    {% if tool == 7 %}
        {% set port8 = port %}
    {% else %}
        {% set port8 = ifs.tools[7] %}
    {% endif %}

    {% if tool == 8 %}
        {% set port9 = port %}
    {% else %}
        {% set port9 = ifs.tools[8] %}
    {% endif %}

    {% if tool == 9 %}
        {% set port10 = port %}
    {% else %}
        {% set port10 = ifs.tools[9] %}
    {% endif %}

    {% if tool == 10 %}
        {% set port11 = port %}
    {% else %}
        {% set port11 = ifs.tools[10] %}
    {% endif %}

    {% if tool == 11 %}
        {% set port12 = port %}
    {% else %}
        {% set port12 = ifs.tools[11] %}
    {% endif %}

    {% if tool == 12 %}
        {% set port13 = port %}
    {% else %}
        {% set port13 = ifs.tools[12] %}
    {% endif %}

    {% if tool == 13 %}
        {% set port14 = port %}
    {% else %}
        {% set port14 = ifs.tools[13] %}
    {% endif %}

    {% if tool == 14 %}
        {% set port15 = port %}
    {% else %}
        {% set port15 = ifs.tools[14] %}
    {% endif %}

    {% if tool == 15 %}
        {% set port16 = port %}
    {% else %}
        {% set port16 = ifs.tools[15] %}
    {% endif %}
    
    SET_GCODE_VARIABLE MACRO=_IFS_VARS VARIABLE=tools VALUE=[{port1},{port2},{port3},{port4},{port5},{port6},{port7},{port8},{port9},{port10},{port11},{port12},{port13},{port14},{port15},{port16}]
    SAVE_VARIABLE VARIABLE=ifs_tools VALUE=[{port1},{port2},{port3},{port4},{port5},{port6},{port7},{port8},{port9},{port10},{port11},{port12},{port13},{port14},{port15},{port16}]
    _IFS_COLORS TOOLS={tools} COLORS={colors}

[gcode_macro IFS_COLORS]
variable_colors:""
variable_tools:""
gcode:
  {% set ifs_colors = printer['gcode_macro IFS_COLORS'] %}
  
  {% if ifs_colors.colors != "" %}
    _IFS_COLORS COLORS={ifs_colors.colors} TOOLS={ifs_colors.tools}
  {% endif %}
  
[gcode_macro _IFS_COLORS]
gcode:
    {% set ifs = printer['gcode_macro _IFS_VARS'] %}

    RESPOND PREFIX="info" MSG="{ifs.tools}"

    PAUSE

    {% set raw_tools = params.TOOLS %}
    SET_GCODE_VARIABLE MACRO=IFS_COLORS VARIABLE=tools VALUE='"{raw_tools}"'
    {% set tools = [] %}
    {% set ns = namespace(cc="") %}
    
    {% for c in raw_tools %}
        {% if c != ',' %}
          {% set ns.cc = (ns.cc|string) + (c|string) %}
          #RESPOND PREFIX="info" MSG="-->{ns.cc}"
        {% else %}
          {% set _ = tools.append(ns.cc) %}
          {% set ns.cc = "" %}
        {% endif %}
    {% endfor %}
    {% set _ = tools.append(ns.cc) %}

    {% set raw_colors = params.COLORS %}
    SET_GCODE_VARIABLE MACRO=IFS_COLORS VARIABLE=colors VALUE='"{raw_colors}"'
    {% set colors = [] %}
    {% set ns = namespace(cc="") %}
    
    {% for c in raw_colors %}
        {% if c != ',' %}
          {% set ns.cc = (ns.cc|string) + (c|string) %}
          #RESPOND PREFIX="info" MSG="-->{ns.cc}"
        {% else %}
          {% set _ = colors.append(ns.cc) %}
          {% set ns.cc = "" %}
        {% endif %}
    {% endfor %}
    {% set _ = colors.append(ns.cc) %}

    RESPOND PREFIX="info" MSG="TOOLS:{tools}"
    RESPOND PREFIX="info" MSG="COLORS:{colors}" 
    
    RESPOND TYPE=command MSG="action:prompt_begin Color to Port"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    {% for tool in tools %}
            RESPOND TYPE=command MSG="action:prompt_button_group_start"
            RESPOND TYPE=command MSG="action:prompt_button {tool|int + 1}||ifs-color-slot warning|{colors[tool|int]}"
            {% for port in range(1,5) %}
                {% if port|int == ifs.tools[tool|int] %}
                    RESPOND TYPE=command MSG="action:prompt_button P{port}|_IFS_COLORS_ASSIGN TOOL={tool} PORT={port} COLORS={raw_colors} TOOLS={raw_tools}|ifs-color-selected primary"
                {% else %}
                    RESPOND TYPE=command MSG="action:prompt_button P{port}|_IFS_COLORS_ASSIGN TOOL={tool} PORT={port} COLORS={raw_colors} TOOLS={raw_tools}|ifs-color"
                {% endif %}
            {% endfor %}
            RESPOND TYPE=command MSG="action:prompt_button_group_end"
    {% endfor %}
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    {% if printer.print_stats.state=="paused" or printer.print_stats.state == "printing" %}
      RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_IFS_COLORS_CANCEL"
      RESPOND TYPE=command MSG="action:prompt_footer_button Print|_IFS_COLORS_PRINT"
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _IFS_VARS]
variable_filament_unload_before_cutting:20
variable_filament_unload_after_cutting:2
variable_filament_unload_speed:1200
variable_nozzle_cleaning_length:60
variable_filament_load_speed: 600
variable_filament_tube_length: 1000
variable_filament_drop_length:  33
variable_tools:[1,2,3,4,4,4,4,4,4,4,4,4,4,4,4,4] # index = tool, value = ifs port

gcode:
    {% for variable, value in params.items() %}
      {% if value == '?' %}
        _IFS_PRINT_VAR VARIABLE={variable|lower}
      {% else %}
        SET_GCODE_VARIABLE MACRO=_IFS_VARS VARIABLE={variable|lower} VALUE="{value}"
        SAVE_VARIABLE VARIABLE=ifs_{variable|lower} VALUE="{value}"
      {% endif %}
    {% endfor %}

[gcode_macro _IFS_PRINT_VAR]
gcode:
    RESPOND PREFIX="info" MSG="{params.VARIABLE|replace('_', ' ')|title} : {printer['gcode_macro _IFS_VARS'][params.VARIABLE]}"
    
