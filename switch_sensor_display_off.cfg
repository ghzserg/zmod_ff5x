# Настройки сенсора как датчика наличия филамента в режиме БЕЗ экрана
[filament_switch_sensor e0_sensor]
pause_on_runout: False
runout_gcode: _RUNOUT_ACTION
insert_gcode: _INSERT_ACTION
switch_pin: !PB14
event_delay: 1.0

[gcode_macro _RUNOUT_ACTION]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if printer[client.runout_sensor].enabled %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Filament runout. Pausing in 30 seconds"{% else %}"Кончился филамент. Через 30 секунд будет пауза"{% endif %}
        UPDATE_DELAYED_GCODE ID=delayed_pause DURATION=30
    {% endif %}

[gcode_macro _INSERT_ACTION]
gcode:
  UPDATE_DELAYED_GCODE ID=delayed_pause DURATION=0

[delayed_gcode delayed_pause]
gcode:
  {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
  RESPOND TYPE=error MSG={% if lang == "en" %}"Filament runout detected"{% else %}"Кончился филамент"{% endif %}
  PAUSE
