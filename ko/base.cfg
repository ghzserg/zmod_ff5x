[gcode_macro SET_LED]
description: LED 설정
rename_existing: _SET_LED
variable_allowed: False
gcode:
    {% if allowed %}
        _SET_LED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% endif %}

[gcode_macro SET_GCODE_OFFSET]
description: Z-오프셋 저장
rename_existing: _SET_GCODE_OFFSET
gcode:
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
    {% else %}
        {% set offsets = {'z': None} %}
    {% endif %}

    {% set ns = namespace(offsets={'z': offsets.z}) %}

    _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}

    {% if 'Z' in params %}
        {% set null = ns.offsets.update({'z': params.Z}) %}
    {% endif %}

    {% if 'Z_ADJUST' in params %}
        {% if ns.offsets.z == None %}
            {% set null = ns.offsets.update({'z': 0}) %}
        {% endif %}
        {% set null = ns.offsets.update({'z': (ns.offsets.z | float) + (params.Z_ADJUST | float)}) %}
    {% endif %}

    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% if screen == False %}
        SAVE_VARIABLE VARIABLE=gcode_offsets VALUE="{ns.offsets}"
    {% endif %}

[gcode_macro LOAD_GCODE_OFFSET]
description: Z-오프셋 복구
gcode:
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
        _SET_GCODE_OFFSET {% for axis, offset in offsets.items() if offsets[axis] %}{ "%s=%s " % (axis, offset) }{% endfor %}
        {% for axis, offset in offsets.items() if offsets[axis] %}
            { action_respond_info("전역 설정 오프셋 로드됨 %s=%.4f " % (axis|upper, offset|float)) }
        {% endfor %}
    {% endif %}

[gcode_macro SET_FAN_SPEED]
description: 팬 제어
rename_existing: _SET_FAN_SPEED
gcode:
    {% set fan = params.FAN|string %}
    {% set speed = params.SPEED|default(0)|float %}

    {% if fan != 'pcb_fan' and fan != 'external_fan' and fan != 'internal_fan' %}
        _SET_FAN_SPEED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% else %}
        {% if fan == 'external_fan' %}
            _SET_FAN_SPEED FAN=internal SPEED={speed}
        {% else %}
            {% if fan == 'internal_fan' %}
                _SET_FAN_SPEED FAN=external SPEED={speed}
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro _SVG28]
gcode:
    SET_GCODE_VARIABLE MACRO=G28 VARIABLE=z VALUE={printer.toolhead.position.z}

[gcode_macro SET_IDLE_TIMEOUT]
rename_existing: SET_IDLE_TIMEOUT_ORIG
gcode:
    {% set tm = params.TIMEOUT|default(1801)|float %}

    {% if (not printer.pause_resume.is_paused) and (tm == 1800) %}
        ZCONTROL_ON
    {% endif %}

    SET_IDLE_TIMEOUT_ORIG TIMEOUT={tm}

[gcode_macro _Z_G28]
gcode:

[gcode_macro _PRE_Z_G28]
gcode:
    G28.1 Z
    M400
    _SVG28


