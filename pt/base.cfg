[gcode_macro _FIND_POINT]
# Поиск точки для измерения
gcode:
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}

    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}

    SET_GCODE_VARIABLE MACRO=_PROBE_POINT VARIABLE=find VALUE=False
    SET_GCODE_VARIABLE MACRO=_TEST_POINT VARIABLE=temp_z_offset VALUE=0.0

    {% set bed_mesh = printer.bed_mesh %}
    {% if not bed_mesh.profile_name %}
        { action_respond_info("Perfil ou matriz de malha não encontrados") }
    {% else %}
        {% set min_x = bed_mesh.mesh_min[0]|float %}
        {% set max_x = bed_mesh.mesh_max[0]|float %}
        {% set min_y = bed_mesh.mesh_min[1]|float %}
        {% set max_y = bed_mesh.mesh_max[1]|float %}
        {% set x_count = bed_mesh.probed_matrix|length %}
        {% set y_count = bed_mesh.probed_matrix[0]|length %}

        {% set x_step = (max_x - min_x) / (x_count - 1) if x_count > 1 else 0 %}
        {% set y_step = (max_y - min_y) / (y_count - 1) if y_count > 1 else 0 %}
        {% set center_x = (min_x + max_x) / 2.0 %}
        {% set center_y = (min_y + max_y) / 2.0 %}

        {% set points = [] %}
        {% for y_index in range(y_count) %}
            {% for x_index in range(x_count) %}
                {% set x = min_x + x_index * x_step|float %}
                {% set y = min_y + y_index * y_step|float %}
                {% set z = bed_mesh.probed_matrix[y_index][x_index]|float %}
                {% set dx = x - center_x %}
                {% set dy = y - center_y %}
                {% set dist = (dx * dx + dy * dy) ** 0.5 %}
                {% set _ = points.append({'x': x, 'y': y, 'z': z, 'dist': dist}) %}
          {% endfor %}
        {% endfor %}

        {% if mesh_test == 5 or mesh_test == 6 %}
            # 5 - тестировать с АВТОПОДБОРОМ Z-Offset, с очисткой сопла
            # 6 - тестировать с АВТОПОДБОРОМ Z-Offset, с очисткой сопла, в случае несовпадения карты, запускать KAMP
            _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
            {% for p in points | sort(attribute='dist') %}
                _PROBE_POINT X={p.x} Y={p.y} Z={p.z}
            {% endfor %}
        {% else %}
            # 3 - тестировать с АВТОПОДБОРОМ Z-Offset, без очистки сопла
            # 4 - тестировать с АВТОПОДБОРОМ Z-Offset, без очистки сопла, в случае несовпадения карты, запускать KAMP
            {% if printer.exclude_object.objects != [] %}
                {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
                {% set x_min = (all_points | map(attribute=0) | min | default(0)) %}
                {% set x_max = (all_points | map(attribute=0) | max | default(0)) %}
                {% set y_min = (all_points | map(attribute=1) | min | default(0)) %}
                {% set y_max = (all_points | map(attribute=1) | max | default(0)) %}

                { action_respond_info("Exclude: X %.2f-%.2f\tY %.4f-%.2f" | format(x_min, x_max, y_min, y_max)) }
                {% for p in points | sort(attribute='dist') %}
                    {% if p.x < x_min or p.x > x_max or p.y < y_min or p.y > y_max %}
                        _PROBE_POINT X={p.x} Y={p.y} Z={p.z}
                    {% endif %}
                {% endfor %}
            {% endif %}

            {% for p in points | sort(attribute='dist', reverse=true) %}
                _PROBE_POINT X={p.x} Y={p.y} Z={p.z}
            {% endfor %}
        {% endif %}
    {% endif %}

[gcode_macro _PROBE_POINT]
# Замер точки
variable_find: False
gcode:
    {% set x = params.X|default(0)|float %}
    {% set y = params.Y|default(0)|float %}
    {% set z = params.Z|default(0)|float %}

    {% set z_offset_klipper = printer.configfile.settings.probe.z_offset|default(0.0)|float %}

    {% if not find %}
        _G28
        M400
        _TEST_MIN_MAX

        { action_respond_info("X: %.4f\tY: %.4f\tZ: %.4f" | format(x, y, z+z_offset_klipper)) }

        SAVE_GCODE_STATE NAME=_probe_point
            G1 X{x} F6000
            G1 Y{y} F6000
            M400

            LOAD_CELL_TARE
            PROBE
            G1 Z5 F300
        RESTORE_GCODE_STATE MOVE=0 NAME=_probe_point

        _TEST_POINT X={x} Y={y} Z={z+z_offset_klipper}
        SET_GCODE_VARIABLE MACRO=_PROBE_POINT VARIABLE=find VALUE=True
  {% endif %}

[gcode_macro _TEST_POINT]
variable_temp_z_offset: 0.0
gcode:
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}

    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}

    {% set x = params.X|default(0)|float %}
    {% set y = params.Y|default(0)|float %}
    {% set z = params.Z|default(0)|float %}

    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}

    {% set zprobe = printer.probe.last_z_result | float %}
    {% set zdelta = zprobe-z | float %}

    { action_respond_info("Probe: %.4f\tMesh: %.4f\tDelta: %.4f" | format(z, zprobe, zdelta)) }

    {% if zdelta | abs < 0.6 %}
        SET_GCODE_VARIABLE MACRO=_TEST_POINT VARIABLE=temp_z_offset VALUE={zdelta}

        _SET_GCODE_OFFSET_FAST Z_ADJUST={zdelta} FROM="_TEST_POINT"
        RESTORE_GCODE_STATE MOVE=1 NAME=_mesh_test
        _WAIT_TEMP EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} NAME=_TEST_POINT
    {% else %}
        SET_GCODE_VARIABLE MACRO=_TEST_POINT VARIABLE=temp_z_offset VALUE=0.0

        {action_respond_info("Possível perfil errado carregado (placa/temperatura diferente)")}
        {% if mesh_test == 3 or mesh_test == 5 %}
            # 3 - тестировать с АВТОПОДБОРОМ Z-Offset, без очистки сопла
            # 5 - тестировать с АВТОПОДБОРОМ Z-Offset, с очисткой сопла
            {action_raise_error("AVISO: A última sonda EXCEDE o valor guardado em %.4f mm! Use SAVE_ZMOD_DATA MESH_TEST=%d para iniciar automaticamente o KAMP se ocorrer um erro" % (zdelta, mesh_test+1))}
        {% else %}
            {action_raise_info("AVISO: A última sonda EXCEDE o valor guardado em %.4f mm! => KAMP" % (zdelta))}
            KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
        {% endif %}
    {% endif %}

[gcode_macro _MESH_TEST]
description: Comparar extremos da grelha com última sonda
gcode:
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set mesh = printer.bed_mesh.profiles[profile_name] %}
    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}

    SET_GCODE_VARIABLE MACRO=_TEST_POINT VARIABLE=temp_z_offset VALUE=0.0

    {% if mesh %}
        {% if mesh_test == 1 or mesh_test == 2 %}
            # 1 - тестировать БЕЗ автоподбора Z-Offset (по умолчанию)
            # 2 - тестировать БЕЗ автоподбора Z-Offset, в случае несовпадения карты, запускать KAMP
            RESPOND PREFIX="info" MSG="AutoZOffset: desligado // See https://github.com/ghzserg/zmod/wiki/Global_en mesh_test"
            _MESH_PROBE
            _MESH_COMPARE
        {% endif %}
        {% if mesh_test == 3 or mesh_test == 4 or mesh_test == 5 or mesh_test == 6 %}
            # 3 - тестировать с АВТОПОДБОРОМ Z-Offset, без очистки сопла
            # 4 - тестировать с АВТОПОДБОРОМ Z-Offset, без очистки сопла, в случае несовпадения карты, запускать KAMP
            # 5 - тестировать с АВТОПОДБОРОМ Z-Offset, с очисткой сопла
            # 6 - тестировать с АВТОПОДБОРОМ Z-Offset, с очисткой сопла, в случае несовпадения карты, запускать KAMP
            RESPOND PREFIX="info" MSG="AutoZOffset: ligado // See https://github.com/ghzserg/zmod/wiki/Global_en mesh_test"
            _FIND_POINT
            SAVE_GCODE_STATE NAME=_mesh_test
        {% endif %}
    {% else %}
        {action_respond_info("AVISO: Malha da mesa não carregada!")}
    {% endif %}

[gcode_macro _MESH_PROBE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set kamp_settings = printer["gcode_macro _KAMP_Settings"] %}                                                                 # Pull variables from _KAMP_Settings
    {% set mesh_margin = kamp_settings.mesh_margin | float %}                                                                       # Pull mesh margin setting from _KAMP_Settings
    {% set fuzz_amount = kamp_settings.fuzz_amount | float %}                                                                       # Pull fuzz amount setting from _KAMP_Settings
    {% set fuzz_range = range((0) | int, (fuzz_amount * 100) | int + 1) %}                                                          # Set fuzz_range between 0 and fuzz_amount
    {% set adapted_x_min = mesh_margin + (fuzz_range | random / 100.0) %}                                                           # Adapt x_min to margin and fuzz constraints

    _G28
    _TEST_MIN_MAX

    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = G10 | string %}
        {% set UNRETRACT = G11 | string %}
    {% else %}
        {% set RETRACT = 'G1 E-.5 F2100' | string %}
        {% set UNRETRACT = 'G1 E.5 F2100' | string %}
    {% endif %}

    G92 E0
    G90
    _CLIENT_LINEAR_MOVE X=-{adapted_x_min}

    G1 Z5 F6000

    {RETRACT}

    LOAD_CELL_TARE
    PROBE

    G1 Z5 F6000

    {UNRETRACT}

[gcode_macro _MESH_COMPARE]
gcode:
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set z_offset_klipper = printer.configfile.settings.probe.z_offset|default(0.0)|float %}
    {% set mesh = printer.bed_mesh %}
    {% set last_probe = printer.probe.last_z_result - z_offset_klipper %}
    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}

    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer

    {% if mesh and 'mesh_matrix' in mesh and profile_name %}
        {% set all_z = mesh.mesh_matrix | sum(start=[]) %}
        {% set min_z = all_z | min %}
        {% set max_z = all_z | max %}

        {action_respond_info("Current profile: %s" % profile_name)}
        {action_respond_info("Mapa mínimo: %.3f mm | Delta: %.3f mm" % (min_z, max_z - min_z))}
        {action_respond_info("Mapa máximo: %.3f mm | Última sonda: %.3f mm" % (max_z, last_probe))}

        {% if last_probe < min_z - 0.21 %}
            {action_respond_info("Possível perfil errado carregado (placa/temperatura diferente)")}
            {action_respond_info("Desativar verificação com: MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
            {% if mesh_test == 2 %}
                {action_respond_info("AVISO: Última sonda ABAIXO do mínimo da malha por %.3f mm! => KAMP" % (min_z - last_probe))}
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% else %}
                {action_raise_error("AVISO: Última sonda ABAIXO do mínimo da malha por %.3f mm! Use SAVE_ZMOD_DATA MESH_TEST=2 para iniciar automaticamente o KAMP se ocorrer um erro" % (min_z - last_probe))}
            {% endif %}
        {% elif last_probe > max_z + 0.21 %}
            {action_respond_info("Possível perfil errado carregado (placa/temperatura diferente)")}
            {action_respond_info("Desativar verificação com: MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
            {% if mesh_test == 2 %}
                {action_respond_info("AVISO: Última sonda ACIMA do máximo da malha por %.3f mm! => KAMP" % (last_probe - max_z))}
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% else %}
                {action_raise_error("AVISO: Última sonda ACIMA do máximo da malha por %.3f mm! Use SAVE_ZMOD_DATA MESH_TEST=2 para iniciar automaticamente o KAMP se ocorrer um erro" % (last_probe - max_z))}
            {% endif %}
        {% else %}
            {action_respond_info("OK: Sonda dentro dos extremos da malha")}
        {% endif %}

    {% else %}
        {action_respond_info("Perfil ou matriz de malha não encontrados")}
    {% endif %}

[gcode_macro _START_MESH]
gcode:
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}

    {% if skip_leveling == False %}
        {% if force_kamp == True %}
            RESPOND PREFIX="//" MSG="KAMP iniciado SKIP_LEVELING={skip_leveling} FORCE_KAMP={force_kamp}"

            {% set screen = printer["gcode_macro _SCREEN"].screen %}
            {% if screen == True %}
                RESPOND PREFIX="info" MSG="Sabia que pode ativar o KAMP globalmente?"
                RESPOND PREFIX="//" MSG="SAVE_ZMOD_DATA USE_KAMP=1 CLEAR=LINE_PURGE"
            {% endif %}
            M400
            KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            M400

        {% else %}
            {% if (not printer['bed_mesh'].profile_name) or force_leveling == True %}
                {% if mesh != "" %}
                    RESPOND PREFIX="!!" MSG="Construindo malha {mesh} (não encontrada). Salve APÓS a impressão!"
                    _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE={mesh}
                {% else %}
                    {% if force_leveling == True %}
                        RESPOND PREFIX="info" MSG="Construindo malha padrão (FORCE_LEVELING={force_leveling})"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=default
                    {% else %}
                        RESPOND PREFIX="info" MSG="Construindo malha automática (nenhum perfil carregado)"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=auto
                    {% endif %}
                {% endif %}
            {% else %}
                {% set cur_mesh = printer['bed_mesh'].profile_name %}
                RESPOND PREFIX="//" MSG="Sem necessidade de nivelamento. Perfil carregado: {cur_mesh}"
            {% endif %}
        {% endif %}

    {% else %}
        RESPOND PREFIX="//" MSG="A saltar nivelamento da mesa. SKIP_LEVELING={skip_leveling}"
    {% endif %}

[gcode_macro _PRINT_MESH]
gcode:
    {% set cur_mesh = printer['bed_mesh'].profile_name %}

    RESPOND PREFIX="info" MSG="A imprimir com malha da mesa: {cur_mesh}"

[gcode_macro _PREPARE_PRINT]
gcode:
    UPDATE_DELAYED_GCODE ID=_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_FAST_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_STOP_MOTOR DURATION=0
    UPDATE_DELAYED_GCODE ID=_AUTO_REBOOT DURATION=0
    UPDATE_DELAYED_GCODE ID=_PRO_POWEROFF DURATION=0
    UPDATE_DELAYED_GCODE ID=_GOTO_PAUSE DURATION=0
    UPDATE_DELAYED_GCODE ID=_ZUPDATE DURATION=0

    LOAD_CELL_TARE

    SET_GCODE_VARIABLE MACRO=_NOTIFY_ON_PERCENT VARIABLE=notified_percent VALUE=0

[gcode_macro _START_PRINT]
description: Substituir G-code de início padrão
variable_zextruder_temp: 245.0
variable_zbed_temp: 80.0
variable_zforce_kamp: False
variable_zforce_leveling: False
variable_zskip_leveling: False
variable_zzoffset: 99.0
variable_zmesh: ""
gcode:
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}              ; if True it forces the KAMP bed level process
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}      ; if True it forces the bed level process
    {% set zoffset = printer["gcode_macro _START_PRINT"].zzoffset %}                    ; Установить Z offset
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}        ; Не строить карту
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}                          ; Имя профиля карты стола

    {% set filename = printer.virtual_sdcard.file_path|default("")|string  %}

    {% set force_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% set disable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% set disable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(1) | int %}
    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE")|string %}
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}

    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    _PREPARE_PRINT

    CLEAR_PAUSE
    ZCONTROL_AUTO
    ZCONTROL_ON
    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    ZSSH_RELOAD

    RESPOND PREFIX="info" MSG="START_PRINT BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} FORCE_LEVELING={force_leveling} FORCE_KAMP={force_kamp} Z_OFFSET={zoffset} SKIP_LEVELING={skip_leveling} MESH={mesh}"

    RESPOND PREFIX="info" MSG="Temperatura do extrusor: {extruder_temp}"
    RESPOND PREFIX="info" MSG="Temperatura da mesa: {bed_temp}"

    {% if zprint_leveling == 0 %}
        {% if force_kamp == True %}
            RESPOND PREFIX="info" MSG="KAMP: ativado"
        {% else %}
            RESPOND PREFIX="info" MSG="KAMP: desativado"
        {% endif %}

        {% if force_leveling == True %}
            RESPOND PREFIX="info" MSG="Nivelamento forçado da mesa: ativado"
        {% else %}
            RESPOND PREFIX="info" MSG="Nivelamento forçado da mesa: desativado"
        {% endif %}

        {% if skip_leveling == True %}
            RESPOND PREFIX="info" MSG="Saltar nivelamento da mesa: ativado"
        {% else %}
            RESPOND PREFIX="info" MSG="Saltar nivelamento da mesa: desativado"
        {% endif %}

        RESPOND PREFIX="info" MSG="Carregar malha da mesa: {mesh}"
    {% endif %}

    {% if screen == False %}
        {% if force_md5 == 1 %}
            RESPOND PREFIX="info" MSG="MD5: ativado"
        {% else %}
            RESPOND PREFIX="info" MSG="MD5: desativado"
        {% endif %}
    {% endif %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="Priming do nozzle: desativado"
    {% else %}
        RESPOND PREFIX="info" MSG="Priming do nozzle: ativado"
        RESPOND PREFIX="info" MSG="Algoritmo de priming: {zclear}"
    {% endif %}

    {% if disable_skew == 1 %}
        RESPOND PREFIX="info" MSG="SKEW: desativado"
    {% else %}
        RESPOND PREFIX="info" MSG="SKEW: ativado"
    {% endif %}

    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}
    {% if ( force_md5 == 1 and check_md5 == 0 ) %}
        RESPOND PREFIX="info" MSG="Verificação MD5 iniciada"
        CHECK_MD5 DELETE=True
    {% endif %}

    M140 S{bed_temp}        ; start bed heating
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    _G28

    {% if not client.ad5x %}
        {% set we = printer['temperature_sensor weightValue'].temperature %}
        {% if we != 0 %}
            LOAD_CELL_TARE
        {% endif %}
    {% endif %}

    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Construindo malha da mesa com ecrã nativo em cada impressão. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% else %}
            RESPOND PREFIX="//" MSG="Construindo malha da mesa em cada impressão. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
            BED_MESH_CLEAR
            M400
            {% if zuse_kamp == 1 %}
                RESPOND PREFIX="info" MSG="A usar KAMP das definições globais. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
                M400
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
                M400
            {% else %}
                RESPOND PREFIX="info" MSG="Construindo malha completa da mesa. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
                M400
                _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
                M400
            {% endif %}
        {% endif %}

        RESPOND PREFIX="//" MSG="Todos os parâmetros START_PRINT para nivelamento são ignorados"
    {% else %}
        {% if mesh != "" %}
            RESPOND PREFIX="info" MSG="A tentar carregar malha da mesa: {mesh}"
            BED_MESH_CLEAR
            M400
            {% for mesh_dt in printer['bed_mesh'].profiles %}
                {% if mesh == mesh_dt %}
                    BED_MESH_PROFILE LOAD={mesh}
                    RESPOND PREFIX="info" MSG="Malha da mesa {mesh} carregada"
                {% endif %}
            {% endfor %}
        {% endif %}

        _START_MESH
    {% endif %}

    # load skew profile
    {% if disable_skew == 0 %}
        RESPOND PREFIX="info" MSG="A carregar skew_profile"
        SKEW_PROFILE LOAD=skew_profile
    {% endif %}

    G90                     ; use absolute coordinates
    {% if (zprint_leveling == 0 and force_kamp == True) or (zprint_leveling == 1 and screen == False and zuse_kamp == 1) or (zclear == "LINE_PURGE" and client.ad5x == 0 ) %}
        _SMART_PARK
    {% else %}
        _UGOL_PARK
    {% endif %}

    #M190 S{bed_temp}
    #M109 S{extruder_temp}

    _WAIT_TEMP EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} NAME=START_PRINT

    {% if client.ad5x %}
        {% if not ( (zprint_leveling == 0 and force_kamp == True ) or ( zprint_leveling == 1 and screen == False and zuse_kamp == 1 ) ) %}
            _PRINT_CLEAR_NOZZLE
        {% endif %}
        M400
        _SMART_PARK
    {% endif %}

    {% if (load_zoffset == 1) and (screen == False) %}
        RESPOND PREFIX="info" MSG="A usar controlo global Z-Offset. O parâmetro Z_OFFSET é ignorado"
        LOAD_GCODE_OFFSET
    {% else %}
        {% if (load_zoffset == 1) and (screen == True) %}
            RESPOND PREFIX="info" MSG="Carregamento Z-Offset global: ignorado (a trabalhar com ecrã)"
        {% endif %}

        {% if zoffset == 99.0 %}
            RESPOND PREFIX="info" MSG="Configuração do Z-Offset ignorada"
        {% else %}
            RESPOND PREFIX="info" MSG="A definir Z-Offset {zoffset}"
            SET_GCODE_OFFSET Z={zoffset} FROM=START_PRINT
        {% endif %}
    {% endif %}

    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
    {% if mesh_test == 0 or force_kamp == True or zprint_leveling == 1 or force_leveling == True %}
        _PRINT_MESH
    {% else %}
        _MESH_TEST
    {% endif %}

    {% if printer.toolhead.position.z < 5 %}
        G1 Z5 F3000
    {% endif %}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}

    {% if zmidi_start != "" %}
        PLAY_MIDI FILE={zmidi_start}
    {% endif %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="Purga de linha do nozzle desativada. DISABLE_PRIMING={disable_priming}"
    {% else %}
        RESPOND PREFIX="info" MSG="Purga de linha do nozzle. Algoritmo: {zclear}"

        {% set macro_name = zclear | lower %}
        {% set macro_key = "gcode_macro " + macro_name %}
        {% set macro_settings = printer.configfile.settings.get(macro_key) %}
        {% if macro_settings is none %}
            RESPOND TYPE=error MSG="{macro_name|upper} - este macro de limpeza NÃO existe. É usado o LINE_PURGE. Adicione o macro {macro_name|upper} a mod_data/user.cfg ou desative o uso da linha de limpeza // SAVE_ZMOD_DATA DISABLE_PRIMING=1"
            RESPOND TYPE=echo MSG="Macros disponíveis:"
            RESPOND TYPE=echo MSG="LINE_PURGE // SAVE_ZMOD_DATA CLEAR=LINE_PURGE"
            RESPOND TYPE=echo MSG="_CLEAR1 // SAVE_ZMOD_DATA CLEAR=_CLEAR1"
            RESPOND TYPE=echo MSG="_CLEAR2 // SAVE_ZMOD_DATA CLEAR=_CLEAR2"
            RESPOND TYPE=echo MSG="_CLEAR3 // SAVE_ZMOD_DATA CLEAR=_CLEAR3"
            RESPOND TYPE=echo MSG="_CLEAR4 // SAVE_ZMOD_DATA CLEAR=_CLEAR4"
            {% set zzclear = "LINE_PURGE" %}
        {% else %}
            {% set zzclear = zclear | upper %}
        {% endif %}

        {% if ( (force_kamp == True) or (zuse_kamp == 1) ) and (zzclear == "_CLEAR1" or zzclear == "_CLEAR2" or zzclear == "_CLEAR3" or zzclear == "_CLEAR4") %}
            RESPOND PREFIX="info" MSG="Está a usar KAMP. Recomendado usar LINE_PURGE: // SAVE_ZMOD_DATA CLEAR=LINE_PURGE"
            RESPOND PREFIX="info" MSG="LINE_PURGE forçado"
            M400
            LINE_PURGE
            M400
        {% else %}
            _TEST_MIN_MAX
            M400
            SAVE_GCODE_STATE NAME=clear_state
            M400
            RESPOND PREFIX="info" MSG="{zzclear}"
            {zzclear}
            M400
            RESTORE_GCODE_STATE MOVE=0 NAME=clear_state
        {% endif %}
    {% endif %}
    EXCLUDE_OBJECT_DEFINE RESET=1
    ZEXCLUDE
    RESPOND TYPE=echo MSG="START_PRINT terminou o seu trabalho."

[gcode_macro UPDATE_MCU]
description: Atualizar MCU
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set current_klipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% set force = params.FORCE|default(0)|int %}

    RESPOND TYPE=error MSG="Aguarde a música e desligue a impressora. Aguarde 10 segundos e ligue novamente. Atualização do MCU começará."

    {% if (current_klipper13 == 1 and force == 0) or (force == 11) or (force == 12) %}
        RESPOND PREFIX="info" MSG="A gravar MCU com versão original para Klipper nativo"
        #SAVE_VARIABLE VARIABLE=klipper13 VALUE={0|int}
        G4 P5000
        M400
        RUN_SHELL_COMMAND CMD=zmcu PARAMS="0"
    {% else %}
        {% if (current_klipper13 == 0 and force == 0) or (force == 13) %}
            RESPOND PREFIX="info" MSG="Flash MCU Klipper 13"
            #SAVE_VARIABLE VARIABLE=klipper13 VALUE={1|int}
            G4 P5000
            M400
            RUN_SHELL_COMMAND CMD=zmcu PARAMS="1"
        {% endif %}
    {% endif %}

[gcode_macro NEW_SAVE_CONFIG]
description: Guardar parâmetros sem congelar ecrã original
gcode:
    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if screen == False or client.ad5x %}
        SAVE_CONFIG
    {% else %}
        RESPOND PREFIX="info" MSG="NEW_SAVE_CONFIG"
        RUN_SHELL_COMMAND CMD=restart_klipper
    {% endif %}

[gcode_macro CLOSE_DIALOGS]
description: Fechar diálogos no ecrã original (lento)
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        RESPOND PREFIX="info" MSG="Fechando janelas de diálogo no ecrã nativo (lento)"
        RUN_SHELL_COMMAND CMD=close_dialogs
        RESPOND PREFIX="info" MSG="Falha ao fechar janelas? Use fecho rápido: FAST_CLOSE_DIALOGS // SAVE_ZMOD_DATA CLOSE_DIALOGS=2"
    {% else %}
        FAST_CLOSE_DIALOGS
    {% endif %}

[gcode_macro FAST_CLOSE_DIALOGS]
description: Fechar diálogos no ecrã original (rápido)
gcode:
    RESPOND PREFIX="info" MSG="Fechando janelas de diálogo no ecrã nativo (rápido)"
    RUN_SHELL_COMMAND CMD=zprint PARAMS="CLOSE CLOSE"

[delayed_gcode _STOP_MOTOR]
gcode:
    RESPOND PREFIX="info" MSG="Motores desativados"
    M84                     ; Выключить мотор

[delayed_gcode _ZUPDATE]
gcode:
    RUN_SHELL_COMMAND CMD=zupdate

[delayed_gcode _GOTO_PAUSE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        G90
        RESPOND PREFIX="info" MSG="A mover cabeça para canto direito distante"
        G1 X{client.custom_park_x} F7800
        M400
        G1 Y{client.custom_park_y} F7800
        M400
    {% else %}
        _GOTO_TRASH
    {% endif %}

[delayed_gcode _CLOSE_DIALOGS]
gcode:
    CLOSE_DIALOGS

[delayed_gcode _FAST_CLOSE_DIALOGS]
gcode:
    FAST_CLOSE_DIALOGS

[delayed_gcode _AUTO_REBOOT]
gcode:
    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% if (zauto_reboot == 2) and (screen == False) %}
        FIRMWARE_RESTART
    {% else %}
        REBOOT
    {% endif %}

[delayed_gcode _PRO_POWEROFF]
gcode:
    SHUTDOWN

[delayed_gcode restart_services]
initial_duration: 180
gcode:
    ZSSH_RELOAD

[delayed_gcode start_led]
initial_duration: 10
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% set save_filament_sensors = printer.save_variables.variables.save_filament_sensors|default(0) | int %}
    {% set e0_sensor_status = printer.save_variables.variables.e0_sensor|default(1) | int %}
    {% set head_switch_sensor_status = printer.save_variables.variables.head_switch_sensor|default(1) | int %}
    {% set ifs_motion_sensor_status = printer.save_variables.variables.ifs_motion_sensor|default(1) | int %}

    {% if client.ad5x %}
        UPDATE_FF_OFFSET
    {% endif %}


    RUN_SHELL_COMMAND CMD=zshaper_new PARAMS="SCV {printer.configfile.settings.printer.square_corner_velocity}"

    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    SET_GCODE_VARIABLE MACRO=_SHUTDOWN VARIABLE=trigger_allowed VALUE=True
    SET_GCODE_VARIABLE MACRO=SET_LED VARIABLE=allowed VALUE=True

    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    {% set zcontrol_z = printer.save_variables.variables.zcontrol_z|default(10) | int %}
    ZCONTROL_Z Z={zcontrol_z}

    CAMERA_RESTART

    GET_ZMOD_DATA

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    {% if zmidi_on != "" %}
        PLAY_MIDI FILE={zmidi_on}
    {% endif %}

    RUN_SHELL_COMMAND CMD=zlink PARAMS="start"
    _LANG SKIP=0
    _GLOBAL START=1
    LOAD_ZOFFSET_NATIVE START=1

    {% if save_filament_sensors == 1 %}
        {% if client.ad5x %}
            {% if screen == False %}
                RESPOND PREFIX="info" MSG="head_switch_sensor: {head_switch_sensor_status}"
                _SET_FILAMENT_SENSOR SENSOR=head_switch_sensor ENABLE={head_switch_sensor_status}
                RESPOND PREFIX="info" MSG="ifs_motion_sensor: {ifs_motion_sensor_status}"
                _SET_FILAMENT_SENSOR SENSOR=ifs_motion_sensor ENABLE={ifs_motion_sensor_status}
            {% endif %}
        {% else %}
            RESPOND PREFIX="info" MSG="e0_sensor: {e0_sensor_status}"
            _SET_FILAMENT_SENSOR SENSOR=e0_sensor ENABLE={e0_sensor_status}
        {% endif %}
    {% endif %}

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    LED S={zled}
    _NOTIFY MSG="Impressora ligada" TYPE=on

[gcode_macro _COLDPULL_LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro _GOTO_MID]
gcode:

[gcode_macro _COLDPULL_LOAD_MATERIAL]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    RESPOND TYPE=command MSG=action:prompt_end

    _G28
    _GOTO_MID

    G90
    G1 X{client.min_x+(client.max_x-client.min_x)/2} F7800
    M400
    G1 Y{client.min_y+(client.max_y-client.min_y)/2} F7800
    M400

    {% set extruder_temp = params.TEMP|default(245)|float %}
    RESPOND PREFIX="info" MSG="A aguardar que o nozzle aqueça até {extruder_temp}"
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp} MAXIMUM={extruder_temp+10}

    RESPOND PREFIX="info" MSG="Extrusando 10 cm de filamento"

    G92 E0
    _DISABLE_SENSOR
        G1 E100 F100
        M400
    _ENABLE_SENSOR

    {% set cold_temp = params.COLD|default(245)|float %}
    RESPOND PREFIX="info" MSG="Arrefecendo para {cold_temp}°C"
    M104 S{cold_temp}
    M106 P0 S255
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={cold_temp-2} MAXIMUM={cold_temp+2}

    RESPOND PREFIX="info" MSG="A puxar o filamento"

    G92 E0
    _DISABLE_SENSOR
        G1 E-70 F1500
        M400
    _ENABLE_SENSOR

    RESPOND PREFIX="info" MSG="Remover o filamento restante manualmente"
    M107
    M104 S0
    G92 E0

[gcode_macro COLDPULL]
description: Cold pull (limpeza do nozzle) suavemente
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Seleção de material para carregamento"
    RESPOND TYPE=command MSG="action:prompt_text Selecionar material para limpar o nozzle"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button PETG|_COLDPULL_LOAD_MATERIAL TEMP=245 COLD=100|primary"
    RESPOND TYPE=command MSG="action:prompt_button ABS|_COLDPULL_LOAD_MATERIAL TEMP=255 COLD=105|primary"
    RESPOND TYPE=command MSG="action:prompt_button NEYLON|_COLDPULL_LOAD_MATERIAL TEMP=260 COLD=120|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancelar|_COLDPULL_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro SAVE_ZMOD_DATA]
description: Guardar parâmetros ZMOD
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set i = params.I|default(0)|int %}

    {% if params.CLOSE_DIALOGS %}
        {% set zclose_dialogs = params.CLOSE_DIALOGS|default(2)|int %}
        {% if client.ad5x and zclose_dialogs == 1 %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% else %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
        {% endif %}
    {% endif %}

    {% if params.STOP_MOTOR %}
        {% set zstop_motor = params.STOP_MOTOR|default(1)|int %}
        SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.USE_SWAP %}
        {% set zuse_swap = params.USE_SWAP|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}
    {% endif %}

    {% if params.AUTO_REBOOT %}
        {% set zauto_reboot = params.AUTO_REBOOT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}
    {% endif %}

    {% if params.SAVE_RESTORE %}
        {% set save_restore = params.SAVE_RESTORE|default(1)|int %}
        SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}
    {% endif %}

    {% if params.FIX_SCV %}
        {% set fix_scv = params.FIX_SCV|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}
    {% endif %}

    {% if params.WIFI %}
        {% set wifi = params.WIFI|default(1)|int %}
        SAVE_VARIABLE VARIABLE=wifi VALUE={wifi|int}
    {% endif %}

    {% if client.ad5x %}
    {% if params.SILENT %}
        {% set silent = params.SILENT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=silent VALUE={silent|int}
    {% endif %}
    {% if params.AUTOINSERT %}
        {% set autoinsert = params.AUTOINSERT|default(1)|int %}
        SAVE_VARIABLE VARIABLE=autoinsert VALUE={autoinsert|int}
    {% endif %}
    {% if params.USE_TRASH_ON_PRINT %}
        {% set use_trash_on_print = params.USE_TRASH_ON_PRINT|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE={use_trash_on_print|int}
    {% endif %}
    {% if params.REMOVE_FILAMENT %}
        {% set remove_filament = params.REMOVE_FILAMENT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=remove_filament VALUE={remove_filament|int}
    {% endif %}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.MOTION_SENSOR %}
        {% set motion_sensor = params.MOTION_SENSOR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}
    {% endif %}

    {% if params.FIX_E0011 %}
        {% set fix_e0011 = params.FIX_E0011|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    {% endif %}

    {% if params.FIX_E0017 %}
        {% set fix_e0017 = params.FIX_E0017|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    {% endif %}

    {% if params.PRINT_LEVELING %}
        {% set zprint_leveling = params.PRINT_LEVELING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}
    {% endif %}

    {% if params.USE_KAMP %}
        {% set zuse_kamp = params.USE_KAMP|default(0)|int %}
        SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}
    {% endif %}

    {% if params.MESH_TEST %}
        {% set zmesh_test = params.MESH_TEST|default(1)|int %}
        SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.NEW_SAVE_CONFIG %}
        {% set znew_save_config = params.NEW_SAVE_CONFIG|default(0)|int %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% endif %}

    {% if params.PRECLEAR %}
        {% set zpreclear = params.PRECLEAR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% endif %}
    {% endif %}

    {% if params.FORCE_MD5 %}
        {% set zforce_md5 = params.FORCE_MD5|default(1)|int %}
        SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}
    {% endif %}

    {% if params.DISABLE_SKEW %}
        {% set zdisable_skew = params.DISABLE_SKEW|default(1)|int %}
        SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}
    {% endif %}

    {% if params.LOAD_ZOFFSET %}
        {% set zload_zoffset = params.LOAD_ZOFFSET|default(1)|int %}
        SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}
    {% endif %}

    {% if params.LED %}
        {% set zled = params.LED|default(50)|int %}
        SAVE_VARIABLE VARIABLE=led VALUE={zled|int}
    {% endif %}

    {% if params.DISABLE_PRIMING %}
        {% set zdisable_priming = params.DISABLE_PRIMING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}
    {% endif %}

    {% if params.CLEAR %}
        {% set zclear = params.CLEAR|default("LINE_PURGE")|string %}
        SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'
    {% endif %}

    {% if params.CHINA_CLOUD %}
        {% set zchina_cloud = params.CHINA_CLOUD|default(1)|int %}
        SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}
    {% endif %}

    {% if params.SAVE_MOONRAKER %}
        {% set save_moonraker = params.SAVE_MOONRAKER|default(0)|int %}
        SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}
    {% endif %}

    {% if params.SAVE_FILAMENT_SENSORS %}
        {% set save_filament_sensors = params.SAVE_FILAMENT_SENSORS|default(0)|int %}
        SAVE_VARIABLE VARIABLE=save_filament_sensors VALUE={save_filament_sensors|int}
    {% endif %}

    {% if params.NICE %}
        {% set znice = params.NICE|default(20)|int %}
        {% if znice > 40 %}
            SAVE_VARIABLE VARIABLE=nice VALUE={40|int}
        {% else %}
            {% if znice < 1 %}
                SAVE_VARIABLE VARIABLE=nice VALUE={1|int}
            {% else %}
                SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
            {% endif %}
        {% endif %}
    {% endif %}

    {% if params.DISPLAY_OFF_TIMEOUT %}
        {% set display_off_timeout = params.DISPLAY_OFF_TIMEOUT|default(20)|int %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% if params.ZCONTROL_Z %}
        {% set zcontrol_z = params.ZCONTROL_Z|default(10)|int %}
        SAVE_VARIABLE VARIABLE=zcontrol_z VALUE={zcontrol_z|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.PRO_POWEROFF_TIMEOUT %}
        {% set pro_poweroff_timeout = params.PRO_POWEROFF_TIMEOUT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% endif %}
    {% endif %}

    {% if params.MIDI_ON %}
        {% set zmidi_on = params.MIDI_ON|default("")|string %}
        {% if zmidi_on == "0" %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_START %}
        {% set zmidi_start = params.MIDI_START|default("")|string %}
        {% if zmidi_start == "0" %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_PAUSE %}
        {% set zmidi_pause = params.MIDI_PAUSE|default("")|string %}
        {% if zmidi_pause == "0" %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_END %}
        {% set zmidi_end = params.MIDI_END|default("")|string %}
        {% if zmidi_end == "0" %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'
        {% endif %}
    {% endif %}

    {% if i == 0 %}
        GET_ZMOD_DATA
    {% else %}
        _GLOBAL N={i}
    {% endif %}

[gcode_macro GET_ZMOD_DATA]
description: Obter parâmetros ZMOD
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    RESPOND PREFIX="info" MSG="Parâmetros ZMOD. Defina via SAVE_ZMOD_DATA"

    {% set guppy = printer.save_variables.variables.guppy|default(1) | int %}
    SAVE_VARIABLE VARIABLE=guppy VALUE={guppy|int}

    {% if screen == True %}
        RESPOND PREFIX="info" MSG="Está a usar ecrã nativo // DISPLAY_ON"
    {% else %}
        {% if guppy == 1 %}
            RESPOND PREFIX="info" MSG="Está a trabalhar SEM ecrã nativo com GuppyScreen // DISPLAY_OFF GUPPY=1"
        {% else %}
            RESPOND PREFIX="info" MSG="Está a trabalhar SEM ecrã nativo // DISPLAY_OFF GUPPY=0"
        {% endif %}
    {% endif %}

    RESPOND PREFIX="info" MSG="Parâmetros usados no início da impressão e nivelamento [START_PRINT]"

    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Construir malha da mesa com ecrã nativo em cada impressão. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% else %}
            RESPOND PREFIX="//" MSG="Construir malha da mesa em cada impressão. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% endif %}
    {% else %}
        RESPOND PREFIX="//" MSG="Não construir malha da mesa em cada impressão. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}

    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="//" MSG="Usar malha adaptativa (KAMP) onde possível em vez de malha completa // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
    {% else %}
        RESPOND PREFIX="//" MSG="Não usar KAMP em vez de BED_MESH_CALIBRATE // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}

    {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
    {% if zmesh_test == 0 %}
        RESPOND PREFIX="//" MSG="Não testar malha da mesa antes de imprimir // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 1 %}
        RESPOND PREFIX="//" MSG="Testar malha da mesa antes de imprimir // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 2 %}
        RESPOND PREFIX="//" MSG="Testar malha da mesa antes de imprimir + KAMP // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 3 %}
        RESPOND PREFIX="//" MSG="Testar malha da mesa antes de imprimir + AutoZOffset // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 4 %}
        RESPOND PREFIX="//" MSG="Testar malha da mesa antes de imprimir + AutoZOffset + KAMP // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 5 %}
        RESPOND PREFIX="//" MSG="Testar malha da mesa antes de imprimir + AutoZOffset + Clear // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 6 %}
        RESPOND PREFIX="//" MSG="Testar malha da mesa antes de imprimir + AutoZOffset + Clear + KAMP // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}

    SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}
    RESPOND PREFIX="//" MSG="Tocar MIDI no início da impressão: {zmidi_start} // SAVE_ZMOD_DATA MIDI_START={zmidi_start}"
    SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'

    {% set zmidi_pause = printer.save_variables.variables.midi_pause|default("") | string %}
    RESPOND PREFIX="//" MSG="Tocar MIDI na pausa da impressão: {zmidi_pause} // SAVE_ZMOD_DATA MIDI_PAUSE={zmidi_pause}"
    SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'

    {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% if zforce_md5 == 1 %}
        RESPOND PREFIX="//" MSG="Verificar checksum MD5 do ficheiro // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% else %}
        RESPOND PREFIX="//" MSG="Não verificar checksum MD5 do ficheiro // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}

    {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% if zdisable_skew == 1 %}
        RESPOND PREFIX="//" MSG="Correção SKEW desativada // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% else %}
        RESPOND PREFIX="//" MSG="Correção SKEW ativada. Perfil skew_profile // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}

    {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(1) | int %}
    {% if screen == False %}
        {% if zload_zoffset == 1 %}
            RESPOND PREFIX="//" MSG="Carregar Z-Offset das definições globais // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
        {% else %}
            RESPOND PREFIX="//" MSG="Não carregar Z-Offset das definições globais // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}

    {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% if zdisable_priming == 1 %}
        RESPOND PREFIX="//" MSG="Desativar purga de linha do nozzle // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% else %}
        RESPOND PREFIX="//" MSG="Ativar purga de linha do nozzle // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}

    {% if not client.ad5x %}
        {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
        {% if zpreclear == 1 %}
            RESPOND PREFIX="//" MSG="Usar pré-purga do nozzle // SAVE_ZMOD_DATA PRECLEAR={zpreclear}"
        {% else %}
            RESPOND PREFIX="//" MSG="Não usar pré-purga do nozzle // SAVE_ZMOD_DATA PRECLEAR={zpreclear}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% else %}
        {% set silent = printer.save_variables.variables.silent|default(0) | int %}
        {% if silent == 0 %}
            RESPOND PREFIX="//" MSG="Não ocultar seleção de cor quando a impressão inicia // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        {% if silent == 1 %}
            RESPOND PREFIX="//" MSG="Ocultar seleção de cor, imprimir com IFS // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        {% if silent == 2 %}
            RESPOND PREFIX="//" MSG="Ocultar seleção de cor, imprimir sem IFS // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=silent VALUE={silent|int}
    {% endif %}

    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE") | string %}
    RESPOND PREFIX="//" MSG="Algoritmo de purga: {zclear} // SAVE_ZMOD_DATA CLEAR={zclear}"
    SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'

    RESPOND PREFIX="info" MSG="Parâmetros usados no fim da impressão e cancelamento [END_PRINT]"

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    RESPOND PREFIX="//" MSG="Tocar MIDI no fim da impressão: {zmidi_end} // SAVE_ZMOD_DATA MIDI_END={zmidi_end}"
    SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'

    {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(2) | int %}
    SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
    {% if zclose_dialogs == 0 %}
        RESPOND PREFIX="//" MSG="Não fechar diálogos no ecrã nativo // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% else %}
        {% if client.ad5x %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% endif %}
    {% endif %}
    {% if zclose_dialogs == 1 %}
        RESPOND PREFIX="//" MSG="Fechar automaticamente diálogos no ecrã nativo após 20 seg (lento) // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}
    {% if zclose_dialogs == 2 %}
        RESPOND PREFIX="//" MSG="Fechar automaticamente diálogos no ecrã nativo após 20 seg (rápido) // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}

    {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
    {% if zstop_motor == 1 %}
        RESPOND PREFIX="//" MSG="Desativar automaticamente motores após impressão/cancelamento em 25 seg // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% else %}
        RESPOND PREFIX="//" MSG="Não desativar motores automaticamente após impressão/cancelamento // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}

    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% if zauto_reboot == 0 %}
        RESPOND PREFIX="//" MSG="Não reiniciar impressora automaticamente // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 1 %}
        RESPOND PREFIX="//" MSG="Reiniciar automaticamente impressora após 1,5 minutos // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 2 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Reiniciar automaticamente impressora após 1,5 minutos // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% else %}
            RESPOND PREFIX="//" MSG="Reiniciar automaticamente firmware após 1,5 minutos // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}

    {% if not client.ad5x %}
        {% set pro_poweroff_timeout = printer.save_variables.variables.pro_poweroff_timeout|default(0) | int %}
        RESPOND PREFIX="//" MSG="Desligar FF5M Pro após (min): {timeout} // SAVE_ZMOD_DATA PRO_POWEROFF_TIMEOUT={pro_poweroff_timeout}"
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% else %}
        {% set remove_filament = printer.save_variables.variables.remove_filament|default(0) | int %}
        {% if remove_filament == 0 %}
            RESPOND PREFIX="//" MSG="Não remover o filamento após a impressão estar concluída // SAVE_ZMOD_DATA REMOVE_FILAMENT={remove_filament}"
        {% else %}
            RESPOND PREFIX="//" MSG="Remover o filamento após a impressão estar concluída // SAVE_ZMOD_DATA REMOVE_FILAMENT={remove_filament}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=remove_filament VALUE={remove_filament|int}
    {% endif %}

    RESPOND PREFIX="info" MSG="Parâmetros globais do sistema"

    {% set save_restore = printer.save_variables.variables.save_restore|default(1) | int %}
    {% if save_restore == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="A guardar controlado pelo ecrã nativo // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="Guardar dados para recuperação de impressão // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% else %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="A guardar controlado pelo ecrã nativo // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="Não guardar dados para recuperação de impressão // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}

    {% if not client.ad5x %}
        {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
        {% if motion_sensor == 1 %}
            RESPOND PREFIX="//" MSG="A usar sensor de movimento de filamento // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
            {% if screen == True %}
                RESPOND PREFIX="//" MSG="Desativar sensor de filamento no ecrã nativo"
            {% endif %}
        {% else %}
            RESPOND PREFIX="//" MSG="A usar sensor de presença de filamento // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}

    {% if client.ad5x %}
        {% set autoinsert = printer.save_variables.variables.autoinsert|default(1) | int %}
        {% if autoinsert == 0 %}
            RESPOND PREFIX="//" MSG="Não inserir haste automaticamente // SAVE_ZMOD_DATA AUTOINSERT={autoinsert}"
        {% else %}
            RESPOND PREFIX="//" MSG="Insert rod automatically // SAVE_ZMOD_DATA AUTOINSERT={autoinsert}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=autoinsert VALUE={autoinsert|int}

        {% set use_trash_on_print = printer.save_variables.variables.use_trash_on_print|default(1) | int %}
        {% if use_trash_on_print == 0 %}
            RESPOND PREFIX="//" MSG="Não usar lixo ao imprimir // SAVE_ZMOD_DATA USE_TRASH_ON_PRINT={use_trash_on_print}"
        {% else %}
            RESPOND PREFIX="//" MSG="Usar lixo ao imprimir // SAVE_ZMOD_DATA USE_TRASH_ON_PRINT={use_trash_on_print}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE={use_trash_on_print|int}
    {% endif %}

    {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
    {% if fix_scv == 1 %}
        RESPOND PREFIX="//" MSG="Usar SCV do config para gráficos shaper // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% else %}
        RESPOND PREFIX="//" MSG="Usar SCV = 5 para gráficos shaper // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}

    {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(1) | int %}
    {% if fix_e0011 == 1 %}
        RESPOND PREFIX="//" MSG="Corrigir erro E0011 // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% else %}
        RESPOND PREFIX="//" MSG="Não corrigir erro E0011 // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    RUN_SHELL_COMMAND CMD=zfix_e0011 PARAMS="{fix_e0011}"

    {% set fix_e0017 = printer.save_variables.variables.fix_e0017|default(1) | int %}
    {% if fix_e0017 == 1 %}
        RESPOND PREFIX="//" MSG="Corrigir erro E0017 // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% else %}
        RESPOND PREFIX="//" MSG="Não corrigir erro E0017 // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    RUN_SHELL_COMMAND CMD=zfix_e0017 PARAMS="{fix_e0017}"

    {% set wifi = printer.save_variables.variables.wifi|default(1) | int %}
    {% if wifi == 1 %}
        RESPOND PREFIX="//" MSG="Zmod Wifi On // SAVE_ZMOD_DATA WIFI={wifi}"
    {% else %}
        RESPOND PREFIX="//" MSG="Zmod Wifi Off // SAVE_ZMOD_DATA WIFI={wifi}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=wifi VALUE={wifi|int}

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    RESPOND PREFIX="//" MSG="Brilho LED ao ligar: {zled} // SAVE_ZMOD_DATA LED={zled}"
    SAVE_VARIABLE VARIABLE=led VALUE={zled|int}

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    RESPOND PREFIX="//" MSG="Tocar MIDI ao ligar: {zmidi_on} // SAVE_ZMOD_DATA MIDI_ON={zmidi_on}"
    SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'

    {% if not client.ad5x %}
        {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
        {% if znew_save_config == 1 %}
            RESPOND PREFIX="//" MSG="Usar NEW_SAVE_CONFIG alternativo // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% else %}
            RESPOND PREFIX="//" MSG="Usar SAVE_CONFIG padrão // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% else %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE=0
    {% endif %}

    {% if not client.ad5x %}
        {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
        {% if zuse_swap == 0 %}
            RESPOND PREFIX="//" MSG="SWAP não usado // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 1 %}
            RESPOND PREFIX="//" MSG="SWAP usado em EMMC // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 2 %}
            RESPOND PREFIX="//" MSG="SWAP usado em USB FLASH // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}

    {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(1) | int %}
    {% if zchina_cloud == 1 %}
        RESPOND PREFIX="//" MSG="Permitir nuvens chinesas // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% else %}
        RESPOND PREFIX="//" MSG="Bloquear nuvens chinesas // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}

    {% set save_moonraker = printer.save_variables.variables.save_moonraker|default(0) | int %}
    {% if save_moonraker == 1 %}
        RESPOND PREFIX="//" MSG="Guardar alterações de botões Fluidd/Mainsail // SAVE_ZMOD_DATA SAVE_MOONRAKER={save_moonraker}"
    {% else %}
        RESPOND PREFIX="//" MSG="Usar definições de botões Fluidd/Mainsail do ZMOD // SAVE_ZMOD_DATA SAVE_MOONRAKER={save_moonraker}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}

    {% set save_filament_sensors = printer.save_variables.variables.save_filament_sensors|default(0) | int %}
    {% if save_filament_sensors == 1 %}
        RESPOND PREFIX="//" MSG="Guardar o estado dos sensores de filamento // SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS={save_filament_sensors}"
    {% else %}
        RESPOND PREFIX="//" MSG="Não guardar o estado dos sensores de filamento // SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS={save_filament_sensors}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_filament_sensors VALUE={save_filament_sensors|int}

    {% set display_off_timeout = printer.save_variables.variables.display_off_timeout|default(20) | int %}
    {% if screen == False %}
        RESPOND PREFIX="//" MSG="Desligar ecrã nativo após (seg): {display_off_timeout} // SAVE_ZMOD_DATA DISPLAY_OFF_TIMEOUT={display_off_timeout}"
    {% endif %}
    {% if display_off_timeout < 5 %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE=5
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if zklipper13 == 1 %}
        RESPOND PREFIX="//" MSG="A usar Klipper 13"
    {% else %}
        {% if not client.ad5x %}
            RESPOND PREFIX="//" MSG="A usar Klipper nativo 11"
        {% else %}
            RESPOND PREFIX="//" MSG="A usar Klipper nativo 12"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=klipper13 VALUE={zklipper13}

    {% if screen == True %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=0
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=1
    {% endif %}

    {% set znice = printer.save_variables.variables.nice|default(20) | int %}
    RESPOND PREFIX="//" MSG="Prioridade do processo Klipper (1-mín, 40-máx): {znice}"
    SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
    RUN_SHELL_COMMAND CMD=znice

    {% set zcontrol_z = printer.save_variables.variables.zcontrol_z|default(10) | int %}
    RESPOND PREFIX="//" MSG="ZCONTROL_Z: {zcontrol_z} // SAVE_ZMOD_DATA ZCONTROL_Z={zcontrol_z}"
    SAVE_VARIABLE VARIABLE=zcontrol_z VALUE={zcontrol_z|int}
    ZCONTROL_Z Z={zcontrol_z}

    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND PREFIX="//" MSG="Idiomas disponíveis: en, ru, de, fr, it, es, ja, ko, zh, pt, cs, tr // LANG LANG={lang}"
    RUN_SHELL_COMMAND CMD=zversion
    _CHECK_VERSION

    {% if screen == False %}
        {% if display_off_timeout > 30 %}
            RESPOND PREFIX="info" MSG="O ecrã alternativo está a demorar muito a carregar? Reduza o tempo de carregamento do ecrã padrão. // SAVE_ZMOD_DATA DISPLAY_OFF_TIMEOUT=10"
        {% endif %}
        {% if wifi == 0 %}
            RESPOND PREFIX="//" MSG="Cansado de problemas com WiFi? Deixe o zmod gerir isso. // SAVE_ZMOD_DATA WIFI=1"
        {% endif %}
    {% endif %}

[gcode_macro SET_LED]
description: Definir LED
rename_existing: _SET_LED
variable_allowed: False
gcode:
    {% if allowed %}
        _SET_LED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% endif %}

[gcode_macro _SET_GCODE_OFFSET_FAST]
gcode:
    {% set from = params.FROM|default("Ecrã nativo")|string %}

    {% if 'Z' in params %}
        RESPOND PREFIX="info" MSG="Z-Offset: {params.Z} {from}"
    {% endif %}

    {% if 'Z_ADJUST' in params %}
        {% set z = (printer.gcode_move.homing_origin.z | float) + (params.Z_ADJUST | float) %}
        RESPOND PREFIX="info" MSG="Z-Offset: {z} {from}"
    {% endif %}

    _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}

[gcode_macro SET_GCODE_OFFSET]
description: Guardar Z-Offset
rename_existing: _SET_GCODE_OFFSET
gcode:
    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set temp_z_offset = printer["gcode_macro _TEST_POINT"].temp_z_offset | default(0.0) | float %}

    {% set start = params.START|default(0)|int %}
    {% set from = params.FROM|default("Ecrã nativo")|string %}

    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
    {% else %}
        {% set offsets = {'z': None} %}
    {% endif %}

    {% set ns = namespace(offsets={'z': offsets.z}) %}

    {% if 'Z' in params %}
        {% set null = ns.offsets.update({'z': params.Z}) %}
    {% endif %}

    {% if 'Z_ADJUST' in params %}
        {% if ns.offsets.z == None %}
            {% set null = ns.offsets.update({'z': 0}) %}
        {% endif %}
        {% set null = ns.offsets.update({'z': (ns.offsets.z | float) + (params.Z_ADJUST | float)}) %}
    {% endif %}

    {% if screen == True and start == 1 and 'Z' in params %}
        RESPOND PREFIX="info" MSG="Z-Offset guardado no ecrã nativo: {params.Z}"
    {% endif %}

    {% if start == 0 %}
        RESPOND PREFIX="info" MSG="Z-Offset: {ns.offsets.z} {from}"
        _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% endif %}

    {% if screen == False %}
        {% if start == 0 %}
            {% set ns_save = ns.offsets %}
            {% set _ = ns_save.update({'z': (ns.offsets.z | float) - (temp_z_offset | float)}) %}
            SAVE_VARIABLE VARIABLE=gcode_offsets VALUE="{ns_save}"
        {% else %}
            LOAD_GCODE_OFFSET START=1
        {% endif %}
    {% endif %}

[gcode_macro LOAD_GCODE_OFFSET]
description: Restaurar Z-Offset
gcode:
    {% set start = params.START|default(0)|int %}

    SET_GCODE_VARIABLE MACRO=_TEST_POINT VARIABLE=temp_z_offset VALUE=0.0

    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
        {% if start == 0 %}
            {% for axis, offset in offsets.items() if offsets[axis] %}
                { action_respond_info("Offset carregado das definições globais %s=%.4f " % (axis|upper, offset|float)) }
            {% endfor %}
            _SET_GCODE_OFFSET_FAST {% for axis, offset in offsets.items() if offsets[axis] %}{ "%s=%s " % (axis, offset) }{% endfor %} FROM=LOAD_GCODE_OFFSET
        {% else %}
            {% for axis, offset in offsets.items() if offsets[axis] %}
                { action_respond_info("Z-Offset guardado nas definições globais: %.4f " % (offset|float)) }
            {% endfor %}
        {% endif %}
    {% else %}
        _SET_GCODE_OFFSET_FAST Z=0.0 FROM=LOAD_GCODE_OFFSET
    {% endif %}

[gcode_macro SET_FAN_SPEED]
description: Controlo de ventoinhas
rename_existing: _SET_FAN_SPEED
gcode:
    {% set fan = params.FAN|string %}
    {% set speed = params.SPEED|default(0)|float %}

    {% if fan != 'pcb_fan' and fan != 'external_fan' and fan != 'internal_fan' %}
        _SET_FAN_SPEED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% else %}
        {% if fan == 'external_fan' %}
            _SET_FAN_SPEED FAN=internal SPEED={speed}
        {% else %}
            {% if fan == 'internal_fan' %}
                _SET_FAN_SPEED FAN=external SPEED={speed}
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro _SVG28]
gcode:
    SET_GCODE_VARIABLE MACRO=G28 VARIABLE=z VALUE={printer.toolhead.position.z}

[gcode_macro SET_IDLE_TIMEOUT]
rename_existing: SET_IDLE_TIMEOUT_ORIG
gcode:
    {% set tm = params.TIMEOUT|default(1801)|float %}

    {% if (not printer.pause_resume.is_paused) and (tm == 1800) %}
        ZCONTROL_ON
    {% endif %}

    SET_IDLE_TIMEOUT_ORIG TIMEOUT={tm}

[gcode_macro _Z_G28]
gcode:

[gcode_macro _PRE_Z_G28]
gcode:
    G28.1 Z
    M400
    _SVG28


[gcode_macro G28]
rename_existing: G28.1
variable_z: 220
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not 'X' in params and not 'Y' in params and not 'Z' in params %}
        _HOME
    {% else %}
        {% if client.ad5x %}
            _FIX_G28
        {% endif %}
        {% if 'Z' in params or not('X' in params or 'Y' in params or 'Z' in params) %}
            _PRE_Z_G28
        {% endif %}
        {% if 'X' in params or not('X' in params or 'Y' in params or 'Z' in params) or ('Y' in params and ("x" not in printer.toolhead.homed_axes)) %}
            G28.1 X
            M400
        {% endif %}
        {% if 'Y' in params or not('X' in params or 'Y' in params or 'Z' in params) %}
            G28.1 Y
            M400
        {% endif %}
        {% if 'Z' in params or not('X' in params or 'Y' in params or 'Z' in params) %}
            _Z_G28
        {% endif %}

    {% endif %}

[gcode_macro _CANCEL_PRINT]
variable_cancel_send: 0
gcode:

[gcode_macro _CLIENT_LINEAR_MOVE]
description: Movimento linear com guardar/restaurar estado gcode
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set e_move = "E" ~ params.E if params.E is defined else "" %}
    {% set rate = "F" ~ params.F if params.F is defined else "" %}
    {% set ABSOLUTE = params.ABSOLUTE | default(0) | int != 0 %}
    {% set z_max = [ printer['gcode_macro G28'].z | default(220), 220 ] | min %}
    {% if ABSOLUTE %}
        {% set x_move = "X" ~ ([ [params.X|float, client.max_x]  |min, client.min_x]| max) if params.X is defined else "" %}
        {% set y_move = "Y" ~ ([ [params.Y|float, client.max_y]  |min, client.min_y]| max) if params.Y is defined else "" %}
        {% set z_move = "Z" ~ ([ [params.Z|float, z_max]|min, 0   ]| max) if params.Z is defined else "" %}
    {% else %}
        {% set pos = printer.toolhead.position %}
        {% if params.X is defined %}
            {% set x_move = "X" ~ ([client.min_x - pos.x, [client.max_x - pos.x, params.X|float]| min]| max) %}
        {% else %}
            {% set x_move = "" %}
        {% endif %}
        {% if params.Y is defined %}
            {% set y_move = "Y" ~ ([client.min_y - pos.y, [client.max_y - pos.y, params.Y|float]| min]| max) %}
        {% else %}
            {% set y_move = "" %}
        {% endif %}
        {% if params.Z is defined %}
            {% set z_move = "Z" ~ ([- pos.z, [z_max - pos.z, params.Z|float]| min]| max) %}
        {% else %}
            {% set z_move = "" %}
        {% endif %}
    {% endif %}

    M400
    SAVE_GCODE_STATE NAME=_client_movement

    # Не двигаем головой во время печати
    {% if state != 'printing' %}
        {% set ABSOLUTE_E = params.ABSOLUTE_E | default(0) | int != 0 %}


        {% if x_move or y_move or z_move %}
            G9{ 0 if ABSOLUTE else 1 }
        {% endif %}
        {% if e_move %}
            M8{ 2 if ABSOLUTE_E else 3 }
        {% endif %}

        RESPOND PREFIX="//" MSG="G1 { x_move } { y_move } { z_move } { e_move } { rate }"
        G1 { x_move } { y_move } { z_move } { e_move } { rate }
    {% else %}
        RESPOND PREFIX="info" MSG="Impressão em progresso. Movimento desativado."
    {% endif %}

    RESTORE_GCODE_STATE MOVE=0 NAME=_client_movement

[gcode_macro _ZSDCARD_PRINT_FILE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set force_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% set silent = printer.save_variables.variables.silent|default(0) | int %}
    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
    {% set path = printer.configfile.settings.virtual_sdcard.path %}

    _PREPARE_PRINT

    {% if 'FILENAME' in params %}
        {% set filename = params.FILENAME|default("")|string %}
    {% else %}
        {action_raise_error("Erro! Nome do ficheiro não especificado.")}
    {% endif %}

    {% if force_md5 == 1 %}
        RESPOND PREFIX="info" MSG="Verificação MD5 iniciada {filename}"
        CHECK_MD5 DELETE=True FILENAME="{path}{filename}"
    {% endif %}

    {% if not client.ad5x %}
        SDCARD_PRINT_FILE FILENAME="{filename}"
    {% else %}
        SET_ZCOLOR FILENAME="{filename}" SILENT={silent} LEVELING={zprint_leveling}
    {% endif %}

[gcode_macro SDCARD_PRINT_FILE]
rename_existing: BASE_SDCARD_PRINT_FILE
gcode:
    {% set filename = params.FILENAME|default("")|string %}
    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE")|string %}
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% set path = printer.configfile.settings.virtual_sdcard.path %}

    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% if screen == False %}
        _CHECK_START_PRINT FILENAME="{path}{filename}"
    {% endif %}

    ZCONTROL_AUTO
    ZCONTROL_ON
    _G28
    G90
    M400
    G1 Z50 F3000
    M400
    BASE_SDCARD_PRINT_FILE {rawparams}

    {% if zuse_kamp == 1 or zclear == "LINE_PURGE" %}
        RESPOND PREFIX="info" MSG="A obter dados para KAMP."
        RUN_SHELL_COMMAND CMD=zexclude PARAMS={'"%s"' % (filename.replace("'", "\\\'").replace(" ", "\ "))}
    {% endif %}

[gcode_macro SDCARD_RESET_FILE]
rename_existing: BASE_SDCARD_RESET_FILE
gcode:
    ZCONTROL_OFF
    BASE_SDCARD_RESET_FILE

[gcode_macro BELTS_SHAPER_CALIBRATION]
description: Teste de meio-eixo CoreXY para análise de frequência de correias
gcode:
    {% set spectrogram = params.SPECTROGRAM|default(0)|int %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        RESPOND PREFIX="!!" MSG="Requer 256MB RAM + SWAP ativado. !!"
        _GUPPY_BELTS_SHAPER_CALIBRATION SPECTROGRAM={spectrogram} PNG_WIDTH=10 PNG_HEIGHT=10 PNG_OUT_PATH="/opt/config/mod_data/belts_calibration_full.png"
    {% else %}
        _GUPPY_BELTS_SHAPER_CALIBRATION SPECTROGRAM=0 PNG_WIDTH=10 PNG_HEIGHT=10 PNG_OUT_PATH="/opt/config/mod_data/belts_calibration_full.png"
    {% endif %}

[gcode_macro _GUPPY_BELTS_SHAPER_CALIBRATION]
description: Teste de meio-eixo CoreXY para análise de frequência de correias
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}

    {% set min_freq = params.FREQ_START|default(5)|float %}
    {% set max_freq = params.FREQ_END|default(100)|float %}
    {% set hz_per_sec = params.HZ_PER_SEC|default(1)|float %}
    {% set png_out_path = params.PNG_OUT_PATH|default("/opt/config/mod_data/belts_calibration.png") %}
    {% set png_width = params.PNG_WIDTH|default(8)|float %}
    {% set png_height = params.PNG_HEIGHT|default(4.8)|float %}
    {% set spectrogram = params.SPECTROGRAM|default(0)|int %}

    TEST_RESONANCES AXIS=1,1 OUTPUT=raw_data NAME=b FREQ_START={min_freq} FREQ_END={max_freq} HZ_PER_SEC={hz_per_sec}
    M400

    TEST_RESONANCES AXIS=1,-1 OUTPUT=raw_data NAME=a FREQ_START={min_freq} FREQ_END={max_freq} HZ_PER_SEC={hz_per_sec}
    M400

    RESPOND MSG="A gerar perfil de frequência das correias..."
    RESPOND MSG="Isto irá demorar algum tempo (3-5 minutos)"

    {% set klipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if klipper13 == 1 %}
        {% set fname = "/tmp/raw_data_axis=1.000,-1.000,0.000_a.csv /tmp/raw_data_axis=1.000,1.000,0.000_b.csv" %}
    {% else %}
        {% set fname = "/tmp/raw_data_axis=1.000,-1.000_a.csv /tmp/raw_data_axis=1.000,1.000_b.csv" %}
    {% endif %}

    {% if spectrogram == 1 %}
        RUN_SHELL_COMMAND CMD=guppy_belts_calibration PARAMS="-w {png_width} -l {png_height} -o {png_out_path} -k /usr/share/klipper {fname} --{lang}"
    {% else %}
        RUN_SHELL_COMMAND CMD=guppy_belts_calibration PARAMS="-w {png_width} -l {png_height} -n -o {png_out_path} -k /usr/share/klipper {fname} --{lang}"
    {% endif %}

    RESPOND PREFIX="info" MSG="Imagem guardada: {png_out_path}. Configuration -> mod_data"
    RESPOND PREFIX="//" MSG="Command {guppy_belts_calibration} finished"

[gcode_macro _GUPPY_EXCITATE_AXIS_AT_FREQ]
description: Manter frequência para diagnósticos de vibração
gcode:
    {% set frequency = params.FREQUENCY|default(25)|int %}
    {% set time = params.TIME|default(10)|int %}
    {% set axis = params.AXIS|default("x")|string|lower %}

    {% if axis not in ["x", "y", "a", "b"] %}
      { action_raise_error("AXIS selection invalid. Should be either x, y, a or b!") }
    {% endif %}

    {% if axis == "a" %}
        {% set axis = "1,-1" %}
    {% elif axis == "b" %}
        {% set axis = "1,1" %}
    {% endif %}

    TEST_RESONANCES OUTPUT=raw_data AXIS={axis} FREQ_START={frequency-1} FREQ_END={frequency+1} HZ_PER_SEC={1/(time/3)}
    M400

[gcode_macro _GUPPY_MACRO]
description: Botão Guppy personalizado
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if client.ad5x %}
        COLOR
    {% else %}
        PLAY_MIDI
        RESPOND TYPE=command MSG="action:prompt_begin Isto é um macro de teste"
        RESPOND TYPE=command MSG="action:prompt_text Adicione _GUPPY_MACRO a mod_data/user.cfg"
        RESPOND TYPE=command MSG="action:prompt_text Exemplo de _GUPPY_MACRO está em mod/base.cfg"

        RESPOND TYPE=command MSG="action:prompt_footer_button Ok|RESPOND TYPE=command MSG=action:prompt_end|info"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro ZSHAPER]
description: Calibração do input shaper
gcode:
    {% set x = params.X|default(1)|int %}
    {% set y = params.Y|default(1)|int %}

    _G28
    _GOTO_MID
    {% if x == 1 %}
        RESPOND PREFIX="info" MSG="Coletando dados do eixo X"
        TEST_RESONANCES AXIS=X NAME=X
        M400
    {% endif %}
    {% if y == 1 %}
        RESPOND PREFIX="info" MSG="Coletando dados do eixo Y"
        TEST_RESONANCES AXIS=Y NAME=Y
        M400
    {% endif %}
    {% if x == 1 %}
        RUN_SHELL_COMMAND CMD=zshaper_new PARAMS="X"
    {% endif %}
    {% if y == 1 %}
        RUN_SHELL_COMMAND CMD=zshaper_new PARAMS="Y"
    {% endif %}

[gcode_macro _SPEED_SET]
description: Definir velocidade 1/4->1/2->1 por 60s na retoma de impressão
variable_speed1: 100
variable_speed2: 100
gcode:
    {% set zspeed = params.SPEED|default(100)|int %}
    RESPOND PREFIX="info" MSG="Speed0: {zspeed/4}"

    SET_GCODE_VARIABLE MACRO=_SPEED_SET VARIABLE=speed1 VALUE={zspeed/2}
    SET_GCODE_VARIABLE MACRO=_SPEED_SET VARIABLE=speed2 VALUE={zspeed}
    M220 S{zspeed/4}
    UPDATE_DELAYED_GCODE ID=_SET_SPEED1 DURATION=60
    UPDATE_DELAYED_GCODE ID=_SET_SPEED2 DURATION=120

[delayed_gcode _SET_SPEED1]
initial_duration: 0
gcode:
    {% set speed = printer["gcode_macro _SPEED_SET"].speed1 %}
    RESPOND PREFIX="info" MSG="Speed1: {speed}"
    M220 S{speed}

[delayed_gcode _SET_SPEED2]
initial_duration: 0
gcode:
    {% set speed = printer["gcode_macro _SPEED_SET"].speed2 %}
    RESPOND PREFIX="info" MSG="Speed2: {speed}"
    M220 S{speed}

[gcode_macro ZRESTORE]
description: Retomar impressão interrompida
gcode:
    {% set test = params.TEST|default(0)|int %}

    {% set state = printer.print_stats.state %}
    {% set filename = printer.print_stats.filename %}
    {% set progress = printer.display_status.progress * 100 %}

    {% if test == 2 %}
        RESPOND PREFIX="info" MSG="Dados guardados eliminados"
        RUN_SHELL_COMMAND CMD=rm PARAMS="/opt/config/mod_data/klipper_data.json"
    {% else %}
        {% if test == 1 and state != 'printing' and state != 'paused' %}
            RUN_SHELL_COMMAND CMD=zrestore PARAMS="test"
        {% else %}
            {% if state == 'printing' %}
                RESPOND PREFIX="info" MSG="Imprimindo atualmente: {filename} ({progress | round(1)}%), recuperação impossível"
            {% elif state == 'paused' %}
                RESPOND PREFIX="info" MSG="Em pausa: {filename}, recuperação impossível"
            {% elif state == 'complete' %}
                RESPOND PREFIX="info" MSG="Impressão concluída"
                RUN_SHELL_COMMAND CMD=zrestore
            {% elif state == 'error' %}
                RESPOND PREFIX="info" MSG="Erro: {printer.print_stats.message}"
                RUN_SHELL_COMMAND CMD=zrestore
            {% else %}
                RESPOND PREFIX="info" MSG="Estado: {state}"
                RUN_SHELL_COMMAND CMD=zrestore
            {% endif %}
        {% endif %}
    {% endif %}

[delayed_gcode _TEST_RESTORE]
initial_duration: 0
gcode:
    ZRESTORE TEST=1

[gcode_macro _ZRESTORE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Impressão interrompida detetada"
    RESPOND TYPE=command MSG="action:prompt_text Mudar para consola para ver etapas de recuperação"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Restaurar|_ZRESTORE_OK|primary"
    RESPOND TYPE=command MSG="action:prompt_button Eliminar dados|_ZRESTORE_DEL|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancelar|_ZRESTORE_CANCEL"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _ZRESTORE_OK]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    ZRESTORE

[gcode_macro _ZRESTORE_DEL]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    ZRESTORE TEST=2

[gcode_macro _ZRESTORE_CANCEL]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro _ZRESTORE_MESH_TEST]
gcode:
    {% set cur_mesh = printer['bed_mesh'].profile_name %}
    {% set mesh = params.MESH|default("auto") %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% if cur_mesh != mesh %}
        {% if screen == True %}
            RESPOND PREFIX="info" MSG="Malha da mesa {mesh} não encontrada. Perfil MESH_DATA carregado"
            BED_MESH_PROFILE LOAD=MESH_DATA
        {% else %}
            RESPOND PREFIX="info" MSG="Malha da mesa {mesh} não encontrada. Perfil automático carregado"
            BED_MESH_PROFILE LOAD=auto
        {% endif %}
    {% endif %}

[gcode_macro _ZRESTORE_MESH_LOAD]
gcode:
    {% set mesh = params.MESH|default("auto") %}

    BED_MESH_CLEAR
    M400
    {% for mesh_dt in printer['bed_mesh'].profiles %}
        {% if mesh == mesh_dt %}
            BED_MESH_PROFILE LOAD={mesh}
            RESPOND PREFIX="info" MSG="Malha da mesa {mesh} carregada"
        {% endif %}
    {% endfor %}
    _ZRESTORE_MESH_TEST MESH={mesh}

# Использование: SET_PAUSE_NEXT_LAYER [ENABLE=[0 | 1]] [MACRO=<name>]
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Ativar pausa na próxima camada
gcode:
    {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
    {% set ENABLE = params.ENABLE | default(1)|int != 0 %}
    {% set MACRO = params.MACRO | default(pause_next_layer.call, True) %}
    SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

# Usage: SET_PAUSE_AT_LAYER [ENABLE=[0 | 1]] [LAYER=<number>] [MACRO=<name>]
[gcode_macro SET_PAUSE_AT_LAYER]
description: Ativar/desativar pausa em camada específica
gcode:
    {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
    {% set ENABLE = params.ENABLE | int != 0 if params.ENABLE is defined
             else params.LAYER is defined %}
    {% set LAYER = params.LAYER | default(pause_at_layer.layer) | int %}
    {% set MACRO = params.MACRO | default(pause_at_layer.call, True) %}
    SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

# Использование: SET_PRINT_STATS_INFO [TOTAL_LAYER=<total_layer_count>] [CURRENT_LAYER= <current_layer>]
[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Substituir para obter funções pause_next_layer e pause_at_layer
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
    {% if pause_next_layer.enable %}
        RESPOND TYPE=echo MSG='{"%s, SET_PAUSE_AT_LAYER " % pause_next_layer.call}'
        {pause_next_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
        SET_PAUSE_NEXT_LAYER ENABLE=0
    {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER | int == pause_at_layer.layer %}
        RESPOND TYPE=echo MSG='{"%s, pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
        {pause_at_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
        SET_PAUSE_AT_LAYER ENABLE=0
    {% endif %}

    {% set notify_percent = printer.save_variables.variables.notify_percent|default(0) | int %}
    {% if notify_percent > 0 %}
        _NOTIFY_ON_PERCENT
    {% endif %}
    SET_PRINT_STATS_INFO_BASE {rawparams}

