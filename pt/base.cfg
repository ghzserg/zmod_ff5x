[gcode_macro _GLOBAL]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% set skip_global = printer.save_variables.variables.skip_global|default(0) | int %}
    {% set skip_lang = printer.save_variables.variables.skip_lang|default(0) | int %}
    {% set skip_recommend = printer.save_variables.variables.skip_recommend|default(0) | int %}
    {% set skip_link = printer.save_variables.variables.skip_link|default(0) | int %}

    {% set n = params.N|default(1)|int %}
    {% set start = params.START|default(0)|int %}

    {% if skip_global == 0 and skip_lang == 1 and start == 1 %}
        _SHOW_MSG MSG="Pode navegar e alterar parâmetros globais se necessário. https://github.com/ghzserg/zmod/wiki/Global_en" COMMAND="_GLOBAL"
    {% endif %}

    {% if skip_link == 0 and skip_global == 1 and skip_lang == 1 and skip_recommend == 1 and start == 1 %}
        _SHOW_MSG MSG="Sabia que pode aceder à sua impressora remotamente usando zmod.link?" COMMAND="_GLOBAL_SAVE PARAM='skip_link'"
    {% endif %}

    {% if start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_end"
    {% endif %}

    {% if n == 1 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parâmetros usados no início da impressão e nivelamento [START_PRINT]: {n}"

        # 1
        {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
        {% if zprint_leveling == 1 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Construir malha da mesa com ecrã nativo em cada impressão.|SAVE_ZMOD_DATA PRINT_LEVELING=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Construir malha da mesa em cada impressão.|SAVE_ZMOD_DATA PRINT_LEVELING=0 I={n}|primary"
            {% endif %}
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Não construir malha da mesa em cada impressão.|SAVE_ZMOD_DATA PRINT_LEVELING=1 I={n}|primary"
        {% endif %}

        # 2
        {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
        {% if zuse_kamp == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Usar malha adaptativa (KAMP) onde possível em vez de malha completa|SAVE_ZMOD_DATA USE_KAMP=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Não usar KAMP em vez de BED_MESH_CALIBRATE|SAVE_ZMOD_DATA USE_KAMP=1 I={n}|primary"
        {% endif %}

        # 3
        {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
        {% if zmesh_test == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button Não testar malha da mesa antes de imprimir|SAVE_ZMOD_DATA MESH_TEST=1 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Testar malha da mesa antes de imprimir|SAVE_ZMOD_DATA MESH_TEST=2 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 2 %}
            RESPOND TYPE=command MSG="action:prompt_button Testar malha da mesa antes de imprimir + KAMP|SAVE_ZMOD_DATA MESH_TEST=3 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 3 %}
            RESPOND TYPE=command MSG="action:prompt_button Testar malha da mesa antes de imprimir + AutoZOffset|SAVE_ZMOD_DATA MESH_TEST=4 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 4 %}
            RESPOND TYPE=command MSG="action:prompt_button Testar malha da mesa antes de imprimir + AutoZOffset + KAMP|SAVE_ZMOD_DATA MESH_TEST=5 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 5 %}
            RESPOND TYPE=command MSG="action:prompt_button Testar malha da mesa antes de imprimir + AutoZOffset + Clear|SAVE_ZMOD_DATA MESH_TEST=6 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 6 %}
            RESPOND TYPE=command MSG="action:prompt_button Testar malha da mesa antes de imprimir + AutoZOffset + Clear + KAMP|SAVE_ZMOD_DATA MESH_TEST=0 I={n}|primary"
        {% endif %}

        # 4
        {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
        {% if zforce_md5 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Verificar checksum MD5 do ficheiro|SAVE_ZMOD_DATA FORCE_MD5=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Não verificar checksum MD5 do ficheiro|SAVE_ZMOD_DATA FORCE_MD5=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Próximo|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 2 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parâmetros usados no início da impressão e nivelamento [START_PRINT]: {n}"

        # 1
        {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
        {% if zdisable_skew == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Correção SKEW desativada|SAVE_ZMOD_DATA DISABLE_SKEW=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Correção SKEW ativada. Perfil skew_profile|SAVE_ZMOD_DATA DISABLE_SKEW=1 I={n}|primary"
        {% endif %}

        # 2
        {% if screen == False %}
            {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(1) | int %}
            {% if zload_zoffset == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Carregar Z-Offset das definições globais|SAVE_ZMOD_DATA LOAD_ZOFFSET=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Não carregar Z-Offset das definições globais|SAVE_ZMOD_DATA LOAD_ZOFFSET=1 I={n}|primary"
            {% endif %}
        {% endif %}

        # 3
        {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
        {% if zdisable_priming == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Desativar purga de linha do nozzle|SAVE_ZMOD_DATA DISABLE_PRIMING=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Ativar purga de linha do nozzle|SAVE_ZMOD_DATA DISABLE_PRIMING=1 I={n}|primary"
        {% endif %}

        {% if not client.ad5x %}
            # 4
            {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
            {% if zpreclear == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Usar pré-purga do nozzle|SAVE_ZMOD_DATA PRECLEAR=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Não usar pré-purga do nozzle|SAVE_ZMOD_DATA PRECLEAR=1 I={n}|primary"
            {% endif %}
        {% else %}
            # 4
            {% set silent = printer.save_variables.variables.silent|default(0) | int %}
            {% if silent == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button Não ocultar seleção de cor quando a impressão inicia|SAVE_ZMOD_DATA SILENT=1 I={n}|primary"
            {% endif %}
            {% if silent == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Ocultar seleção de cor, imprimir com IFS|SAVE_ZMOD_DATA SILENT=2 I={n}|primary"
            {% endif %}
            {% if silent == 2 %}
                RESPOND TYPE=command MSG="action:prompt_button Ocultar seleção de cor, imprimir sem IFS|SAVE_ZMOD_DATA SILENT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Próximo|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 3 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parâmetros usados no fim da impressão e cancelamento [END_PRINT]: {n}"

        # 1
        {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(2) | int %}
        {% if zclose_dialogs == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button Não fechar diálogos no ecrã nativo|SAVE_ZMOD_DATA CLOSE_DIALOGS=1 I={n}|primary"
        {% endif %}
        {% if zclose_dialogs == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Fechar automaticamente diálogos no ecrã nativo após 20 seg (lento)|SAVE_ZMOD_DATA CLOSE_DIALOGS=2 I={n}|primary"
        {% endif %}
        {% if zclose_dialogs == 2 %}
            RESPOND TYPE=command MSG="action:prompt_button Fechar automaticamente diálogos no ecrã nativo após 20 seg (rápido)|SAVE_ZMOD_DATA CLOSE_DIALOGS=0 I={n}|primary"
        {% endif %}

        # 2
        {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
        {% if zstop_motor == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Desativar automaticamente motores após impressão/cancelamento em 25 seg|SAVE_ZMOD_DATA STOP_MOTOR=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Não desativar motores automaticamente após impressão/cancelamento|SAVE_ZMOD_DATA STOP_MOTOR=1 I={n}|primary"
        {% endif %}

        # 3
        {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
        {% if zauto_reboot == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button Não reiniciar impressora automaticamente|SAVE_ZMOD_DATA AUTO_REBOOT=1 I={n}|primary"
        {% endif %}
        {% if zauto_reboot == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Reiniciar automaticamente impressora após 1,5 minutos|SAVE_ZMOD_DATA AUTO_REBOOT=2 I={n}|primary"
        {% endif %}
        {% if zauto_reboot == 2 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Reiniciar automaticamente impressora após 1,5 minutos|SAVE_ZMOD_DATA AUTO_REBOOT=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Reiniciar automaticamente firmware após 1,5 minutos|SAVE_ZMOD_DATA AUTO_REBOOT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        {% if client.ad5x %}
            # 4
            {% set remove_filament = printer.save_variables.variables.remove_filament|default(0) | int %}
            {% if remove_filament == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button Não remover o filamento após a impressão estar concluída|SAVE_ZMOD_DATA REMOVE_FILAMENT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Remover o filamento após a impressão estar concluída|SAVE_ZMOD_DATA REMOVE_FILAMENT==0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Próximo|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 4 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parâmetros globais do sistema: {n}"

        # 1
        {% set save_restore = printer.save_variables.variables.save_restore|default(1) | int %}
        {% if save_restore == 1 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button A guardar controlado pelo ecrã nativo|SAVE_ZMOD_DATA SAVE_RESTORE=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Guardar dados para recuperação de impressão|SAVE_ZMOD_DATA SAVE_RESTORE=0 I={n}|primary"
            {% endif %}
        {% else %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button A guardar controlado pelo ecrã nativo|SAVE_ZMOD_DATA SAVE_RESTORE=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Não guardar dados para recuperação de impressão|SAVE_ZMOD_DATA SAVE_RESTORE=1 I={n}|primary"
            {% endif %}
        {% endif %}

        # 2
        {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
        {% if fix_scv == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Usar SCV do config para gráficos shaper|SAVE_ZMOD_DATA FIX_SCV=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Usar SCV = 5 para gráficos shaper|SAVE_ZMOD_DATA FIX_SCV=1 I={n}|primary"
        {% endif %}

        # 3
        {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(1) | int %}
        {% if fix_e0011 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Corrigir erro E0011|SAVE_ZMOD_DATA FIX_E0011=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Não corrigir erro E0011|SAVE_ZMOD_DATA FIX_E0011=1 I={n}|primary"
        {% endif %}

        # 4
        {% set fix_e0017 = printer.save_variables.variables.fix_e0017|default(1) | int %}
        {% if fix_e0017 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Corrigir erro E0017|SAVE_ZMOD_DATA FIX_E0017=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Não corrigir erro E0017|SAVE_ZMOD_DATA FIX_E0017=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Próximo|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 5 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parâmetros globais do sistema: {n}"

        # 1
        {% set wifi = printer.save_variables.variables.wifi|default(1) | int %}
        {% if wifi == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Zmod Wifi On|SAVE_ZMOD_DATA WIFI=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Zmod Wifi Off|SAVE_ZMOD_DATA WIFI=1 I={n}|primary"
        {% endif %}

        # 2
        {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(1) | int %}
        {% if zchina_cloud == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Permitir nuvens chinesas|SAVE_ZMOD_DATA CHINA_CLOUD=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Bloquear nuvens chinesas|SAVE_ZMOD_DATA CHINA_CLOUD=1 I={n}|primary"
        {% endif %}

        # 3
        {% set save_moonraker = printer.save_variables.variables.save_moonraker|default(0) | int %}
        {% if save_moonraker == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Guardar alterações de botões Fluidd/Mainsail|SAVE_ZMOD_DATA SAVE_MOONRAKER=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Usar definições de botões Fluidd/Mainsail do ZMOD|SAVE_ZMOD_DATA SAVE_MOONRAKER=1 I={n}|primary"
        {% endif %}

        # 4
        {% set save_filament_sensors = printer.save_variables.variables.save_filament_sensors|default(0) | int %}
        {% if save_filament_sensors == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Guardar o estado dos sensores de filamento|SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Não guardar o estado dos sensores de filamento|SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Próximo|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 6 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parâmetros globais do sistema: {n}"

        {% if not client.ad5x %}
            # 1
            {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
            {% if motion_sensor == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button A usar sensor de movimento de filamento|SAVE_ZMOD_DATA MOTION_SENSOR=0 I={n}|primary"
                {% if screen == True %}
                    RESPOND TYPE=command MSG="action:prompt_text Desativar sensor de filamento no ecrã nativo"
                {% endif %}
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button A usar sensor de presença de filamento|SAVE_ZMOD_DATA MOTION_SENSOR=1 I={n}|primary"
            {% endif %}

            # 2
            {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
            {% if zuse_swap == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP não usado|SAVE_ZMOD_DATA USE_SWAP=1 I={n}|primary"
            {% endif %}
            {% if zuse_swap == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP usado em EMMC|SAVE_ZMOD_DATA USE_SWAP=2 I={n}|primary"
            {% endif %}
            {% if zuse_swap == 2 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP usado em USB FLASH|SAVE_ZMOD_DATA USE_SWAP=0 I={n}|primary"
            {% endif %}

            # 3
            {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
            {% if znew_save_config == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Usar NEW_SAVE_CONFIG alternativo|SAVE_ZMOD_DATA NEW_SAVE_CONFIG=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Usar SAVE_CONFIG padrão|SAVE_ZMOD_DATA NEW_SAVE_CONFIG=1 I={n}|primary"
            {% endif %}
        {% else %}
            # 1
            {% set autoinsert = printer.save_variables.variables.autoinsert|default(1) | int %}
            {% if autoinsert == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button Não inserir haste automaticamente|SAVE_ZMOD_DATA AUTOINSERT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Insert rod automatically|SAVE_ZMOD_DATA AUTOINSERT=0 I={n}|primary"
            {% endif %}

            # 2
            {% set use_trash_on_print = printer.save_variables.variables.use_trash_on_print|default(1) | int %}
            {% if use_trash_on_print == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button Não usar lixo ao imprimir|SAVE_ZMOD_DATA USE_TRASH_ON_PRINT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Usar lixo ao imprimir|SAVE_ZMOD_DATA USE_TRASH_ON_PRINT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Próximo|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 7 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parâmetros globais do sistema: {n}"

        # 1
        {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
        RESPOND TYPE=command MSG="action:prompt_button Language {lang}|LANG|primary"

        # 2
        RESPOND TYPE=command MSG="action:prompt_button Reset ZMOD Global| _RESET_ZMOD|orange"

        RESPOND TYPE=command MSG="action:prompt_footer_button OK|_SHOW_MSG MSG=\"Se algum parâmetro foi alterado, é recomendado reiniciar a impressora. Macro GLOBAL\" COMMAND='_GLOBAL_SAVE PARAM=skip_global' COMMAND_REBOOT=\"_GLOBAL_SAVE PARAM=skip_global REBOOT=1\"|red"

        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro SET_FILAMENT_SENSOR]
rename_existing: _SET_FILAMENT_SENSOR
gcode:
    _SET_FILAMENT_SENSOR {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}

    {% set sensor = params.SENSOR|default("none")|string %}
    {% set enable = params.ENABLE|default(2)|int %}

    {% if sensor != "none" and enable != 2 %}
        SAVE_VARIABLE VARIABLE={sensor} VALUE={enable}
    {% endif %}

[gcode_macro _NOTIFY]
gcode:

[gcode_macro _NOTIFY_ON_PERCENT]
variable_notified_percent: 0
variable_last_percent: 0
gcode:

[gcode_macro TAR_CONFIG]
description: Criar backup dos ficheiros de configuração para arquivo
gcode:
    RUN_SHELL_COMMAND CMD=screen
    RESPOND PREFIX="info" MSG="Download archive in 'Configuration' -> 'mod_data' ->"
    RUN_SHELL_COMMAND CMD=tar_config
    RESPOND PREFIX="info" MSG="Para restaurar o config, copie para 'Configuration' -> 'mod_data' -> config.tar.gz e chame RESTORE_TAR_CONFIG"
