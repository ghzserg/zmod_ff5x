    {% if client.runout_sensor2 | default("") != "" %}
        {% if screen == False and printer[client.runout_sensor2].enabled %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed2 VALUE=True
