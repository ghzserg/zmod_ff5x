    {% if not client.ad5x %}
        RESPOND PREFIX="info" MSG="Fermeture des fenêtres (lent)"
        RUN_SHELL_COMMAND CMD=close_dialogs
        RESPOND PREFIX="info" MSG="Échec fermeture ? Utilisez FAST_CLOSE_DIALOGS // SAVE_ZMOD_DATA CLOSE_DIALOGS=2"
    {% else %}
        FAST_CLOSE_DIALOGS
    {% endif %}

