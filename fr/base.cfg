[gcode_macro ZSHAPER]
description: Calibration du shaper d'entrée
gcode:
    {% set x = params.X|default(1)|int %}
    {% set y = params.Y|default(1)|int %}

    _G28
    _GOTO_MID
    {% if x == 1 %}
        RESPOND PREFIX="info" MSG="Collecte des données de l'axe X"
        TEST_RESONANCES AXIS=X NAME=X
        M400
    {% endif %}
    {% if y == 1 %}
        RESPOND PREFIX="info" MSG="Collecte des données de l'axe Y"
        TEST_RESONANCES AXIS=Y NAME=Y
        M400
