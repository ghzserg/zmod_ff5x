[gcode_macro _GLOBAL]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% set skip_global = printer.save_variables.variables.skip_global|default(0) | int %}
    {% set skip_lang = printer.save_variables.variables.skip_lang|default(0) | int %}
    {% set skip_recommend = printer.save_variables.variables.skip_recommend|default(0) | int %}
    {% set skip_link = printer.save_variables.variables.skip_link|default(0) | int %}

    {% set n = params.N|default(1)|int %}
    {% set start = params.START|default(0)|int %}

    {% if skip_global == 0 and skip_lang == 1 and start == 1 %}
        _SHOW_MSG MSG="Vous pouvez parcourir et modifier les paramètres globaux si nécessaire. https://github.com/ghzserg/zmod/wiki/Global_en" COMMAND="_GLOBAL"
    {% endif %}

    {% if skip_link == 0 and skip_global == 1 and skip_lang == 1 and skip_recommend == 1 and start == 1 %}
        _SHOW_MSG MSG="Saviez-vous que vous pouvez accéder à votre imprimante à distance en utilisant zmod.link ?" COMMAND="_GLOBAL_SAVE PARAM='skip_link'"
    {% endif %}

    {% if start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_end"
    {% endif %}

    {% if n == 1 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Paramètres utilisés au démarrage/nivellement [START_PRINT]: {n}"

        # 1
        {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
        {% if zprint_leveling == 1 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Créer un maillage via l'écran natif à chaque impression.|SAVE_ZMOD_DATA PRINT_LEVELING=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Créer un maillage à chaque impression.|SAVE_ZMOD_DATA PRINT_LEVELING=0 I={n}|primary"
            {% endif %}
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Ne construisez pas de maillage de lit sur chaque impression|SAVE_ZMOD_DATA PRINT_LEVELING=1 I={n}|primary"
        {% endif %}

        # 2
        {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
        {% if zuse_kamp == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Préférer le maillage adaptatif (KAMP)|SAVE_ZMOD_DATA USE_KAMP=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas utiliser KAMP à la place de BED_MESH_CALIBRATE|SAVE_ZMOD_DATA USE_KAMP=1 I={n}|primary"
        {% endif %}

        # 3
        {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
        {% if zmesh_test == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas tester le maillage avant impression|SAVE_ZMOD_DATA MESH_TEST=1 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Tester le maillage avant impression|SAVE_ZMOD_DATA MESH_TEST=2 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 2 %}
            RESPOND TYPE=command MSG="action:prompt_button Tester le maillage avant impression + KAMP|SAVE_ZMOD_DATA MESH_TEST=3 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 3 %}
            RESPOND TYPE=command MSG="action:prompt_button Tester le maillage avant impression + AutoZOffset|SAVE_ZMOD_DATA MESH_TEST=4 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 4 %}
            RESPOND TYPE=command MSG="action:prompt_button Tester le maillage avant impression + AutoZOffset + KAMP|SAVE_ZMOD_DATA MESH_TEST=0 I={n}|primary"
        {% endif %}

        # 4
        {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
        {% if zforce_md5 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Vérifier la somme MD5 du fichier|SAVE_ZMOD_DATA FORCE_MD5=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas vérifier la somme MD5|SAVE_ZMOD_DATA FORCE_MD5=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Suivant|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 2 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Paramètres utilisés au démarrage/nivellement [START_PRINT]: {n}"

        # 1
        {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
        {% if zdisable_skew == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Correction SKEW désactivée|SAVE_ZMOD_DATA DISABLE_SKEW=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Correction SKEW activée. Profil skew_profile|SAVE_ZMOD_DATA DISABLE_SKEW=1 I={n}|primary"
        {% endif %}

        # 2
        {% if screen == False %}
            {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(1) | int %}
            {% if zload_zoffset == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Charger le Z-Offset des paramètres globaux|SAVE_ZMOD_DATA LOAD_ZOFFSET=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Ne pas charger le Z-Offset des paramètres globaux|SAVE_ZMOD_DATA LOAD_ZOFFSET=1 I={n}|primary"
            {% endif %}
        {% endif %}

        # 3
        {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
        {% if zdisable_priming == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Désactiver la purge de buse|SAVE_ZMOD_DATA DISABLE_PRIMING=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Activer la purge de buse|SAVE_ZMOD_DATA DISABLE_PRIMING=1 I={n}|primary"
        {% endif %}

        {% if not client.ad5x %}
            # 4
            {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
            {% if zpreclear == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Utiliser la pré-purge|SAVE_ZMOD_DATA PRECLEAR=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Ne pas utiliser la pré-purge|SAVE_ZMOD_DATA PRECLEAR=1 I={n}|primary"
            {% endif %}
        {% else %}
            # 4
            {% set silent = printer.save_variables.variables.silent|default(0) | int %}
            {% if silent == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button Ne pas masquer la sélection de couleur au démarrage de l'impression|SAVE_ZMOD_DATA SILENT=1 I={n}|primary"
            {% endif %}
            {% if silent == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Masquer la sélection de couleur, imprimer avec IFS|SAVE_ZMOD_DATA SILENT=2 I={n}|primary"
            {% endif %}
            {% if silent == 2 %}
                RESPOND TYPE=command MSG="action:prompt_button Masquer la sélection de couleur, imprimer sans IFS|SAVE_ZMOD_DATA SILENT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Suivant|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 3 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Paramètres utilisés en fin d'impression/annulation [END_PRINT]: {n}"

        # 1
        {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(2) | int %}
        {% if zclose_dialogs == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas fermer les dialogues sur l'écran|SAVE_ZMOD_DATA CLOSE_DIALOGS=1 I={n}|primary"
        {% endif %}
        {% if zclose_dialogs == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Fermeture auto des dialogues en 20s (lente)|SAVE_ZMOD_DATA CLOSE_DIALOGS=2 I={n}|primary"
        {% endif %}
        {% if zclose_dialogs == 2 %}
            RESPOND TYPE=command MSG="action:prompt_button Fermeture auto des dialogues en 20s (rapide)|SAVE_ZMOD_DATA CLOSE_DIALOGS=0 I={n}|primary"
        {% endif %}

        # 2
        {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
        {% if zstop_motor == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Désactivation auto des moteurs après impression/annulation (25s)|SAVE_ZMOD_DATA STOP_MOTOR=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas désactiver les moteurs automatiquement|SAVE_ZMOD_DATA STOP_MOTOR=1 I={n}|primary"
        {% endif %}

        # 3
        {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
        {% if zauto_reboot == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas redémarrer automatiquement|SAVE_ZMOD_DATA AUTO_REBOOT=1 I={n}|primary"
        {% endif %}
        {% if zauto_reboot == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Redémarrage auto après 1.5 minutes|SAVE_ZMOD_DATA AUTO_REBOOT=2 I={n}|primary"
        {% endif %}
        {% if zauto_reboot == 2 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Redémarrage auto après 1.5 minutes|SAVE_ZMOD_DATA AUTO_REBOOT=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Relance du firmware après 1.5 minutes|SAVE_ZMOD_DATA AUTO_REBOOT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        {% if client.ad5x %}
            # 4
            {% set remove_filament = printer.save_variables.variables.remove_filament|default(0) | int %}
            {% if remove_filament == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button Ne pas retirer le filament après l'impression|SAVE_ZMOD_DATA REMOVE_FILAMENT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Retirer le filament après l'impression|SAVE_ZMOD_DATA REMOVE_FILAMENT==0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Suivant|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 4 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Paramètres système: {n}"

        # 1
        {% set save_restore = printer.save_variables.variables.save_restore|default(1) | int %}
        {% if save_restore == 1 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Sauvegarde contrôlée par l'écran natif|SAVE_ZMOD_DATA SAVE_RESTORE=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Sauvegarder pour la récupération|SAVE_ZMOD_DATA SAVE_RESTORE=0 I={n}|primary"
            {% endif %}
        {% else %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Sauvegarde contrôlée par l'écran natif|SAVE_ZMOD_DATA SAVE_RESTORE=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Ne pas sauvegarder pour la récupération|SAVE_ZMOD_DATA SAVE_RESTORE=1 I={n}|primary"
            {% endif %}
        {% endif %}

        # 2
        {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
        {% if fix_scv == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Utiliser SCV du config pour les graphiques|SAVE_ZMOD_DATA FIX_SCV=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Utiliser SCV = 5 pour les graphiques du shaper|SAVE_ZMOD_DATA FIX_SCV=1 I={n}|primary"
        {% endif %}

        # 3
        {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(1) | int %}
        {% if fix_e0011 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Corriger l'erreur E0011|SAVE_ZMOD_DATA FIX_E0011=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas corriger l'erreur E0011|SAVE_ZMOD_DATA FIX_E0011=1 I={n}|primary"
        {% endif %}

        # 4
        {% set fix_e0017 = printer.save_variables.variables.fix_e0017|default(1) | int %}
        {% if fix_e0017 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Corriger l'erreur E0017|SAVE_ZMOD_DATA FIX_E0017=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas corriger l'erreur E0017|SAVE_ZMOD_DATA FIX_E0017=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Suivant|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 5 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Paramètres système: {n}"

        # 1
        {% set wifi = printer.save_variables.variables.wifi|default(0) | int %}
        {% if wifi == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Zmod Wifi On|SAVE_ZMOD_DATA WIFI=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Zmod Wifi Off|SAVE_ZMOD_DATA WIFI=1 I={n}|primary"
        {% endif %}

        # 2
        {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(1) | int %}
        {% if zchina_cloud == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Autoriser les serveurs chinois|SAVE_ZMOD_DATA CHINA_CLOUD=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Bloquer les serveurs chinois|SAVE_ZMOD_DATA CHINA_CLOUD=1 I={n}|primary"
        {% endif %}

        # 3
        {% set save_moonraker = printer.save_variables.variables.save_moonraker|default(0) | int %}
        {% if save_moonraker == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Sauvegarder les changements des boutons Fluidd/Mainsail|SAVE_ZMOD_DATA SAVE_MOONRAKER=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Utiliser les paramètres de boutons ZMOD pour Fluidd/Mainsail|SAVE_ZMOD_DATA SAVE_MOONRAKER=1 I={n}|primary"
        {% endif %}

        # 4
        {% set save_filament_sensors = printer.save_variables.variables.save_filament_sensors|default(0) | int %}
        {% if save_filament_sensors == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Enregistrer l'état des capteurs de filament|SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Ne pas enregistrer l'état des capteurs de filament|SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Suivant|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 6 %}
        RESPOND TYPE=command MSG="action:prompt_begin Paramètres système: {n}"

        {% if not client.ad5x %}
            # 1
            {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
            {% if motion_sensor == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Utilisation du détecteur de mouvement|SAVE_ZMOD_DATA MOTION_SENSOR=0 I={n}|primary"
                {% if screen == True %}
                    RESPOND TYPE=command MSG="action:prompt_text Désactiver le détecteur de filament sur l'écran"
                {% endif %}
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Utilisation du détecteur de présence|SAVE_ZMOD_DATA MOTION_SENSOR=1 I={n}|primary"
            {% endif %}

            # 2
            {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
            {% if zuse_swap == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP non utilisé|SAVE_ZMOD_DATA USE_SWAP=1 I={n}|primary"
            {% endif %}
            {% if zuse_swap == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP sur EMMC|SAVE_ZMOD_DATA USE_SWAP=2 I={n}|primary"
            {% endif %}
            {% if zuse_swap == 2 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP sur clé USB|SAVE_ZMOD_DATA USE_SWAP=0 I={n}|primary"
            {% endif %}

            # 3
            {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
            {% if znew_save_config == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Utiliser l'alternative NEW_SAVE_CONFIG|SAVE_ZMOD_DATA NEW_SAVE_CONFIG=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Utiliser SAVE_CONFIG standard|SAVE_ZMOD_DATA NEW_SAVE_CONFIG=1 I={n}|primary"
            {% endif %}
        {% else %}
            # 1
            {% set autoinsert = printer.save_variables.variables.autoinsert|default(1) | int %}
            {% if autoinsert == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button Ne pas charger le filament automatiquement|SAVE_ZMOD_DATA AUTOINSERT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Charger le filament automatiquement|SAVE_ZMOD_DATA AUTOINSERT=0 I={n}|primary"
            {% endif %}

            # 2
            {% set use_trash_on_print = printer.save_variables.variables.use_trash_on_print|default(1) | int %}
            {% if use_trash_on_print == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button Ne pas utiliser le bac de purge pendant l'impression|SAVE_ZMOD_DATA USE_TRASH_ON_PRINT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Utiliser le bac de purge pendant l'impression|SAVE_ZMOD_DATA USE_TRASH_ON_PRINT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Suivant|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 7 %}
        RESPOND TYPE=command MSG="action:prompt_begin Paramètres système: {n}"

        # 1
        {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
        RESPOND TYPE=command MSG="action:prompt_button Language {lang}|LANG|primary"

        # 2
        RESPOND TYPE=command MSG="action:prompt_button Reset ZMOD Global| _RESET_ZMOD|orange"

        RESPOND TYPE=command MSG="action:prompt_footer_button OK|_SHOW_MSG MSG=\"Si des paramètres ont été modifiés, il est recommandé de redémarrer l'imprimante. Macro GLOBAL\" COMMAND='_GLOBAL_SAVE PARAM=skip_global' COMMAND_REBOOT=\"_GLOBAL_SAVE PARAM=skip_global REBOOT=1\"|red"

        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro SET_FILAMENT_SENSOR]
rename_existing: _SET_FILAMENT_SENSOR
gcode:
    _SET_FILAMENT_SENSOR {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}

    {% set sensor = params.SENSOR|default("none")|string %}
    {% set enable = params.ENABLE|default(2)|int %}

    {% if sensor != "none" and enable != 2 %}
        SAVE_VARIABLE VARIABLE={sensor} VALUE={enable}
    {% endif %}

[gcode_macro _NOTIFY]
gcode:

[gcode_macro _NOTIFY_ON_PERCENT]
variable_notified_percent: 0
variable_last_percent: 0
gcode:

[gcode_macro TAR_CONFIG]
description: Sauvegarde des fichiers de config dans une archive
gcode:
    RUN_SHELL_COMMAND CMD=screen
    RESPOND PREFIX="info" MSG="Téléchargez l'archive dans 'Configuration' -> 'mod_data' ->"
    RUN_SHELL_COMMAND CMD=tar_config
    RESPOND PREFIX="info" MSG="Pour restaurer la configuration, copiez dans 'Configuration' -> 'mod_data' -> config.tar.gz et appelez RESTORE_TAR_CONFIG"

[gcode_macro _SAVE_CONFIG]
gcode:
    {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
    {% if znew_save_config == 1 %}
        NEW_SAVE_CONFIG
    {% else %}
        M400
        _ORIG_SAVE_CONFIG
    {% endif %}

[gcode_macro SAVE_CONFIG]
rename_existing: _ORIG_SAVE_CONFIG
gcode:
    M400
    _ORIG_SAVE_CONFIG
