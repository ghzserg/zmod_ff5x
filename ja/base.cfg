        {% if znew_save_config == 1 %}
            RESPOND PREFIX="//" MSG="代替NEW_SAVE_CONFIGを使用 // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% else %}
