[gcode_macro _CLEAR_TRAP]
description: Код очистки с чистилкой справа сверху-вниз
gcode:
    RESPOND PREFIX="info" MSG="Заглушка _CLEAR_TRAP"

[gcode_macro _START_PRECLEAR]
description: Предочистка сопла
gcode:
    CLEAR_NOZZLE IGNORE_TEMP=1

[gcode_macro CLEAR_NOZZLE]
description: Очистка сопла
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(230)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set ignore_temp = params.IGNORE_TEMP|default(0)|int %}

    {% if ignore_temp == 0%}
        RESPOND PREFIX="info" MSG="Запущена родная очистка сопла {extruder_temp}/{bed_temp}"
    {% else %}
        RESPOND PREFIX="info" MSG="Предочистка сопла"
    {% endif %}

    _G28

    G1 X52.50 F12000
    G1 Y220 F12000
    G1 Y229.00 F3000
    M400

    {% if ignore_temp == 0 %}
        M140 S{bed_temp}         ; Греем стол
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-3} MAXIMUM={bed_temp+4}
        M104 S{extruder_temp} T0
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+4}
    {% endif %}

    G1 Z20 F600

    M106 S255

    G92 E0
    G1 E10 F400
    G92 E0
    G1 E-3 F1000
    M400
    G92 E0
    G1 X73 F9000
    G1 X65
    G1 X73
    G1 X65
    G1 X78
    G1 Y220
    M400
    G1 X52.50 F12000
    G1 Y220 F12000
    G1 Y229.00 F3000
    M400

    M104 S120 T0             ; Снижаем температуру до 120 градусов
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={118} MAXIMUM={123}

    G1 X73 F9000
    G1 X65
    G1 X73
    G1 X65
    G1 X78
    G1 Y220
    M400

    M106 S0

