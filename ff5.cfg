[include ad5x.cfg]

[zmod_color]

[gcode_macro COLOR]
gcode:
    GET_ZCOLOR

[gcode_macro RESET_ZCOLOR]
gcode:
    RESPOND TYPE=command MSG=action:prompt_end
    CHANGE_ZCOLOR SLOT=1 HEX=FEF043 TYPE=PLA
    CHANGE_ZCOLOR SLOT=2 HEX=FFFFFF TYPE=PLA
    CHANGE_ZCOLOR SLOT=3 HEX=161616 TYPE=PLA
    CHANGE_ZCOLOR SLOT=4 HEX=F72224 TYPE=PLA

[gcode_macro CHANGE_FILAMENT]
gcode:
    {% set channel  = params.CHANNEL| int %}
    RESPOND PREFIX="info" MSG="Change filament to {channel}"
