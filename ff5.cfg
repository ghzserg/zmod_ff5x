# Сохранение переменных
[save_variables]
filename: /usr/data/config/mod_data/variables.cfg

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True    ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 218.0   ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 218.0   ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 50.0    ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_speed_hop        : 25.0    ; z move speed in mm/s
variable_speed_move       : 300.0   ; move speed in mm/s
variable_park_at_cancel   : False   ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : 108.0   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : 108.0   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_use_fw_retract   : False   ; use fw_retraction instead of the manual version [True/False]
variable_idle_timeout     : 86400   ; time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
variable_runout_sensor    : "filament_switch_sensor e0_sensor"
variable_user_pause_macro : "_PAUSE_MACRO"   ; Everything inside the "" will be executed after the klipper base pause (PAUSE_BASE) function
variable_user_resume_macro: "ZCONTROL_ON"    ; Everything inside the "" will be executed before the klipper base resume (RESUME_BASE) function
variable_user_cancel_macro: "_COMMON_END_PRINT"
variable_retract          : 1.0   ; the value to retract while PAUSE
variable_cancel_retract   : 5.0   ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 35.0  ; retract speed in mm/s
variable_unretract        : 1.0   ; the value to unretract while RESUME
variable_speed_unretract  : 35.0  ; unretract speed in mm/s
variable_max_x            : 220.0
variable_max_y            : 220.0
variable_min_x            : 0.0
variable_min_y            : 0.0
gcode:
    M105

# Регулировка винтов
[screws_tilt_adjust]
screw1: 16, 16
screw1_name: Левый ближний
screw2: 204, 16
screw2_name: Правый ближний
screw3: 204, 204
screw3_name: Правый дальний
screw4: 16, 204
screw4_name: Левый дальний
horizontal_move_z: 10.
speed: 600.
screw_thread: CW-M4

[gcode_macro TAR_CONFIG]
description: Сохраняет файлы конфигурации в архив
gcode:
    RUN_SHELL_COMMAND CMD=tar PARAMS="-cf /opt/config/mod_data/config.tar --exclude ssh.key --exclude .git --exclude .shell --exclude config.tar /opt/config/ /usr/data/logFiles/firmwareExe.log /usr/data/logFiles/meminfo.complete.log /usr/data/logFiles/printer.log /usr/data/logFiles/moonraker.log /usr/data/logFiles/ffstartup-arm.log /usr/data/logFiles/dmesg.complete.log"
    RESPOND PREFIX="info" MSG="Скачать архив можно в 'Конфигурация' -> 'mod_data' -> config.tar"

[gcode_macro LOAD_CELL_TARE]
description: Сброс веса тензодатчиков
variable_success: 0
gcode:
    RESPOND PREFIX="info" MSG="Сброс веса тензодатчиков не требуется"

[gcode_macro _CLEAR1]
description: Код очистки из Orca Slicer
gcode:
    G90
    M83
    G1 Z5 F6000
    G1 E-0.2 F800
    G1 X220 Y0 F6000      ; X=110+110, Y=-110+110
    G1 E2 F800
    G1 X165 Y0 Z0.25 F4800  ; X=55+110, Y=-110+110
    G1 X55 E8 F2400         ; X=-55+110
    G1 Y0.4 F2400           ; Y=-109.6+110
    G1 X165 E5 F2400        ; X=55+110
    G1 Y0 X165 Z0.45 F4800  ; Y=-110+110, X=55+110
    G1 X55 E8 F2400         ; X=-55+110
    G1 Y0.4 F2400           ; Y=-109.6+110
    G1 X165 E5 F2400        ; X=55+110
    G92 E0

[gcode_macro _CLEAR2]
description: Код очистки из группы FF
gcode:
    G90
    M83
    G1 E-0.2 F800
    G1 X220 Y0 Z5 F6000      ; X=110+110, Y=-110+110
    G1 Z0.2 F1200
    G1 E2 F800
    G1 X130 E9 F1000         ; X=20+110
    G1 X50 E12.5 F1000       ; X=-60+110
    G1 E-0.2 F800
    G92 E0

[gcode_macro _CLEAR3]
description: Код очистки из группы FF2
gcode:
    G90
    G1 Z5 F6000
    M83
    G1 Y0 X190 Z0.2 F4800      ; Y=-110+110, X=80+110
    G1 X130 E9 F1000           ; X=20+110
    G1 X50 E12.5 F1000         ; X=-60+110
    G92 E0

[gcode_macro _CLEAR4]
description: Код очистки от Шрейдера справа сверху-вниз
gcode:
    G90
    M83
    G1 Z5 F6000
    G1 E-1.5 F800
    G1 X220 Y151 F6000         ; X=110+110, Y=41+110
    G1 E2 F800
    G1 Y151 Z0.2 F4800         ; Y=41+110
    G1 Y71 E9 F1000            ; Y=-39+110
    G1 Y11 E12.5 F1000         ; Y=-99+110
    G92 E0

[gcode_macro _CLEAR_TRAP]
description: Код очистки с чистилкой справа сверху-вниз
gcode:
    RESPOND PREFIX="info" MSG="Заглушка _CLEAR_TRAP"

[gcode_macro _PRE_CLEAR_NOZZLE]
description: Предочистка сопла
gcode:
    RESPOND PREFIX="info" MSG="Заглушка _PRE_CLEAR_NOZZLE"

[gcode_macro CLEAR_NOZZLE]
description: Очистка сопла
gcode:
    RESPOND PREFIX="info" MSG="Заглушка CLEAR_NOZZLE"

    _G28

    {% set extruder_temp = params.EXTRUDER_TEMP|default(230)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    M140 S{bed_temp}         ; Греем стол
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-3} MAXIMUM={bed_temp+4}

    M104 S120 T0             ; Снижаем температуру до 120 градусов
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={118} MAXIMUM={123}

[gcode_macro ZCONTROL_ON]
gcode:


[gcode_macro ZCONTROL_OFF]
gcode:


[gcode_macro ZCONTROL_STATUS]
gcode:

