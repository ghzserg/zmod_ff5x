# Сохранение переменных
[save_variables]
filename: /opt/config/mod_data/variables.cfg

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True    ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 108.0   ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 108.0   ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 50.0    ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_speed_hop        : 25.0    ; z move speed in mm/s
variable_speed_move       : 300.0   ; move speed in mm/s
variable_park_at_cancel   : False   ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : 108.0   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : 108.0   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_use_fw_retract   : False   ; use fw_retraction instead of the manual version [True/False]
variable_idle_timeout     : 86400   ; time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
variable_runout_sensor    : "filament_switch_sensor e0_sensor"
variable_user_pause_macro : "_PAUSE_MACRO"   ; Everything inside the "" will be executed after the klipper base pause (PAUSE_BASE) function
variable_user_resume_macro: "ZCONTROL_ON"    ; Everything inside the "" will be executed before the klipper base resume (RESUME_BASE) function
variable_user_cancel_macro: "_COMMON_END_PRINT"
variable_retract          : 1.0   ; the value to retract while PAUSE
variable_cancel_retract   : 5.0   ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 35.0  ; retract speed in mm/s
variable_unretract        : 1.0   ; the value to unretract while RESUME
variable_speed_unretract  : 35.0  ; unretract speed in mm/s
variable_max_x            : 110.0
variable_max_y            : 110.0
variable_min_x            : -110.0
variable_min_y            : -110.0
variable_ff5x             : False
gcode:
    M105

# Регулировка винтов
[screws_tilt_adjust]
screw1: -94, -94
screw1_name: Левый ближний
screw2: 94, -94
screw2_name: Правый ближний
screw3: 94, 94
screw3_name: Правый дальний
screw4: -94, 94
screw4_name: Левый дальний
horizontal_move_z: 10.
speed: 600.
screw_thread: CW-M4

[gcode_macro _UGOL_PARK]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    M106 S0                 ; Отключить кулер
    M107                    ; Отключить кулер экструдера

    G1 X{client.custom_park_x} Y{client.custom_park_y}            ; Угоняем в угол
    G1 Z5 F3000
    G1 Z-0.02 F500          ; Запечатываем сопло, чтобы не текло
#    G1 Z5 F3000
    M400

[gcode_macro NOZZLE_CONTROL]
description: Контроль отрыва детали или удара сопла о стол
gcode:
    {% set we = params.WEIGHT|default(800)|int %}

    RUN_SHELL_COMMAND CMD=znozzle PARAMS="{we}"

[gcode_macro TAR_CONFIG]
description: Сохраняет файлы конфигурации в архив
gcode:
    RUN_SHELL_COMMAND CMD=tar PARAMS="-cf /opt/config/mod_data/config.tar --exclude ssh.key --exclude .git --exclude .shell --exclude config.tar /opt/klipper/klippy/toolhead.py /opt/config/ /data/logFiles/firmwareExe.log /data/logFiles/meminfo.complete.log /data/logFiles/printer.log /data/logFiles/moonraker.log /data/logFiles/ffstartup-arm.log /data/logFiles/dmesg.complete.log"
    RESPOND PREFIX="info" MSG="Скачать архив можно в 'Конфигурация' -> 'mod_data' -> config.tar"

[gcode_macro LOAD_CELL_TARE]
description: Сброс веса тензодатчиков
variable_success: 0
gcode:
    {% set we = printer['temperature_sensor weightValue'].temperature %}

    RESPOND PREFIX="info" MSG="Сброс веса тензодатчиков"

    QUERY_PROBE

    _LOAD_CELL_TARE_PROBE

    _LOAD_CELL_TARE_CHECK

    # Сбрасываем значение переменной
    SET_GCODE_VARIABLE MACRO=LOAD_CELL_TARE VARIABLE=success VALUE=0

    # Пробуем 10 раз сбросить тензы
    {% for i in range(1, 11) %}
        _LOAD_CELL_TARE_IF_NO_SUCCESS ITER={i}
    {% endfor %}

    # Финальная проверка
    _LOAD_CELL_TARE_FINAL_CHECK

# Проверяем, что сопло не упирается в стол
[gcode_macro _LOAD_CELL_TARE_PROBE]
gcode:
    {% if printer['probe'].last_query %}
        {% set probe="сработал" %}
        SAVE_GCODE_STATE NAME=CELL_TARE MOVE=0
        {% if "z" not in printer.toolhead.homed_axes %}
            G28 Z
            M400
        {% else %}
            {% if printer.toolhead.position.z < 10 %}
                G91
                G1 Z5
                M400
                G4 P500
                M400
            {% endif %}
        {% endif %}
        RESTORE_GCODE_STATE NAME=CELL_TARE MOVE=0
        RESPOND PREFIX="info" MSG="Обнаружена сработка тензодатчика! Убедитесь что стол чист!"
    {% else %}
        {% set probe="не сработал" %}
    {% endif %}
    RESPOND PREFIX="info" MSG="Датчик касания {probe}"

# Сброс и проверка тензодатчиков
[gcode_macro _LOAD_CELL_TARE_IF_NO_SUCCESS]
gcode:
    {% set iter = params.ITER|default(0)|int %}

    {% if not printer["gcode_macro LOAD_CELL_TARE"].success %}
        _LOAD_CELL_TARE_SET
        _LOAD_CELL_TARE_CHECK ITER={iter}
    {% endif %}

# Сброс тензодатчиков
[gcode_macro _LOAD_CELL_TARE_SET]
gcode:
    # Tare is set by toggeling level_h1 pin
    SET_PIN PIN=level_h1 VALUE=0
    G4 P{505}
    M400
    SET_PIN PIN=level_h1 VALUE=1
    G4 P{505}
    M400
    SET_PIN PIN=level_h1 VALUE=0
    G4 P{505}
    M400
    SET_PIN PIN=level_h1 VALUE=1
    G4 P{505}
    M400

# Проверка тензодатчиков
[gcode_macro _LOAD_CELL_TARE_CHECK]
gcode:
    {% set iter = params.ITER|default(0)|int %}

    {% set we = printer['temperature_sensor weightValue'].temperature %}

    {% if "PRESSED" in printer['gcode_button check_level_pin'].state %}
        {% set clp="Обнуление подтверждено" %}
        {% if iter != 0 %}
            SET_GCODE_VARIABLE MACRO=LOAD_CELL_TARE VARIABLE=success VALUE=1
        {% endif %}
    {% else %}
        {% set clp="Подтверждения обнуления нет" %}
    {% endif %}

    RESPOND PREFIX="info" MSG="Поверка №{iter+1}. {clp}. Вес: {we}"

# Финальная проверка
[gcode_macro _LOAD_CELL_TARE_FINAL_CHECK]
gcode:
    {% set we = printer['temperature_sensor weightValue'].temperature %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    # Check success
    {% if printer["gcode_macro LOAD_CELL_TARE"].success %}
        # Toggle level clear plin.
        # No sure what the level clear pin does. But we do the same as the stock software.
        SET_PIN PIN=level_clear VALUE=0
        G4 P10
        M400
        SET_PIN PIN=level_clear VALUE=1
        G4 P10
        M400
        RESPOND PREFIX="info" MSG="Сброс веса тензодатчиков прошел успешно. Вес: {we}"
    # Else raise error
    {% else %}
        RESPOND PREFIX="info" MSG="Вес при ошибке: {we}"
        {% if screen == True %}
            RESPOND PREFIX="info" MSG="Используйте режим снятия карты стола с родного экрана. // SAVE_ZMOD_DATA PRINT_LEVELING=1"
        {% endif %}
        {action_raise_error("Ошибка сброса веса тензодатчиков. Читайте FAQ: https://github.com/ghzserg/zmod/wiki/FAQ")}
    {% endif %}

