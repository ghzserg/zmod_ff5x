    SET_GCODE_VARIABLE MACRO=_SPEED_SET VARIABLE=speed2 VALUE={zspeed}
    M220 S{zspeed/4}
    UPDATE_DELAYED_GCODE ID=_SET_SPEED1 DURATION=60
    UPDATE_DELAYED_GCODE ID=_SET_SPEED2 DURATION=120

[delayed_gcode _SET_SPEED1]
