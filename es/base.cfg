# Использование: SET_PAUSE_NEXT_LAYER [ENABLE=[0 | 1]] [MACRO=<name>]
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Habilitar pausa en la siguiente capa
gcode:
    {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
    {% set ENABLE = params.ENABLE | default(1)|int != 0 %}
    {% set MACRO = params.MACRO | default(pause_next_layer.call, True) %}
    SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

# Usage: SET_PAUSE_AT_LAYER [ENABLE=[0 | 1]] [LAYER=<number>] [MACRO=<name>]
[gcode_macro SET_PAUSE_AT_LAYER]
description: Habilitar/deshabilitar pausa en una capa específica
gcode:
    {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
    {% set ENABLE = params.ENABLE | int != 0 if params.ENABLE is defined
             else params.LAYER is defined %}
    {% set LAYER = params.LAYER | default(pause_at_layer.layer) | int %}
    {% set MACRO = params.MACRO | default(pause_at_layer.call, True) %}
    SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

# Использование: SET_PRINT_STATS_INFO [TOTAL_LAYER=<total_layer_count>] [CURRENT_LAYER= <current_layer>]
[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Sobrescribir para obtener funciones pause_next_layer y pause_at_layer
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
    {% if pause_next_layer.enable %}
        RESPOND TYPE=echo MSG='{"%s, SET_PAUSE_AT_LAYER " % pause_next_layer.call}'
        {pause_next_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
        SET_PAUSE_NEXT_LAYER ENABLE=0
    {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER | int == pause_at_layer.layer %}
        RESPOND TYPE=echo MSG='{"%s, pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
        {pause_at_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
        SET_PAUSE_AT_LAYER ENABLE=0
    {% endif %}

    {% set notify_percent = printer.save_variables.variables.notify_percent|default(0) | int %}
    {% if notify_percent > 0 %}
        _NOTIFY_ON_PERCENT
    {% endif %}
    SET_PRINT_STATS_INFO_BASE {rawparams}

[gcode_macro ZFLASH]
description: Actualizar impresora a través de USB
gcode:
    RUN_SHELL_COMMAND CMD=zflash

[gcode_macro _DISABLE_SENSOR]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% if client.runout_sensor | default("") != "" %}
        {% if printer[client.runout_sensor].enabled %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed VALUE=True
            {% if client.ad5x %}
                _SET_FILAMENT_SENSOR SENSOR=head_switch_sensor ENABLE=0
            {% else %}
                _SET_FILAMENT_SENSOR SENSOR=e0_sensor ENABLE=0
            {% endif %}
        {% else %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed VALUE=False
        {% endif %}
    {% endif %}

    {% if client.runout_sensor2 | default("") != "" %}
        {% if screen == False and printer[client.runout_sensor2].enabled %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed2 VALUE=True
            _SET_FILAMENT_SENSOR SENSOR=ifs_motion_sensor ENABLE=0
        {% else %}
            SET_GCODE_VARIABLE MACRO=_ENABLE_SENSOR VARIABLE=allowed2 VALUE=False
        {% endif %}
    {% endif %}

[gcode_macro _ENABLE_SENSOR]
variable_allowed: False
variable_allowed2: False
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% if allowed %}
        {% if client.ad5x %}
            _SET_FILAMENT_SENSOR SENSOR=head_switch_sensor ENABLE=1
        {% else %}
            _SET_FILAMENT_SENSOR SENSOR=e0_sensor ENABLE=1
        {% endif %}
    {% endif %}

    {% if screen == False and allowed2 %}
        _SET_FILAMENT_SENSOR SENSOR=ifs_motion_sensor ENABLE=1
    {% endif %}


[gcode_macro RESTORE_TAR_CONFIG]
description: Restaurar archivos de configuración de respaldo desde el archivo
gcode:
    RUN_SHELL_COMMAND CMD=zrestore_tar_config

[gcode_macro NOZZLE_CONTROL]
description: Detectar desprendimiento de la pieza o golpe de la boquilla
gcode:
    {% set we = params.WEIGHT|default(1500)|int %}

    RUN_SHELL_COMMAND CMD=znozzle PARAMS="{we}"

[gcode_macro RESET_PASSWD]
gcode:
    RUN_SHELL_COMMAND CMD=zreset_passwd

[gcode_macro _WIFI]
gcode:
    RUN_SHELL_COMMAND CMD=wifi

[gcode_macro SET_ACTIVE_SPOOL]
description: SpoolMan Set Active Spool
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method(
       "spoolman_set_active_spool",
       spool_id=id
    )}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
description: SpoolMan Clear Active Spool
gcode:
  {action_call_remote_method(
    "spoolman_set_active_spool",
    spool_id=None
  )}

[gcode_macro ENABLE_PLUGIN]
gcode:
    {% set name = params.NAME|default("None")|string %}

    RUN_SHELL_COMMAND CMD=plugins PARAMS="{name} Enable"

[gcode_macro DISABLE_PLUGIN]
gcode:
    {% set name = params.NAME|default("None")|string %}

    RUN_SHELL_COMMAND CMD=plugins PARAMS="{name} Disable"

[gcode_macro SCREEN]
gcode:
    RUN_SHELL_COMMAND CMD=screen

[gcode_macro _CHECK_VERSION]
gcode:
    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% set version = printer.mcu.mcu_version %}

    {% if zklipper13 == 1 and not "-425-" in version %}
        RESPOND PREFIX="!!" MSG="Versión de MCU incorrecta. Ejecute UPDATE_MCU FORCE=13 !!"
    {% endif %}

[gcode_macro _RESET_SPEED]
gcode:
    {% set klipper13 = printer.save_variables.variables.klipper13|default(0) | int %}

    M220 S100
    M221 S100

    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity}
    SET_VELOCITY_LIMIT ACCEL={printer.configfile.settings.printer.max_accel}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={printer.configfile.settings.printer.square_corner_velocity}
    {% if klipper13 == 1 %}
        SET_VELOCITY_LIMIT ACCEL_TO_DECEL={printer.configfile.settings.printer.accell_to_decel}
    {% else %}
        SET_VELOCITY_LIMIT MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}
    {% endif %}

    {% if printer.configfile.settings.extruder is defined %}
        SET_PRESSURE_ADVANCE ADVANCE={printer.configfile.settings.extruder.pressure_advance|default(0)} SMOOTH_TIME={printer.configfile.settings.extruder.pressure_advance_smooth_time|default(0.04)}
    {% endif %}

    {% if printer.configfile.settings.firmware_retraction is defined %}
        SET_RETRACTION RETRACT_LENGTH={printer.configfile.settings.firmware_retraction.retract_length} UNRETRACT_EXTRA_LENGTH={printer.configfile.settings.firmware_retraction.unretract_extra_length} RETRACT_SPEED={printer.configfile.settings.firmware_retraction.retract_speed} UNRETRACT_SPEED={printer.configfile.settings.firmware_retraction.unretract_speed}
    {% endif %}

[gcode_macro LANG]
gcode:
    {% set lang = params.LANG|default("none") %}

    _LANG LANG={lang}

[gcode_macro _LANG]
gcode:
    {% set skip_lang = printer.save_variables.variables.skip_lang|default(0) | int %}

    {% set skip = params.SKIP|default(1)|int %}
    {% set i = params.I|default(0)|int %}
    {% set lang = params.LANG|default("none") %}

    {% if skip == 1 %}
        {% if lang == "none" %}
            {% set show = 1 %}
        {% else %}
            {% set show = 0 %}
        {% endif %}
    {% else %}
        {% if skip_lang == 0 %}
            {% set show = 1 %}
        {% else %}
            {% set show = 0 %}
        {% endif %}
    {% endif %}

    {% if show == 1 %}
        RESPOND TYPE=command MSG="action:prompt_begin Select language"
        RESPOND TYPE=command MSG="action:prompt_text Select language"

        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button EN|_LANG LANG=en I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button RU|_LANG LANG=ru I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button DE|_LANG LANG=de I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button FR|_LANG LANG=fr I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button IT|_LANG LANG=it I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button ES|_LANG LANG=es I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button CS|_LANG LANG=cs I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button PT|_LANG LANG=pt I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button TR|_LANG LANG=tr I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button JA|_LANG LANG=ja I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button KO|_LANG LANG=ko I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button ZH|_LANG LANG=zh I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        {% if i == 1 %}
            SAVE_VARIABLE VARIABLE=skip_lang VALUE=1
            RESPOND TYPE=command MSG="action:prompt_end"
        {% endif %}
        {% if lang != "none" %}
            RUN_SHELL_COMMAND CMD=zlang PARAMS="{lang}"
        {% endif %}
    {% endif %}

[gcode_macro _SHOW_MSG]
gcode:
    {% set title = params.TITLE|default("Configuración inicial")|string %}
    {% set msg = params.MSG|default("Ok")|string %}
    {% set command = params.COMMAND|default("RESPOND TYPE=command MSG=action:prompt_end")|string %}
    {% set command_reboot = params.COMMAND_REBOOT|default("none")|string %}

    RESPOND TYPE=command MSG=action:prompt_end

    RESPOND TYPE=command MSG="action:prompt_begin {title}"
    RESPOND TYPE=command MSG="action:prompt_text {msg}"

    RESPOND TYPE=command MSG="action:prompt_footer_button OK|{command}|primary"
    {% if command_reboot != "none" %}
        RESPOND TYPE=command MSG="action:prompt_footer_button REBOOT|{command_reboot}|red"
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _RECOMMEND]
gcode:
    {% set skip_global = printer.save_variables.variables.skip_global|default(0) | int %}
    {% set skip_lang = printer.save_variables.variables.skip_lang|default(0) | int %}
    {% set skip_recommend = printer.save_variables.variables.skip_recommend|default(0) | int %}

    {% set close = params.CLOSE|default(0)|int %}
    {% set enable = params.ENABLE|default(0)|int %}

    {% if close == 1 %}
        RESPOND TYPE=command MSG=action:prompt_end
        SAVE_VARIABLE VARIABLE=skip_recommend VALUE=1
        {% if enable == 1 %}
            ENABLE_PLUGIN name=recommend
        {% endif %}
    {% else %}
        {% if skip_global == 1 and skip_lang == 1 and skip_recommend == 0 %}
            RESPOND TYPE=command MSG="action:prompt_begin Configuración inicial"
            RESPOND TYPE=command MSG="action:prompt_text ¿Activar el plugin de recomendaciones? Permite configurar los ajustes básicos con un clic."
            RESPOND TYPE=command MSG="action:prompt_footer_button Yes|_RECOMMEND CLOSE=1 ENABLE=1|red"
            RESPOND TYPE=command MSG="action:prompt_footer_button No|_RECOMMEND CLOSE=1 ENABLE=0|primary"
            RESPOND TYPE=command MSG="action:prompt_show"
        {% endif %}
    {% endif %}

[gcode_macro _RESET_ZMOD]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    RESPOND TYPE=command MSG="action:prompt_end"

    SAVE_VARIABLE VARIABLE=print_leveling VALUE=0
    SAVE_VARIABLE VARIABLE=use_kamp VALUE=0
    SAVE_VARIABLE VARIABLE=mesh_test VALUE=1
    SAVE_VARIABLE VARIABLE=force_md5 VALUE=1
    SAVE_VARIABLE VARIABLE=disable_skew VALUE=1
    SAVE_VARIABLE VARIABLE=load_zoffset VALUE=1
    SAVE_VARIABLE VARIABLE=disable_priming VALUE=0
    SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
    SAVE_VARIABLE VARIABLE=stop_motor VALUE=1
    SAVE_VARIABLE VARIABLE=auto_reboot VALUE=0
    SAVE_VARIABLE VARIABLE=save_restore VALUE=1
    SAVE_VARIABLE VARIABLE=fix_scv VALUE=1
    SAVE_VARIABLE VARIABLE=fix_e0011 VALUE=1
    SAVE_VARIABLE VARIABLE=fix_e0017 VALUE=1
    SAVE_VARIABLE VARIABLE=wifi VALUE=1
    SAVE_VARIABLE VARIABLE=china_cloud VALUE=1
    SAVE_VARIABLE VARIABLE=save_moonraker VALUE=0
    SAVE_VARIABLE VARIABLE=save_filament_sensors VALUE=0

    {% if not client.ad5x %}
        SAVE_VARIABLE VARIABLE=preclear VALUE=0
        SAVE_VARIABLE VARIABLE=new_save_config VALUE=0
        SAVE_VARIABLE VARIABLE=use_swap VALUE=1
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE=0
    {% else %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE=0
        SAVE_VARIABLE VARIABLE=silent VALUE=0
        SAVE_VARIABLE VARIABLE=autoinsert VALUE=1
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE=1
        SAVE_VARIABLE VARIABLE=remove_filament VALUE=0
    {% endif %}

    SAVE_VARIABLE VARIABLE=skip_lang VALUE=0
    SAVE_VARIABLE VARIABLE=skip_global VALUE=0
    SAVE_VARIABLE VARIABLE=skip_recommend VALUE=0

    REBOOT

[gcode_macro GLOBAL]
description: Obtener parámetros ZMOD
gcode:
    _GLOBAL

[gcode_macro _GLOBAL_SAVE]
gcode:
    {% set param = params.PARAM|default("none")|string %}
    {% set reboot = params.REBOOT|default(0)|int %}

    {% if param != "none" %}
        SAVE_VARIABLE VARIABLE={param} VALUE=1
    {% endif %}
    {% if reboot == 1 %}
        REBOOT
    {% endif %}
    RESPOND TYPE=command MSG=action:prompt_end

[gcode_macro _GLOBAL]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% set skip_global = printer.save_variables.variables.skip_global|default(0) | int %}
    {% set skip_lang = printer.save_variables.variables.skip_lang|default(0) | int %}
    {% set skip_recommend = printer.save_variables.variables.skip_recommend|default(0) | int %}
    {% set skip_link = printer.save_variables.variables.skip_link|default(0) | int %}

    {% set n = params.N|default(1)|int %}
    {% set start = params.START|default(0)|int %}

    {% if skip_global == 0 and skip_lang == 1 and start == 1 %}
        _SHOW_MSG MSG="Puede explorar y cambiar parámetros globales si es necesario. https://github.com/ghzserg/zmod/wiki/Global_es" COMMAND="_GLOBAL"
    {% endif %}

    {% if skip_link == 0 and skip_global == 1 and skip_lang == 1 and skip_recommend == 1 and start == 1 %}
        _SHOW_MSG MSG="¿Sabías que puedes acceder a tu impresora de forma remota usando zmod.link?" COMMAND="_GLOBAL_SAVE PARAM='skip_link'"
    {% endif %}

    {% if start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_end"
    {% endif %}

    {% if n == 1 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parámetros usados al iniciar impresión y nivelar cama [START_PRINT]: {n}"

        # 1
        {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
        {% if zprint_leveling == 1 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Construir malla de cama con la pantalla nativa en cada impresión.|SAVE_ZMOD_DATA PRINT_LEVELING=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Construir malla de cama en cada impresión.|SAVE_ZMOD_DATA PRINT_LEVELING=0 I={n}|primary"
            {% endif %}
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button No construya una malla de cama en cada impresión.|SAVE_ZMOD_DATA PRINT_LEVELING=1 I={n}|primary"
        {% endif %}

        # 2
        {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
        {% if zuse_kamp == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Usar malla adaptativa (KAMP) donde sea posible en lugar de malla completa de cama|SAVE_ZMOD_DATA USE_KAMP=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button No usar KAMP en lugar de BED_MESH_CALIBRATE|SAVE_ZMOD_DATA USE_KAMP=1 I={n}|primary"
        {% endif %}

        # 3
        {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
        {% if zmesh_test == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button No probar malla de cama antes de imprimir|SAVE_ZMOD_DATA MESH_TEST=1 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Probar malla de cama antes de imprimir|SAVE_ZMOD_DATA MESH_TEST=2 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 2 %}
            RESPOND TYPE=command MSG="action:prompt_button Probar malla de cama antes de imprimir + KAMP|SAVE_ZMOD_DATA MESH_TEST=0 I={n}|primary"
        {% endif %}

        # 4
        {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
        {% if zforce_md5 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Verificar suma MD5 del archivo|SAVE_ZMOD_DATA FORCE_MD5=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button No verificar suma MD5 del archivo|SAVE_ZMOD_DATA FORCE_MD5=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Siguiente|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 2 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parámetros usados al iniciar impresión y nivelar cama [START_PRINT]: {n}"

        # 1
        {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
        {% if zdisable_skew == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Corrección SKEW deshabilitada|SAVE_ZMOD_DATA DISABLE_SKEW=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Corrección SKEW habilitada. Perfil skew_profile|SAVE_ZMOD_DATA DISABLE_SKEW=1 I={n}|primary"
        {% endif %}

        # 2
        {% if screen == False %}
            {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(1) | int %}
            {% if zload_zoffset == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Cargar Z-Offset desde configuraciones globales|SAVE_ZMOD_DATA LOAD_ZOFFSET=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button No cargar Z-Offset desde configuraciones globales|SAVE_ZMOD_DATA LOAD_ZOFFSET=1 I={n}|primary"
            {% endif %}
        {% endif %}

        # 3
        {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
        {% if zdisable_priming == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Deshabilitar purga de línea de la boquilla|SAVE_ZMOD_DATA DISABLE_PRIMING=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Habilitar purga de línea de la boquilla|SAVE_ZMOD_DATA DISABLE_PRIMING=1 I={n}|primary"
        {% endif %}

        {% if not client.ad5x %}
            # 4
            {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
            {% if zpreclear == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Usar pre-purga de boquilla|SAVE_ZMOD_DATA PRECLEAR=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button No usar pre-purga de la boquilla|SAVE_ZMOD_DATA PRECLEAR=1 I={n}|primary"
            {% endif %}
        {% else %}
            # 4
            {% set silent = printer.save_variables.variables.silent|default(0) | int %}
            {% if silent == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button No ocultar la selección de color al iniciar la impresión|SAVE_ZMOD_DATA SILENT=1 I={n}|primary"
            {% endif %}
            {% if silent == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Ocultar la selección de color, imprimir con IFS|SAVE_ZMOD_DATA SILENT=2 I={n}|primary"
            {% endif %}
            {% if silent == 2 %}
                RESPOND TYPE=command MSG="action:prompt_button Ocultar la selección de color, imprimir sin IFS|SAVE_ZMOD_DATA SILENT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Siguiente|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 3 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parámetros usados al finalizar y cancelar impresión [END_PRINT]: {n}"

        # 1
        {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(2) | int %}
        {% if zclose_dialogs == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button No cerrar diálogos en la pantalla nativa|SAVE_ZMOD_DATA CLOSE_DIALOGS=1 I={n}|primary"
        {% endif %}
        {% if zclose_dialogs == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Cerrar automáticamente los diálogos en la pantalla nativa después de 20 segundos (lento)|SAVE_ZMOD_DATA CLOSE_DIALOGS=2 I={n}|primary"
        {% endif %}
        {% if zclose_dialogs == 2 %}
            RESPOND TYPE=command MSG="action:prompt_button Cerrar automáticamente los diálogos en la pantalla nativa después de 20 segundos (rápido)|SAVE_ZMOD_DATA CLOSE_DIALOGS=0 I={n}|primary"
        {% endif %}

        # 2
        {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
        {% if zstop_motor == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Desactivar automáticamente los motores después de imprimir/cancelar en 25 segundos|SAVE_ZMOD_DATA STOP_MOTOR=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button No desactivar motores automáticamente después de imprimir/cancelar|SAVE_ZMOD_DATA STOP_MOTOR=1 I={n}|primary"
        {% endif %}

        # 3
        {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
        {% if zauto_reboot == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button No reiniciar la impresora automáticamente|SAVE_ZMOD_DATA AUTO_REBOOT=1 I={n}|primary"
        {% endif %}
        {% if zauto_reboot == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Reinicio automático de la impresora después de 1.5 minutos|SAVE_ZMOD_DATA AUTO_REBOOT=2 I={n}|primary"
        {% endif %}
        {% if zauto_reboot == 2 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Reinicio automático de la impresora después de 1.5 minutos|SAVE_ZMOD_DATA AUTO_REBOOT=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Reinicio automático del firmware después de 1.5 minutos|SAVE_ZMOD_DATA AUTO_REBOOT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        {% if client.ad5x %}
            # 4
            {% set remove_filament = printer.save_variables.variables.remove_filament|default(0) | int %}
            {% if remove_filament == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button No quitar el filamento después de completar la impresión|SAVE_ZMOD_DATA REMOVE_FILAMENT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Quitar el filamento después de completar la impresión|SAVE_ZMOD_DATA REMOVE_FILAMENT==0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Siguiente|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 4 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parámetros de sistema: {n}"

        # 1
        {% set save_restore = printer.save_variables.variables.save_restore|default(1) | int %}
        {% if save_restore == 1 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Guardado controlado por pantalla nativa|SAVE_ZMOD_DATA SAVE_RESTORE=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Guardar datos para recuperación de impresión|SAVE_ZMOD_DATA SAVE_RESTORE=0 I={n}|primary"
            {% endif %}
        {% else %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button Guardado controlado por pantalla nativa|SAVE_ZMOD_DATA SAVE_RESTORE=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button No guardar datos para recuperación de impresión|SAVE_ZMOD_DATA SAVE_RESTORE=1 I={n}|primary"
            {% endif %}
        {% endif %}

        # 2
        {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
        {% if fix_scv == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Usar SCV de configuración para gráficos de modelador|SAVE_ZMOD_DATA FIX_SCV=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Usar SCV = 5 para gráficos de modelador|SAVE_ZMOD_DATA FIX_SCV=1 I={n}|primary"
        {% endif %}

        # 3
        {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(1) | int %}
        {% if fix_e0011 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Corregir error E0011|SAVE_ZMOD_DATA FIX_E0011=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button No corregir error E0011|SAVE_ZMOD_DATA FIX_E0011=1 I={n}|primary"
        {% endif %}

        # 4
        {% set fix_e0017 = printer.save_variables.variables.fix_e0017|default(1) | int %}
        {% if fix_e0017 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Corregir error E0017|SAVE_ZMOD_DATA FIX_E0017=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button No corregir error E0017|SAVE_ZMOD_DATA FIX_E0017=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Siguiente|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 5 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parámetros de sistema: {n}"

        # 1
        {% set wifi = printer.save_variables.variables.wifi|default(1) | int %}
        {% if wifi == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Zmod Wifi On|SAVE_ZMOD_DATA WIFI=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Zmod Wifi Off|SAVE_ZMOD_DATA WIFI=1 I={n}|primary"
        {% endif %}

        # 2
        {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(1) | int %}
        {% if zchina_cloud == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Permitir nubes chinas|SAVE_ZMOD_DATA CHINA_CLOUD=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Bloquear nubes chinas|SAVE_ZMOD_DATA CHINA_CLOUD=1 I={n}|primary"
        {% endif %}

        # 3
        {% set save_moonraker = printer.save_variables.variables.save_moonraker|default(0) | int %}
        {% if save_moonraker == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Guardar cambios de botones de Fluidd/Mainsail|SAVE_ZMOD_DATA SAVE_MOONRAKER=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Usar configuraciones de botones de Fluidd/Mainsail desde ZMOD|SAVE_ZMOD_DATA SAVE_MOONRAKER=1 I={n}|primary"
        {% endif %}

        # 4
        {% set save_filament_sensors = printer.save_variables.variables.save_filament_sensors|default(0) | int %}
        {% if save_filament_sensors == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Guardar el estado de los sensores de filamento|SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button No guardar el estado de los sensores de filamento|SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Siguiente|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 6 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parámetros de sistema: {n}"

        {% if not client.ad5x %}
            # 1
            {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
            {% if motion_sensor == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Usando sensor de movimiento de filamento|SAVE_ZMOD_DATA MOTION_SENSOR=0 I={n}|primary"
                {% if screen == True %}
                    RESPOND TYPE=command MSG="action:prompt_text Deshabilitar sensor de filamento en la pantalla nativa"
                {% endif %}
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Usando sensor de presencia de filamento|SAVE_ZMOD_DATA MOTION_SENSOR=1 I={n}|primary"
            {% endif %}

            # 2
            {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
            {% if zuse_swap == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP no utilizado|SAVE_ZMOD_DATA USE_SWAP=1 I={n}|primary"
            {% endif %}
            {% if zuse_swap == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP utilizado en EMMC|SAVE_ZMOD_DATA USE_SWAP=2 I={n}|primary"
            {% endif %}
            {% if zuse_swap == 2 %}
                RESPOND TYPE=command MSG="action:prompt_button SWAP utilizado en USB FLASH|SAVE_ZMOD_DATA USE_SWAP=0 I={n}|primary"
            {% endif %}

            # 3
            {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
            {% if znew_save_config == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button Usar NEW_SAVE_CONFIG alternativo|SAVE_ZMOD_DATA NEW_SAVE_CONFIG=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Usar SAVE_CONFIG estándar|SAVE_ZMOD_DATA NEW_SAVE_CONFIG=1 I={n}|primary"
            {% endif %}
        {% else %}
            # 1
            {% set autoinsert = printer.save_variables.variables.autoinsert|default(1) | int %}
            {% if autoinsert == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button No cargar filamento automáticamente|SAVE_ZMOD_DATA AUTOINSERT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Cargar filamento automáticamente|SAVE_ZMOD_DATA AUTOINSERT=0 I={n}|primary"
            {% endif %}

            # 2
            {% set use_trash_on_print = printer.save_variables.variables.use_trash_on_print|default(1) | int %}
            {% if use_trash_on_print == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button No usar contenedor de purga durante la impresión|SAVE_ZMOD_DATA USE_TRASH_ON_PRINT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button Usar contenedor de purga durante la impresión|SAVE_ZMOD_DATA USE_TRASH_ON_PRINT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button Siguiente|_GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 7 %}
        RESPOND TYPE=command MSG="action:prompt_begin Parámetros de sistema: {n}"

        # 1
        {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
        RESPOND TYPE=command MSG="action:prompt_button Language {lang}|LANG|primary"

        # 2
        RESPOND TYPE=command MSG="action:prompt_button Reset ZMOD Global| _RESET_ZMOD|orange"

        RESPOND TYPE=command MSG="action:prompt_footer_button OK|_SHOW_MSG MSG=\"Si se cambiaron parámetros, se recomienda reiniciar la impresora. Macro GLOBAL\" COMMAND='_GLOBAL_SAVE PARAM=skip_global' COMMAND_REBOOT=\"_GLOBAL_SAVE PARAM=skip_global REBOOT=1\"|red"

        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro SET_FILAMENT_SENSOR]
rename_existing: _SET_FILAMENT_SENSOR
gcode:
    _SET_FILAMENT_SENSOR {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}

    {% set sensor = params.SENSOR|default("none")|string %}
    {% set enable = params.ENABLE|default(2)|int %}

    {% if sensor != "none" and enable != 2 %}
        SAVE_VARIABLE VARIABLE={sensor} VALUE={enable}
    {% endif %}

[gcode_macro _NOTIFY]
gcode:

[gcode_macro _NOTIFY_ON_PERCENT]
variable_notified_percent: 0
variable_last_percent: 0
gcode:

[gcode_macro TAR_CONFIG]
description: Guardar archivos de configuración en un archivo
gcode:
    RUN_SHELL_COMMAND CMD=screen
    RESPOND PREFIX="info" MSG="Descargar archivo en 'Configuración' -> 'mod_data' ->"
    RUN_SHELL_COMMAND CMD=tar_config
    RESPOND PREFIX="info" MSG="Para restaurar la configuración, copie a 'Configuración' -> 'mod_data' -> config.tar.gz y llame a RESTORE_TAR_CONFIG"
