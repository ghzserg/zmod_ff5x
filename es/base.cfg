[gcode_macro G28]
rename_existing: G28.1
variable_z: 220
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not 'X' in params and not 'Y' in params and not 'Z' in params %}
        _HOME
    {% else %}
        {% if client.ad5x %}
            _FIX_G28
        {% endif %}
        {% if 'Z' in params or not('X' in params or 'Y' in params or 'Z' in params) %}
            _PRE_Z_G28
