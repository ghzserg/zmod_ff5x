[zmod]
[include ../mod_data/lang.cfg]

[skew_correction]

[firmware_retraction]
retract_length: 0.7
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

[include shell.cfg]

[gcode_macro CLEAR_NOZZLE]
description: Limpieza de boquilla
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(230)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
    ZCONTROL_OFF

[include ff5.cfg]

[gcode_macro _TEST_MIN_MAX]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if "xyz" in printer.toolhead.homed_axes %}
        M400
        SAVE_GCODE_STATE NAME=test_min_max
        G90

        {% if printer.toolhead.position.y < client.min_y %}
            G1 Y{client.min_y} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.y > client.max_y %}
            G1 Y{client.max_y} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.x < client.min_x %}
            G1 X{client.min_x} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.x > client.max_x %}
            G1 X{client.max_x} F2000
            M400
        {% endif %}

        RESTORE_GCODE_STATE MOVE=0 NAME=test_min_max
    {% endif %}

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
gcode:
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}

    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="info" MSG="Usando KAMP"
        M400
        _KAMP_BED_MESH_CALIBRATE
        M400
    {% else %}
        RESPOND PREFIX="info" MSG="Usando BED_MESH_CALIBRATE"
        _TEST_MIN_MAX
        M400
        _BED_MESH_CALIBRATE {rawparams}
        M400
    {% endif %}

[gcode_macro _G28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        _HOME
    {% endif %}


[gcode_macro CHECK_MD5]
description: Verificación de suma MD5 del archivo
gcode:
  {% if 'FILENAME' in params %}
    {% set filename = params.FILENAME|default("")|string %}
  {% else %}
    {% set filename = printer.virtual_sdcard.file_path|default("")|string  %}
  {% endif %}

  SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

  {% if filename != "" %}

    {% if 'DELETE' in params %}
      {% set delete = params.DELETE|default("False")|string %}
    {% endif %}

    RUN_SHELL_COMMAND CMD=check_md5 PARAMS={'"%s %s"' % (filename.replace("'", "\\\'").replace(" ", "\ "), delete)}
    {% for i in range(30) %}
        ZLOAD_VARIABLE
        _CHECK_MD5
    {% endfor %}

    ZLOAD_VARIABLE
    _FINAL_CHECK_MD5 FILENAME="{filename}"

  {% endif %}

[gcode_macro _CHECK_START_PRINT]
gcode:
    {% set filename = params.FILENAME|default("")|string %}

    RUN_SHELL_COMMAND CMD=check_start_print PARAMS={'"%s %s"' % (filename.replace("'", "\\\'").replace(" ", "\ "), delete)}

[gcode_macro _CHECK_MD5]
description: Esperando que la verificación termine
gcode:
    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}

    {% if (check_md5 == 0) %}
        G4 P{1000}
    {% endif %}

[gcode_macro _FINAL_CHECK_MD5]
description: Prueba final
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set filename = params.FILENAME|default("")|string %}
    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}

    {% if (check_md5 == 0) %}
        RESPOND TYPE=error MSG="Error: Archivo '{filename}' no fue verificado a tiempo. Impresión cancelada."
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 1) %}
        RESPOND TYPE=error MSG="Error: Archivo '{filename}' no especificado. Impresión cancelada."
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 2) %}
        RESPOND TYPE="error" MSG="Error: Archivo {filename} no encontrado. Impresión cancelada."
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 3) %}
        RESPOND TYPE="error" MSG="El archivo {filename} no tiene suma MD5. Actívalo en Orca. https://github.com/ghzserg/zmod/wiki/Recomendations"
    {% endif %}
    {% if (check_md5 == 4) %}
        {% if not client.ad5x %}
            RESPOND TYPE="error" MSG="El archivo {filename} contiene comandos de arco (G2, G3). Desactívalos. En Orca: Perfil de proceso -> Aproximación de arco -> Desmarcar Reemplazar Espiral/Auto Z-Hop. En Orca: Perfil de impresora -> Extrusor 1 -> Tipo Z Hop -> Establecer Normal o Inclinado"
        {% endif %}
        RESPOND PREFIX="info" MSG="Archivo {filename} verificado exitosamente. Suma MD5 coincide."
    {% endif %}
    {% if (check_md5 == 8) %}
        {% if not client.ad5x %}
            RESPOND TYPE="error" MSG="El archivo {filename} usa comandos G17/G18/G19 no soportados. Reemplaza el tipo Z-Hop. En Orca: Perfil de impresora -> Extrusor 1 -> Tipo Z Hop -> Establecer Normal o Inclinado"
        {% endif %}
        RESPOND PREFIX="info" MSG="Archivo {filename} verificado exitosamente. Suma MD5 coincide."
    {% endif %}
    {% if (check_md5 == 5) %}
        RESPOND PREFIX="info" MSG="Archivo {filename} verificado exitosamente. Suma MD5 coincide."
    {% endif %}
    {% if (check_md5 == 6) %}
        RESPOND TYPE="error" MSG="Suma MD5 no coincide. Archivo eliminado. Impresión cancelada"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 7) %}
        RESPOND TYPE="error" MSG="Suma MD5 no coincide. Impresión cancelada"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}

[gcode_macro _FINAL_STOP_MD5]
gcode:
    {action_raise_error("Verificación MD5 fallida. Impresión cancelada.")}

[gcode_macro BED_LEVEL_SCREWS_TUNE]
description: Calibración de los tornillos de la cama
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(130)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    RESPOND PREFIX="info" MSG="Antes de las mediciones, no olvides limpiar la boquilla con la macro CLEAR_NOZZLE"

    BED_MESH_CLEAR
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed  MINIMUM={bed_temp-2} MAXIMUM={bed_temp+3}
    TEMPERATURE_WAIT SENSOR=extruder  MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+3}

    _HOME
    _GOTO_MID

    LOAD_CELL_TARE

    SCREWS_TILT_CALCULATE

[gcode_macro _GOTO_MESH]
gcode:
    #G1 Z100 F600
    #M400
    _GOTO_MID

[gcode_macro _FIX_BED_MESH_CALIBRATE]
gcode:
    {% set profile = params.PROFILE|default("default") %}

    RESPOND PREFIX="info" MSG="Antes de las mediciones, no olvides limpiar la boquilla con la macro CLEAR_NOZZLE"

    _G28
    _GOTO_MID

    LOAD_CELL_TARE
    _BED_MESH_CALIBRATE PROFILE="{profile}"

    _GOTO_MESH

[gcode_macro _FULL_BED_LEVEL]
description: Calibración de la cama sin apagar la temperatura
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set profile = params.PROFILE|default("auto") %}

    RESPOND PREFIX="info" MSG="Calibración de la cama. Perfil {profile}. Temperatura del extrusor: {extruder_temp} / Cama: {bed_temp}"

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    # Начинаем калибровку
    _BED_MESH_CALIBRATE PROFILE="{profile}"

    _UGOL_PARK

[gcode_macro AUTO_FULL_BED_LEVEL]
description: Calibración de la cama con apagado de la temperatura
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set profile = params.PROFILE|default("auto") %}

    _FULL_BED_LEVEL EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} PROFILE={profile}

    # Выклчюаем обогрев
    _STOP

[include ./KAMP/KAMP_Settings.cfg]

[gcode_macro _WAIT_TEMP]
# Убираем стабилизацию температуры, для тех у кого не настроен PID экструдера и/или PID стола
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set name = params.NAME|default("") %}

    RESPOND PREFIX="//" MSG="Esperando la normalización de la temperatura. Cama: {bed_temp-3}-{bed_temp+4}. Extrusor: {extruder_temp-2}-{extruder_temp+4} {name}"
    RESPOND PREFIX="//" MSG="Si tarda mucho tiempo, calibre el PID del extrusor y la cama {name}"

    {% if bed_temp | int != 0 %}
        M140 S{bed_temp}
    {% endif %}
    # Включаем для AD5X одновременный нагрев сопла и стола
    {% if client.ad5x %}
        {% if bed_temp | int != 0 %}
            TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-20} MAXIMUM={bed_temp+4}
        {% endif %}
        {% if extruder_temp | int != 0 %}
            M104 S{extruder_temp}
        {% endif %}
    {% endif %}
    {% if bed_temp | int != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-3} MAXIMUM={bed_temp+4}
    {% endif %}
    {% if extruder_temp | int != 0 %}
        M104 S{extruder_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+4}
    {% endif %}
    RESPOND PREFIX="//" MSG="Normalización de temperatura completada {name}"

[gcode_macro KAMP]
description: Cama adaptativa
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    M400
    _KAMP_BED_MESH_CALIBRATE
    M400

    _SMART_PARK
    M400

    _WAIT_TEMP EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} NAME=KAMP

# Калибровка PID стола
[gcode_macro PID_TUNE_BED]
description: Bed PID calibratio
gcode:
    {% set temperature = params.TEMPERATURE|default(80) %}

    _HOME
    _GOTO_MID

    M107

    PID_CALIBRATE HEATER=heater_bed TARGET={temperature}

    {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
    {% if znew_save_config == 1 %}
        NEW_SAVE_CONFIG
    {% else %}
        SAVE_CONFIG
    {% endif %}

# Калибровка PID экструдера
[gcode_macro PID_TUNE_EXTRUDER]
description: Calibración PID del extrusor
gcode:
    {% set temperature = params.TEMPERATURE|default(245) | int %}
    {% set cooler = params.COOLER|default(100) | int %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    _HOME
    _GOTO_MID

    G1 X{client.min_x+(client.max_x-client.min_x)/2} Y{client.min_y+(client.max_y-client.min_y)/2} F3000

    M106 P0 S{2.55*cooler| float}
    PID_CALIBRATE HEATER=extruder TARGET={temperature}
    {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
    {% if znew_save_config == 1 %}
        NEW_SAVE_CONFIG
    {% else %}
        SAVE_CONFIG
    {% endif %}

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  125
gcode:
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}

    {% set m600_temp = printer["gcode_macro M600"].zextruder_temp|float %}

    {% set extruder_temp = params.EXTRUDER_TEMP|default(m600_temp) | float %}
    {% set extrude_len   = params.EXTRUDE_LEN|default(load_distance) |float %}
    {% set speed = params.SPEED|default(450)|float %}

    RESPOND PREFIX="info" MSG="Cargando filamento a {extruder_temp} durante {extrude_len}mm a {speed/60} mm/s"
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-1}

    M400
    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E{extrude_len} F{speed} ; extrude with 7.5mm/s
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE MOVE=0 NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  75
gcode:
    {% set speed = params.SPEED|default(450)|int %}

    {% set extruder_temp = printer["gcode_macro M600"].zextruder_temp|float %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}

    M400
    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E-{unload_distance} F{speed} ; unload
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE MOVE=0 NAME=unload_state

[gcode_macro PURGE_FILAMENT]
variable_purge_distance:  25
gcode:
    {% set speed = params.SPEED|default(450)|int %}

    {% set extruder_temp = printer["gcode_macro M600"].zextruder_temp|float %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}

    M400
    SAVE_GCODE_STATE NAME=purge_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E{purge_distance} F{speed}   ; purge
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE MOVE=0 NAME=purge_state

[gcode_macro LOAD_MATERIAL]
description: Carga/cambio manual de filamento
variable_initial_target_temp: 0
gcode:
    # save gcode state
    M400
    SAVE_GCODE_STATE NAME=load_material_state
    # save heating state
    SET_GCODE_VARIABLE MACRO=LOAD_MATERIAL VARIABLE=initial_target_temp VALUE={printer["extruder"].target}

    _LOAD_MATERIAL_SELECT

[gcode_macro _LOAD_MATERIAL_SELECT]
gcode:
    {% if not printer["extruder"].target >= printer.configfile.settings['extruder'].min_extrude_temp %}
        RESPOND TYPE=command MSG="action:prompt_begin Selección de material"
        RESPOND TYPE=command MSG="action:prompt_text Seleccionar material para cargar"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button PLA|_LOAD_MATERIAL_HEATUP TEMP=210|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG|_LOAD_MATERIAL_HEATUP TEMP=240|primary"
        RESPOND TYPE=command MSG="action:prompt_button ABS|_LOAD_MATERIAL_HEATUP TEMP=250|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancelar|_LOAD_MATERIAL_END"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={printer["extruder"].target}
        _LOAD_MATERIAL_ACTION
    {% endif %}

[gcode_macro _LOAD_MATERIAL_HEATUP]
gcode:
    {% set extruder_temp = params.TEMP|default(200)|float %}
    M104 S{extruder_temp}
    RESPOND TYPE=command MSG=action:prompt_end
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}
    _LOAD_MATERIAL_ACTION

[gcode_macro _LOAD_MATERIAL_ACTION]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Gestión de filamento"
    RESPOND TYPE=command MSG="action:prompt_text Seleccionar acción"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Cargar|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Descargar|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Purgar|PURGE_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button OK|_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    # restore old temp
    M104 S{printer["gcode_macro LOAD_MATERIAL"].initial_target_temp}
    # restore gcode state
    RESTORE_GCODE_STATE MOVE=0 NAME=load_material_state

[gcode_macro M600]
description: Pausa y cambio de filamento
variable_zextruder_temp: 240.0
gcode:
    {% set extruder_temp = printer[printer.toolhead.extruder].target if printer.toolhead.extruder != '' else 240.0 %}
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=zextruder_temp VALUE={extruder_temp|float}

    RESPOND PREFIX="info" MSG="Temperatura de boquilla {extruder_temp}"

    PAUSE

    RESPOND TYPE=command MSG="action:prompt_begin Cambio de filamento"
    RESPOND TYPE=command MSG="action:prompt_text Se ha solicitado cambio de filamento. Carga nuevo filamento y haz clic en 'Reanudar'."
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Cargar|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Descargar|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Purgar|PURGE_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Reanudar|_INTERACTIVE_LOAD_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _INTERACTIVE_LOAD_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESUME

[gcode_macro _SHUTDOWN]
variable_trigger_allowed: False
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if trigger_allowed %}
        {% if not client.ad5x %}
            SET_PIN PIN=clear_power_off VALUE=1
            G4 P500
            SET_PIN PIN=clear_power_off VALUE=0
        {% endif %}
        RESPOND TYPE=command MSG="action:prompt_begin ¿Apagar impresora?"
        RESPOND TYPE=command MSG="action:prompt_text ¿Apagar impresora?"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button Sí|SHUTDOWN|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancelar|RESPOND TYPE=command MSG=action:prompt_end"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro SHUTDOWN]
description: Apagar impresora
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    RESPOND TYPE=command MSG="action:prompt_end"
    BED_MESH_CLEAR
    M400
    {% if not client.ad5x %}
        # Reset button state, otherwise only one trigger can occur
        SET_PIN PIN=clear_power_off VALUE=1
        # There is a deboucing circuit which needs some delay
        G4 P500
        # Disable pin again otherwise on reset the button will be triggered 1-3 times
        SET_PIN PIN=clear_power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=run_power_off
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    {% if not client.ad5x %}
        SET_PIN PIN=power_off VALUE=0
    {% endif %}
    G4 P1000
    RUN_SHELL_COMMAND CMD=poweroff

[gcode_macro REBOOT]
description: Reiniciar impresora
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    BED_MESH_CLEAR
    M400
    {% if not client.ad5x %}
        # Reset button state, otherwise only one trigger can occur
        SET_PIN PIN=clear_power_off VALUE=1
        # There is a deboucing circuit which needs some delay
        G4 P500
        # Disable pin again otherwise on reset the button will be triggered 1-3 times
        SET_PIN PIN=clear_power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=reboot

[gcode_macro REMOVE_ZMOD]
description: Eliminar zmod
gcode:
    {% set full = params.FULL|default(0)|int %}
    CLEAR_EMMC

    {% if full == 1 %}
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/FULL_REMOVE"
    {% else %}
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/REMOVE"
    {% endif %}

    RUN_SHELL_COMMAND CMD=sync
    RUN_SHELL_COMMAND CMD=reboot

[gcode_macro SKIP_ZMOD]
description: Reiniciar al sistema original (sin zmod)
gcode:
    {% set mute = params.MUTE|default(0)|int %}

    {% if mute == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Deshabilitar temporalmente ZMOD"
        RESPOND TYPE=command MSG="action:prompt_text Después de hacer clic en Aceptar, la impresora se apagará"
        RESPOND TYPE=command MSG="action:prompt_text Necesitas desconectar el cable de alimentación y luego volver a conectarlo"
        RESPOND TYPE=command MSG="action:prompt_text La impresora arrancará en el firmware nativo"
        RESPOND TYPE=command MSG="action:prompt_footer_button OK|SKIP_ZMOD MUTE=1"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/SKIP_ZMOD"
        RUN_SHELL_COMMAND CMD=sync
        RUN_SHELL_COMMAND CMD=poweroff
    {% endif %}

[gcode_macro LED_ON]
description: Habilitar retroiluminación
gcode:
    SET_LED LED=chamber_led WHITE=1

[gcode_macro LED_OFF]
description: Deshabilitar retroiluminación
gcode:
    SET_LED LED=chamber_led WHITE=0

[gcode_macro LED]
description: Habilitar retroiluminación
gcode:
    {% set S = params.S|default(50)|int %}
    SET_LED LED=chamber_led WHITE={S/100|float}

[gcode_macro DISPLAY_ON]
description: Habilitar pantalla nativa y reiniciar
gcode:
    SAVE_VARIABLE VARIABLE=display_off VALUE=0
    RUN_SHELL_COMMAND CMD=zdisplay PARAMS="on"

[gcode_macro DISPLAY_OFF]
description: Deshabilitar pantalla nativa
gcode:
    {% set guppy = params.GUPPY|default(1)|int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(1) | int %}

    SAVE_VARIABLE VARIABLE=display_off VALUE=1
    RESPOND TYPE=command MSG="action:prompt_begin Warning"
    RESPOND TYPE=command MSG="action:prompt_text No deshabilites la pantalla si no comprendes completamente el nivelado de la cama, el Z-Offset y las macros START_PRINT/END_PRINT"
    RESPOND TYPE=command MSG="action:prompt_text Use LOAD_ZOFFSET_NATIVE para copiar el Z-Offset de la pantalla nativa."
    RESPOND TYPE=command MSG="action:prompt_text Active NOZZLE_CONTROL para controlar el impacto de la boquilla en la mesa"
    RESPOND TYPE=command MSG="action:prompt_text https://github.com/ghzserg/zmod/wiki/FAQ"

    {% if guppy == 1 %}
        RESPOND PREFIX="info" MSG="Cargando GuppyScreen"
        {% if load_zoffset == 0 %}
            RESPOND PREFIX="info" MSG="Usar carga de Z-Offset desde parámetros globales para controlar Z-Offset con GuppyScreen"
            RESPOND PREFIX="info" MSG="SAVE_ZMOD_DATA LOAD_ZOFFSET=1"
        {% endif %}
        RESPOND TYPE=command MSG="action:prompt_footer_button Ok|RESPOND TYPE=command MSG=action:prompt_end|info"
        RESPOND TYPE=command MSG="action:prompt_show"

        G4 P5000
        RUN_SHELL_COMMAND CMD=zdisplay PARAMS="guppy"
        SAVE_VARIABLE VARIABLE=guppy VALUE={1|int}
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_footer_button Ok|RESPOND TYPE=command MSG=action:prompt_end|info"
        RESPOND TYPE=command MSG="action:prompt_show"

        G4 P5000
        RUN_SHELL_COMMAND CMD=zdisplay PARAMS="off"
        SAVE_VARIABLE VARIABLE=guppy VALUE={0|int}
    {% endif %}
    RESTART

[gcode_macro MEM]
description: Verificar uso de memoria
gcode:
    RUN_SHELL_COMMAND CMD=zmem

[gcode_macro PLAY_MIDI]
description: Reproducir archivo MIDI
variable_mute: 0
gcode:
    {% if mute == 0 %}
        {% set FILE = params.FILE|default("For_Elise.mid")|string %}
        RUN_SHELL_COMMAND CMD=audio_midi PARAMS="{FILE}"
    {% endif %}

[gcode_macro MUTE]
description: Silenciar sonido
gcode:
    {% set mute = params.MUTE|default(1)|int %}
    SET_GCODE_VARIABLE MACRO=PLAY_MIDI VARIABLE=mute VALUE={mute}

[gcode_macro CAMERA_ON]
description: Usar cámara alternativa
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% if not client.ad5x %}
        {% set WIDTH  = params.WIDTH|default(640)|int %}
        {% set HEIGHT = params.HEIGHT|default(480)|int %}
    {% else %}
        {% set WIDTH  = params.WIDTH|default(1280)|int %}
        {% set HEIGHT = params.HEIGHT|default(720)|int %}
    {% endif %}
    {% set FPS    = params.FPS|default(20)|int %}
    {% set VIDEO  = params.VIDEO|default(client.video)|string %}
    {% set FS     = params.FS|default(0)|int %}
    {% set STREAMER = params.STREAMER|default("auto")|string %}
    {% set FORMAT = params.FORMAT|default("MJPEG")|string %}

    RESPOND PREFIX="info" MSG="No olvides apagar la cámara en la pantalla nativa de tu impresora."

    RUN_SHELL_COMMAND CMD=zcamera PARAMS="on {WIDTH} {HEIGHT} {FPS} {VIDEO} {FS} {STREAMER} {FORMAT} RESTART"
    RUN_SHELL_COMMAND CMD=cat PARAMS="/opt/config/mod_data/log/cam/cam.log"

[gcode_macro CAMERA_OFF]
description: Deshabilitar cámara alternativa
gcode:
    RESPOND PREFIX="info" MSG="Habilitar cámara en la pantalla de la impresora"

    RUN_SHELL_COMMAND CMD=zcamera PARAMS="off"

[gcode_macro CAMERA_RESTART]
description: Reiniciar cámara alternativa
gcode:
    RUN_SHELL_COMMAND CMD="s99camera" PARAMS="restart"

[gcode_macro DATE_GET]
description: Verificar hora
gcode:
    RUN_SHELL_COMMAND CMD=date

[gcode_macro DATE_SET]
description: Establecer fecha y hora (formato: 2024.01.01-00:00:00)
gcode:
    {% set dt = params.DT|default("2024.01.01-00:00:00")|string %}
    RUN_SHELL_COMMAND CMD=zremote PARAMS="/bin/date {dt}"

[gcode_macro WEB]
description: Cambiar interfaz web (fluidd/mainsail)
gcode:
    {% set mute = params.MUTE|default(0)|int %}

    {% if mute == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin Después de ejecutar la macro, presiona Ctrl + F5"
        RESPOND TYPE=command MSG="action:prompt_text Después de ejecutar la macro, presiona Ctrl + F5"
        RESPOND TYPE=command MSG="action:prompt_footer_button OK|WEB MUTE=1"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RUN_SHELL_COMMAND CMD=zhttp
    {% endif %}

[gcode_macro _STOP_FAN]
gcode:
    M106 S0                 ; Отключить кулер
    M107                    ; Отключить кулер экструдера
    SET_FAN_SPEED FAN=chamber_fan SPEED=0

[gcode_macro _STOP]
description: Deshabilitar calentamiento y enfriador
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    M400
    M220 S100               ; Скорость 100%
    M221 S100               ; Экструзия 100%
    M140 S0                 ; Отключить нагрев стола
    M104 S0                 ; Отключить нагрев экструдера
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    {% if zmidi_end != "" %}
        PLAY_MIDI FILE={zmidi_end}
    {% endif %}
    EXCLUDE_OBJECT_DEFINE RESET=1
    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    RUN_SHELL_COMMAND CMD=znice

    {% if printer.bed_mesh.profile_name == "default" %}
        BED_MESH_CLEAR
        BED_MESH_PROFILE REMOVE=default
    {% endif %}

    ZCONTROL_OFF

    {% if client.ad5x %}
        {% if screen == False %}
            IFS_F18
            SET_GCODE_VARIABLE MACRO=END_CHANGE_FILAMENT VARIABLE=last_data VALUE="{{'restore_position': 0, 'restore_temp': 0, 'temp': 0, 'fan_speed': 0, 'channel': 99}}"
        {% endif %}
        SDCARD_ENABLE_FFM ENABLE=0
    {% endif %}

    _STOP_FAN
    _RESET_SPEED

    UPDATE_DELAYED_GCODE ID=_ZUPDATE DURATION=20

    RESPOND PREFIX="info" MSG="Trabajo completado"

[gcode_macro CHECK_SYSTEM]
description: Verificación del sistema operativo
gcode:
    {% set restore = params.RESTORE|default(0)|int %}

    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}

    {% if client.ad5x %}
        {% if restore == 1 %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="restore 0"
        {% else %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="not_restore 0"
        {% endif %}
    {% else %}
        {% if restore == 1 %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="restore {zklipper13}"
        {% else %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="not_restore {zklipper13}"
        {% endif %}
    {% endif %}

[gcode_macro SET_TIMEZONE]
description: Cambio de zona horaria
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% set ZONE  = params.ZONE|default("Europe/Moscow")|string %}
    RESPOND PREFIX="info" MSG="Europe/"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/share/zoneinfo/Europe"
    {% else %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/data/.mod/.zmod/usr/share/zoneinfo/Europe"
    {% endif %}
    RESPOND PREFIX="info" MSG="Asia/"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/share/zoneinfo/Asia"
    {% else %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/data/.mod/.zmod/usr/share/zoneinfo/Asia"
    {% endif %}
    RESPOND PREFIX="info" MSG="Use SET_TIMEZONE ZONE=Asia/Yekaterinburg"
    RUN_SHELL_COMMAND CMD=rm PARAMS="/etc/localtime"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/share/zoneinfo/{ZONE} /etc/localtime"
    {% else %}
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/data/.mod/.zmod/usr/share/zoneinfo/{ZONE} /etc/localtime"
        RUN_SHELL_COMMAND CMD=rm PARAMS="/usr/data/.mod/.zmod/etc/localtime"
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/share/zoneinfo/{ZONE} /usr/data/.mod/.zmod/etc/localtime"
    {% endif %}
    RUN_SHELL_COMMAND CMD=date

[gcode_macro STOP_ZMOD]
description: Detener fluidd/mainsail y moonraker
gcode:
    RUN_SHELL_COMMAND CMD=stop_zmod PARAMS="stop"

[gcode_macro START_ZMOD]
description: Iniciar fluidd/mainsail y moonraker después de STOP_ZMOD
gcode:
    RUN_SHELL_COMMAND CMD=stop_zmod PARAMS="up"

[gcode_macro TEST_EMMC]
description: Probar EMMC
gcode:
    {% set size    = params.SIZE|default(400)|int %}
    {% set sync    = params.SYNC|default(1)|int %}
    {% set flash   = params.FLASH|default(0)|int %}
    {% set random  = params.RANDOM|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zfs PARAMS="{size} {sync} {flash} {random}"

[gcode_macro CLEAR_EMMC]
description: Limpiar EMMC
gcode:
    {% set log    = params.LOG|default(1)|int %}
    {% set any    = params.ANY|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zclear PARAMS="{log} {any}"

[gcode_macro ZSSH_ON]
description: Redirigir moonraker y cámara al servidor SSH
gcode:
    {% set ssh_server  = params.SSH_SERVER|default("127.0.0.1")|string %}
    {% set ssh_port    = params.SSH_PORT|default(22)|int %}
    {% set ssh_user    = params.SSH_USER|default("user")|string %}
    {% set video_port  = params.VIDEO_PORT|default(8080)|int %}
    {% set moon_port   = params.MOON_PORT|default(7125)|int %}
    {% set remote_run  = params.REMOTE_RUN|default("NONE")|string %}
    RUN_SHELL_COMMAND CMD=zssh PARAMS="START {ssh_server} {ssh_port} {ssh_user} {video_port} {moon_port} '{remote_run}' RESTART"

[gcode_macro ZLINK]
description: ZLINK.info
gcode:
    {% set p  = params.P|default("bad")|string %}
    {% set u  = params.U|default("bad")|string %}

    {% set m  = params.M|default(0)|int %}
    {% set c  = params.C|default(0)|int %}

    {% if p == "" or u == "" or m == 0 or c ==0 %}
        RESPOND TYPE="echo" MSG="Datos ZLINK incorrectos. Registre su impresora en http://zlink.info y reciba una cadena ZLINK."
        RUN_SHELL_COMMAND CMD=zlink PARAMS="get"
    {% else %}
        RUN_SHELL_COMMAND CMD=zlink PARAMS="enable {p} {u} {m} {c}"
    {% endif %}

[gcode_macro ZLINK_OFF]
gcode:
    RESPOND TYPE="echo" MSG="ZLINK.info off"
    RUN_SHELL_COMMAND CMD=zlink PARAMS="disable"

[gcode_macro ZSSH_OFF]
description: Deshabilitar reenvío de puerto SSH
gcode:
    RUN_SHELL_COMMAND CMD=zssh PARAMS="STOP 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro ZSSH_RESTART]
description: Reinicio SSH
gcode:
    RUN_SHELL_COMMAND CMD=zssh PARAMS="RESTART 127.0.0.1 22 user 8080 7125 NONE RESTART"
    _CHECK_VERSION

[gcode_macro ZSSH_RELOAD]
description: Iniciar SSH si no está en ejecución
gcode:
    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if screen == True %}
        RESPOND PREFIX="info" MSG="Estás usando la pantalla nativa"
    {% else %}
        RESPOND PREFIX="info" MSG="No estás usando la pantalla nativa"
    {% endif %}

    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if zklipper13 == 1 %}
        RESPOND PREFIX="//" MSG="Usando Klipper 13"
    {% else %}
        {% if not client.ad5x %}
            RESPOND PREFIX="//" MSG="Usando Klipper nativo 11"
        {% else %}
            RESPOND PREFIX="//" MSG="Usando Klipper nativo 12"
        {% endif %}
    {% endif %}
    _CHECK_VERSION

    RUN_SHELL_COMMAND CMD=zssh PARAMS="RELOAD 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro _MESH_TEST]
description: Comparar extremos de la cuadrícula con la última sonda
gcode:
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set mesh = printer.bed_mesh.profiles[profile_name] %}

    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer

    {% if mesh %}
        _MESH_PROBE
        _MESH_COMPARE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
    {% else %}
        {action_respond_info("ADVERTENCIA: ¡Malla de cama no cargada!")}
    {% endif %}

[gcode_macro _MESH_PROBE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set kamp_settings = printer["gcode_macro _KAMP_Settings"] %}                                                                 # Pull variables from _KAMP_Settings
    {% set mesh_margin = kamp_settings.mesh_margin | float %}                                                                       # Pull mesh margin setting from _KAMP_Settings
    {% set fuzz_amount = kamp_settings.fuzz_amount | float %}                                                                       # Pull fuzz amount setting from _KAMP_Settings
    {% set fuzz_range = range((0) | int, (fuzz_amount * 100) | int + 1) %}                                                          # Set fuzz_range between 0 and fuzz_amount
    {% set adapted_x_min = mesh_margin + (fuzz_range | random / 100.0) %}                                                           # Adapt x_min to margin and fuzz constraints

    _G28
    _TEST_MIN_MAX

    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = G10 | string %}
        {% set UNRETRACT = G11 | string %}
    {% else %}
        {% set RETRACT = 'G1 E-.5 F2100' | string %}
        {% set UNRETRACT = 'G1 E.5 F2100' | string %}
    {% endif %}

    G92 E0
    G90
    _CLIENT_LINEAR_MOVE X=-{adapted_x_min}

    G1 Z5 F6000

    {RETRACT}

    LOAD_CELL_TARE
    PROBE

    G1 Z5 F6000

    {UNRETRACT}

[gcode_macro _MESH_COMPARE]
gcode:
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set z_offset_klipper = printer.configfile.settings.probe.z_offset|default(0.0)|float %}
    {% set mesh = printer.bed_mesh %}
    {% set last_probe = printer.probe.last_z_result - z_offset_klipper %}
    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}

    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer

    {% if mesh and 'mesh_matrix' in mesh and profile_name %}
        {% set all_z = mesh.mesh_matrix | sum(start=[]) %}
        {% set min_z = all_z | min %}
        {% set max_z = all_z | max %}

        {action_respond_info("Current profile: %s" % profile_name)}
        {action_respond_info("Mínimo mapa: %.3f mm | Delta: %.3f mm" % (min_z, max_z - min_z))}
        {action_respond_info("Máximo mapa: %.3f mm | Última sonda: %.3f mm" % (max_z, last_probe))}

        {% if last_probe < min_z - 0.21 %}
            {action_respond_info("Posible perfil incorrecto cargado (placa/temperatura diferente)")}
            {action_respond_info("Deshabilitar verificación: MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
            {% if mesh_test == 2 %}
                {action_respond_info("ADVERTENCIA: ¡Última sonda POR DEBAJO del mínimo de la malla por %.3f mm! => KAMP" % (min_z - last_probe))}
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% else %}
                {action_raise_error("ADVERTENCIA: ¡Última sonda POR DEBAJO del mínimo de la malla por %.3f mm! Use SAVE_ZMOD_DATA MESH_TEST=2 para lanzar automáticamente KAMP si se produce un error" % (min_z - last_probe))}
            {% endif %}
        {% elif last_probe > max_z + 0.21 %}
            {action_respond_info("Posible perfil incorrecto cargado (placa/temperatura diferente)")}
            {action_respond_info("Deshabilitar verificación: MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
            {% if mesh_test == 2 %}
                {action_respond_info("ADVERTENCIA: ¡Última sonda POR ENCIMA del máximo de la malla por %.3f mm! => KAMP" % (last_probe - max_z))}
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% else %}
                {action_raise_error("ADVERTENCIA: ¡Última sonda POR ENCIMA del máximo de la malla por %.3f mm! Use SAVE_ZMOD_DATA MESH_TEST=2 para lanzar automáticamente KAMP si se produce un error" % (last_probe - max_z))}
            {% endif %}
        {% else %}
            {action_respond_info("OK: Sonda dentro de los extremos de la malla")}
        {% endif %}

    {% else %}
        {action_respond_info("Perfil o matriz de malla no encontrados")}
    {% endif %}

[gcode_macro _START_MESH]
gcode:
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}

    {% if skip_leveling == False %}
        {% if force_kamp == True %}
            RESPOND PREFIX="//" MSG="KAMP iniciado SKIP_LEVELING={skip_leveling} FORCE_KAMP={force_kamp}"

            {% set screen = printer["gcode_macro _SCREEN"].screen %}
            {% if screen == True %}
                RESPOND PREFIX="info" MSG="¿Sabías que puedes habilitar KAMP globalmente?"
                RESPOND PREFIX="//" MSG="SAVE_ZMOD_DATA USE_KAMP=1 CLEAR=LINE_PURGE"
            {% endif %}
            M400
            KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            M400

        {% else %}
            {% if (not printer['bed_mesh'].profile_name) or force_leveling == True %}
                {% if mesh != "" %}
                    RESPOND PREFIX="!!" MSG="Creando malla {mesh} (no encontrada). ¡Guárdala DESPUÉS de imprimir!"
                    _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE={mesh}
                {% else %}
                    {% if force_leveling == True %}
                        RESPOND PREFIX="info" MSG="Creando malla predeterminada (FORCE_LEVELING={force_leveling})"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=default
                    {% else %}
                        RESPOND PREFIX="info" MSG="Creando malla automática (ningún perfil cargado)"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=auto
                    {% endif %}
                {% endif %}
            {% else %}
                {% set cur_mesh = printer['bed_mesh'].profile_name %}
                RESPOND PREFIX="//" MSG="No es necesario nivelar. Perfil cargado: {cur_mesh}"
            {% endif %}
        {% endif %}

    {% else %}
        RESPOND PREFIX="//" MSG="Omitiendo nivelado de cama. SKIP_LEVELING={skip_leveling}"
    {% endif %}

[gcode_macro _PRINT_MESH]
gcode:
    {% set cur_mesh = printer['bed_mesh'].profile_name %}

    RESPOND PREFIX="info" MSG="Imprimiendo con malla de cama: {cur_mesh}"

[gcode_macro _PREPARE_PRINT]
gcode:
    UPDATE_DELAYED_GCODE ID=_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_FAST_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_STOP_MOTOR DURATION=0
    UPDATE_DELAYED_GCODE ID=_AUTO_REBOOT DURATION=0
    UPDATE_DELAYED_GCODE ID=_PRO_POWEROFF DURATION=0
    UPDATE_DELAYED_GCODE ID=_GOTO_PAUSE DURATION=0
    UPDATE_DELAYED_GCODE ID=_ZUPDATE DURATION=0

    LOAD_CELL_TARE

    SET_GCODE_VARIABLE MACRO=_NOTIFY_ON_PERCENT VARIABLE=notified_percent VALUE=0

[gcode_macro _START_PRINT]
description: Reemplazar G-code de inicio predeterminado
variable_zextruder_temp: 245.0
variable_zbed_temp: 80.0
variable_zforce_kamp: False
variable_zforce_leveling: False
variable_zskip_leveling: False
variable_zzoffset: 99.0
variable_zmesh: ""
gcode:
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}              ; if True it forces the KAMP bed level process
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}      ; if True it forces the bed level process
    {% set zoffset = printer["gcode_macro _START_PRINT"].zzoffset %}                    ; Установить Z offset
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}        ; Не строить карту
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}                          ; Имя профиля карты стола

    {% set filename = printer.virtual_sdcard.file_path|default("")|string  %}

    {% set force_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% set disable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% set disable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(1) | int %}
    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE")|string %}
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}

    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    _PREPARE_PRINT

    CLEAR_PAUSE
    ZCONTROL_AUTO
    ZCONTROL_ON
    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    ZSSH_RELOAD

    RESPOND PREFIX="info" MSG="START_PRINT BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} FORCE_LEVELING={force_leveling} FORCE_KAMP={force_kamp} Z_OFFSET={zoffset} SKIP_LEVELING={skip_leveling} MESH={mesh}"

    RESPOND PREFIX="info" MSG="Temperatura del extrusor: {extruder_temp}"
    RESPOND PREFIX="info" MSG="Temperatura de la cama: {bed_temp}"

    {% if zprint_leveling == 0 %}
        {% if force_kamp == True %}
            RESPOND PREFIX="info" MSG="KAMP: habilitado"
        {% else %}
            RESPOND PREFIX="info" MSG="KAMP: deshabilitado"
        {% endif %}

        {% if force_leveling == True %}
            RESPOND PREFIX="info" MSG="Nivelado forzado de la cama: habilitado"
        {% else %}
            RESPOND PREFIX="info" MSG="Nivelado forzado de la cama: deshabilitado"
        {% endif %}

        {% if skip_leveling == True %}
            RESPOND PREFIX="info" MSG="Omitir nivelado de cama: habilitado"
        {% else %}
            RESPOND PREFIX="info" MSG="Omitir nivelado de cama: deshabilitado"
        {% endif %}

        RESPOND PREFIX="info" MSG="Cargar malla de cama: {mesh}"
    {% endif %}

    {% if screen == False %}
        {% if force_md5 == 1 %}
            RESPOND PREFIX="info" MSG="MD5: habilitado"
        {% else %}
            RESPOND PREFIX="info" MSG="MD5: deshabilitado"
        {% endif %}
    {% endif %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="Purga de boquilla: deshabilitada"
    {% else %}
        RESPOND PREFIX="info" MSG="Purga de boquilla: habilitada"
        RESPOND PREFIX="info" MSG="Algoritmo de purga: {zclear}"
    {% endif %}

    {% if disable_skew == 1 %}
        RESPOND PREFIX="info" MSG="SKEW: deshabilitado"
    {% else %}
        RESPOND PREFIX="info" MSG="SKEW: habilitado"
    {% endif %}

    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}
    {% if ( force_md5 == 1 and check_md5 == 0 ) %}
        RESPOND PREFIX="info" MSG="Verificación MD5 iniciada"
        CHECK_MD5 DELETE=True
    {% endif %}

    M140 S{bed_temp}        ; start bed heating
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    _G28

    {% if not client.ad5x %}
        {% set we = printer['temperature_sensor weightValue'].temperature %}
        {% if we != 0 %}
            LOAD_CELL_TARE
        {% endif %}
    {% endif %}

    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Creando malla de cama con la pantalla nativa en cada impresión. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% else %}
            RESPOND PREFIX="//" MSG="Creando malla de cama en cada impresión. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
            BED_MESH_CLEAR
            M400
            {% if zuse_kamp == 1 %}
                RESPOND PREFIX="info" MSG="Usando KAMP desde configuraciones globales. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
                M400
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
                M400
            {% else %}
                RESPOND PREFIX="info" MSG="Creando malla completa de la cama. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
                M400
                _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
                M400
            {% endif %}
        {% endif %}

        RESPOND PREFIX="//" MSG="Todos los parámetros START_PRINT para el nivelado de la cama son ignorados"
    {% else %}
        {% if mesh != "" %}
            RESPOND PREFIX="info" MSG="Intentando cargar malla de cama: {mesh}"
            BED_MESH_CLEAR
            M400
            {% for mesh_dt in printer['bed_mesh'].profiles %}
                {% if mesh == mesh_dt %}
                    BED_MESH_PROFILE LOAD={mesh}
                    RESPOND PREFIX="info" MSG="Malla de cama {mesh} cargada"
                {% endif %}
            {% endfor %}
        {% endif %}

        _START_MESH
    {% endif %}

    # load skew profile
    {% if disable_skew == 0 %}
        RESPOND PREFIX="info" MSG="Cargando skew_profile"
        SKEW_PROFILE LOAD=skew_profile
    {% endif %}

    G90                     ; use absolute coordinates
    {% if (zprint_leveling == 0 and force_kamp == True) or (zprint_leveling == 1 and screen == False and zuse_kamp == 1) or (zclear == "LINE_PURGE" and client.ad5x == 0 ) %}
        _SMART_PARK
    {% else %}
        _UGOL_PARK
    {% endif %}

    #M190 S{bed_temp}
    #M109 S{extruder_temp}

    _WAIT_TEMP EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} NAME=START_PRINT

    {% if client.ad5x %}
        {% if not ( (zprint_leveling == 0 and force_kamp == True ) or ( zprint_leveling == 1 and screen == False and zuse_kamp == 1 ) ) %}
            _PRINT_CLEAR_NOZZLE
        {% endif %}
        M400
        _SMART_PARK
    {% endif %}

    {% if (load_zoffset == 1) and (screen == False) %}
        RESPOND PREFIX="info" MSG="Usando control global Z-Offset. Se ignora el parámetro Z_OFFSET"
        LOAD_GCODE_OFFSET
    {% else %}
        {% if (load_zoffset == 1) and (screen == True) %}
            RESPOND PREFIX="info" MSG="Carga global de Z-Offset: ignorada (trabajando con pantalla)"
        {% endif %}

        {% if zoffset == 99.0 %}
            RESPOND PREFIX="info" MSG="Configuración de Z-Offset omitida"
        {% else %}
            RESPOND PREFIX="info" MSG="Configurando Z-Offset {zoffset}"
            SET_GCODE_OFFSET Z={zoffset} FROM=START_PRINT
        {% endif %}
    {% endif %}

    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
    {% if mesh_test == 0 or force_kamp == True or zprint_leveling == 1 or force_leveling == True %}
        _PRINT_MESH
    {% else %}
        _MESH_TEST EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
    {% endif %}

    {% if printer.toolhead.position.z < 5 %}
        G1 Z5 F3000
    {% endif %}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}

    {% if zmidi_start != "" %}
        PLAY_MIDI FILE={zmidi_start}
    {% endif %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="Purga de línea de boquilla deshabilitada. DISABLE_PRIMING={disable_priming}"
    {% else %}
        RESPOND PREFIX="info" MSG="Purga de línea de boquilla. Algoritmo: {zclear}"

        {% set macro_name = zclear | lower %}
        {% set macro_key = "gcode_macro " + macro_name %}
        {% set macro_settings = printer.configfile.settings.get(macro_key) %}
        {% if macro_settings is none %}
            RESPOND TYPE=error MSG="{macro_name|upper} - este macro de limpieza NO existe. Se utiliza LINE_PURGE. Agregue la macro {macro_name|upper} a mod_data/user.cfg o desactive el uso de la línea de limpieza // SAVE_ZMOD_DATA DISABLE_PRIMING=1"
            RESPOND TYPE=echo MSG="Macros disponibles:"
            RESPOND TYPE=echo MSG="LINE_PURGE // SAVE_ZMOD_DATA CLEAR=LINE_PURGE"
            RESPOND TYPE=echo MSG="_CLEAR1 // SAVE_ZMOD_DATA CLEAR=_CLEAR1"
            RESPOND TYPE=echo MSG="_CLEAR2 // SAVE_ZMOD_DATA CLEAR=_CLEAR2"
            RESPOND TYPE=echo MSG="_CLEAR3 // SAVE_ZMOD_DATA CLEAR=_CLEAR3"
            RESPOND TYPE=echo MSG="_CLEAR4 // SAVE_ZMOD_DATA CLEAR=_CLEAR4"
            {% set zzclear = "LINE_PURGE" %}
        {% else %}
            {% set zzclear = zclear | upper %}
        {% endif %}

        {% if ( (force_kamp == True) or (zuse_kamp == 1) ) and (zzclear == "_CLEAR1" or zzclear == "_CLEAR2" or zzclear == "_CLEAR3" or zzclear == "_CLEAR4") %}
            RESPOND PREFIX="info" MSG="Estás usando KAMP. Se recomienda usar LINE_PURGE: // SAVE_ZMOD_DATA CLEAR=LINE_PURGE"
            RESPOND PREFIX="info" MSG="LINE_PURGE forzado"
            M400
            LINE_PURGE
            M400
        {% else %}
            _TEST_MIN_MAX
            M400
            SAVE_GCODE_STATE NAME=clear_state
            M400
            RESPOND PREFIX="info" MSG="{zzclear}"
            {zzclear}
            M400
            RESTORE_GCODE_STATE MOVE=0 NAME=clear_state
        {% endif %}
    {% endif %}
    EXCLUDE_OBJECT_DEFINE RESET=1
    ZEXCLUDE
    RESPOND TYPE=echo MSG="START_PRINT ha terminado su trabajo."

[gcode_macro UPDATE_MCU]
description: Actualizar MCU
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set current_klipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% set force = params.FORCE|default(0)|int %}

    RESPOND TYPE=error MSG="Espera la música y apaga la impresora. Espera 10 segundos y vuelve a encender. Comenzará la actualización del MCU."

    {% if (current_klipper13 == 1 and force == 0) or (force == 11) or (force == 12) %}
        RESPOND PREFIX="info" MSG="Flasheando MCU con versión original para Klipper nativo"
        #SAVE_VARIABLE VARIABLE=klipper13 VALUE={0|int}
        G4 P5000
        M400
        RUN_SHELL_COMMAND CMD=zmcu PARAMS="0"
    {% else %}
        {% if (current_klipper13 == 0 and force == 0) or (force == 13) %}
            RESPOND PREFIX="info" MSG="Flash MCU Klipper 13"
            #SAVE_VARIABLE VARIABLE=klipper13 VALUE={1|int}
            G4 P5000
            M400
            RUN_SHELL_COMMAND CMD=zmcu PARAMS="1"
        {% endif %}
    {% endif %}

[gcode_macro NEW_SAVE_CONFIG]
description: Guardar parámetros sin congelar pantalla nativa
gcode:
    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if screen == False or client.ad5x %}
        SAVE_CONFIG
    {% else %}
        RESPOND PREFIX="info" MSG="NEW_SAVE_CONFIG"
        RUN_SHELL_COMMAND CMD=restart_klipper
    {% endif %}

[gcode_macro CLOSE_DIALOGS]
description: Cerrar diálogos en la pantalla nativa (lento)
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        RESPOND PREFIX="info" MSG="Cerrando ventanas de diálogo en la pantalla nativa (lento)"
        RUN_SHELL_COMMAND CMD=close_dialogs
        RESPOND PREFIX="info" MSG="¿Fallo al cerrar ventanas? Usa cierre rápido: FAST_CLOSE_DIALOGS // SAVE_ZMOD_DATA CLOSE_DIALOGS=2"
    {% else %}
        FAST_CLOSE_DIALOGS
    {% endif %}

[gcode_macro FAST_CLOSE_DIALOGS]
description: Cerrar diálogos en la pantalla nativa (rápido)
gcode:
    RESPOND PREFIX="info" MSG="Cerrando ventanas de diálogo en la pantalla nativa (rápido)"
    RUN_SHELL_COMMAND CMD=zprint PARAMS="CLOSE CLOSE"

[delayed_gcode _STOP_MOTOR]
gcode:
    RESPOND PREFIX="info" MSG="Motores desactivados"
    M84                     ; Выключить мотор

[delayed_gcode _ZUPDATE]
gcode:
    RUN_SHELL_COMMAND CMD=zupdate

[delayed_gcode _GOTO_PAUSE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        G90
        RESPOND PREFIX="info" MSG="Moviendo cabezal a la esquina derecha lejana"
        G1 X{client.custom_park_x} F7800
        M400
        G1 Y{client.custom_park_y} F7800
        M400
    {% else %}
        _GOTO_TRASH
    {% endif %}

[delayed_gcode _CLOSE_DIALOGS]
gcode:
    CLOSE_DIALOGS

[delayed_gcode _FAST_CLOSE_DIALOGS]
gcode:
    FAST_CLOSE_DIALOGS

[delayed_gcode _AUTO_REBOOT]
gcode:
    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% if (zauto_reboot == 2) and (screen == False) %}
        FIRMWARE_RESTART
    {% else %}
        REBOOT
    {% endif %}

[delayed_gcode _PRO_POWEROFF]
gcode:
    SHUTDOWN

[delayed_gcode restart_services]
initial_duration: 180
gcode:
    ZSSH_RELOAD

[delayed_gcode start_led]
initial_duration: 10
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% set save_filament_sensors = printer.save_variables.variables.save_filament_sensors|default(0) | int %}
    {% set e0_sensor_status = printer.save_variables.variables.e0_sensor|default(1) | int %}
    {% set head_switch_sensor_status = printer.save_variables.variables.head_switch_sensor|default(1) | int %}
    {% set ifs_motion_sensor_status = printer.save_variables.variables.ifs_motion_sensor|default(1) | int %}

    {% if client.ad5x %}
        UPDATE_FF_OFFSET
    {% endif %}


    RUN_SHELL_COMMAND CMD=zshaper_new PARAMS="SCV {printer.configfile.settings.printer.square_corner_velocity}"

    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    SET_GCODE_VARIABLE MACRO=_SHUTDOWN VARIABLE=trigger_allowed VALUE=True
    SET_GCODE_VARIABLE MACRO=SET_LED VARIABLE=allowed VALUE=True

    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    {% set zcontrol_z = printer.save_variables.variables.zcontrol_z|default(10) | int %}
    ZCONTROL_Z Z={zcontrol_z}

    CAMERA_RESTART

    GET_ZMOD_DATA

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    {% if zmidi_on != "" %}
        PLAY_MIDI FILE={zmidi_on}
    {% endif %}

    RUN_SHELL_COMMAND CMD=zlink PARAMS="start"
    _LANG SKIP=0
    _GLOBAL START=1
    LOAD_ZOFFSET_NATIVE START=1

    {% if save_filament_sensors == 1 %}
        {% if client.ad5x %}
            {% if screen == False %}
                RESPOND PREFIX="info" MSG="head_switch_sensor: {head_switch_sensor_status}"
                _SET_FILAMENT_SENSOR SENSOR=head_switch_sensor ENABLE={head_switch_sensor_status}
                RESPOND PREFIX="info" MSG="ifs_motion_sensor: {ifs_motion_sensor_status}"
                _SET_FILAMENT_SENSOR SENSOR=ifs_motion_sensor ENABLE={ifs_motion_sensor_status}
            {% endif %}
        {% else %}
            RESPOND PREFIX="info" MSG="e0_sensor: {e0_sensor_status}"
            _SET_FILAMENT_SENSOR SENSOR=e0_sensor ENABLE={e0_sensor_status}
        {% endif %}
    {% endif %}

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    LED S={zled}
    _NOTIFY MSG="Impresora encendida" TYPE=on

[gcode_macro _COLDPULL_LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro _GOTO_MID]
gcode:

[gcode_macro _COLDPULL_LOAD_MATERIAL]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    RESPOND TYPE=command MSG=action:prompt_end

    _G28
    _GOTO_MID

    G90
    G1 X{client.min_x+(client.max_x-client.min_x)/2} F7800
    M400
    G1 Y{client.min_y+(client.max_y-client.min_y)/2} F7800
    M400

    {% set extruder_temp = params.TEMP|default(245)|float %}
    RESPOND PREFIX="info" MSG="Esperando que la boquilla se caliente hasta {extruder_temp}"
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp} MAXIMUM={extruder_temp+10}

    RESPOND PREFIX="info" MSG="Extruyendo 10 cm de filamento"

    G92 E0
    _DISABLE_SENSOR
        G1 E100 F100
        M400
    _ENABLE_SENSOR

    {% set cold_temp = params.COLD|default(245)|float %}
    RESPOND PREFIX="info" MSG="Enfriando hasta {cold_temp}°C"
    M104 S{cold_temp}
    M106 P0 S255
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={cold_temp-2} MAXIMUM={cold_temp+2}

    RESPOND PREFIX="info" MSG="Tirando del filamento"

    G92 E0
    _DISABLE_SENSOR
        G1 E-70 F1500
        M400
    _ENABLE_SENSOR

    RESPOND PREFIX="info" MSG="Retirar el filamento restante manualmente"
    M107
    M104 S0
    G92 E0

[gcode_macro COLDPULL]
description: Limpieza suave de la boquilla (cold pull)
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Selección de material para carga"
    RESPOND TYPE=command MSG="action:prompt_text Seleccionar material para limpiar la boquilla"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button PETG|_COLDPULL_LOAD_MATERIAL TEMP=245 COLD=100|primary"
    RESPOND TYPE=command MSG="action:prompt_button ABS|_COLDPULL_LOAD_MATERIAL TEMP=255 COLD=105|primary"
    RESPOND TYPE=command MSG="action:prompt_button NEYLON|_COLDPULL_LOAD_MATERIAL TEMP=260 COLD=120|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancelar|_COLDPULL_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro SAVE_ZMOD_DATA]
description: Guardar parámetros ZMOD
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set i = params.I|default(0)|int %}

    {% if params.CLOSE_DIALOGS %}
        {% set zclose_dialogs = params.CLOSE_DIALOGS|default(2)|int %}
        {% if client.ad5x and zclose_dialogs == 1 %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% else %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
        {% endif %}
    {% endif %}

    {% if params.STOP_MOTOR %}
        {% set zstop_motor = params.STOP_MOTOR|default(1)|int %}
        SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.USE_SWAP %}
        {% set zuse_swap = params.USE_SWAP|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}
    {% endif %}

    {% if params.AUTO_REBOOT %}
        {% set zauto_reboot = params.AUTO_REBOOT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}
    {% endif %}

    {% if params.SAVE_RESTORE %}
        {% set save_restore = params.SAVE_RESTORE|default(1)|int %}
        SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}
    {% endif %}

    {% if params.FIX_SCV %}
        {% set fix_scv = params.FIX_SCV|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}
    {% endif %}

    {% if params.WIFI %}
        {% set wifi = params.WIFI|default(1)|int %}
        SAVE_VARIABLE VARIABLE=wifi VALUE={wifi|int}
    {% endif %}

    {% if client.ad5x %}
    {% if params.SILENT %}
        {% set silent = params.SILENT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=silent VALUE={silent|int}
    {% endif %}
    {% if params.AUTOINSERT %}
        {% set autoinsert = params.AUTOINSERT|default(1)|int %}
        SAVE_VARIABLE VARIABLE=autoinsert VALUE={autoinsert|int}
    {% endif %}
    {% if params.USE_TRASH_ON_PRINT %}
        {% set use_trash_on_print = params.USE_TRASH_ON_PRINT|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE={use_trash_on_print|int}
    {% endif %}
    {% if params.REMOVE_FILAMENT %}
        {% set remove_filament = params.REMOVE_FILAMENT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=remove_filament VALUE={remove_filament|int}
    {% endif %}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.MOTION_SENSOR %}
        {% set motion_sensor = params.MOTION_SENSOR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}
    {% endif %}

    {% if params.FIX_E0011 %}
        {% set fix_e0011 = params.FIX_E0011|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    {% endif %}

    {% if params.FIX_E0017 %}
        {% set fix_e0017 = params.FIX_E0017|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    {% endif %}

    {% if params.PRINT_LEVELING %}
        {% set zprint_leveling = params.PRINT_LEVELING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}
    {% endif %}

    {% if params.USE_KAMP %}
        {% set zuse_kamp = params.USE_KAMP|default(0)|int %}
        SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}
    {% endif %}

    {% if params.MESH_TEST %}
        {% set zmesh_test = params.MESH_TEST|default(1)|int %}
        SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.NEW_SAVE_CONFIG %}
        {% set znew_save_config = params.NEW_SAVE_CONFIG|default(0)|int %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% endif %}

    {% if params.PRECLEAR %}
        {% set zpreclear = params.PRECLEAR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% endif %}
    {% endif %}

    {% if params.FORCE_MD5 %}
        {% set zforce_md5 = params.FORCE_MD5|default(1)|int %}
        SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}
    {% endif %}

    {% if params.DISABLE_SKEW %}
        {% set zdisable_skew = params.DISABLE_SKEW|default(1)|int %}
        SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}
    {% endif %}

    {% if params.LOAD_ZOFFSET %}
        {% set zload_zoffset = params.LOAD_ZOFFSET|default(1)|int %}
        SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}
    {% endif %}

    {% if params.LED %}
        {% set zled = params.LED|default(50)|int %}
        SAVE_VARIABLE VARIABLE=led VALUE={zled|int}
    {% endif %}

    {% if params.DISABLE_PRIMING %}
        {% set zdisable_priming = params.DISABLE_PRIMING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}
    {% endif %}

    {% if params.CLEAR %}
        {% set zclear = params.CLEAR|default("LINE_PURGE")|string %}
        SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'
    {% endif %}

    {% if params.CHINA_CLOUD %}
        {% set zchina_cloud = params.CHINA_CLOUD|default(1)|int %}
        SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}
    {% endif %}

    {% if params.SAVE_MOONRAKER %}
        {% set save_moonraker = params.SAVE_MOONRAKER|default(0)|int %}
        SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}
    {% endif %}

    {% if params.SAVE_FILAMENT_SENSORS %}
        {% set save_filament_sensors = params.SAVE_FILAMENT_SENSORS|default(0)|int %}
        SAVE_VARIABLE VARIABLE=save_filament_sensors VALUE={save_filament_sensors|int}
    {% endif %}

    {% if params.NICE %}
        {% set znice = params.NICE|default(20)|int %}
        {% if znice > 40 %}
            SAVE_VARIABLE VARIABLE=nice VALUE={40|int}
        {% else %}
            {% if znice < 1 %}
                SAVE_VARIABLE VARIABLE=nice VALUE={1|int}
            {% else %}
                SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
            {% endif %}
        {% endif %}
    {% endif %}

    {% if params.DISPLAY_OFF_TIMEOUT %}
        {% set display_off_timeout = params.DISPLAY_OFF_TIMEOUT|default(20)|int %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% if params.ZCONTROL_Z %}
        {% set zcontrol_z = params.ZCONTROL_Z|default(10)|int %}
        SAVE_VARIABLE VARIABLE=zcontrol_z VALUE={zcontrol_z|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.PRO_POWEROFF_TIMEOUT %}
        {% set pro_poweroff_timeout = params.PRO_POWEROFF_TIMEOUT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% endif %}
    {% endif %}

    {% if params.MIDI_ON %}
        {% set zmidi_on = params.MIDI_ON|default("")|string %}
        {% if zmidi_on == "0" %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_START %}
        {% set zmidi_start = params.MIDI_START|default("")|string %}
        {% if zmidi_start == "0" %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_PAUSE %}
        {% set zmidi_pause = params.MIDI_PAUSE|default("")|string %}
        {% if zmidi_pause == "0" %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_END %}
        {% set zmidi_end = params.MIDI_END|default("")|string %}
        {% if zmidi_end == "0" %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'
        {% endif %}
    {% endif %}

    {% if i == 0 %}
        GET_ZMOD_DATA
    {% else %}
        _GLOBAL N={i}
    {% endif %}

[gcode_macro GET_ZMOD_DATA]
description: Obtener parámetros ZMOD
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    RESPOND PREFIX="info" MSG="Parámetros ZMOD. Establecidos mediante SAVE_ZMOD_DATA"

    {% set guppy = printer.save_variables.variables.guppy|default(1) | int %}
    SAVE_VARIABLE VARIABLE=guppy VALUE={guppy|int}

    {% if screen == True %}
        RESPOND PREFIX="info" MSG="Estás usando la pantalla nativa // DISPLAY_ON"
    {% else %}
        {% if guppy == 1 %}
            RESPOND PREFIX="info" MSG="Estás trabajando SIN pantalla nativa pero CON GuppyScreen // DISPLAY_OFF GUPPY=1"
        {% else %}
            RESPOND PREFIX="info" MSG="Estás trabajando SIN pantalla nativa // DISPLAY_OFF GUPPY=0"
        {% endif %}
    {% endif %}

    RESPOND PREFIX="info" MSG="Parámetros usados al iniciar impresión y nivelar cama [START_PRINT]"

    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Construir malla de cama con la pantalla nativa en cada impresión. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% else %}
            RESPOND PREFIX="//" MSG="Construir malla de cama en cada impresión. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% endif %}
    {% else %}
        RESPOND PREFIX="//" MSG="No construya una malla de cama en cada impresión. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}

    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="//" MSG="Usar malla adaptativa (KAMP) donde sea posible en lugar de malla completa de cama // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
    {% else %}
        RESPOND PREFIX="//" MSG="No usar KAMP en lugar de BED_MESH_CALIBRATE // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}

    {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
    {% if zmesh_test == 0 %}
        RESPOND PREFIX="//" MSG="No probar malla de cama antes de imprimir // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 1 %}
        RESPOND PREFIX="//" MSG="Probar malla de cama antes de imprimir // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 2 %}
        RESPOND PREFIX="//" MSG="Probar malla de cama antes de imprimir + KAMP // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}
    RESPOND PREFIX="//" MSG="Reproducir MIDI al iniciar impresión: {zmidi_start} // SAVE_ZMOD_DATA MIDI_START={zmidi_start}"
    SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'

    {% set zmidi_pause = printer.save_variables.variables.midi_pause|default("") | string %}
    RESPOND PREFIX="//" MSG="Reproducir MIDI al pausar impresión: {zmidi_pause} // SAVE_ZMOD_DATA MIDI_PAUSE={zmidi_pause}"
    SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'

    {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% if zforce_md5 == 1 %}
        RESPOND PREFIX="//" MSG="Verificar suma MD5 del archivo // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% else %}
        RESPOND PREFIX="//" MSG="No verificar suma MD5 del archivo // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}

    {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% if zdisable_skew == 1 %}
        RESPOND PREFIX="//" MSG="Corrección SKEW deshabilitada // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% else %}
        RESPOND PREFIX="//" MSG="Corrección SKEW habilitada. Perfil skew_profile // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}

    {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(1) | int %}
    {% if screen == False %}
        {% if zload_zoffset == 1 %}
            RESPOND PREFIX="//" MSG="Cargar Z-Offset desde configuraciones globales // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
        {% else %}
            RESPOND PREFIX="//" MSG="No cargar Z-Offset desde configuraciones globales // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}

    {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% if zdisable_priming == 1 %}
        RESPOND PREFIX="//" MSG="Deshabilitar purga de línea de la boquilla // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% else %}
        RESPOND PREFIX="//" MSG="Habilitar purga de línea de la boquilla // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}

    {% if not client.ad5x %}
        {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
        {% if zpreclear == 1 %}
            RESPOND PREFIX="//" MSG="Usar pre-purga de boquilla // SAVE_ZMOD_DATA PRECLEAR={zpreclear}"
        {% else %}
            RESPOND PREFIX="//" MSG="No usar pre-purga de la boquilla // SAVE_ZMOD_DATA PRECLEAR={zpreclear}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% else %}
        {% set silent = printer.save_variables.variables.silent|default(0) | int %}
        {% if silent == 0 %}
            RESPOND PREFIX="//" MSG="No ocultar la selección de color al iniciar la impresión // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        {% if silent == 1 %}
            RESPOND PREFIX="//" MSG="Ocultar la selección de color, imprimir con IFS // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        {% if silent == 2 %}
            RESPOND PREFIX="//" MSG="Ocultar la selección de color, imprimir sin IFS // SAVE_ZMOD_DATA SILENT={silent}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=silent VALUE={silent|int}
    {% endif %}

    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE") | string %}
    RESPOND PREFIX="//" MSG="Algoritmo de purga: {zclear} // SAVE_ZMOD_DATA CLEAR={zclear}"
    SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'

    RESPOND PREFIX="info" MSG="Parámetros usados al finalizar y cancelar impresión [END_PRINT]"

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    RESPOND PREFIX="//" MSG="Reproducir MIDI al finalizar impresión: {zmidi_end} // SAVE_ZMOD_DATA MIDI_END={zmidi_end}"
    SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'

    {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(2) | int %}
    SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
    {% if zclose_dialogs == 0 %}
        RESPOND PREFIX="//" MSG="No cerrar diálogos en la pantalla nativa // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% else %}
        {% if client.ad5x %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% endif %}
    {% endif %}
    {% if zclose_dialogs == 1 %}
        RESPOND PREFIX="//" MSG="Cerrar automáticamente los diálogos en la pantalla nativa después de 20 segundos (lento) // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}
    {% if zclose_dialogs == 2 %}
        RESPOND PREFIX="//" MSG="Cerrar automáticamente los diálogos en la pantalla nativa después de 20 segundos (rápido) // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}

    {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
    {% if zstop_motor == 1 %}
        RESPOND PREFIX="//" MSG="Desactivar automáticamente los motores después de imprimir/cancelar en 25 segundos // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% else %}
        RESPOND PREFIX="//" MSG="No desactivar motores automáticamente después de imprimir/cancelar // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}

    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% if zauto_reboot == 0 %}
        RESPOND PREFIX="//" MSG="No reiniciar la impresora automáticamente // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 1 %}
        RESPOND PREFIX="//" MSG="Reinicio automático de la impresora después de 1.5 minutos // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 2 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Reinicio automático de la impresora después de 1.5 minutos // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% else %}
            RESPOND PREFIX="//" MSG="Reinicio automático del firmware después de 1.5 minutos // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}

    {% if not client.ad5x %}
        {% set pro_poweroff_timeout = printer.save_variables.variables.pro_poweroff_timeout|default(0) | int %}
        RESPOND PREFIX="//" MSG="Apagar FF5M Pro después de (min): {pro_poweroff_timeout} // SAVE_ZMOD_DATA PRO_POWEROFF_TIMEOUT={pro_poweroff_timeout}"
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% else %}
        {% set remove_filament = printer.save_variables.variables.remove_filament|default(0) | int %}
        {% if remove_filament == 0 %}
            RESPOND PREFIX="//" MSG="No quitar el filamento después de completar la impresión // SAVE_ZMOD_DATA REMOVE_FILAMENT={remove_filament}"
        {% else %}
            RESPOND PREFIX="//" MSG="Quitar el filamento después de completar la impresión // SAVE_ZMOD_DATA REMOVE_FILAMENT={remove_filament}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=remove_filament VALUE={remove_filament|int}
    {% endif %}

    RESPOND PREFIX="info" MSG="Parámetros de sistema"

    {% set save_restore = printer.save_variables.variables.save_restore|default(1) | int %}
    {% if save_restore == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Guardado controlado por pantalla nativa // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="Guardar datos para recuperación de impresión // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% else %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="Guardado controlado por pantalla nativa // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="No guardar datos para recuperación de impresión // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}

    {% if not client.ad5x %}
        {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
        {% if motion_sensor == 1 %}
            RESPOND PREFIX="//" MSG="Usando sensor de movimiento de filamento // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
            {% if screen == True %}
                RESPOND PREFIX="//" MSG="Deshabilitar sensor de filamento en la pantalla nativa"
            {% endif %}
        {% else %}
            RESPOND PREFIX="//" MSG="Usando sensor de presencia de filamento // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}

    {% if client.ad5x %}
        {% set autoinsert = printer.save_variables.variables.autoinsert|default(1) | int %}
        {% if autoinsert == 0 %}
            RESPOND PREFIX="//" MSG="No cargar filamento automáticamente // SAVE_ZMOD_DATA AUTOINSERT={autoinsert}"
        {% else %}
            RESPOND PREFIX="//" MSG="Cargar filamento automáticamente // SAVE_ZMOD_DATA AUTOINSERT={autoinsert}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=autoinsert VALUE={autoinsert|int}

        {% set use_trash_on_print = printer.save_variables.variables.use_trash_on_print|default(1) | int %}
        {% if use_trash_on_print == 0 %}
            RESPOND PREFIX="//" MSG="No usar contenedor de purga durante la impresión // SAVE_ZMOD_DATA USE_TRASH_ON_PRINT={use_trash_on_print}"
        {% else %}
            RESPOND PREFIX="//" MSG="Usar contenedor de purga durante la impresión // SAVE_ZMOD_DATA USE_TRASH_ON_PRINT={use_trash_on_print}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE={use_trash_on_print|int}
    {% endif %}

    {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
    {% if fix_scv == 1 %}
        RESPOND PREFIX="//" MSG="Usar SCV de configuración para gráficos de modelador // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% else %}
        RESPOND PREFIX="//" MSG="Usar SCV = 5 para gráficos de modelador // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}

    {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(1) | int %}
    {% if fix_e0011 == 1 %}
        RESPOND PREFIX="//" MSG="Corregir error E0011 // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% else %}
        RESPOND PREFIX="//" MSG="No corregir error E0011 // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    RUN_SHELL_COMMAND CMD=zfix_e0011 PARAMS="{fix_e0011}"

    {% set fix_e0017 = printer.save_variables.variables.fix_e0017|default(1) | int %}
    {% if fix_e0017 == 1 %}
        RESPOND PREFIX="//" MSG="Corregir error E0017 // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% else %}
        RESPOND PREFIX="//" MSG="No corregir error E0017 // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    RUN_SHELL_COMMAND CMD=zfix_e0017 PARAMS="{fix_e0017}"

    {% set wifi = printer.save_variables.variables.wifi|default(1) | int %}
    {% if wifi == 1 %}
        RESPOND PREFIX="//" MSG="Zmod Wifi On // SAVE_ZMOD_DATA WIFI={wifi}"
    {% else %}
        RESPOND PREFIX="//" MSG="Zmod Wifi Off // SAVE_ZMOD_DATA WIFI={wifi}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=wifi VALUE={wifi|int}

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    RESPOND PREFIX="//" MSG="Brillo del LED al encender: {zled} // SAVE_ZMOD_DATA LED={zled}"
    SAVE_VARIABLE VARIABLE=led VALUE={zled|int}

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    RESPOND PREFIX="//" MSG="Reproducir MIDI al encender: {zmidi_on} // SAVE_ZMOD_DATA MIDI_ON={zmidi_on}"
    SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'

    {% if not client.ad5x %}
        {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
        {% if znew_save_config == 1 %}
            RESPOND PREFIX="//" MSG="Usar NEW_SAVE_CONFIG alternativo // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% else %}
            RESPOND PREFIX="//" MSG="Usar SAVE_CONFIG estándar // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% else %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE=0
    {% endif %}

    {% if not client.ad5x %}
        {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
        {% if zuse_swap == 0 %}
            RESPOND PREFIX="//" MSG="SWAP no utilizado // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 1 %}
            RESPOND PREFIX="//" MSG="SWAP utilizado en EMMC // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 2 %}
            RESPOND PREFIX="//" MSG="SWAP utilizado en USB FLASH // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}

    {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(1) | int %}
    {% if zchina_cloud == 1 %}
        RESPOND PREFIX="//" MSG="Permitir nubes chinas // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% else %}
        RESPOND PREFIX="//" MSG="Bloquear nubes chinas // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}

    {% set save_moonraker = printer.save_variables.variables.save_moonraker|default(0) | int %}
    {% if save_moonraker == 1 %}
        RESPOND PREFIX="//" MSG="Guardar cambios de botones de Fluidd/Mainsail // SAVE_ZMOD_DATA SAVE_MOONRAKER={save_moonraker}"
    {% else %}
        RESPOND PREFIX="//" MSG="Usar configuraciones de botones de Fluidd/Mainsail desde ZMOD // SAVE_ZMOD_DATA SAVE_MOONRAKER={save_moonraker}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}

    {% set save_filament_sensors = printer.save_variables.variables.save_filament_sensors|default(0) | int %}
    {% if save_filament_sensors == 1 %}
        RESPOND PREFIX="//" MSG="Guardar el estado de los sensores de filamento // SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS={save_filament_sensors}"
    {% else %}
        RESPOND PREFIX="//" MSG="No guardar el estado de los sensores de filamento // SAVE_ZMOD_DATA SAVE_FILAMENT_SENSORS={save_filament_sensors}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_filament_sensors VALUE={save_filament_sensors|int}

    {% set display_off_timeout = printer.save_variables.variables.display_off_timeout|default(20) | int %}
    {% if screen == False %}
        RESPOND PREFIX="//" MSG="Apagar pantalla nativa después de (seg): {display_off_timeout} // SAVE_ZMOD_DATA DISPLAY_OFF_TIMEOUT={display_off_timeout}"
    {% endif %}
    {% if display_off_timeout < 5 %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE=5
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if zklipper13 == 1 %}
        RESPOND PREFIX="//" MSG="Usando Klipper 13"
    {% else %}
        {% if not client.ad5x %}
            RESPOND PREFIX="//" MSG="Usando Klipper nativo 11"
        {% else %}
            RESPOND PREFIX="//" MSG="Usando Klipper nativo 12"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=klipper13 VALUE={zklipper13}

    {% if screen == True %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=0
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=1
    {% endif %}

    {% set znice = printer.save_variables.variables.nice|default(20) | int %}
    RESPOND PREFIX="//" MSG="Prioridad del proceso Klipper (1-mín, 40-máx): {znice}"
    SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
    RUN_SHELL_COMMAND CMD=znice

    {% set zcontrol_z = printer.save_variables.variables.zcontrol_z|default(10) | int %}
    RESPOND PREFIX="//" MSG="ZCONTROL_Z: {zcontrol_z} // SAVE_ZMOD_DATA ZCONTROL_Z={zcontrol_z}"
    SAVE_VARIABLE VARIABLE=zcontrol_z VALUE={zcontrol_z|int}
    ZCONTROL_Z Z={zcontrol_z}

    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND PREFIX="//" MSG="Idiomas disponibles: en, ru, de, fr, it, es, ja, ko, zh, pt, cs, tr // LANG LANG={lang}"
    RUN_SHELL_COMMAND CMD=zversion
    _CHECK_VERSION

    {% if screen == False %}
        {% if display_off_timeout > 30 %}
            RESPOND PREFIX="info" MSG="¿La pantalla alternativa tarda mucho en cargar? Reduce el tiempo de carga de la pantalla predeterminada. // SAVE_ZMOD_DATA DISPLAY_OFF_TIMEOUT=10"
        {% endif %}
        {% if wifi == 0 %}
            RESPOND PREFIX="//" MSG="¿Cansado de problemas con WiFi? Deja que zmod lo gestione. // SAVE_ZMOD_DATA WIFI=1"
        {% endif %}
    {% endif %}

[gcode_macro SET_LED]
description: Establecer LED
rename_existing: _SET_LED
variable_allowed: False
gcode:
    {% if allowed %}
        _SET_LED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% endif %}

[gcode_macro _SET_GCODE_OFFSET_FAST]
gcode:
    {% set from = params.FROM|default("Pantalla nativa")|string %}

    {% if 'Z' in params %}
        RESPOND PREFIX="info" MSG="Z-Offset: {params.Z} {from}"
    {% endif %}

    {% if 'Z_ADJUST' in params %}
        {% set z = (printer.gcode_move.homing_origin.z | float) + (params.Z_ADJUST | float) %}
        RESPOND PREFIX="info" MSG="Z-Offset: {z} {from}"
    {% endif %}

    _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}


[gcode_macro SET_GCODE_OFFSET]
description: Guardar Z-Offset
rename_existing: _SET_GCODE_OFFSET
gcode:
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% set start = params.START|default(0)|int %}
    {% set from = params.FROM|default("Pantalla nativa")|string %}

    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
    {% else %}
        {% set offsets = {'z': None} %}
    {% endif %}

    {% set ns = namespace(offsets={'z': offsets.z}) %}

    {% if 'Z' in params %}
        {% set null = ns.offsets.update({'z': params.Z}) %}
    {% endif %}

    {% if 'Z_ADJUST' in params %}
        {% if ns.offsets.z == None %}
            {% set null = ns.offsets.update({'z': 0}) %}
        {% endif %}
        {% set null = ns.offsets.update({'z': (ns.offsets.z | float) + (params.Z_ADJUST | float)}) %}
    {% endif %}

    {% if screen == True and start == 1 and 'Z' in params %}
        RESPOND PREFIX="info" MSG="Z-Offset guardado en la pantalla nativa: {params.Z}"
    {% endif %}

    {% if start == 0 %}
        RESPOND PREFIX="info" MSG="Z-Offset: {ns.offsets.z} {from}"
        _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% endif %}

    {% if screen == False %}
        {% if start == 0 %}
            SAVE_VARIABLE VARIABLE=gcode_offsets VALUE="{ns.offsets}"
        {% else %}
            LOAD_GCODE_OFFSET START=1
        {% endif %}
    {% endif %}

[gcode_macro LOAD_GCODE_OFFSET]
description: Restaurar Z-Offset
gcode:
    {% set start = params.START|default(0)|int %}

    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
        {% if start == 0 %}
            {% for axis, offset in offsets.items() if offsets[axis] %}
                { action_respond_info("Desplazamiento cargado desde configuraciones globales %s=%.4f " % (axis|upper, offset|float)) }
            {% endfor %}
            _SET_GCODE_OFFSET_FAST {% for axis, offset in offsets.items() if offsets[axis] %}{ "%s=%s " % (axis, offset) }{% endfor %} FROM=LOAD_GCODE_OFFSET
        {% else %}
            {% for axis, offset in offsets.items() if offsets[axis] %}
                { action_respond_info("Z-Offset guardado en la configuración global: %.4f " % (offset|float)) }
            {% endfor %}
        {% endif %}
    {% endif %}

[gcode_macro SET_FAN_SPEED]
description: Control de ventiladores
rename_existing: _SET_FAN_SPEED
gcode:
    {% set fan = params.FAN|string %}
    {% set speed = params.SPEED|default(0)|float %}

    {% if fan != 'pcb_fan' and fan != 'external_fan' and fan != 'internal_fan' %}
        _SET_FAN_SPEED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% else %}
        {% if fan == 'external_fan' %}
            _SET_FAN_SPEED FAN=internal SPEED={speed}
        {% else %}
            {% if fan == 'internal_fan' %}
                _SET_FAN_SPEED FAN=external SPEED={speed}
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro _SVG28]
