[respond]

[include base.cfg]

[gcode_macro RESUME]
description: Восстановить печать
rename_existing: RESUME_BASE
gcode:
    ZCONTROL_ON
    RUN_SHELL_COMMAND CMD=zsend PARAMS="M24"
#    RESUME_BASE

[gcode_macro PAUSE]
description: Поставить печать на паузу
rename_existing: PAUSE_BASE
gcode:
    {% set midi_pause = printer.save_variables.variables.midi_pause|default("") | string %}
    {% if midi_pause != "" %}
        PLAY_MIDI FILE={midi_pause}
    {% endif %}

    RUN_SHELL_COMMAND CMD=zsend PARAMS="M25"
    UPDATE_DELAYED_GCODE ID=_GOTO_PAUSE DURATION=10
    ZCONTROL_OFF
#    PAUSE_BASE

[gcode_macro M25]
description: Поставить печать на паузу
rename_existing: M25.1
gcode:
    ZCONTROL_OFF
    M25.1
    UPDATE_DELAYED_GCODE ID=_GOTO_PAUSE DURATION=10

[gcode_macro CANCEL_PRINT]
description: Отменить печать
rename_existing: CANCEL_PRINT_BASE
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("ru")|string %}
    {% set cancel_send = printer["gcode_macro _CANCEL_PRINT"].cancel_send %}

    {% if cancel_send == 1 %}
        RESPOND TYPE=echo MSG={% if lang == "en" %}"Resending cancellation to native screen canceled"{% else %}"Повторная отправка отмены на родной экрана отменена"{% endif %}
        SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
        ZCONTROL_OFF
    {% else %}
        RUN_SHELL_COMMAND CMD=zsend PARAMS="M26"
        _STOP
        SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=1
        RESPOND TYPE=echo MSG={% if lang == "en" %}"Cancellation sent to native screen"{% else %}"Отмена отправлена на родной экран"{% endif %}
    {% endif %}

    {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(0) | int %}
    {% if zclose_dialogs == 1 %}
        UPDATE_DELAYED_GCODE ID=_CLOSE_DIALOGS DURATION=20
    {% endif %}
    {% if zclose_dialogs == 2 %}
        UPDATE_DELAYED_GCODE ID=_FAST_CLOSE_DIALOGS DURATION=20
    {% endif %}

    {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
    {% if zstop_motor == 1 %}
        UPDATE_DELAYED_GCODE ID=_STOP_MOTOR DURATION=25
    {% endif %}

    CANCEL_PRINT_BASE

[gcode_macro START_PRINT]
description: Замена стандартного стартового G-code
variable_screen: True
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("ru")|string %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(245)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set force_kamp = params.FORCE_KAMP|default(False) %}
    {% set force_leveling = params.FORCE_LEVELING|default(False) %}
    {% set skip_leveling = params.SKIP_LEVELING|default(False) %}
    {% set skip_zoffset = params.SKIP_ZOFFSET|default(True) %}
    {% set zoffset = params.Z_OFFSET|default(0.0)|float %}
    {% set mesh = params.MESH|default("")|string %}

    {% if params.FORCE_MD5 %}
        {% set force_md5 = params.FORCE_MD5|default(True) %}
        {% if force_md5 == True %}
            {action_raise_error("Параметр FORCE_MD5 переехал в SAVE_ZMOD_DATA\nИспользуйте SAVE_ZMOD_DATA FORCE_MD5=1" if lang == "ru" else "Parameter FORCE_MD5 moved to SAVE_ZMOD_DATA\nUse SAVE_ZMOD_DATA FORCE_MD5=1")}
        {% else %}
            {action_raise_error("Параметр FORCE_MD5 переехал в SAVE_ZMOD_DATA\nИспользуйте SAVE_ZMOD_DATA FORCE_MD5=0" if lang == "ru" else "Parameter FORCE_MD5 moved to SAVE_ZMOD_DATA\nUse SAVE_ZMOD_DATA FORCE_MD5=0")}
        {% endif %}
    {% endif %}

    {% if params.DISABLE_PRIMING %}
        {% set disable_priming = params.DISABLE_PRIMING|default(False) %}
        {% if disable_priming == True %}
            {action_raise_error("Параметр DISABLE_PRIMING переехал в SAVE_ZMOD_DATA\nИспользуйте SAVE_ZMOD_DATA DISABLE_PRIMING=1" if lang == "ru" else "Parameter DISABLE_PRIMING moved to SAVE_ZMOD_DATA\nUse SAVE_ZMOD_DATA DISABLE_PRIMING=1")}
        {% else %}
            {action_raise_error("Параметр DISABLE_PRIMING переехал в SAVE_ZMOD_DATA\nИспользуйте SAVE_ZMOD_DATA DISABLE_PRIMING=0" if lang == "ru" else "Parameter DISABLE_PRIMING moved to SAVE_ZMOD_DATA\nUse SAVE_ZMOD_DATA DISABLE_PRIMING=0")}
        {% endif %}
    {% endif %}

    {% if params.DISABLE_SKEW_CORRECT %}
        {% set disable_skew = params.DISABLE_SKEW_CORRECT|default(True) %}
        {% if disable_skew == True %}
            {action_raise_error("Параметр DISABLE_SKEW_CORRECT переехал в SAVE_ZMOD_DATA\nИспользуйте SAVE_ZMOD_DATA DISABLE_SKEW=1" if lang == "ru" else "Parameter DISABLE_SKEW_CORRECT moved to SAVE_ZMOD_DATA\nUse SAVE_ZMOD_DATA DISABLE_SKEW=1")}
        {% else %}
            {action_raise_error("Параметр DISABLE_SKEW_CORRECT переехал в SAVE_ZMOD_DATA\nИспользуйте SAVE_ZMOD_DATA DISABLE_SKEW=0" if lang == "ru" else "Parameter DISABLE_SKEW_CORRECT moved to SAVE_ZMOD_DATA\nUse SAVE_ZMOD_DATA DISABLE_SKEW=0")}
        {% endif %}
    {% endif %}

    {% if params.CLEAR %}
        {% set clear = params.CLEAR|default("_CLEAR1")|string %}
        {action_raise_error("Параметр CLEAR переехал в SAVE_ZMOD_DATA\nИспользуйте SAVE_ZMOD_DATA CLEAR=" + clear if lang == "ru" else "Parameter CLEAR moved to SAVE_ZMOD_DATA\nUse SAVE_ZMOD_DATA CLEAR=" + clear)}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zforce_kamp VALUE={force_kamp|int}
    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zbed_temp VALUE={bed_temp|float}
    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zextruder_temp VALUE={extruder_temp|float}
    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zforce_leveling VALUE={force_leveling}
    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zforce_kamp VALUE={force_kamp}
    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zskip_zoffset VALUE={skip_zoffset}
    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zskip_leveling VALUE={skip_leveling}
    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zzoffset VALUE={zoffset|float}
    SET_GCODE_VARIABLE MACRO=_START_PRINT VARIABLE=zmesh VALUE='"{mesh|string}"'

    _START_PRINT

[gcode_macro END_PRINT]
description: Завершающий G-code
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("ru")|string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% if (printer.toolhead.extruder != '') and (printer[printer.toolhead.extruder].can_extrude) %}
        G1 E-3 F3600
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}
        G1 X{client.custom_park_x} Y{client.custom_park_y} F30000
    {% endif %}

    {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(0) | int %}
    {% if zclose_dialogs == 1 %}
        UPDATE_DELAYED_GCODE ID=_CLOSE_DIALOGS DURATION=20
    {% endif %}
    {% if zclose_dialogs == 2 %}
        UPDATE_DELAYED_GCODE ID=_FAST_CLOSE_DIALOGS DURATION=20
    {% endif %}

    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% if zauto_reboot != 0 %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Automatic reboot in 1.5 minutes"{% else %}"Автоматическая перезагрузка через 1.5 минуты"{% endif %}
        UPDATE_DELAYED_GCODE ID=_AUTO_REBOOT DURATION=90
    {% endif %}

    {% set pro_poweroff_timeout = printer.save_variables.variables.pro_poweroff_timeout|default(0) | int %}
    {% if pro_poweroff_timeout != 0 %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Automatic printer shutdown in {pro_poweroff_timeout} min"{% else %}"Автоматическое выключение принтера через {pro_poweroff_timeout} мин"{% endif %}
        UPDATE_DELAYED_GCODE ID=_PRO_POWEROFF DURATION={pro_poweroff_timeout*60}
    {% endif %}

    _STOP

    {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
    {% if zstop_motor == 1 %}
        UPDATE_DELAYED_GCODE ID=_STOP_MOTOR DURATION=25
    {% endif %}

[gcode_macro _PRINT_FILE]
description: Печать файла
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("ru")|string %}
    {% set path = printer.configfile.settings.virtual_sdcard.path %}

    {% if 'FILENAME' in params %}
        {% set filename = params.FILENAME|default("")|string %}
    {% else %}
        {action_raise_error("Ошибка! Имя файла не указано." if lang == "ru" else "Error! Filename not specified.")}
    {% endif %}

    EXCLUDE_OBJECT_DEFINE RESET=1

    {% set force_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% if force_md5 == 1 %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Started MD5 check {filename}"{% else %}"Запущена проверка MD5 {filename}"{% endif %}
        CHECK_MD5 DELETE=True FILENAME='{path}{filename}'
    {% endif %}

    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Getting data for KAMP."{% else %}"Получаю данные для KAMP."{% endif %}
        RUN_SHELL_COMMAND CMD=zexclude PARAMS="'{filename}'"
    {% endif %}

    ZCONTROL_ABORT
    ZCONTROL_ON

    {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
    {% if zpreclear == 1 %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Heating bed and extruder."{% else %}"Сейчас будет нагрет стол и экструдер."{% endif %}
        RESPOND PREFIX="//" MSG={% if lang == "en" %}"Printer screen will freeze until pre-cleaning is complete."{% else %}"Экран принтера замерзнет до окончания предочистки."{% endif %}
        RUN_SHELL_COMMAND CMD=zpreclear PARAMS="'{filename}' TEST"
    {% else %}
        RUN_SHELL_COMMAND CMD=zpreclear PARAMS="'{filename}' NONE"
    {% endif %}

[gcode_macro LEVELING_PRINT_FILE]
description: Печать файла с построением карты стола с родного экрана
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("ru")|string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if 'FILENAME' in params %}
        {% set filename = params.FILENAME|default("")|string %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Printing file {filename} with bed leveling from native screen"{% else %}"Печать файла {filename} с построением карты стола с родного экрана"{% endif %}
        M23 /{filename}
    {% else %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Printing file with bed leveling from native screen"{% else %}"Печать файла с построением карты стола с родного экрана"{% endif %}
        {action_raise_error("Ошибка! Имя файла не указано." if lang == "ru" else "Error! Filename not specified.")}
    {% endif %}

    _PRINT_FILE FILENAME="{filename}"

    {% if not client.ff5x %}
        RUN_SHELL_COMMAND CMD=zprint PARAMS="PRINT '{filename}'"
    {% else %}
        SET_ZCOLOR FILENAME="{filename}" LEVELING=1
    {% endif %}

[gcode_macro NOLEVELING_PRINT_FILE]
description: Печать файла с родного экрана
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("ru")|string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if 'FILENAME' in params %}
        {% set filename = params.FILENAME|default("")|string %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Printing file {filename} from native screen"{% else %}"Печать файла {filename} с родного экрана"{% endif %}
        M23 /{filename}
    {% else %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Printing file from native screen"{% else %}"Печать файла с родного экрана"{% endif %}
        {action_raise_error("Ошибка! Имя файла не указано." if lang == "ru" else "Error! Filename not specified.")}
    {% endif %}

    _PRINT_FILE FILENAME="{filename}"

    {% if not client.ff5x %}
        RUN_SHELL_COMMAND CMD=zsend PARAMS="M23 '{filename}'"
    {% else %}
        SET_ZCOLOR FILENAME="{filename}" LEVELING=0
    {% endif %}
