[gcode_macro BELTS_SHAPER_CALIBRATION]
description: Выполнение специального теста полуоси для анализа и сравнения профилей частот отдельных ремней на принтерах CoreXY
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}

    {% set spectrogram = params.SPECTROGRAM|default(0)|int %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ff5x %}
        {% if lang == "en" %}
            RESPOND PREFIX="!!" MSG="Requires 256MB RAM + enabled SWAP. !!"
        {% else %}
            RESPOND PREFIX="!!" MSG="Для работы требуется 256 мегабайт оперативной памяти + включенный SWAP. !!"
        {% endif %}
        _GUPPY_BELTS_SHAPER_CALIBRATION SPECTROGRAM={spectrogram} PNG_WIDTH=10 PNG_HEIGHT=10 PNG_OUT_PATH="/opt/config/mod_data/belts_calibration_full.png"
    {% else %}
        _GUPPY_BELTS_SHAPER_CALIBRATION SPECTROGRAM=0 PNG_WIDTH=10 PNG_HEIGHT=10 PNG_OUT_PATH="/opt/config/mod_data/belts_calibration_full.png"
    {% endif %}

[gcode_macro _GUPPY_BELTS_SHAPER_CALIBRATION]
description: Выполнение специального теста полуоси для анализа и сравнения профилей частот отдельных ремней на принтерах CoreXY
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}

    {% set min_freq = params.FREQ_START|default(5)|float %}
    {% set max_freq = params.FREQ_END|default(100)|float %}
    {% set hz_per_sec = params.HZ_PER_SEC|default(1)|float %}
    {% set png_out_path = params.PNG_OUT_PATH|default("/opt/config/mod_data/belts_calibration.png") %}
    {% set png_width = params.PNG_WIDTH|default(8)|float %}
    {% set png_height = params.PNG_HEIGHT|default(4.8)|float %}
    {% set spectrogram = params.SPECTROGRAM|default(0)|int %}

    TEST_RESONANCES AXIS=1,1 OUTPUT=raw_data NAME=b FREQ_START={min_freq} FREQ_END={max_freq} HZ_PER_SEC={hz_per_sec}
    M400

    TEST_RESONANCES AXIS=1,-1 OUTPUT=raw_data NAME=a FREQ_START={min_freq} FREQ_END={max_freq} HZ_PER_SEC={hz_per_sec}
    M400

    {% if lang == "en" %}
        RESPOND MSG="Generating belts frequency profile..."
        RESPOND MSG="This will take some time (3-5 minutes)"
    {% else %}
        RESPOND MSG="Генерация частотного профиля ремней..."
        RESPOND MSG="Это займет немного времени (3-5 минут)"
    {% endif %}
    {% if spectrogram == 1 %}
        RUN_SHELL_COMMAND CMD=guppy_belts_calibration PARAMS="-w {png_width} -l {png_height} -o {png_out_path} -k /usr/share/klipper /tmp/raw_data_axis=1.000,-1.000_a.csv /tmp/raw_data_axis=1.000,1.000_b.csv"
    {% else %}
        RUN_SHELL_COMMAND CMD=guppy_belts_calibration PARAMS="-w {png_width} -l {png_height} -n -o {png_out_path} -k /usr/share/klipper /tmp/raw_data_axis=1.000,-1.000_a.csv /tmp/raw_data_axis=1.000,1.000_b.csv"
    {% endif %}
    {% if lang == "en" %}
        RESPOND PREFIX="info" MSG="Image saved: {png_out_path}. Configuration -> mod_data"
    {% else %}
        RESPOND PREFIX="info" MSG="Изображение сохранено: {png_out_path}. Конфигурация -> mod_data"
    {% endif %}
    RESPOND PREFIX="//" MSG="Command {guppy_belts_calibration} finished"

[gcode_macro _GUPPY_EXCITATE_AXIS_AT_FREQ]
description: Поддерживайте заданную частоту в течение определенного периода времени для диагностики и определения источника вибрации.
gcode:
    {% set frequency = params.FREQUENCY|default(25)|int %}
    {% set time = params.TIME|default(10)|int %}
    {% set axis = params.AXIS|default("x")|string|lower %}

    {% if axis not in ["x", "y", "a", "b"] %}
      { action_raise_error("AXIS selection invalid. Should be either x, y, a or b!") }
    {% endif %}

    {% if axis == "a" %}
        {% set axis = "1,-1" %}
    {% elif axis == "b" %}
        {% set axis = "1,1" %}
    {% endif %}

    TEST_RESONANCES OUTPUT=raw_data AXIS={axis} FREQ_START={frequency-1} FREQ_END={frequency+1} HZ_PER_SEC={1/(time/3)}
    M400

