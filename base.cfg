    {% endif %}

    {% set zklipper12 = printer.save_variables.variables.klipper12|default(0) | int %}
    {% if zklipper12 == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Using Klipper 12{% else %}Используется Klipper 12{% endif %}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Using native Klipper{% else %}Используется родной Klipper{% endif %}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=klipper12 VALUE=0

    {% if screen == True %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=0
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=1
    {% endif %}

    {% set znice = printer.save_variables.variables.nice|default(20) | int %}
    RESPOND PREFIX="//" MSG="{% if lang == "en" %}Klipper process priority (1-min, 40-max): {znice}{% else %}Приоритет процесса Klipper (1-минимальный, 40-максимальный): {znice}{% endif %}"
    SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
    RUN_SHELL_COMMAND CMD=znice

    ZCONTROL_STATUS
    RUN_SHELL_COMMAND CMD=zversion

[gcode_macro SET_LED]
description: Сохранение Z-Offset
