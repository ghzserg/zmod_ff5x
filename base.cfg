    {% endif %}
    SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}

    {% set display_off_timeout = printer.save_variables.variables.display_off_timeout|default(180) | int %}
    {% if screen == False %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Turn off native screen after (sec): {display_off_timeout}{% else %}Выключать родной экран через (сек): {display_off_timeout}{% endif %} // SAVE_ZMOD_DATA DISPLAY_OFF_TIMEOUT={display_off_timeout}"
    {% endif %}
