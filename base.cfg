#        G4 P5000
#        M400
#        RUN_SHELL_COMMAND CMD=zmcu PARAMS="1"
#    {% endif %}

[gcode_macro NEW_SAVE_CONFIG]
description: Сохранить параметры, без зависания родного экрана
gcode:
    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if screen == False or client.ff5x %}
        SAVE_CONFIG
    {% else %}
        RESPOND PREFIX="info" MSG="NEW_SAVE_CONFIG"
        RUN_SHELL_COMMAND CMD=restart_klipper
    {% endif %}

[gcode_macro CLOSE_DIALOGS]
description: Закрыть диалоговые окна на родном экране (медленно)
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ff5x %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Closing dialog windows on native screen (slow){% else %}Закрываю диалоговые окна на родном экране (медленно){% endif %}"
        RUN_SHELL_COMMAND CMD=close_dialogs
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Failed to close windows? Use fast close: FAST_CLOSE_DIALOGS // SAVE_ZMOD_DATA CLOSE_DIALOGS=2{% else %}Не сработало закрытие окон? Используйте быстрое закрытие окон FAST_CLOSE_DIALOGS // SAVE_ZMOD_DATA CLOSE_DIALOGS=2{% endif %}"
    {% else %}
        FAST_CLOSE_DIALOGS
    {% endif %}

[gcode_macro FAST_CLOSE_DIALOGS]
description: Закрыть диалоговые окна на родном экране (быстро)
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Closing dialog windows on native screen (fast){% else %}Закрываю диалоговые окна на родном экране (быстро){% endif %}"
    RUN_SHELL_COMMAND CMD=zprint PARAMS="CLOSE CLOSE"

[delayed_gcode _STOP_MOTOR]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Motors disabled{% else %}Моторы отключены{% endif %}"
    M84                     ; Выключить мотор

[delayed_gcode _GOTO_PAUSE]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Moving head to far right corner{% else %}Отвожу голову в дальний правый угол{% endif %}"
    G1 Y{client.custom_park_y} F7800
    M400
    G1 X{client.custom_park_x} F7800
    M400

[delayed_gcode _CLOSE_DIALOGS]
gcode:
    CLOSE_DIALOGS

[delayed_gcode _FAST_CLOSE_DIALOGS]
gcode:
    FAST_CLOSE_DIALOGS

[delayed_gcode _AUTO_REBOOT]
gcode:
    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    {% if (zauto_reboot == 2) and (screen == False) %}
        FIRMWARE_RESTART
    {% else %}
        REBOOT
    {% endif %}

[delayed_gcode _PRO_POWEROFF]
gcode:
    SHUTDOWN

[delayed_gcode restart_services]
initial_duration: 180
gcode:
    ZSSH_RELOAD

[delayed_gcode start_led]
initial_duration: 10
gcode:
    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    SET_GCODE_VARIABLE MACRO=_SHUTDOWN VARIABLE=trigger_allowed VALUE=True
    SET_GCODE_VARIABLE MACRO=SET_LED VARIABLE=allowed VALUE=True

    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    CAMERA_RESTART

    GET_ZMOD_DATA

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    {% if zmidi_on != "" %}
        PLAY_MIDI FILE={zmidi_on}
    {% endif %}

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    LED S={zled}

[gcode_macro _COLDPULL_LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro _COLDPULL_LOAD_MATERIAL]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    RESPOND TYPE=command MSG=action:prompt_end

    _G28

    G90
    G1 X{client.min_x+(client.max_x-client.min_x)/2} F7800
    G1 Y{client.min_y+(client.max_y-client.min_y)/2} F7800
    M400
    M400

    {% set extruder_temp = params.TEMP|default(245)|float %}
    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Waiting for nozzle to heat up to {extruder_temp}{% else %}Ждем нагревани сопла до {extruder_temp} градусов{% endif %}"
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp} MAXIMUM={extruder_temp+10}

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Extruding 10 cm of filament{% else %}Пропускаем 10 см пластика{% endif %}"

    _DISABLE_SENSOR
        G1 E100 F100
        M400
    _ENABLE_SENSOR

    {% set cold_temp = params.COLD|default(245)|float %}
    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Cooling down to {cold_temp}°C{% else %}Остужаем до {cold_temp} градусов{% endif %}"
    M104 S{cold_temp}
    M106 P0 S255
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={cold_temp-2} MAXIMUM={cold_temp+2}

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Pulling the filament{% else %}Дергаем пруток{% endif %}"

    _DISABLE_SENSOR
        G1 E-70 F1500
        M400
    _ENABLE_SENSOR

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Remove the remaining filament manually{% else %}Вытащите остаток прутка руками{% endif %}"
    M107
    M104 S0

[gcode_macro COLDPULL]
description: Колдпул (очистка сопла) без насилия.
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND TYPE=command MSG="action:prompt_begin {% if lang == "en" %}Material selection for loading{% else %}Выбор материала для загрузки{% endif %}"
    RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}Select material to clean the nozzle{% else %}Выберите каким материлом чистить сопло{% endif %}"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button PETG|_COLDPULL_LOAD_MATERIAL TEMP=245 COLD=100|primary"
    RESPOND TYPE=command MSG="action:prompt_button ABS|_COLDPULL_LOAD_MATERIAL TEMP=255 COLD=105|primary"
    RESPOND TYPE=command MSG="action:prompt_button NEYLON|_COLDPULL_LOAD_MATERIAL TEMP=260 COLD=120|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button {% if lang == "en" %}Cancel{% else %}Отмена{% endif %}|_COLDPULL_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro SAVE_ZMOD_DATA]
description: Сохранить параметры ZMOD
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if params.CLOSE_DIALOGS %}
        {% set zclose_dialogs = params.CLOSE_DIALOGS|default(0)|int %}
        {% if client.ff5x and zclose_dialogs == 1 %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% else %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
        {% endif %}
    {% endif %}

    {% if params.STOP_MOTOR %}
        {% set zstop_motor = params.STOP_MOTOR|default(1)|int %}
        SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}
    {% endif %}

    {% if not client.ff5x %}
    {% if params.USE_SWAP %}
        {% set zuse_swap = params.USE_SWAP|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}
    {% endif %}

    {% if params.AUTO_REBOOT %}
        {% set zauto_reboot = params.AUTO_REBOOT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}
    {% endif %}

    {% if params.SAVE_RESTORE %}
        {% set save_restore = params.SAVE_RESTORE|default(1)|int %}
        SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}
    {% endif %}

    {% if params.FIX_SCV %}
        {% set fix_scv = params.FIX_SCV|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}
    {% endif %}

    {% if not client.ff5x %}
    {% if params.MOTION_SENSOR %}
        {% set motion_sensor = params.MOTION_SENSOR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}
    {% endif %}

    {% if params.FIX_E0011 %}
        {% set fix_e0011 = params.FIX_E0011|default(0)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    {% endif %}

    {% if params.FIX_E0017 %}
        {% set fix_e0017 = params.FIX_E0017|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    {% endif %}

    {% if params.PRINT_LEVELING %}
        {% set zprint_leveling = params.PRINT_LEVELING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}
    {% endif %}

    {% if params.USE_KAMP %}
        {% set zuse_kamp = params.USE_KAMP|default(0)|int %}
        SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}
    {% endif %}

    {% if params.MESH_TEST %}
        {% set zmesh_test = params.MESH_TEST|default(1)|int %}
        SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}
    {% endif %}

    {% if not client.ff5x %}
    {% if params.NEW_SAVE_CONFIG %}
        {% set znew_save_config = params.NEW_SAVE_CONFIG|default(0)|int %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% endif %}

    {% if params.PRECLEAR %}
        {% set zpreclear = params.PRECLEAR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% endif %}
    {% endif %}

    {% if params.FORCE_MD5 %}
        {% set zforce_md5 = params.FORCE_MD5|default(1)|int %}
        SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}
    {% endif %}

    {% if params.DISABLE_SKEW %}
        {% set zdisable_skew = params.DISABLE_SKEW|default(1)|int %}
        SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}
    {% endif %}

    {% if params.LOAD_ZOFFSET %}
        {% set zload_zoffset = params.LOAD_ZOFFSET|default(0)|int %}
        SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}
    {% endif %}

    {% if params.LED %}
        {% set zled = params.LED|default(50)|int %}
        SAVE_VARIABLE VARIABLE=led VALUE={zled|int}
    {% endif %}

    {% if params.DISABLE_PRIMING %}
        {% set zdisable_priming = params.DISABLE_PRIMING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}
    {% endif %}

    {% if params.CLEAR %}
        {% set zclear = params.CLEAR|default("LINE_PURGE")|string %}
        SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'
    {% endif %}

    {% if params.CHINA_CLOUD %}
        {% set zchina_cloud = params.CHINA_CLOUD|default(0)|int %}
        SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}
    {% endif %}

    {% if params.SAVE_MOONRAKER %}
        {% set save_moonraker = params.SAVE_MOONRAKER|default(0)|int %}
        SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}
    {% endif %}

    {% if params.NICE %}
        {% set znice = params.NICE|default(20)|int %}
        {% if znice > 40 %}
            SAVE_VARIABLE VARIABLE=nice VALUE={40|int}
        {% else %}
            {% if znice < 1 %}
                SAVE_VARIABLE VARIABLE=nice VALUE={1|int}
            {% else %}
                SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
            {% endif %}
        {% endif %}
    {% endif %}

    {% if params.DISPLAY_OFF_TIMEOUT %}
        {% set display_off_timeout = params.DISPLAY_OFF_TIMEOUT|default(180)|int %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% if params.PRO_POWEROFF_TIMEOUT %}
        {% set pro_poweroff_timeout = params.PRO_POWEROFF_TIMEOUT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% endif %}

    {% if params.MIDI_ON %}
        {% set zmidi_on = params.MIDI_ON|default("")|string %}
        {% if zmidi_on == "0" %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_START %}
        {% set zmidi_start = params.MIDI_START|default("")|string %}
        {% if zmidi_start == "0" %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_PAUSE %}
        {% set zmidi_pause = params.MIDI_PAUSE|default("")|string %}
        {% if zmidi_pause == "0" %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_END %}
        {% set zmidi_end = params.MIDI_END|default("")|string %}
        {% if zmidi_end == "0" %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'
        {% endif %}
    {% endif %}

    GET_ZMOD_DATA

[gcode_macro GET_ZMOD_DATA]
description: Получить параметры ZMOD
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}ZMOD parameters. Set via SAVE_ZMOD_DATA{% else %}Параметры zmod. Задаются через SAVE_ZMOD_DATA{% endif %}"

    {% set guppy = printer.save_variables.variables.guppy|default(1) | int %}
    SAVE_VARIABLE VARIABLE=guppy VALUE={guppy|int}

    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% if screen == True %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}You are using native screen // DISPLAY_ON{% else %}Вы работаете с родным экраном // DISPLAY_ON{% endif %}"
    {% else %}
        {% if guppy == 1 %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}You are working WITHOUT native screen with GuppyScreen // DISPLAY_OFF GUPPY=1{% else %}Вы работаете БЕЗ родного экрана c GuppyScreen // DISPLAY_OFF GUPPY=1{% endif %}"
        {% else %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}You are working WITHOUT native screen // DISPLAY_OFF GUPPY=0{% else %}Вы работаете БЕЗ родного экрана // DISPLAY_OFF GUPPY=0{% endif %}"
        {% endif %}
    {% endif %}

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Parameters used at print start and bed leveling [START_PRINT]{% else %}Параметры используемые при начале печати, построении карты стола [START_PRINT]{% endif %}"

    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Build bed mesh with native screen on each print. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% else %}При каждой печати строить карту стола средствами родного экрана. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% endif %}"
        {% else %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Build bed mesh on each print. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% else %}При каждой печати строить карту стола. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% endif %}"
        {% endif %}
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't build bed mesh with native screen // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% else %}Не строить карту стола средствами родного экрана // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% endif %}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}

    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Use adaptive mesh (KAMP) where possible instead of full bed mesh // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}{% else %}Где возможно использовать адаптивную карту стола(KAMP), вместо полной карты стола // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}{% endif %}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't use KAMP instead of BED_MESH_CALIBRATE // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}{% else %}Не использоваить KAMP вместо BED_MESH_CALIBRATE // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}{% endif %}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}

    {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
    {% if zmesh_test == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Test bed mesh before printing // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}{% else %}Тестировать карту стола перед печатью // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}{% endif %}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't test bed mesh before printing // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}{% else %}Не тестировать карту стола перед печатью // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}{% endif %}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}
    RESPOND PREFIX="//" MSG="{% if lang == "en" %}Play MIDI on print start: {zmidi_start}{% else %}Играть MIDI при запуске печати: {zmidi_start}{% endif %} // SAVE_ZMOD_DATA MIDI_START={zmidi_start}"
    SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'

    {% set zmidi_pause = printer.save_variables.variables.midi_pause|default("") | string %}
    RESPOND PREFIX="//" MSG="{% if lang == "en" %}Play MIDI on print pause: {zmidi_pause}{% else %}Играть MIDI при паузе печати: {zmidi_pause}{% endif %} // SAVE_ZMOD_DATA MIDI_PAUSE={zmidi_pause}"
    SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'

    {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% if zforce_md5 == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Check file MD5 checksum{% else %}Проверять MD5 сумму файла{% endif %} // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't check file MD5 checksum{% else %}Не проверять MD5 сумму файла{% endif %} // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}

    {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% if zdisable_skew == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}SKEW correction disabled{% else %}SKEW коррекция отключена{% endif %} // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}SKEW correction enabled. Profile skew_profile{% else %}SKEW коррекция включена. Профиль skew_profile{% endif %} // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}

    {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}
    {% if zload_zoffset == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Load Z-OFFSET from global settings{% else %}Загрузка Z-OFFSET из глобальных параметров{% endif %} // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't load Z-OFFSET from global settings{% else %}Не загружать Z-OFFSET из глобальных параметров{% endif %} // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}

    {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% if zdisable_priming == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Disable nozzle line purge{% else %}Выключить очистку сопла линией{% endif %} // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Enable nozzle line purge{% else %}Включить очистку сопла линией{% endif %} // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}

    {% if not client.ff5x %}
        {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
        {% if zpreclear == 1 %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Use nozzle pre-purge{% else %}Использовать предочистку сопла{% endif %} // SAVE_ZMOD_DATA PRECLEAR={zpreclear}"
        {% else %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't use nozzle pre-purge{% else %}Не использовать предочистку сопла{% endif %} // SAVE_ZMOD_DATA PRECLEAR={zpreclear}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% endif %}

    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE") | string %}
    RESPOND PREFIX="//" MSG="{% if lang == "en" %}Purge algorithm: {zclear}{% else %}Алгоритм очистки: {zclear}{% endif %} // SAVE_ZMOD_DATA CLEAR={zclear}"
    SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Parameters used at print end and cancellation [END_PRINT]{% else %}Параметры используемые при окончании и отмене печати [END_PRINT]{% endif %}"

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    RESPOND PREFIX="//" MSG="{% if lang == "en" %}Play MIDI at print end: {zmidi_end}{% else %}Играть MIDI в конце печати: {zmidi_end}{% endif %} // SAVE_ZMOD_DATA MIDI_END={zmidi_end}"
    SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'

    {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(0) | int %}
    SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
    {% if zclose_dialogs == 0 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't close dialogs on native screen{% else %}Не закрывать диалоги на родном экране{% endif %} // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% else %}
        {% if client.ff5x %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% endif %}
    {% endif %}
    {% if zclose_dialogs == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Auto close dialogs on native screen after 20 sec (slow){% else %}Автоматически закрывать диалоги на родном экране через 20 секунд (медленно){% endif %} // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}
    {% if zclose_dialogs == 2 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Auto close dialogs on native screen after 20 sec (fast){% else %}Автоматически закрывать диалоги на родном экране через 20 секунд (быстро){% endif %} // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}

    {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
    {% if zstop_motor == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Auto disable motors after print/cancel in 25 sec{% else %}Автоматически выключать моторы после печати/отмены печати через 25 секунд{% endif %} // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't disable motors automatically after print/cancel{% else %}Не выключать моторы автоматически после печати/отмены печати{% endif %} // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}

    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% if zauto_reboot == 0 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't reboot printer automatically{% else %}Не перезапускать принтер автоматически{% endif %} // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Auto reboot printer after 1.5 minutes{% else %}Автоматически перезапускать принтер через 1.5 минуты после печати{% endif %} //SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 2 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Auto reboot printer after 1.5 minutes{% else %}Автоматически перезапускать принтер через 1.5 минуты после печати{% endif %} //SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% else %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Auto restart firmware after 1.5 minutes{% else %}Автоматически перезапускать прошивку через 1.5 минуты после печати{% endif %} //SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}

    {% if not client.ff5x %}
        {% set pro_poweroff_timeout = printer.save_variables.variables.pro_poweroff_timeout|default(0) | int %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Power off FF5M Pro after (min): {timeout}{% else %}Выключать FF5M Pro через (мин): {pro_poweroff_timeout}{% endif %} // SAVE_ZMOD_DATA PRO_POWEROFF_TIMEOUT={pro_poweroff_timeout}"
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% endif %}

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}System-wide parameters{% else %}Общесистемные параметры{% endif %}"

    {% set save_restore = printer.save_variables.variables.save_restore|default(1) | int %}
    {% if save_restore == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Saving controlled by native screen{% else %}Сохранение управляется родным экраном{% endif %} // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Save data for print recovery{% else %}Сохранять данные для восстановления печати{% endif %} // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% else %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Saving controlled by native screen{% else %}Сохранение управляется родным экраном{% endif %} // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't save data for print recovery{% else %}Не сохранять данные для восстановления печати{% endif %} // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}

    {% if not client.ff5x %}
        {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
        {% if motion_sensor == 1 %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Using filament motion sensor{% else %}Используется датчик движения филамента{% endif %} // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
            {% if screen == True %}
                RESPOND PREFIX="//" MSG="{% if lang == "en" %}Disable filament sensor on native screen{% else %}Отключите датчик филамента на родном экране{% endif %}"
            {% endif %}
        {% else %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Using filament presence sensor{% else %}Используется датчик наличия филамента{% endif %} // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}

    {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
    {% if fix_scv == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Use SCV from config for shaper graphs{% else %}Использовать SCV из конфигурации при построении графиков шейперов{% endif %} // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Use SCV = 5 for shaper graphs{% else %}Использовать SCV = 5 при построении графиков шейперов{% endif %} // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}

    {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(0) | int %}
    {% if fix_e0011 == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Fix E0011 error{% else %}Исправить ошибку E0011{% endif %} // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't fix E0011 error{% else %}Не исправлять ошибку E0011{% endif %} // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    RUN_SHELL_COMMAND CMD=zfix_e0011 PARAMS="{fix_e0011}"

    {% set fix_e0017 = printer.save_variables.variables.fix_e0017|default(1) | int %}
    {% if fix_e0017 == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Fix E0017 error{% else %}Исправить ошибку E0017{% endif %} // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Don't fix E0017 error{% else %}Не исправлять ошибку E0017{% endif %} // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    RUN_SHELL_COMMAND CMD=zfix_e0017 PARAMS="{fix_e0017}"

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    RESPOND PREFIX="//" MSG="{% if lang == "en" %}LED brightness at power on: {zled}{% else %}Яркость LED при включении: {zled}{% endif %} // SAVE_ZMOD_DATA LED={zled}"
    SAVE_VARIABLE VARIABLE=led VALUE={zled|int}

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    RESPOND PREFIX="//" MSG="{% if lang == "en" %}Play MIDI at power on: {zmidi_on}{% else %}Играть MIDI при включении: {zmidi_on}{% endif %} // SAVE_ZMOD_DATA MIDI_ON={zmidi_on}"
    SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'

    {% if not client.ff5x %}
        {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
        {% if znew_save_config == 1 %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Use alternative NEW_SAVE_CONFIG{% else %}Использовать альтернативный NEW_SAVE_CONFIG{% endif %} // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% else %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Use standard SAVE_CONFIG{% else %}Использовать стандартный SAVE_CONFIG{% endif %} // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% else %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE=0
    {% endif %}

    {% if not client.ff5x %}
        {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
        {% if zuse_swap == 0 %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}SWAP not used{% else %}SWAP не используется{% endif %} // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 1 %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}SWAP used on EMMC{% else %}SWAP используется на EMMC{% endif %} // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 2 %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}SWAP used on USB FLASH{% else %}SWAP используется на USB FLASH{% endif %} // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}

    {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(0) | int %}
    {% if zchina_cloud == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Allow Chinese clouds{% else %}Разрешить китайские облака{% endif %} // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Block Chinese clouds{% else %}Запретить китайские облака{% endif %} // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% endif %}
