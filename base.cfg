[zmod]
[include ../mod_data/lang.cfg]

[skew_correction]

[firmware_retraction]
retract_length: 0.7
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

[include shell.cfg]
[include ff5.cfg]

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
gcode:
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}

    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Using KAMP"{% else %}"Использую KAMP"{% endif %}
        _KAMP_BED_MESH_CALIBRATE
    {% else %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Using BED_MESH_CALIBRATE"{% else %}"Использую BED_MESH_CALIBRATE"{% endif %}
        _BED_MESH_CALIBRATE {rawparams}
    {% endif %}

[gcode_macro _G28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28 Z
        M400
        G28 X
        M400
        G28 Y
        M400
    {% endif %}

[gcode_macro CHECK_MD5]
description: Проверка MD5 суммы файла
gcode:
  {% if 'FILENAME' in params %}
    {% set filename = params.FILENAME|default("")|string %}
  {% else %}
    {% set filename = printer.virtual_sdcard.file_path|default("")|string  %}
  {% endif %}

  SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

  {% if filename != "" %}

    {% if 'DELETE' in params %}
      {% set delete = params.DELETE|default("False")|string %}
    {% endif %}

    RUN_SHELL_COMMAND CMD=check_md5 PARAMS={'"%s %s"' % (filename.replace(" ", "\ "), delete)}
    {% for i in range(30) %}
        ZLOAD_VARIABLE
        _CHECK_MD5
    {% endfor %}

    ZLOAD_VARIABLE
    _FINAL_CHECK_MD5 FILENAME="'{filename}'"

  {% endif %}

[gcode_macro _CHECK_MD5]
description: Ожидаем, когда проверка закончится
gcode:
    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}

    {% if (check_md5 == 0) %}
        G4 P{1000}
    {% endif %}

[gcode_macro _FINAL_CHECK_MD5]
description: Финальный тест
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set filename = params.FILENAME|default("")|string %}
    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}

    {% if (check_md5 == 0) %}
        RESPOND TYPE=error MSG={% if lang == "en" %}"Error: File '{filename}' was not verified in time. Print canceled."{% else %}"Ошибка: Файл '{filename}' не был проверен за отведенное время. Печать отменена."{% endif %}
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 1) %}
        RESPOND TYPE=error MSG={% if lang == "en" %}"Error: File '{filename}' not specified. Print canceled."{% else %}"Ошибка: Файл '{filename}' не указан. Печать отменена."{% endif %}
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 2) %}
        RESPOND TYPE="error" MSG={% if lang == "en" %}"Error: File {filename} not found. Print canceled."{% else %}"Ошибка: Файл {filename} не найден. Печать отменена."{% endif %}
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 3) %}
        RESPOND TYPE="error" MSG={% if lang == "en" %}"File {filename} has no MD5 checksum. Enable it in Orca. https://github.com/ghzserg/zmod/wiki/Recomendations_en"{% else %}"В файле {filename} нет MD5 суммы. Включите ее в Orca. https://github.com/ghzserg/zmod/wiki/Recomendations"{% endif %}
    {% endif %}
    {% if (check_md5 == 4) %}
        {% if not client.ff5x %}
            RESPOND TYPE="error" MSG={% if lang == "en" %}"File {filename} contains arc commands (G2, G3). Disable them. In Orca: Process Profile -> Arc Approximation -> Uncheck"{% else %}"В файле {filename} найдено использование дуг(G2, G3). Отключите их. В Orca: Профиль процесса -> Аппроксимация дугами. Убрать галочку."{% endif %}
            RESPOND PREFIX="info" MSG={% if lang == "en" %}"Replace Spiral/Auto Z-Hop. In Orca: Printer Profile -> Extruder 1 -> Z Hop Type -> Set to Normal or Sloped"{% else %}"Замените Cпиральный/Автоматич. Z-Hop. В Orca: Профиль принтера -> Экструдер 1 -> Тип подъема оси Z. Установите Обычный или Наклонный."{% endif %}
        {% endif %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"File {filename} verified successfully. MD5 checksum matches."{% else %}"Файл {filename} проверен успешно. MD5 сумма совпала."{% endif %}
    {% endif %}
    {% if (check_md5 == 8) %}
        {% if not client.ff5x %}
            RESPOND TYPE="error" MSG={% if lang == "en" %}"File {filename} uses unsupported G17/G18/G19 commands. Replace Z-Hop type."{% else %}"В файле {filename} найдено использование (G17, G18, G19). Замените Cпиральный/Автоматич. Z-Hop. Принтер его не поддерживает."{% endif %}
            RESPOND PREFIX="info" MSG={% if lang == "en" %}"In Orca: Printer Profile -> Extruder 1 -> Z Hop Type -> Set to Normal or Sloped"{% else %}"В Orca: Профиль принтера -> Экструдер 1 -> Тип подъема оси Z. Установите Обычный или Наклонный."{% endif %}
        {% endif %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"File {filename} verified successfully. MD5 checksum matches."{% else %}"Файл {filename} проверен успешно. MD5 сумма совпала."{% endif %}
    {% endif %}
    {% if (check_md5 == 5) %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"File {filename} verified successfully. MD5 checksum matches."{% else %}"Файл {filename} проверен успешно. MD5 сумма совпала."{% endif %}
    {% endif %}
    {% if (check_md5 == 6) %}
        RESPOND TYPE="error" MSG={% if lang == "en" %}"File {filename} MD5 mismatch. File deleted. Print canceled"{% else %}"В файле {filename} не совпала MD5 сумма. Файл удален. Печать отменена"{% endif %}
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 7) %}
        RESPOND TYPE="error" MSG={% if lang == "en" %}"File {filename} MD5 mismatch. Print canceled"{% else %}"В файле {filename} не совпала MD5 сумма. Печать отменена"{% endif %}
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}

[gcode_macro _FINAL_STOP_MD5]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {action_raise_error(
        "MD5 check failed. Print canceled." if lang == "en" 
        else "Проверка MD5 завершилась с ошибкой. Печать отменена."
    )}

[gcode_macro BED_LEVEL_SCREWS_TUNE]
description: Калибровка винтов стола
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(130)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    RESPOND PREFIX="info" MSG={% if lang == "en" %}"Before measurements, don't forget to clean the nozzle with CLEAR_NOZZLE macro"{% else %}"До измерений, не забудьте почистить сопло макросом CLEAR_NOZZLE"{% endif %}

    BED_MESH_CLEAR
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed  MINIMUM={bed_temp-2} MAXIMUM={bed_temp+3}
    TEMPERATURE_WAIT SENSOR=extruder  MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+3}

    G28 Z
    M400
    G28 X
    M400
    G28 Y
    M400

    LOAD_CELL_TARE

    SCREWS_TILT_CALCULATE

[gcode_macro _FULL_BED_LEVEL]
description: Калибровка стола без выключения температуры
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set profile = params.PROFILE|default("auto") %}


    RESPOND PREFIX="info" MSG={% if lang == "en" %}"Bed calibration. Profile {profile}. Extruder temp: {extruder_temp} / Bed temp: {bed_temp}"{% else %}"Калибровка стола. Профиль {profile}. {extruder_temp}/{bed_temp}"{% endif %}

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    # Начинаем калибровку
    _BED_MESH_CALIBRATE PROFILE="{profile}"

    _UGOL_PARK

[gcode_macro AUTO_FULL_BED_LEVEL]
description: Калибровка стола c выключением температуры
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set profile = params.PROFILE|default("auto") %}

    _FULL_BED_LEVEL EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} PROFILE={profile}

    # Выклчюаем обогрев
    _STOP

[include ./KAMP/KAMP_Settings.cfg]

[gcode_macro KAMP]
description: Адаптивная кровать
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    _KAMP_BED_MESH_CALIBRATE

    _SMART_PARK

    M190 S{bed_temp}
    M109 S{extruder_temp}

# Калибровка PID экструдера
[gcode_macro PID_TUNE_EXTRUDER]
description: Калибровка PID экструдера
gcode:
    {% set temperature = params.TEMPERATURE|default(245) %}
    {% set cooler = params.COOLER|default(255) %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    G28 Z
    M400
    G28 X
    M400
    G28 Y
    M400

    G1 X{client.min_x+(client.max_x-client.min_x)/2} Y{client.min_y+(client.max_y-client.min_y)/2}

    M106 P0 S{cooler}
    PID_CALIBRATE HEATER=extruder TARGET={temperature}
    {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
    {% if znew_save_config == 1 %}
        NEW_SAVE_CONFIG
    {% else %}
        SAVE_CONFIG
    {% endif %}

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  125
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}

    {% set m600_temp = printer["gcode_macro M600"].zextruder_temp|float %}

    {% set extruder_temp = params.EXTRUDER_TEMP|default(m600_temp) | float %}
    {% set extrude_len   = params.EXTRUDE_LEN|default(load_distance) |float %}
    {% set speed = params.SPEED|default(450)|float %}

    RESPOND PREFIX="info" MSG={% if lang == "en" %}"Loading filament at {extruder_temp} for {extrude_len}mm at {speed/60} mm/s"{% else %}"Загрузка филамента с температурой {extruder_temp} на {extrude_len} мм со скоростью {speed/60} мм/с"{% endif %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-1}

    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E{extrude_len} F{speed} ; extrude with 7.5mm/s
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  75
gcode:
    {% set speed = params.SPEED|default(450) %}

    {% set extruder_temp = printer["gcode_macro M600"].zextruder_temp|float %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}

    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E-{unload_distance} F{speed} ; unload
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro PURGE_FILAMENT]
variable_purge_distance:  25
gcode:
    {% set speed = params.SPEED|default(450) %}

    {% set extruder_temp = printer["gcode_macro M600"].zextruder_temp|float %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}

    SAVE_GCODE_STATE NAME=purge_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E{purge_distance} F{speed}   ; purge
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE NAME=purge_state

[gcode_macro LOAD_MATERIAL]
description: Manual filament loading / change
variable_initial_target_temp: 0
gcode:
    # save gcode state
    SAVE_GCODE_STATE NAME=load_material_state
    # save heating state
    SET_GCODE_VARIABLE MACRO=LOAD_MATERIAL VARIABLE=initial_target_temp VALUE={printer["extruder"].target}

    _LOAD_MATERIAL_SELECT

[gcode_macro _LOAD_MATERIAL_SELECT]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% if not printer["extruder"].target >= printer.configfile.settings['extruder'].min_extrude_temp %}
        RESPOND TYPE=command MSG="action:prompt_begin {% if lang == "en" %}Material selection{% else %}Выбор материала{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}Select material to load{% else %}Какой материал загружать{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button PLA|_LOAD_MATERIAL_HEATUP TEMP=210|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG|_LOAD_MATERIAL_HEATUP TEMP=240|primary"
        RESPOND TYPE=command MSG="action:prompt_button ABS|_LOAD_MATERIAL_HEATUP TEMP=250|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button {% if lang == "en" %}Cancel{% else %}Отмена{% endif %}|_LOAD_MATERIAL_END"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={printer["extruder"].target}
        _LOAD_MATERIAL_ACTION
    {% endif %}

[gcode_macro _LOAD_MATERIAL_HEATUP]
gcode:
    {% set extruder_temp = params.TEMP|default(200)|float %}
    M104 S{extruder_temp}
    RESPOND TYPE=command MSG=action:prompt_end
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}
    _LOAD_MATERIAL_ACTION

[gcode_macro _LOAD_MATERIAL_ACTION]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND TYPE=command MSG="action:prompt_begin {% if lang == "en" %}Filament management{% else %}Загрузка филамента{% endif %}"
    RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}Select action{% else %}Что сделать?{% endif %}"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button {% if lang == "en" %}Load{% else %}Загрузить{% endif %}|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button {% if lang == "en" %}Unload{% else %}Выгрузить{% endif %}|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button {% if lang == "en" %}Purge{% else %}Очистить{% endif %}|PURGE_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button {% if lang == "en" %}OK{% else %}Ок{% endif %}|_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    # restore old temp
    M104 S{printer["gcode_macro LOAD_MATERIAL"].initial_target_temp}
    # restore gcode state
    RESTORE_GCODE_STATE NAME=load_material_state

[gcode_macro M600]
description: Пауза и смена филамента
variable_zextruder_temp: 240.0
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set extruder_temp = printer[printer.toolhead.extruder].target if printer.toolhead.extruder != '' else 240.0 %}
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=zextruder_temp VALUE={extruder_temp|float}

    RESPOND PREFIX="info" MSG={% if lang == "en" %}"Nozzle temperature {extruder_temp}"{% else %}"Температура сопла {extruder_temp}"{% endif %}

    PAUSE

    RESPOND TYPE=command MSG="action:prompt_begin {% if lang == "en" %}Filament Change{% else %}Замена филамента{% endif %}"
    RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}Filament change requested. Load new filament and click 'Resume'.{% else %}Запрошена замена нити. Загрузите новую нить и нажмите «возобновить».{% endif %}"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button {% if lang == "en" %}Load{% else %}Загрузить{% endif %}|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button {% if lang == "en" %}Unload{% else %}Выгрузить{% endif %}|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button {% if lang == "en" %}Purge{% else %}Очистить{% endif %}|PURGE_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button {% if lang == "en" %}Resume{% else %}Возобновить{% endif %}|_INTERACTIVE_LOAD_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _INTERACTIVE_LOAD_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESUME

[gcode_macro _SHUTDOWN]
variable_trigger_allowed: False
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if trigger_allowed %}
        {% if not client.ff5x %}
            SET_PIN PIN=clear_power_off VALUE=1
            G4 P500
            SET_PIN PIN=clear_power_off VALUE=0
        {% endif %}
        RESPOND TYPE=command MSG="action:prompt_begin {% if lang == "en" %}Shutdown printer?{% else %}Выключить принтер?{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}Shutdown printer?{% else %}Выключить принтер?{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button {% if lang == "en" %}Yes{% else %}Да{% endif %}|SHUTDOWN|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button {% if lang == "en" %}Cancel{% else %}Отмена{% endif %}|RESPOND TYPE=command MSG=action:prompt_end"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro SHUTDOWN]
description: Выключить принтер
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    RESPOND TYPE=command MSG="action:prompt_end"
    BED_MESH_CLEAR
    M400
    {% if not client.ff5x %}
        # Reset button state, otherwise only one trigger can occur
        SET_PIN PIN=clear_power_off VALUE=1
        # There is a deboucing circuit which needs some delay
        G4 P500
        # Disable pin again otherwise on reset the button will be triggered 1-3 times
        SET_PIN PIN=clear_power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=run_power_off
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    {% if not client.ff5x %}
        SET_PIN PIN=power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=poweroff

[gcode_macro REBOOT]
description: Перезагрузить принтер
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    BED_MESH_CLEAR
    M400
    {% if not client.ff5x %}
        # Reset button state, otherwise only one trigger can occur
        SET_PIN PIN=clear_power_off VALUE=1
        # There is a deboucing circuit which needs some delay
        G4 P500
        # Disable pin again otherwise on reset the button will be triggered 1-3 times
        SET_PIN PIN=clear_power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=reboot

[gcode_macro REMOVE_ZMOD]
description: Удалить zmod
gcode:
    {% set full = params.FULL|default(0)|int %}
    CLEAR_EMMC

    {% if full == 1 %}
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/FULL_REMOVE"
    {% else %}
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/REMOVE"
    {% endif %}

    RUN_SHELL_COMMAND CMD=sync
    RUN_SHELL_COMMAND CMD=reboot

[gcode_macro SKIP_ZMOD]
description: Перезагрузка в оригинальную систему. Без запуска zmod.
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set mute = params.MUTE|default(0)|int %}

    {% if mute == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin {% if lang == "en" %}Temporary ZMOD disable{% else %}Временно отключение ZMOD{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}After clicking OK the printer will be powered off{% else %}После нажатия на кнопку OK принтер будет выключен.{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}You need to disconnect power cord and then reconnect it{% else %}Нужно отключить питание от принетра, а потом его включить{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}Printer will boot into stock firmware{% else %}Принтер загрузится в родную прошивку{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_footer_button {% if lang == "en" %}OK{% else %}Ok{% endif %}|SKIP_ZMOD MUTE=1"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/SKIP_ZMOD"
        RUN_SHELL_COMMAND CMD=sync
        RUN_SHELL_COMMAND CMD=poweroff
    {% endif %}

[gcode_macro LED_ON]
description: Включить подсветку
gcode:
    SET_LED LED=chamber_led WHITE=1

[gcode_macro LED_OFF]
description: Выключить подсветку
gcode:
    SET_LED LED=chamber_led WHITE=0

[gcode_macro LED]
description: Включить подсветку на несколько процентов
gcode:
    {% set S = params.S|default(50)|int %}
    SET_LED LED=chamber_led WHITE={S/100|float}

[gcode_macro DISPLAY_ON]
description: Включить стандартный экран и перезагрузить принтер
gcode:
    SAVE_VARIABLE VARIABLE=display_off VALUE=0
    RUN_SHELL_COMMAND CMD=zdisplay PARAMS="on"

[gcode_macro DISPLAY_OFF]
description: Выключить стандартный экран
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set guppy = params.GUPPY|default(1)|int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}

    SAVE_VARIABLE VARIABLE=display_off VALUE=1
    RESPOND PREFIX="info" MSG={% if lang == "en" %}"Do not disable display if you don't fully understand bed leveling, z-offset and START_PRINT/END_PRINT macros"{% else %}"Не отключайте экран, если вы четко не понимаете как работает карта стола, z-offset и макросы START_PRINT и END_PRINT"{% endif %}
    RESPOND PREFIX="info" MSG={% if lang == "en" %}"https://github.com/ghzserg/zmod/wiki/FAQ_en"{% else %}"https://github.com/ghzserg/zmod/wiki/FAQ"{% endif %}

    {% if guppy == 1 %}
        RESPOND PREFIX="info" MSG={% if lang == "en" %}"Loading GuppyScreen"{% else %}"Будет загружен GuppyScreen"{% endif %}
        {% if load_zoffset == 0 %}
            RESPOND PREFIX="info" MSG={% if lang == "en" %}"Use Z-OFFSET loading from global parameters to control Z-OFFSET with GuppyScreen"{% else %}"Используйте загрузку Z-OFFSET из глобальных параметров, чтобы управлять Z-OFFSET c GuppyScreen"{% endif %}
            RESPOND PREFIX="info" MSG="SAVE_ZMOD_DATA LOAD_ZOFFSET=1"
        {% endif %}
        RUN_SHELL_COMMAND CMD=zdisplay PARAMS="guppy"
        SAVE_VARIABLE VARIABLE=guppy VALUE={1|int}
    {% else %}
        RUN_SHELL_COMMAND CMD=zdisplay PARAMS="off"
        SAVE_VARIABLE VARIABLE=guppy VALUE={0|int}
    {% endif %}
    RESTART

[gcode_macro MEM]
description: Посмотреть расход памяти
gcode:
    RUN_SHELL_COMMAND CMD=zmem

[gcode_macro PLAY_MIDI]
description: Проиграть MIDI файл
variable_mute: 0
gcode:
    {% if mute == 0 %}
        {% set FILE = params.FILE|default("For_Elise.mid")|string %}
        RUN_SHELL_COMMAND CMD=audio_midi PARAMS="{FILE}"
    {% endif %}

[gcode_macro MUTE]
description: Заглушить звук
gcode:
    {% set mute = params.MUTE|default(1)|int %}
    SET_GCODE_VARIABLE MACRO=PLAY_MIDI VARIABLE=mute VALUE={mute}

[gcode_macro CAMERA_ON]
description: Использовать альтернативную реализацию камеры
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set WIDTH  = params.WIDTH|default(640)|int %}
    {% set HEIGHT = params.HEIGHT|default(480)|int %}
    {% set FPS    = params.FPS|default(20)|int %}
    {% set VIDEO  = params.VIDEO|default(client.video)|string %}
    {% set FS    = params.FS|default(0)|int %}

    RESPOND PREFIX="info" MSG={% if lang == "en" %}"Disable camera on printer screen"{% else %}"Отключите камеру на экране принтера"{% endif %}

    RUN_SHELL_COMMAND CMD=zcamera PARAMS="on {WIDTH} {HEIGHT} {FPS} {VIDEO} {FS} RESTART"

[gcode_macro CAMERA_OFF]
description: Отключить альтернативную реализацию камеры
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND PREFIX="info" MSG={% if lang == "en" %}"Enable camera on printer screen"{% else %}"Включите камеру на экране принтера"{% endif %}

    {% set WIDTH  = params.WIDTH|default(640)|int %}
    {% set HEIGHT = params.HEIGHT|default(480)|int %}
    {% set FPS    = params.FPS|default(20)|int %}
    {% set VIDEO  = params.VIDEO|default("video0")|string %}
    {% set FS    = params.FS|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zcamera PARAMS="off {WIDTH} {HEIGHT} {FPS} {VIDEO} {FS} RESTART"

[gcode_macro CAMERA_RESTART]
description: Перезапустить альтернативную камеру
gcode:
    RUN_SHELL_COMMAND CMD="s99camera" PARAMS="restart"

[gcode_macro DATE_GET]
description: Посмотреть время
gcode:
    {% set DT  = params.DT|default("")|string %}
    RUN_SHELL_COMMAND CMD=date

[gcode_macro DATE_SET]
description: Установить дату и время в формате 2024.01.01-00:00:00
gcode:
    {% set DT  = params.DT|default("2024.01.01-00:00:00")|string %}
    RUN_SHELL_COMMAND CMD=date PARAMS="date {DT}"

[gcode_macro WEB]
description: Сменить веб интерфейс fluidd/mainsail
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set mute = params.MUTE|default(0)|int %}

    {% if mute == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin {% if lang == "en" %}After macro execution press Ctrl + F5{% else %}После выполнения макроса нажмите Ctrl + F5{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_text {% if lang == "en" %}After macro execution press Ctrl + F5{% else %}После выполнения макроса нажмите Ctrl + F5{% endif %}"
        RESPOND TYPE=command MSG="action:prompt_footer_button OK|WEB MUTE=1"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RUN_SHELL_COMMAND CMD=zhttp
    {% endif %}

[gcode_macro _STOP]
description: Отключить нагрев и кулер
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}

    M400
    M220 S100               ; Скорость 100%
    M221 S100               ; Экструзия 100%
    M140 S0                 ; Отключить нагрев стола
    M104 S0                 ; Отключить нагрев экструдера
    M106 S0                 ; Отключить кулер
    M107                    ; Отключить кулер экструдера
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    {% if zmidi_end != "" %}
        PLAY_MIDI FILE={zmidi_end}
    {% endif %}
    EXCLUDE_OBJECT_DEFINE RESET=1
    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    RUN_SHELL_COMMAND CMD=znice

    {% set profile_name = printer.bed_mesh.profile_name %}
    {% if profile_name == "default" %}
        BED_MESH_CLEAR
        BED_MESH_PROFILE REMOVE=default
    {% endif %}

    ZCONTROL_OFF

    RESPOND PREFIX="info" MSG={% if lang == "en" %}"Work completed"{% else %}"Работа завершена"{% endif %}

[gcode_macro CHECK_SYSTEM]
description: Проверка операционной системы
gcode:
    {% set restore = params.RESTORE|default(0)|int %}

    {% if restore == 1 %}
        RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="restore"
    {% else %}
        RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="not_restore"
    {% endif %}

[gcode_macro SET_TIMEZONE]
description: Смена часового пояса
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% set ZONE  = params.ZONE|default("Europe/Moscow")|string %}
    RESPOND PREFIX="info" MSG="Europe/"
    {% if not client.ff5x %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/share/zoneinfo/Europe"
    {% else %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/data/.mod/.zmod/usr/share/zoneinfo/Europe"
    {% endif %}
    RESPOND PREFIX="info" MSG="Asia/"
    {% if not client.ff5x %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/share/zoneinfo/Asia"
    {% else %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/data/.mod/.zmod/usr/share/zoneinfo/Asia"
    {% endif %}
    RESPOND PREFIX="info" MSG="Use SET_TIMEZONE ZONE=Asia/Yekaterinburg"
    RUN_SHELL_COMMAND CMD=rm PARAMS="/etc/localtime"
    {% if not client.ff5x %}
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/share/zoneinfo/{ZONE} /etc/localtime"
    {% else %}
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/data/.mod/.zmod/usr/share/zoneinfo/{ZONE} /etc/localtime"
        RUN_SHELL_COMMAND CMD=rm PARAMS="/usr/data/.mod/.zmod/etc/localtime"
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/share/zoneinfo/{ZONE} /usr/data/.mod/.zmod/etc/localtime"
    {% endif %}
    RUN_SHELL_COMMAND CMD=date

[gcode_macro STOP_ZMOD]
description: Остановить fluidd/mainsail и moonraker
gcode:
    RUN_SHELL_COMMAND CMD=stop_zmod PARAMS="stop"

[gcode_macro START_ZMOD]
description: Запустить fluidd/mainsail и moonraker после STOP_ZMOD
gcode:
    RUN_SHELL_COMMAND CMD=stop_zmod PARAMS="up"

[gcode_macro TEST_EMMC]
description: Протестировать EMMC
gcode:
    {% set size    = params.SIZE|default(400)|int %}
    {% set sync    = params.SYNC|default(1)|int %}
    {% set flash   = params.FLASH|default(0)|int %}
    {% set random  = params.RANDOM|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zfs PARAMS="{size} {sync} {flash} {random}"

[gcode_macro CLEAR_EMMC]
description: Очистить EMMC
gcode:
    {% set log    = params.LOG|default(1)|int %}
    {% set any    = params.ANY|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zclear PARAMS="{log} {any}"

[gcode_macro ZSSH_ON]
description: Перенаправить moonraker и камеру на SSH сервер
gcode:
    {% set ssh_server  = params.SSH_SERVER|default("127.0.0.1")|string %}
    {% set ssh_port    = params.SSH_PORT|default(22)|int %}
    {% set ssh_user    = params.SSH_USER|default("user")|string %}
    {% set video_port  = params.VIDEO_PORT|default(8080)|int %}
    {% set moon_port   = params.MOON_PORT|default(7125)|int %}
    {% set remote_run  = params.REMOTE_RUN|default("NONE")|string %}
    RUN_SHELL_COMMAND CMD=zssh PARAMS="START {ssh_server} {ssh_port} {ssh_user} {video_port} {moon_port} '{remote_run}' RESTART"

[gcode_macro ZSSH_OFF]
description: Отключить проброс портов SSH
gcode:
    RUN_SHELL_COMMAND CMD=zssh PARAMS="STOP 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro ZSSH_RESTART]
description: Перезапуск SSH
gcode:
    RUN_SHELL_COMMAND CMD=zssh PARAMS="RESTART 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro ZSSH_RELOAD]
description: Запуск SSH, если он не запущен
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    {% if screen == True %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}You are using native screen{% else %}Вы работаете с родным экраном{% endif %}"
    {% else %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}You are NOT using native screen{% else %}Вы работаете БЕЗ родного экрана{% endif %}"
    {% endif %}

    {% set zklipper12 = printer.save_variables.variables.klipper12|default(0) | int %}
    {% if zklipper12 == 1 %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Using Klipper 12.{% else %}Используется Klipper 12.{% endif %}"
    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Using native Klipper.{% else %}Используется родной Klipper.{% endif %}"
    {% endif %}

    RUN_SHELL_COMMAND CMD=zssh PARAMS="RELOAD 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro _MESH_TEST]
description: Сравнивает экстремумы сетки с последним probe
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set mesh = printer.bed_mesh.profiles[profile_name] %}

    {% if mesh %}
        _MESH_PROBE
        _MESH_COMPARE
    {% else %}
        {% if lang == "en" %}
            {action_respond_info("WARNING: Bed mesh not loaded!")}
        {% else %}
            {action_respond_info("WARNING: Карта стола не загружена!")}
        {% endif %}
    {% endif %}

[gcode_macro _MESH_PROBE]
gcode:
    _G28
    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = G10 | string %}
        {% set UNRETRACT = G11 | string %}
    {% else %}
        {% set RETRACT = 'G1 E-.5 F2100' | string %}
        {% set UNRETRACT = 'G1 E.5 F2100' | string %}
    {% endif %}

    G92 E0
    G90
    _CLIENT_LINEAR_MOVE X=-3
    G1 Z5 F6000
    {RETRACT}
    LOAD_CELL_TARE
    PROBE
    G1 Z5 F6000
    {UNRETRACT}

[gcode_macro _MESH_COMPARE]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set mesh = printer.bed_mesh %}
    {% set last_probe = printer.probe.last_z_result %}

    {% if mesh and 'mesh_matrix' in mesh %}
        {% set all_z = mesh.mesh_matrix | sum(start=[]) %}
        {% set min_z = all_z | min %}
        {% set max_z = all_z | max %}

        {% if lang == "en" %}
            {action_respond_info("Current profile: %s" % profile_name)}
            {action_respond_info("Minimum map: %.3f mm | Delta: %.3f mm" % (min_z, max_z - min_z))}
            {action_respond_info("Maximum map: %.3f mm | Last probe: %.3f mm" % (max_z, last_probe))}
        {% else %}
            {action_respond_info("Текущий профиль: %s" % profile_name)}
            {action_respond_info("Минимум карты: %.3f мм | Дельта: %.3f мм" % (min_z, max_z - min_z))}
            {action_respond_info("Максимум карты: %.3f мм | Последний probe: %.3f мм" % (max_z, last_probe))}
        {% endif %}

        {% if last_probe < min_z - 0.21 %}
            {% if lang == "en" %}
                {action_respond_info("Possible wrong profile loaded (different plate/temperature)")}
                {action_respond_info("Disable check with: MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
                {action_raise_error("WARNING: Last probe BELOW mesh minimum by %.3f mm!" % (min_z - last_probe))}
            {% else %}
                {action_respond_info("Возможно загружен профиль от другой пластины или снятый для другой температуры")}
                {action_respond_info("Если считаете что сообщение ошибочно, отключите проверку MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
                {action_raise_error("WARNING: Последний probe НИЖЕ минимума карты стола на %.3f мм!" % (min_z - last_probe))}
            {% endif %}

        {% elif last_probe > max_z + 0.21 %}
            {% if lang == "en" %}
                {action_respond_info("Possible wrong profile loaded (different plate/temperature)")}
                {action_respond_info("Disable check with: MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
                {action_raise_error("WARNING: Last probe ABOVE mesh maximum by %.3f mm!" % (last_probe - max_z))}
            {% else %}
                {action_respond_info("Возможно загружен профиль от другой пластины или снятый для другой температуры")}
                {action_respond_info("Если считаете что сообщение ошибочно, отключите проверку MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
                {action_raise_error("WARNING: Последний probe ВЫШЕ карты стола на %.3f мм!" % (last_probe - max_z))}
            {% endif %}

        {% else %}
            {% if lang == "en" %}
                {action_respond_info("OK: Probe within mesh extremes")}
            {% else %}
                {action_respond_info("OK: Probe в пределах экстремумов сетки")}
            {% endif %}
        {% endif %}

    {% else %}
        {% if lang == "en" %}
            {action_respond_info("Profile or mesh matrix not found")}
        {% else %}
            {action_respond_info("Профиль или матрица сетки не найдены")}
        {% endif %}
    {% endif %}

[gcode_macro _START_MESH]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}

    {% if skip_leveling == False %}
        {% if force_kamp == True %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}KAMP started SKIP_LEVELING={skip_leveling} FORCE_KAMP={force_kamp}{% else %}Запущен KAMP SKIP_LEVELING={skip_leveling} FORCE_KAMP={force_kamp}{% endif %}"

            {% set screen = printer["gcode_macro START_PRINT"].screen %}
            {% if screen == True %}
                RESPOND PREFIX="info" MSG="{% if lang == "en" %}Did you know you can enable KAMP globally?{% else %}А вы знали, что можно прописать запуск KAMP глобально?{% endif %}"
                RESPOND PREFIX="//" MSG="SAVE_ZMOD_DATA USE_KAMP=1 CLEAR=LINE_PURGE"
            {% endif %}
            KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}

        {% else %}
            {% if (not printer['bed_mesh'].profile_name) or force_leveling == True %}
                {% if mesh != "" %}
                    RESPOND PREFIX="!!" MSG="{% if lang == "en" %}Building {mesh} mesh (not found). Save it AFTER print!{% else %}Запущено построение карты стола {mesh}, т.к. она не найдена. Сохраните ее ПОСЛЕ печати{% endif %}"
                    _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE={mesh}

                {% else %}
                    {% if force_leveling == True %}
                        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Building default mesh (FORCE_LEVELING={force_leveling}){% else %}Запущено построение карты стола default (FORCE_LEVELING={force_leveling}){% endif %}"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=default

                    {% else %}
                        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Building auto mesh (no loaded profile){% else %}Запущено построение карты стола auto, т.к. не загружена ни одна карта{% endif %}"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=auto
                    {% endif %}
                {% endif %}
            {% endif %}
            {% set cur_mesh = printer['bed_mesh'].profile_name %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}No need for leveling. Loaded profile: {cur_mesh}{% else %}Нет необходимости строить карту стола. Загружен профиль {cur_mesh}{% endif %}"
        {% endif %}

    {% else %}
        RESPOND PREFIX="//" MSG="{% if lang == "en" %}Skipping bed leveling. SKIP_LEVELING={skip_leveling}{% else %}Карта стола не строится. SKIP_LEVELING={skip_leveling}{% endif %}"
    {% endif %}

[gcode_macro _PRINT_MESH]
gcode:
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    {% set cur_mesh = printer['bed_mesh'].profile_name %}

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Printing with bed mesh: {cur_mesh}{% else %}Печать идет с картой стола: {cur_mesh}{% endif %}"

[gcode_macro _START_PRINT]
description: Замена стандартного стартового G-code
variable_zextruder_temp: 245.0
variable_zbed_temp: 80.0
variable_zforce_kamp: False
variable_zforce_leveling: False
variable_zskip_leveling: False
variable_zskip_zoffset: False
variable_zzoffset: 0.0
variable_zmesh: ""
gcode:
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}              ; if True it forces the KAMP bed level process
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}      ; if True it forces the bed level process
    {% set zoffset = printer["gcode_macro _START_PRINT"].zzoffset %}                    ; Установить Z offset
    {% set skip_zoffset = printer["gcode_macro _START_PRINT"].zskip_zoffset %}          ; Для печати с родного экрана не устанавливать Z offset
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}        ; Не строить карту
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}                          ; Имя профиля карты стола

    {% set force_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% set disable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% set disable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}
    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE")|string %}
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}

    {% set screen = printer["gcode_macro START_PRINT"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}

    UPDATE_DELAYED_GCODE ID=_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_FAST_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_STOP_MOTOR DURATION=0
    UPDATE_DELAYED_GCODE ID=_AUTO_REBOOT DURATION=0
    UPDATE_DELAYED_GCODE ID=_PRO_POWEROFF DURATION=0
    UPDATE_DELAYED_GCODE ID=_GOTO_PAUSE DURATION=0

    CLEAR_PAUSE
    ZCONTROL_ABORT
    ZCONTROL_ON
    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    ZSSH_RELOAD

    RESPOND PREFIX="info" MSG="START_PRINT BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} FORCE_LEVELING={force_leveling} FORCE_KAMP={force_kamp} Z_OFFSET={zoffset} SKIP_ZOFFSET={skip_zoffset} SKIP_LEVELING={skip_leveling} MESH={mesh}"

    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Extruder temperature: {extruder_temp}{% else %}Температура экструдера: {extruder_temp}{% endif %}"
    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Bed temperature: {bed_temp}{% else %}Температура стола: {bed_temp}{% endif %}"

    {% if zprint_leveling == 0 %}
        {% if force_kamp == True %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}KAMP: enabled{% else %}KAMP: включено{% endif %}"
        {% else %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}KAMP: disabled{% else %}KAMP: выключено{% endif %}"
        {% endif %}

        {% if force_leveling == True %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}Forced bed leveling: enabled{% else %}Снятие карты стола принудительно: включено{% endif %}"
        {% else %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}Forced bed leveling: disabled{% else %}Снятие карты стола принудительно: выключено{% endif %}"
        {% endif %}

        {% if skip_leveling == True %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}Skip bed leveling: enabled{% else %}Не снимать карту стола: включено{% endif %}"
        {% else %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}Skip bed leveling: disabled{% else %}Не снимать карту стола: выключено{% endif %}"
        {% endif %}

        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Load bed mesh: {mesh}{% else %}Подгружать карту стола: {mesh}{% endif %}"
    {% endif %}

    {% if screen == False %}
        {% if force_md5 == 1 %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}MD5: enabled{% else %}MD5: включено{% endif %}"
        {% else %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}MD5: disabled{% else %}MD5: выключено{% endif %}"
        {% endif %}
    {% endif %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Nozzle priming: disabled{% else %}Очистка сопла линией: выключено{% endif %}"
    {% else %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Nozzle priming: enabled{% else %}Очистка сопла линией: включено{% endif %}"
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Priming algorithm: {zclear}{% else %}Алгоритм очистки: {zclear}{% endif %}"
    {% endif %}

    {% if disable_skew == 1 %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}SKEW: disabled{% else %}SKEW: выключен{% endif %}"
    {% else %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}SKEW: enabled{% else %}SKEW: включен{% endif %}"
    {% endif %}

    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}
    {% if ( (force_md5 == 1) and ( (screen == False) or (check_md5 == 0) ) ) %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}MD5 check started{% else %}Запущена проверка MD5{% endif %}"
        CHECK_MD5 DELETE=True
    {% endif %}

    M140 S{bed_temp}        ; start bed heating
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    {% if (load_zoffset == 1) and (screen == False) %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Using global Z-Offset control. SKIP_ZOFFSET and Z_OFFSET parameters ignored{% else %}Используется глобальное управление Z-Offset. Параметры SKIP_ZOFFSET и Z_OFFSET игнорируются{% endif %}"
        LOAD_GCODE_OFFSET
    {% else %}
        {% if (load_zoffset == 1) and (screen == True) %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}Global Z-OFFSET load: ignored (working with screen){% else %}Глобальная загрузка Z-OFFSET: игнорируется (работа с экраном){% endif %}"
        {% endif %}

        {% if skip_zoffset == True %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}Z-offset setup skipped, SKIP_ZOFFSET={skip_zoffset}{% else %}Установка Z-offset пропущена, SKIP_ZOFFSET={skip_zoffset}{% endif %}"
        {% else %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}Setting Z-offset {zoffset}, SKIP_ZOFFSET={skip_zoffset}{% else %}Установка Z-offset {zoffset}, SKIP_ZOFFSET={skip_zoffset}{% endif %}"
            SET_GCODE_OFFSET Z={zoffset}
        {% endif %}
    {% endif %}

    _G28

    {% if not client.ff5x %}
        {% set we = printer['temperature_sensor weightValue'].temperature %}
        {% if we != 0 %}
            LOAD_CELL_TARE
        {% endif %}
    {% endif %}

    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Building bed mesh with native screen on each print. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% else %}При каждой печати строить карту стола средствами родного экрана. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% endif %}"
        {% else %}
            RESPOND PREFIX="//" MSG="{% if lang == "en" %}Building bed mesh on each print. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% else %}При каждой печати строить карту стола. // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}{% endif %}"
            BED_MESH_CLEAR
            M400
            {% if zuse_kamp == 1 %}
                RESPOND PREFIX="info" MSG="{% if lang == "en" %}Using KAMP from global settings. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}{% else %}Использую KAMP из глобальных параметров. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}{% endif %}"
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% else %}
                RESPOND PREFIX="info" MSG="{% if lang == "en" %}Building full bed mesh. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}{% else %}Строится полная карта стола. // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}{% endif %}"
                _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% endif %}
        {% endif %}

        RESPOND PREFIX="//" MSG="{% if lang == "en" %}All START_PRINT parameters for bed leveling are ignored{% else %}Все параметры START_PRINT для построения карты стола игнорируются{% endif %}"
    {% else %}
        {% if mesh != "" %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}Trying to load bed mesh: {mesh}{% else %}Пробую загрузить карту стола: {mesh}{% endif %}"
            BED_MESH_CLEAR
            M400
            {% for mesh_dt in printer['bed_mesh'].profiles %}
                {% if mesh == mesh_dt %}
                    BED_MESH_PROFILE LOAD={mesh}
                    RESPOND PREFIX="info" MSG="{% if lang == "en" %}Bed mesh {mesh} loaded{% else %}Карта стола {mesh} загружена{% endif %}"
                {% endif %}
            {% endfor %}
        {% endif %}

        _START_MESH
    {% endif %}

    # load skew profile
    {% if disable_skew == 0 %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Loading skew_profile{% else %}Загрузка skew_profile{% endif %}"
        SKEW_PROFILE LOAD=skew_profile
    {% endif %}

    G90                     ; use absolute coordinates
    {% if ((zprint_leveling == 0) and (force_kamp == True)) or ((zprint_leveling == 1) and (screen == False) and (zuse_kamp == 1)) or (zclear == "LINE_PURGE") %}
        _SMART_PARK
    {% else %}
        _UGOL_PARK
    {% endif %}

    #M190 S{bed_temp}
    #M109 S{extruder_temp}

    # Убираем стабилизацию температуры, для тех у кого не настроен PID экструдера и/или PID стола
    M140 S{bed_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-1} MAXIMUM={bed_temp+1}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-1} MAXIMUM={extruder_temp+1}

    {% if printer.toolhead.position.z < 5 %}
        G1 Z5 F3000
    {% endif %}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Nozzle line purge disabled. DISABLE_PRIMING={disable_priming}{% else %}Очистка сопла линией отключена. DISABLE_PRIMING={disable_priming}{% endif %}"
        _PRINT_MESH
        {% if zmidi_start != "" %}
            PLAY_MIDI FILE={zmidi_start}
        {% endif %}
    {% else %}
        {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
        {% if mesh_test == 0 or force_kamp == True or zprint_leveling == 1 or force_leveling == True %}
            _PRINT_MESH
        {% else %}
            _MESH_TEST
        {% endif %}

        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Nozzle line purge{% else %}Очистка сопла линией{% endif %}"
        RESPOND PREFIX="info" MSG="{% if lang == "en" %}Algorithm: {zclear}{% else %}Алгоритм: {zclear}{% endif %}"

        {% if zmidi_start != "" %}
            PLAY_MIDI FILE={zmidi_start}
        {% endif %}

        {% if ( (force_kamp == True) or (zuse_kamp == 1) ) and (zclear == "_CLEAR1" or zclear == "_CLEAR2" or zclear == "_CLEAR3" or zclear == "_CLEAR4") %}
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}You are using KAMP. Recommended to use LINE_PURGE: // SAVE_ZMOD_DATA CLEAR=LINE_PURGE{% else %}У вас используется KAMP. Рекомендуется использовать линию очистки LINE_PURGE: // SAVE_ZMOD_DATA CLEAR=LINE_PURGE{% endif %}"
            RESPOND PREFIX="info" MSG="{% if lang == "en" %}LINE_PURGE forced{% else %}LINE_PURGE запущен принудительно{% endif %}"
            LINE_PURGE
        {% else %}
            SAVE_GCODE_STATE NAME=CLEAR_STATE
            {zclear}
            RESTORE_GCODE_STATE NAME=CLEAR_STATE
        {% endif %}
    {% endif %}

[gcode_macro UPDATE_MCU]
description: Обновить MCU
gcode:
#    {% set current_klipper12 = printer.save_variables.variables.klipper12|default(0) | int %}

    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}

    RESPOND TYPE=error MSG="{% if lang == "en" %}Wait for the music and power off the printer.{% else %}Дождитесь музыкальной композиции и выключите питание принтера.{% endif %}"
    RESPOND TYPE=error MSG="{% if lang == "en" %}Wait 10 seconds and power on again. MCU update will begin.{% else %}Подождите 10 секунд и включите обратно. Начнется обновление MCU.{% endif %}"

