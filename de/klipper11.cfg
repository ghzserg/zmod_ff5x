[temperature_sensor weightValue]
sensor_type: MAX31856
sensor_pin: PD5
#spi_bus: spi4
spi_speed: 1000000
spi_software_sclk_pin: PD6
spi_software_mosi_pin: PD7
spi_software_miso_pin: PD8
min_temp: 0
max_temp: 2048
gcode_id: W

[temperature_sensor tvocValue]
sensor_type: MAX31865
sensor_pin: PD4
#spi_bus: spi4
#cs_pin: PD0
spi_speed: 500000
spi_software_sclk_pin: PE3
spi_software_mosi_pin: PE4
spi_software_miso_pin: PE5
min_temp: 0
max_temp: 2048
gcode_id: V

[gcode_macro _G17]
gcode:
    RESPOND PREFIX="info" MSG="Spiral/Auto Z-Hop ersetzen. Drucker unterstützt es nicht."
    RESPOND PREFIX="info" MSG="In Orca: Druckerprofil -> Extruder 1 -> Z-Hop-Typ. Normal oder Schräg einstellen."

[gcode_macro G17]
gcode:
    _G17

[gcode_macro G18]
gcode:
    _G17

[gcode_macro G19]
gcode:
    _G17

[gcode_macro LOAD_CELL_TARE]
description: Lastzellen-Gewicht zurücksetzen
variable_success: 0
gcode:
    {% set we = printer['temperature_sensor weightValue'].temperature %}

    RESPOND PREFIX="info" MSG="Lastzellen-Gewicht wird zurückgesetzt"

    QUERY_PROBE

    _LOAD_CELL_TARE_PROBE

    _LOAD_CELL_TARE_CHECK

    # Сбрасываем значение переменной
    SET_GCODE_VARIABLE MACRO=LOAD_CELL_TARE VARIABLE=success VALUE=0

    # Пробуем 10 раз сбросить тензы
    {% for i in range(1, 11) %}
        _LOAD_CELL_TARE_IF_NO_SUCCESS ITER={i}
    {% endfor %}

    # Финальная проверка
    _LOAD_CELL_TARE_FINAL_CHECK

# Проверяем, что сопло не упирается в стол
[gcode_macro _LOAD_CELL_TARE_PROBE]
gcode:
    {% if printer['probe'].last_query %}
        {% set probe="ausgelöst" %}
        SAVE_GCODE_STATE NAME=CELL_TARE
        {% if "z" not in printer.toolhead.homed_axes %}
            G28 Z
            M400
        {% else %}
            {% if printer.toolhead.position.z < 10 %}
                G91
                G1 Z5
                M400
                G4 P500
                M400
            {% endif %}
        {% endif %}
        RESTORE_GCODE_STATE NAME=CELL_TARE MOVE=0
        RESPOND PREFIX="info" MSG="Lastzelle ausgelöst! Stellen Sie sauberes Bett sicher!"
    {% else %}
        {% set probe="ausgelöst" %}
    {% endif %}
    RESPOND PREFIX="info" MSG="Tastkopf-Sensor {probe}"

# Сброс и проверка тензодатчиков
[gcode_macro _LOAD_CELL_TARE_IF_NO_SUCCESS]
gcode:
    {% set iter = params.ITER|default(0)|int %}

    {% if not printer["gcode_macro LOAD_CELL_TARE"].success %}
        _LOAD_CELL_TARE_SET
        _LOAD_CELL_TARE_CHECK ITER={iter}
    {% endif %}

# Сброс тензодатчиков
[gcode_macro _LOAD_CELL_TARE_SET]
gcode:
    # Tare is set by toggeling level_h1 pin
    SET_PIN PIN=level_h1 VALUE=0
    G4 P{505}
    M400
    SET_PIN PIN=level_h1 VALUE=1
    G4 P{505}
    M400
    SET_PIN PIN=level_h1 VALUE=0
    G4 P{505}
    M400
    SET_PIN PIN=level_h1 VALUE=1
    G4 P{505}
    M400

# Проверка тензодатчиков
[gcode_macro _LOAD_CELL_TARE_CHECK]
gcode:
    {% set iter = params.ITER|default(0)|int %}
    {% set we = printer['temperature_sensor weightValue'].temperature %}

    {% if "PRESSED" in printer['gcode_button check_level_pin'].state %}
        {% set clp="Nullung bestätigt" %}
        {% if iter != 0 %}
            SET_GCODE_VARIABLE MACRO=LOAD_CELL_TARE VARIABLE=success VALUE=1
        {% endif %}
    {% else %}
        {% set clp="Nullung nicht bestätigt" %}
    {% endif %}

    RESPOND PREFIX="info" MSG="Prüfung {iter+1}. {clp}. Gewicht: {we}"

# Финальная проверка
[gcode_macro _LOAD_CELL_TARE_FINAL_CHECK]
gcode:
    {% set we = printer['temperature_sensor weightValue'].temperature %}
    {% set screen = printer["gcode_macro START_PRINT"].screen %}

    # Check success
    {% if printer["gcode_macro LOAD_CELL_TARE"].success %}
        # Toggle level clear plin.
        # No sure what the level clear pin does. But we do the same as the stock software.
        SET_PIN PIN=level_clear VALUE=0
        G4 P10
        M400
        SET_PIN PIN=level_clear VALUE=1
        G4 P10
        M400
        RESPOND PREFIX="info" MSG="Lastzellen-Reset erfolgreich. Gewicht: {we}"
    # Else raise error
    {% else %}
        RESPOND PREFIX="info" MSG="Gewicht bei Fehler: {we}"
        {% if screen == True %}
            RESPOND PREFIX="info" MSG="Bett-Nivellierungsmodus vom natives Display verwenden. // SAVE_ZMOD_DATA PRINT_LEVELING=1"
        {% endif %}
        {action_raise_error("Lastzellen-Fehler. FAQ lesen: (Link)")}
    {% endif %}
