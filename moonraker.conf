[server]
host: 0.0.0.0
port: 7125
klippy_uds_address: /tmp/uds

[machine]
provider: systemd_cli
validate_service: false
validate_config: false

[file_manager]
file_system_observer: none

[authorization]
enable_api_key: false

[octoprint_compat]

# Enable print history tracking
[history]

[webcam video]
enabled: true
icon: mdiWebcam
service: mjpegstreamer
stream_url: /webcam/?action=stream
snapshot_url: /webcam/?action=snapshot

[update_manager]
enable_auto_refresh: True
enable_system_updates: False

[update_manager zmod]
type: git_repo
channel: dev
path: /root/printer_data/config/mod/
origin: https://github.com/ghzserg/zmod_ff5x.git
is_system_service: False
primary_branch: 1.6

[update_manager fluidd]
type: web
repo: ghzserg/fluidd
path: /root/fluidd

[update_manager mainsail]
type: web
channel: stable
repo: ghzserg/mainsail
path: /root/mainsail

[update_manager g28_tenz]
type: git_repo
channel: stable
path: /root/printer_data/config/mod_data/plugins/g28_tenz
origin: https://github.com/ghzserg/g28_tenz.git
is_system_service: False
primary_branch: main

[update_manager bambufy]
type: git_repo
channel: stable
path: /root/printer_data/config/mod_data/plugins/bambufy
origin: https://github.com/function3d/bambufy.git
is_system_service: False
primary_branch: master

[update_manager nopoop]
type: git_repo
channel: stable
path: /root/printer_data/config/mod_data/plugins/nopoop
origin: https://github.com/ghzserg/nopoop.git
is_system_service: False
primary_branch: master

[update_manager recommend]
type: git_repo
channel: stable
path: /root/printer_data/config/mod_data/plugins/recommend
origin: https://github.com/ghzserg/recommend.git
is_system_service: False
primary_branch: main

[include mod_data/user.moonraker.conf]
