    {% if zclose_dialogs == 0 %}
        RESPOND PREFIX="//" MSG="不自动关闭原生屏幕对话框 // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% else %}
        {% if client.ad5x %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% endif %}
    {% endif %}
    {% if zclose_dialogs == 1 %}
        RESPOND PREFIX="//" MSG="20秒后自动关闭原生屏幕对话框（慢速） // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}
    {% if zclose_dialogs == 2 %}
        RESPOND PREFIX="//" MSG="20秒后自动关闭原生屏幕对话框（快速） // SAVE_ZMOD_DATA CLOSE_DIALOGS={zclose_dialogs}"
    {% endif %}

    {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
    {% if zstop_motor == 1 %}
        RESPOND PREFIX="//" MSG="打印/取消后25秒自动禁用电机 // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% else %}
        RESPOND PREFIX="//" MSG="打印/取消后不自动禁用电机 // SAVE_ZMOD_DATA STOP_MOTOR={zstop_motor}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}

    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% if zauto_reboot == 0 %}
        RESPOND PREFIX="//" MSG="禁用自动重启 // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 1 %}
        RESPOND PREFIX="//" MSG="打印完成后1.5分钟后自动重启打印机 // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
    {% endif %}
    {% if zauto_reboot == 2 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="打印完成后1.5分钟后自动重启打印机 // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% else %}
            RESPOND PREFIX="//" MSG="1.5分钟后自动重启固件 // SAVE_ZMOD_DATA AUTO_REBOOT={zauto_reboot}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}

    {% if not client.ad5x %}
        {% set pro_poweroff_timeout = printer.save_variables.variables.pro_poweroff_timeout|default(0) | int %}
        RESPOND PREFIX="//" MSG="FF5M Pro在{timeout}分钟后关机 // SAVE_ZMOD_DATA PRO_POWEROFF_TIMEOUT={pro_poweroff_timeout}"
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% else %}
        {% set remove_filament = printer.save_variables.variables.remove_filament|default(0) | int %}
        {% if remove_filament == 0 %}
            RESPOND PREFIX="//" MSG="打印完成后不要取出耗材 // SAVE_ZMOD_DATA REMOVE_FILAMENT={remove_filament}"
        {% else %}
            RESPOND PREFIX="//" MSG="打印完成后取出耗材 // SAVE_ZMOD_DATA REMOVE_FILAMENT={remove_filament}"
