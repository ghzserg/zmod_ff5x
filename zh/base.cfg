        {% else %}
            RESPOND PREFIX="//" MSG="使用标准SAVE_CONFIG // SAVE_ZMOD_DATA NEW_SAVE_CONFIG={znew_save_config}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% else %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE=0
    {% endif %}

    {% if not client.ad5x %}
        {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
        {% if zuse_swap == 0 %}
            RESPOND PREFIX="//" MSG="未使用SWAP // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 1 %}
            RESPOND PREFIX="//" MSG="在EMMC使用SWAP // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        {% if zuse_swap == 2 %}
            RESPOND PREFIX="//" MSG="在USB闪存使用SWAP // SAVE_ZMOD_DATA USE_SWAP={zuse_swap}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}

    {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(1) | int %}
