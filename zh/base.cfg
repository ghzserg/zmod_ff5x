        RESPOND PREFIX="//" MSG="修复E0017错误 // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% else %}
        RESPOND PREFIX="//" MSG="不修复E0017错误 // SAVE_ZMOD_DATA FIX_E0017={fix_e0017}"
    {% endif %}
