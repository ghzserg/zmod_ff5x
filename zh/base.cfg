            RESPOND PREFIX="//" MSG="由原生屏幕控制保存 // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="保存打印恢复数据 // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% else %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="由原生屏幕控制保存 // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% else %}
            RESPOND PREFIX="//" MSG="不保存打印恢复数据 // SAVE_ZMOD_DATA SAVE_RESTORE={save_restore}"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}

    {% if not client.ad5x %}
        {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
        {% if motion_sensor == 1 %}
            RESPOND PREFIX="//" MSG="正在使用耗材运动传感器 // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
            {% if screen == True %}
                RESPOND PREFIX="//" MSG="禁用原生屏幕耗材传感器"
            {% endif %}
        {% else %}
            RESPOND PREFIX="//" MSG="正在使用耗材存在传感器 // SAVE_ZMOD_DATA MOTION_SENSOR={motion_sensor}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}

    {% if client.ad5x %}
        {% set autoinsert = printer.save_variables.variables.autoinsert|default(1) | int %}
        {% if autoinsert == 0 %}
            RESPOND PREFIX="//" MSG="不要自动装入线材 // SAVE_ZMOD_DATA AUTOINSERT={autoinsert}"
        {% else %}
            RESPOND PREFIX="//" MSG="自动装入线材 // SAVE_ZMOD_DATA AUTOINSERT={autoinsert}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=autoinsert VALUE={autoinsert|int}

        {% set use_trash_on_print = printer.save_variables.variables.use_trash_on_print|default(1) | int %}
        {% if use_trash_on_print == 0 %}
            RESPOND PREFIX="//" MSG="打印时不使用清洗箱 // SAVE_ZMOD_DATA USE_TRASH_ON_PRINT={use_trash_on_print}"
        {% else %}
            RESPOND PREFIX="//" MSG="打印时使用清洗箱 // SAVE_ZMOD_DATA USE_TRASH_ON_PRINT={use_trash_on_print}"
        {% endif %}
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE={use_trash_on_print|int}
    {% endif %}

    {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
    {% if fix_scv == 1 %}
        RESPOND PREFIX="//" MSG="使用配置中的SCV生成整形器图表 // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% else %}
        RESPOND PREFIX="//" MSG="使用SCV=5生成整形器图表 // SAVE_ZMOD_DATA FIX_SCV={fix_scv}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}

    {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(1) | int %}
    {% if fix_e0011 == 1 %}
        RESPOND PREFIX="//" MSG="修复E0011错误 // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% else %}
        RESPOND PREFIX="//" MSG="不修复E0011错误 // SAVE_ZMOD_DATA FIX_E0011={fix_e0011}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
