        RESPOND PREFIX="//" MSG="允许中国云服务 // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% else %}
        RESPOND PREFIX="//" MSG="阻止中国云服务 // SAVE_ZMOD_DATA CHINA_CLOUD={zchina_cloud}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}

    {% set save_moonraker = printer.save_variables.variables.save_moonraker|default(0) | int %}
    {% if save_moonraker == 1 %}
        RESPOND PREFIX="//" MSG="保存Fluidd/Mainsail按钮修改 // SAVE_ZMOD_DATA SAVE_MOONRAKER={save_moonraker}"
    {% else %}
        RESPOND PREFIX="//" MSG="使用ZMOD的Fluidd/Mainsail按钮设置 // SAVE_ZMOD_DATA SAVE_MOONRAKER={save_moonraker}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}

    {% set display_off_timeout = printer.save_variables.variables.display_off_timeout|default(20) | int %}
    {% if screen == False %}
        RESPOND PREFIX="//" MSG="原生屏幕在{display_off_timeout}秒后关闭 // SAVE_ZMOD_DATA DISPLAY_OFF_TIMEOUT={display_off_timeout}"
    {% endif %}
    {% if display_off_timeout < 5 %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE=5
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if zklipper13 == 1 %}
        RESPOND PREFIX="//" MSG="正在使用Klipper 13"
    {% else %}
        {% if not client.ad5x %}
            RESPOND PREFIX="//" MSG="正在使用原生Klipper 11"
        {% else %}
            RESPOND PREFIX="//" MSG="正在使用原生Klipper 12"
        {% endif %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=klipper13 VALUE={zklipper13}

    {% if screen == True %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=0
    {% else %}
        SAVE_VARIABLE VARIABLE=display_off VALUE=1
    {% endif %}

    {% set znice = printer.save_variables.variables.nice|default(20) | int %}
    RESPOND PREFIX="//" MSG="Klipper进程优先级（1-最低，40-最高）：{znice}"
    SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
    RUN_SHELL_COMMAND CMD=znice

    ZCONTROL_STATUS
    {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
    RESPOND PREFIX="//" MSG="可用语言: en, ru, de, fr, it, es, ja, ko, zh, pt, cs, tr // LANG LANG={lang}"
    RUN_SHELL_COMMAND CMD=zversion
    _CHECK_VERSION

    {% if screen == False %}
        {% if display_off_timeout > 30 %}
            RESPOND PREFIX="info" MSG="备用屏幕加载时间过长？减少默认屏幕的加载时间。 // SAVE_ZMOD_DATA DISPLAY_OFF_TIMEOUT=10"
        {% endif %}
        {% if wifi == 0 %}
            RESPOND PREFIX="//" MSG="厌倦了WiFi问题？让zmod来管理它。 // SAVE_ZMOD_DATA WIFI=1"
        {% endif %}
    {% endif %}

[gcode_macro SET_LED]
description: 设置 LED
rename_existing: _SET_LED
variable_allowed: False
gcode:
    {% if allowed %}
        _SET_LED {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% endif %}

[gcode_macro SET_GCODE_OFFSET]
description: 保存Z偏移
rename_existing: _SET_GCODE_OFFSET
gcode:
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% set start = params.START|default(0)|int %}

    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
    {% else %}
        {% set offsets = {'z': None} %}
    {% endif %}

    {% set ns = namespace(offsets={'z': offsets.z}) %}

    {% if start == 0 %}
        _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
    {% endif %}

    {% if 'Z' in params %}
        {% set null = ns.offsets.update({'z': params.Z}) %}
    {% endif %}

    {% if 'Z_ADJUST' in params %}
        {% if ns.offsets.z == None %}
            {% set null = ns.offsets.update({'z': 0}) %}
        {% endif %}
        {% set null = ns.offsets.update({'z': (ns.offsets.z | float) + (params.Z_ADJUST | float)}) %}
    {% endif %}

    {% if screen == True and start == 1 and 'Z' in params %}
        _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
        RESPOND PREFIX="info" MSG="Z偏移量已从原生屏幕加载: {params.Z}"
    {% endif %}

    {% if screen == False %}
        {% if start == 0 %}
            SAVE_VARIABLE VARIABLE=gcode_offsets VALUE="{ns.offsets}"
        {% else %}
            LOAD_GCODE_OFFSET
        {% endif %}
    {% endif %}

[gcode_macro LOAD_GCODE_OFFSET]
description: 恢复Z偏移
gcode:
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
