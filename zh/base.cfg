[zmod]
[include ../mod_data/lang.cfg]

[skew_correction]

[firmware_retraction]
retract_length: 0.7
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

[include shell.cfg]

[gcode_macro CLEAR_NOZZLE]
description: 喷嘴清洁
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(230)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
    ZCONTROL_OFF

[include ff5.cfg]

[gcode_macro _TEST_MIN_MAX]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if "xyz" in printer.toolhead.homed_axes %}
        M400
        SAVE_GCODE_STATE NAME=test_min_max
        G90

        {% if printer.toolhead.position.y < client.min_y %}
            G1 Y{client.min_y} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.y > client.max_y %}
            G1 Y{client.max_y} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.x < client.min_x %}
            G1 X{client.min_x} F2000
            M400
        {% endif %}
        {% if printer.toolhead.position.x > client.max_x %}
            G1 X{client.max_x} F2000
            M400
        {% endif %}

        RESTORE_GCODE_STATE MOVE=0 NAME=test_min_max
    {% endif %}

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
gcode:
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}

    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="info" MSG="正在使用KAMP"
        M400
        _KAMP_BED_MESH_CALIBRATE
        M400
    {% else %}
        RESPOND PREFIX="info" MSG="正在使用BED_MESH_CALIBRATE"
        _TEST_MIN_MAX
        M400
        _BED_MESH_CALIBRATE {rawparams}
        M400
    {% endif %}

[gcode_macro _G28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        _HOME
    {% endif %}


[gcode_macro CHECK_MD5]
description: 文件MD5校验
gcode:
  {% if 'FILENAME' in params %}
    {% set filename = params.FILENAME|default("")|string %}
  {% else %}
    {% set filename = printer.virtual_sdcard.file_path|default("")|string  %}
  {% endif %}

  SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

  {% if filename != "" %}

    {% if 'DELETE' in params %}
      {% set delete = params.DELETE|default("False")|string %}
    {% endif %}

    RUN_SHELL_COMMAND CMD=check_md5 PARAMS={'"%s %s"' % (filename.replace("'", "\\\'").replace(" ", "\ "), delete)}
    {% for i in range(30) %}
        ZLOAD_VARIABLE
        _CHECK_MD5
    {% endfor %}

    ZLOAD_VARIABLE
    _FINAL_CHECK_MD5 FILENAME="{filename}"

  {% endif %}

[gcode_macro _CHECK_MD5]
description: 等待校验完成
gcode:
    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}

    {% if (check_md5 == 0) %}
        G4 P{1000}
    {% endif %}

[gcode_macro _FINAL_CHECK_MD5]
description: 最终测试
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set filename = params.FILENAME|default("")|string %}
    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}

    {% if (check_md5 == 0) %}
        RESPOND TYPE=error MSG="错误：文件'{filename}'未及时验证。打印已取消"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 1) %}
        RESPOND TYPE=error MSG="错误：未指定文件'{filename}'。打印已取消"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 2) %}
        RESPOND TYPE="error" MSG="错误：未找到文件{filename}。打印已取消"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 3) %}
        RESPOND TYPE="error" MSG="文件{filename}无MD5校验。需在Orca中启用。参考链接"
    {% endif %}
    {% if (check_md5 == 4) %}
        {% if not client.ad5x %}
            RESPOND TYPE="error" MSG="文件{filename}包含圆弧指令（G2/G3）。需禁用。在Orca中：流程配置->圆弧逼近->取消勾选 替换螺旋/自动Z抬升。在Orca中：打印机配置->挤出机1->Z抬升类型->设为普通或斜坡"
        {% endif %}
        RESPOND PREFIX="info" MSG="文件{filename}验证成功。MD5校验匹配"
    {% endif %}
    {% if (check_md5 == 8) %}
        {% if not client.ad5x %}
            RESPOND TYPE="error" MSG="文件{filename}使用不支持的G17/G18/G19指令。需更换Z抬升类型 在Orca：打印机配置->挤出机1->Z抬升类型->设为普通或斜坡"
        {% endif %}
        RESPOND PREFIX="info" MSG="文件{filename}验证成功。MD5校验匹配"
    {% endif %}
    {% if (check_md5 == 5) %}
        RESPOND PREFIX="info" MSG="文件{filename}验证成功。MD5校验匹配"
    {% endif %}
    {% if (check_md5 == 6) %}
        RESPOND TYPE="error" MSG="文件{filename}MD5不匹配。文件已删除。打印取消"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}
    {% if (check_md5 == 7) %}
        RESPOND TYPE="error" MSG="文件{filename}MD5不匹配。打印取消"
        CANCEL_PRINT
        _FINAL_STOP_MD5
    {% endif %}

[gcode_macro _FINAL_STOP_MD5]
gcode:
    {action_raise_error("MD5校验失败。打印已取消")}

[gcode_macro BED_LEVEL_SCREWS_TUNE]
description: 打印床螺丝校准
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(130)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}

    RESPOND PREFIX="info" MSG="测量前请使用CLEAR_NOZZLE宏清理喷嘴"

    BED_MESH_CLEAR
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed  MINIMUM={bed_temp-2} MAXIMUM={bed_temp+3}
    TEMPERATURE_WAIT SENSOR=extruder  MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+3}

    _HOME
    _GOTO_MID

    LOAD_CELL_TARE

    SCREWS_TILT_CALCULATE

[gcode_macro _GOTO_MESH]
gcode:
    #G1 Z100 F600
    #M400
    _GOTO_MID

[gcode_macro _FIX_BED_MESH_CALIBRATE]
gcode:
    {% set profile = params.PROFILE|default("default") %}

    RESPOND PREFIX="info" MSG="测量前请使用CLEAR_NOZZLE宏清理喷嘴"

    _G28
    _GOTO_MID

    LOAD_CELL_TARE
    _BED_MESH_CALIBRATE PROFILE="{profile}"

    _GOTO_MESH

[gcode_macro _FULL_BED_LEVEL]
description: 不关闭温度的打印床校准
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set profile = params.PROFILE|default("auto") %}

    RESPOND PREFIX="info" MSG="打印床校准。配置文件{profile}。喷头温度：{extruder_temp}/床温：{bed_temp}"

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    # Начинаем калибровку
    _BED_MESH_CALIBRATE PROFILE="{profile}"

    _UGOL_PARK

[gcode_macro AUTO_FULL_BED_LEVEL]
description: 关闭温度的打印床校准
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set profile = params.PROFILE|default("auto") %}

    _FULL_BED_LEVEL EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} PROFILE={profile}

    # Выклчюаем обогрев
    _STOP

[include ./KAMP/KAMP_Settings.cfg]

[gcode_macro _WAIT_TEMP]
# Убираем стабилизацию температуры, для тех у кого не настроен PID экструдера и/или PID стола
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set name = params.NAME|default("") %}

    RESPOND PREFIX="//" MSG="等待温度正常化。热床: {bed_temp-3}-{bed_temp+4}。挤出机: {extruder_temp-2}-{extruder_temp+4} {name}"
    RESPOND PREFIX="//" MSG="如果耗时过长，请校准挤出机和热床的PID {name}"

    {% if bed_temp | int != 0 %}
        M140 S{bed_temp}
    {% endif %}
    # Включаем для AD5X одновременный нагрев сопла и стола
    {% if client.ad5x %}
        {% if bed_temp | int != 0 %}
            TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-20} MAXIMUM={bed_temp+4}
        {% endif %}
        {% if extruder_temp | int != 0 %}
            M104 S{extruder_temp}
        {% endif %}
    {% endif %}
    {% if bed_temp | int != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp-3} MAXIMUM={bed_temp+4}
    {% endif %}
    {% if extruder_temp | int != 0 %}
        M104 S{extruder_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-2} MAXIMUM={extruder_temp+4}
    {% endif %}
    RESPOND PREFIX="//" MSG="温度正常化已完成 {name}"

[gcode_macro KAMP]
description: 自适应打印床
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(240)|float %}
    {% set bed_temp = params.BED_TEMP|default(80)|float %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    BED_MESH_CLEAR          ; Очистка профиля стола
    M400

    _ORIG_CLEAR_NOZZLE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}

    M400
    _KAMP_BED_MESH_CALIBRATE
    M400

    _SMART_PARK
    M400

    _WAIT_TEMP EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} NAME=KAMP

# Калибровка PID стола
[gcode_macro PID_TUNE_BED]
description: Bed PID calibratio
gcode:
    {% set temperature = params.TEMPERATURE|default(80) %}

    _HOME
    _GOTO_MID

    M107

    PID_CALIBRATE HEATER=heater_bed TARGET={temperature}

    {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
    {% if znew_save_config == 1 %}
        NEW_SAVE_CONFIG
    {% else %}
        SAVE_CONFIG
    {% endif %}

# Калибровка PID экструдера
[gcode_macro PID_TUNE_EXTRUDER]
description: 挤出机PID校准
gcode:
    {% set temperature = params.TEMPERATURE|default(245) | int %}
    {% set cooler = params.COOLER|default(100) | int %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    _HOME
    _GOTO_MID

    G1 X{client.min_x+(client.max_x-client.min_x)/2} Y{client.min_y+(client.max_y-client.min_y)/2} F3000

    M106 P0 S{2.55*cooler| float}
    PID_CALIBRATE HEATER=extruder TARGET={temperature}
    {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
    {% if znew_save_config == 1 %}
        NEW_SAVE_CONFIG
    {% else %}
        SAVE_CONFIG
    {% endif %}

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  125
gcode:
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}

    {% set m600_temp = printer["gcode_macro M600"].zextruder_temp|float %}

    {% set extruder_temp = params.EXTRUDER_TEMP|default(m600_temp) | float %}
    {% set extrude_len   = params.EXTRUDE_LEN|default(load_distance) |float %}
    {% set speed = params.SPEED|default(450)|float %}

    RESPOND PREFIX="info" MSG="正在以{extruder_temp}℃加载{extrude_len}毫米耗材，速度{speed/60}毫米/秒"
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp-1}

    M400
    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E{extrude_len} F{speed} ; extrude with 7.5mm/s
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE MOVE=0 NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  75
gcode:
    {% set speed = params.SPEED|default(450)|int %}

    {% set extruder_temp = printer["gcode_macro M600"].zextruder_temp|float %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}

    M400
    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E-{unload_distance} F{speed} ; unload
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE MOVE=0 NAME=unload_state

[gcode_macro PURGE_FILAMENT]
variable_purge_distance:  25
gcode:
    {% set speed = params.SPEED|default(450)|int %}

    {% set extruder_temp = printer["gcode_macro M600"].zextruder_temp|float %}
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}

    M400
    SAVE_GCODE_STATE NAME=purge_state
    G91
    G92 E0

    _DISABLE_SENSOR
        G1 E{purge_distance} F{speed}   ; purge
        M400
    _ENABLE_SENSOR

    RESTORE_GCODE_STATE MOVE=0 NAME=purge_state

[gcode_macro LOAD_MATERIAL]
description: 手动加载/更换耗材
variable_initial_target_temp: 0
gcode:
    # save gcode state
    M400
    SAVE_GCODE_STATE NAME=load_material_state
    # save heating state
    SET_GCODE_VARIABLE MACRO=LOAD_MATERIAL VARIABLE=initial_target_temp VALUE={printer["extruder"].target}

    _LOAD_MATERIAL_SELECT

[gcode_macro _LOAD_MATERIAL_SELECT]
gcode:
    {% if not printer["extruder"].target >= printer.configfile.settings['extruder'].min_extrude_temp %}
        RESPOND TYPE=command MSG="action:prompt_begin 材料选择"
        RESPOND TYPE=command MSG="action:prompt_text 选择要加载的材料"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button PLA|_LOAD_MATERIAL_HEATUP TEMP=210|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG|_LOAD_MATERIAL_HEATUP TEMP=240|primary"
        RESPOND TYPE=command MSG="action:prompt_button ABS|_LOAD_MATERIAL_HEATUP TEMP=250|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button 取消|_LOAD_MATERIAL_END"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={printer["extruder"].target}
        _LOAD_MATERIAL_ACTION
    {% endif %}

[gcode_macro _LOAD_MATERIAL_HEATUP]
gcode:
    {% set extruder_temp = params.TEMP|default(200)|float %}
    M104 S{extruder_temp}
    RESPOND TYPE=command MSG=action:prompt_end
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}
    _LOAD_MATERIAL_ACTION

[gcode_macro _LOAD_MATERIAL_ACTION]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin 耗材管理"
    RESPOND TYPE=command MSG="action:prompt_text 选择操作"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button 加载|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button 卸载|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button 清洗|PURGE_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button 确认|_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    # restore old temp
    M104 S{printer["gcode_macro LOAD_MATERIAL"].initial_target_temp}
    # restore gcode state
    RESTORE_GCODE_STATE MOVE=0 NAME=load_material_state

[gcode_macro M600]
description: 暂停并更换耗材
variable_zextruder_temp: 240.0
gcode:
    {% set extruder_temp = printer[printer.toolhead.extruder].target if printer.toolhead.extruder != '' else 240.0 %}
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=zextruder_temp VALUE={extruder_temp|float}

    RESPOND PREFIX="info" MSG="喷头温度{extruder_temp}"

    PAUSE

    RESPOND TYPE=command MSG="action:prompt_begin 更换耗材"
    RESPOND TYPE=command MSG="action:prompt_text 请求更换耗材。加载新耗材并点击"恢复""
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button 加载|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button 卸载|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button 清洗|PURGE_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button 恢复|_INTERACTIVE_LOAD_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _INTERACTIVE_LOAD_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESUME

[gcode_macro _SHUTDOWN]
variable_trigger_allowed: False
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if trigger_allowed %}
        {% if not client.ad5x %}
            SET_PIN PIN=clear_power_off VALUE=1
            G4 P500
            SET_PIN PIN=clear_power_off VALUE=0
        {% endif %}
        RESPOND TYPE=command MSG="action:prompt_begin 关闭打印机？"
        RESPOND TYPE=command MSG="action:prompt_text 关闭打印机？"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button 是|SHUTDOWN|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button 取消|RESPOND TYPE=command MSG=action:prompt_end"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro SHUTDOWN]
description: 关闭打印机
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    RESPOND TYPE=command MSG="action:prompt_end"
    BED_MESH_CLEAR
    M400
    {% if not client.ad5x %}
        # Reset button state, otherwise only one trigger can occur
        SET_PIN PIN=clear_power_off VALUE=1
        # There is a deboucing circuit which needs some delay
        G4 P500
        # Disable pin again otherwise on reset the button will be triggered 1-3 times
        SET_PIN PIN=clear_power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=run_power_off
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    {% if not client.ad5x %}
        SET_PIN PIN=power_off VALUE=0
    {% endif %}
    G4 P1000
    RUN_SHELL_COMMAND CMD=poweroff

[gcode_macro REBOOT]
description: 重启打印机
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    BED_MESH_CLEAR
    M400
    {% if not client.ad5x %}
        # Reset button state, otherwise only one trigger can occur
        SET_PIN PIN=clear_power_off VALUE=1
        # There is a deboucing circuit which needs some delay
        G4 P500
        # Disable pin again otherwise on reset the button will be triggered 1-3 times
        SET_PIN PIN=clear_power_off VALUE=0
    {% endif %}
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=sync
    G4 P1000
    RUN_SHELL_COMMAND CMD=reboot

[gcode_macro REMOVE_ZMOD]
description: 移除zmod
gcode:
    {% set full = params.FULL|default(0)|int %}
    CLEAR_EMMC

    {% if full == 1 %}
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/FULL_REMOVE"
    {% else %}
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/REMOVE"
    {% endif %}

    RUN_SHELL_COMMAND CMD=sync
    RUN_SHELL_COMMAND CMD=reboot

[gcode_macro SKIP_ZMOD]
description: 重启至原始系统（不加载zmod）
gcode:
    {% set mute = params.MUTE|default(0)|int %}

    {% if mute == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin 临时禁用ZMOD"
        RESPOND TYPE=command MSG="action:prompt_text 点击确定后打印机将关闭"
        RESPOND TYPE=command MSG="action:prompt_text 需要断开电源后重新连接"
        RESPOND TYPE=command MSG="action:prompt_text 打印机将启动原生固件"
        RESPOND TYPE=command MSG="action:prompt_footer_button 确认|SKIP_ZMOD MUTE=1"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RUN_SHELL_COMMAND CMD=ztouch PARAMS="/opt/config/mod/SKIP_ZMOD"
        RUN_SHELL_COMMAND CMD=sync
        RUN_SHELL_COMMAND CMD=poweroff
    {% endif %}

[gcode_macro LED_ON]
description: 启用背光
gcode:
    SET_LED LED=chamber_led WHITE=1

[gcode_macro LED_OFF]
description: 关闭背光
gcode:
    SET_LED LED=chamber_led WHITE=0

[gcode_macro LED]
description: 启用背光
gcode:
    {% set S = params.S|default(50)|int %}
    SET_LED LED=chamber_led WHITE={S/100|float}

[gcode_macro DISPLAY_ON]
description: 启用原生屏幕并重启
gcode:
    SAVE_VARIABLE VARIABLE=display_off VALUE=0
    RUN_SHELL_COMMAND CMD=zdisplay PARAMS="on"

[gcode_macro DISPLAY_OFF]
description: 禁用原生屏幕
gcode:
    {% set guppy = params.GUPPY|default(1)|int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}

    SAVE_VARIABLE VARIABLE=display_off VALUE=1
    RESPOND TYPE=command MSG="action:prompt_begin Warning"
    RESPOND TYPE=command MSG="action:prompt_text 若不完全理解调平、Z偏移和START/END宏，请勿禁用屏幕"
    RESPOND TYPE=command MSG="action:prompt_text 使用 LOAD_ZOFFSET_NATIVE 从原生屏幕复制 Z 偏移量。"
    RESPOND TYPE=command MSG="action:prompt_text 开启 NOZZLE_CONTROL 以控制喷嘴对平台的影响"
    RESPOND TYPE=command MSG="action:prompt_text https://github.com/ghzserg/zmod/wiki/FAQ"

    {% if guppy == 1 %}
        RESPOND PREFIX="info" MSG="正在加载GuppyScreen"
        {% if load_zoffset == 0 %}
            RESPOND PREFIX="info" MSG="从全局参数加载Z偏移以通过GuppyScreen控制"
            RESPOND PREFIX="info" MSG="SAVE_ZMOD_DATA LOAD_ZOFFSET=1"
        {% endif %}
        RESPOND TYPE=command MSG="action:prompt_footer_button Ok|RESPOND TYPE=command MSG=action:prompt_end|info"
        RESPOND TYPE=command MSG="action:prompt_show"

        G4 P5000
        RUN_SHELL_COMMAND CMD=zdisplay PARAMS="guppy"
        SAVE_VARIABLE VARIABLE=guppy VALUE={1|int}
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_footer_button Ok|RESPOND TYPE=command MSG=action:prompt_end|info"
        RESPOND TYPE=command MSG="action:prompt_show"

        G4 P5000
        RUN_SHELL_COMMAND CMD=zdisplay PARAMS="off"
        SAVE_VARIABLE VARIABLE=guppy VALUE={0|int}
    {% endif %}
    RESTART

[gcode_macro MEM]
description: 检查内存使用
gcode:
    RUN_SHELL_COMMAND CMD=zmem

[gcode_macro PLAY_MIDI]
description: 播放MIDI文件
variable_mute: 0
gcode:
    {% if mute == 0 %}
        {% set FILE = params.FILE|default("For_Elise.mid")|string %}
        RUN_SHELL_COMMAND CMD=audio_midi PARAMS="{FILE}"
    {% endif %}

[gcode_macro MUTE]
description: 静音
gcode:
    {% set mute = params.MUTE|default(1)|int %}
    SET_GCODE_VARIABLE MACRO=PLAY_MIDI VARIABLE=mute VALUE={mute}

[gcode_macro CAMERA_ON]
description: 使用替代摄像头
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set WIDTH  = params.WIDTH|default(640)|int %}
    {% set HEIGHT = params.HEIGHT|default(480)|int %}
    {% set FPS    = params.FPS|default(20)|int %}
    {% set VIDEO  = params.VIDEO|default(client.video)|string %}
    {% set FS    = params.FS|default(0)|int %}

    RESPOND PREFIX="info" MSG="不要忘记在打印机的原生屏幕上关闭摄像头。"

    RUN_SHELL_COMMAND CMD=zcamera PARAMS="on {WIDTH} {HEIGHT} {FPS} {VIDEO} {FS} RESTART"
    RUN_SHELL_COMMAND CMD=cat PARAMS="/opt/config/mod_data/log/cam.log"

[gcode_macro CAMERA_OFF]
description: 禁用替代摄像头
gcode:
    RESPOND PREFIX="info" MSG="启用打印机屏幕摄像头"

    {% set WIDTH  = params.WIDTH|default(640)|int %}
    {% set HEIGHT = params.HEIGHT|default(480)|int %}
    {% set FPS    = params.FPS|default(20)|int %}
    {% set VIDEO  = params.VIDEO|default("video0")|string %}
    {% set FS    = params.FS|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zcamera PARAMS="off {WIDTH} {HEIGHT} {FPS} {VIDEO} {FS} RESTART"

[gcode_macro CAMERA_RESTART]
description: 重启替代摄像头
gcode:
    RUN_SHELL_COMMAND CMD="s99camera" PARAMS="restart"

[gcode_macro DATE_GET]
description: 检查时间
gcode:
    RUN_SHELL_COMMAND CMD=date

[gcode_macro DATE_SET]
description: 设置日期和时间（格式：2024.01.01-00:00:00）
gcode:
    {% set dt = params.DT|default("2024.01.01-00:00:00")|string %}
    RUN_SHELL_COMMAND CMD=zremote PARAMS="/bin/date {dt}"

[gcode_macro WEB]
description: 切换网页界面（fluidd/mainsail）
gcode:
    {% set mute = params.MUTE|default(0)|int %}

    {% if mute == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin 执行宏后按Ctrl + F5"
        RESPOND TYPE=command MSG="action:prompt_text 执行宏后按Ctrl + F5"
        RESPOND TYPE=command MSG="action:prompt_footer_button OK|WEB MUTE=1"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RUN_SHELL_COMMAND CMD=zhttp
    {% endif %}

[gcode_macro _STOP_FAN]
gcode:
    M106 S0                 ; Отключить кулер
    M107                    ; Отключить кулер экструдера
    SET_FAN_SPEED FAN=chamber_fan SPEED=0

[gcode_macro _STOP]
description: 禁用加热和散热
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    M400
    M220 S100               ; Скорость 100%
    M221 S100               ; Экструзия 100%
    M140 S0                 ; Отключить нагрев стола
    M104 S0                 ; Отключить нагрев экструдера
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    {% if zmidi_end != "" %}
        PLAY_MIDI FILE={zmidi_end}
    {% endif %}
    EXCLUDE_OBJECT_DEFINE RESET=1
    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    RUN_SHELL_COMMAND CMD=znice

    {% set profile_name = printer.bed_mesh.profile_name %}
    {% if profile_name == "default" %}
        BED_MESH_CLEAR
        BED_MESH_PROFILE REMOVE=default
    {% endif %}

    ZCONTROL_OFF

    {% if client.ad5x %}
        {% if screen == False %}
            IFS_F18
            SET_GCODE_VARIABLE MACRO=END_CHANGE_FILAMENT VARIABLE=last_data VALUE="{{'restore_position': 0, 'restore_temp': 0, 'temp': 0, 'fan_speed': 0, 'channel': 99}}"
        {% endif %}
        SDCARD_ENABLE_FFM ENABLE=0
    {% endif %}

    _STOP_FAN
    _RESET_SPEED

    UPDATE_DELAYED_GCODE ID=_ZUPDATE DURATION=20

    RESPOND PREFIX="info" MSG="工作完成"

[gcode_macro CHECK_SYSTEM]
description: 操作系统检查
gcode:
    {% set restore = params.RESTORE|default(0)|int %}

    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}

    {% if client.ad5x %}
        {% if restore == 1 %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="restore 0"
        {% else %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="not_restore 0"
        {% endif %}
    {% else %}
        {% if restore == 1 %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="restore {zklipper13}"
        {% else %}
            RUN_SHELL_COMMAND CMD=zcheckmd5 PARAMS="not_restore {zklipper13}"
        {% endif %}
    {% endif %}

[gcode_macro SET_TIMEZONE]
description: 时区修改
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% set ZONE  = params.ZONE|default("Europe/Moscow")|string %}
    RESPOND PREFIX="info" MSG="Europe/"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/share/zoneinfo/Europe"
    {% else %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/data/.mod/.zmod/usr/share/zoneinfo/Europe"
    {% endif %}
    RESPOND PREFIX="info" MSG="Asia/"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/share/zoneinfo/Asia"
    {% else %}
        RUN_SHELL_COMMAND CMD=ls PARAMS="/usr/data/.mod/.zmod/usr/share/zoneinfo/Asia"
    {% endif %}
    RESPOND PREFIX="info" MSG="Use SET_TIMEZONE ZONE=Asia/Yekaterinburg"
    RUN_SHELL_COMMAND CMD=rm PARAMS="/etc/localtime"
    {% if not client.ad5x %}
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/share/zoneinfo/{ZONE} /etc/localtime"
    {% else %}
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/data/.mod/.zmod/usr/share/zoneinfo/{ZONE} /etc/localtime"
        RUN_SHELL_COMMAND CMD=rm PARAMS="/usr/data/.mod/.zmod/etc/localtime"
        RUN_SHELL_COMMAND CMD=ln PARAMS="-s /usr/share/zoneinfo/{ZONE} /usr/data/.mod/.zmod/etc/localtime"
    {% endif %}
    RUN_SHELL_COMMAND CMD=date

[gcode_macro STOP_ZMOD]
description: 停止fluidd/mainsail和moonraker
gcode:
    RUN_SHELL_COMMAND CMD=stop_zmod PARAMS="stop"

[gcode_macro START_ZMOD]
description: STOP_ZMOD后启动fluidd/mainsail和moonraker
gcode:
    RUN_SHELL_COMMAND CMD=stop_zmod PARAMS="up"

[gcode_macro TEST_EMMC]
description: 测试EMMC
gcode:
    {% set size    = params.SIZE|default(400)|int %}
    {% set sync    = params.SYNC|default(1)|int %}
    {% set flash   = params.FLASH|default(0)|int %}
    {% set random  = params.RANDOM|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zfs PARAMS="{size} {sync} {flash} {random}"

[gcode_macro CLEAR_EMMC]
description: 清除EMMC
gcode:
    {% set log    = params.LOG|default(1)|int %}
    {% set any    = params.ANY|default(0)|int %}

    RUN_SHELL_COMMAND CMD=zclear PARAMS="{log} {any}"

[gcode_macro ZSSH_ON]
description: 重定向moonraker和摄像头到SSH服务器
gcode:
    {% set ssh_server  = params.SSH_SERVER|default("127.0.0.1")|string %}
    {% set ssh_port    = params.SSH_PORT|default(22)|int %}
    {% set ssh_user    = params.SSH_USER|default("user")|string %}
    {% set video_port  = params.VIDEO_PORT|default(8080)|int %}
    {% set moon_port   = params.MOON_PORT|default(7125)|int %}
    {% set remote_run  = params.REMOTE_RUN|default("NONE")|string %}
    RUN_SHELL_COMMAND CMD=zssh PARAMS="START {ssh_server} {ssh_port} {ssh_user} {video_port} {moon_port} '{remote_run}' RESTART"

[gcode_macro ZLINK]
description: ZLINK.info
gcode:
    {% set p  = params.P|default("bad")|string %}
    {% set u  = params.U|default("bad")|string %}

    {% set m  = params.M|default(0)|int %}
    {% set c  = params.C|default(0)|int %}

    {% if p == "" or u == "" or m == 0 or c ==0 %}
        RESPOND TYPE="echo" MSG="ZLINK数据不正确。在 http://zlink.info 上注册您的打印机并获取ZLINK字符串。"
        RUN_SHELL_COMMAND CMD=zlink PARAMS="get"
    {% else %}
        RUN_SHELL_COMMAND CMD=zlink PARAMS="enable {p} {u} {m} {c}"
    {% endif %}

[gcode_macro ZLINK_OFF]
gcode:
    RESPOND TYPE="echo" MSG="ZLINK.info off"
    RUN_SHELL_COMMAND CMD=zlink PARAMS="disable"

[gcode_macro ZSSH_OFF]
description: 禁用SSH端口转发
gcode:
    RUN_SHELL_COMMAND CMD=zssh PARAMS="STOP 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro ZSSH_RESTART]
description: SSH重启
gcode:
    RUN_SHELL_COMMAND CMD=zssh PARAMS="RESTART 127.0.0.1 22 user 8080 7125 NONE RESTART"
    _CHECK_VERSION

[gcode_macro ZSSH_RELOAD]
description: 如未运行则启动SSH
gcode:
    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if screen == True %}
        RESPOND PREFIX="info" MSG="您正在使用原生屏幕"
    {% else %}
        RESPOND PREFIX="info" MSG="您未使用原生屏幕"
    {% endif %}

    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% if zklipper13 == 1 %}
        RESPOND PREFIX="//" MSG="正在使用Klipper 13"
    {% else %}
        {% if not client.ad5x %}
            RESPOND PREFIX="//" MSG="正在使用原生Klipper 11"
        {% else %}
            RESPOND PREFIX="//" MSG="正在使用原生Klipper 12"
        {% endif %}
    {% endif %}
    _CHECK_VERSION

    RUN_SHELL_COMMAND CMD=zssh PARAMS="RELOAD 127.0.0.1 22 user 8080 7125 NONE RESTART"

[gcode_macro _MESH_TEST]
description: 比较网格极值与最后一次探针数据
gcode:
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set mesh = printer.bed_mesh.profiles[profile_name] %}

    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer

    {% if mesh %}
        _MESH_PROBE
        _MESH_COMPARE EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
    {% else %}
        {action_respond_info("警告：未加载床面网格！")}
    {% endif %}

[gcode_macro _MESH_PROBE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set kamp_settings = printer["gcode_macro _KAMP_Settings"] %}                                                                 # Pull variables from _KAMP_Settings
    {% set mesh_margin = kamp_settings.mesh_margin | float %}                                                                       # Pull mesh margin setting from _KAMP_Settings
    {% set fuzz_amount = kamp_settings.fuzz_amount | float %}                                                                       # Pull fuzz amount setting from _KAMP_Settings
    {% set fuzz_range = range((0) | int, (fuzz_amount * 100) | int + 1) %}                                                          # Set fuzz_range between 0 and fuzz_amount
    {% set adapted_x_min = mesh_margin + (fuzz_range | random / 100.0) %}                                                           # Adapt x_min to margin and fuzz constraints

    _G28
    _TEST_MIN_MAX

    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = G10 | string %}
        {% set UNRETRACT = G11 | string %}
    {% else %}
        {% set RETRACT = 'G1 E-.5 F2100' | string %}
        {% set UNRETRACT = 'G1 E.5 F2100' | string %}
    {% endif %}

    G92 E0
    G90
    _CLIENT_LINEAR_MOVE X=-{adapted_x_min}
    G1 Z5 F6000
    {RETRACT}
    LOAD_CELL_TARE
    PROBE
    G1 Z5 F6000
    {UNRETRACT}

[gcode_macro _MESH_COMPARE]
gcode:
    {% set profile_name = printer.bed_mesh.profile_name %}
    {% set mesh = printer.bed_mesh %}
    {% set last_probe = printer.probe.last_z_result %}
    {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}

    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer

    {% if mesh and 'mesh_matrix' in mesh %}
        {% set all_z = mesh.mesh_matrix | sum(start=[]) %}
        {% set min_z = all_z | min %}
        {% set max_z = all_z | max %}

        {action_respond_info("Current profile: %s" % profile_name)}
        {action_respond_info("网格最小值：%.3f毫米 | 变化量：%.3f毫米" % (min_z, max_z - min_z))}
        {action_respond_info("网格最大值：%.3f毫米 | 最后探针：%.3f毫米" % (max_z, last_probe))}

        {% if last_probe < min_z - 0.21 %}
            {action_respond_info("可能加载了错误配置（不同打印床/温度）")}
            {action_respond_info("如需禁用检查：MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
            {% if mesh_test == 2 %}
                {action_respond_info("警告：最后探针低于网格最小值%.3f毫米！ => KAMP" % (min_z - last_probe))}
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% else %}
                {action_raise_error("警告：最后探针低于网格最小值%.3f毫米！ 使用 SAVE_ZMOD_DATA MESH_TEST=2 在发生错误时自动启动 KAMP" % (min_z - last_probe))}
            {% endif %}
        {% elif last_probe > max_z + 0.21 %}
            {action_respond_info("可能加载了错误配置（不同打印床/温度）")}
            {action_respond_info("如需禁用检查：MESH // SAVE_ZMOD_DATA MESH_TEST=0")}
            {% if mesh_test == 2 %}
                {action_respond_info("警告：最后探针高于网格最大值%.3f毫米！ => KAMP" % (last_probe - max_z))}
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            {% else %}
                {action_raise_error("警告：最后探针高于网格最大值%.3f毫米！ 使用 SAVE_ZMOD_DATA MESH_TEST=2 在发生错误时自动启动 KAMP" % (last_probe - max_z))}
            {% endif %}
        {% else %}
            {action_respond_info("正常：探针在网格极值范围内")}
        {% endif %}

    {% else %}
        {action_respond_info("未找到配置或网格矩阵")}
    {% endif %}

[gcode_macro _START_MESH]
gcode:
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}

    {% if skip_leveling == False %}
        {% if force_kamp == True %}
            RESPOND PREFIX="//" MSG="KAMP已启动 SKIP_LEVELING={skip_leveling} FORCE_KAMP={force_kamp}"

            {% set screen = printer["gcode_macro _SCREEN"].screen %}
            {% if screen == True %}
                RESPOND PREFIX="info" MSG="您知道可以全局启用KAMP吗？"
                RESPOND PREFIX="//" MSG="SAVE_ZMOD_DATA USE_KAMP=1 CLEAR=LINE_PURGE"
            {% endif %}
            M400
            KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
            M400

        {% else %}
            {% if (not printer['bed_mesh'].profile_name) or force_leveling == True %}
                {% if mesh != "" %}
                    RESPOND PREFIX="!!" MSG="正在构建{mesh}网格（未找到）。请在打印后保存！"
                    _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE={mesh}
                {% else %}
                    {% if force_leveling == True %}
                        RESPOND PREFIX="info" MSG="正在构建默认网格（FORCE_LEVELING={force_leveling}）"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=default
                    {% else %}
                        RESPOND PREFIX="info" MSG="正在构建auto网格（未加载配置文件）"
                        _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} PROFILE=auto
                    {% endif %}
                {% endif %}
            {% else %}
                {% set cur_mesh = printer['bed_mesh'].profile_name %}
                RESPOND PREFIX="//" MSG="无需调平。已加载配置：{cur_mesh}"
            {% endif %}
        {% endif %}

    {% else %}
        RESPOND PREFIX="//" MSG="正在跳过调平。SKIP_LEVELING={skip_leveling}"
    {% endif %}

[gcode_macro _PRINT_MESH]
gcode:
    {% set cur_mesh = printer['bed_mesh'].profile_name %}

    RESPOND PREFIX="info" MSG="使用床面网格{cur_mesh}打印"

[gcode_macro _PREPARE_PRINT]
gcode:
    UPDATE_DELAYED_GCODE ID=_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_FAST_CLOSE_DIALOGS DURATION=0
    UPDATE_DELAYED_GCODE ID=_STOP_MOTOR DURATION=0
    UPDATE_DELAYED_GCODE ID=_AUTO_REBOOT DURATION=0
    UPDATE_DELAYED_GCODE ID=_PRO_POWEROFF DURATION=0
    UPDATE_DELAYED_GCODE ID=_GOTO_PAUSE DURATION=0
    UPDATE_DELAYED_GCODE ID=_ZUPDATE DURATION=0

[gcode_macro _START_PRINT]
description: 替换默认起始G代码
variable_zextruder_temp: 245.0
variable_zbed_temp: 80.0
variable_zforce_kamp: False
variable_zforce_leveling: False
variable_zskip_leveling: False
variable_zskip_zoffset: False
variable_zzoffset: 0.0
variable_zmesh: ""
gcode:
    {% set force_kamp = printer["gcode_macro _START_PRINT"].zforce_kamp %}              ; if True it forces the KAMP bed level process
    {% set extruder_temp = printer["gcode_macro _START_PRINT"].zextruder_temp|float %}  ; extruder temp, usually set by slicer
    {% set bed_temp = printer["gcode_macro _START_PRINT"].zbed_temp|float %}            ; bed temp, usually set by slicer
    {% set force_leveling = printer["gcode_macro _START_PRINT"].zforce_leveling %}      ; if True it forces the bed level process
    {% set zoffset = printer["gcode_macro _START_PRINT"].zzoffset %}                    ; Установить Z offset
    {% set skip_zoffset = printer["gcode_macro _START_PRINT"].zskip_zoffset %}          ; Для печати с родного экрана не устанавливать Z offset
    {% set skip_leveling = printer["gcode_macro _START_PRINT"].zskip_leveling %}        ; Не строить карту
    {% set mesh = printer["gcode_macro _START_PRINT"].zmesh %}                          ; Имя профиля карты стола

    {% set filename = printer.virtual_sdcard.file_path|default("")|string  %}

    {% set force_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% set disable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% set disable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% set load_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}
    {% set zclear = printer.save_variables.variables.zclear|default("LINE_PURGE")|string %}
    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}

    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    _PREPARE_PRINT

    CLEAR_PAUSE
    ZCONTROL_ABORT
    ZCONTROL_ON
    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    ZSSH_RELOAD

    RESPOND PREFIX="info" MSG="START_PRINT BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp} FORCE_LEVELING={force_leveling} FORCE_KAMP={force_kamp} Z_OFFSET={zoffset} SKIP_ZOFFSET={skip_zoffset} SKIP_LEVELING={skip_leveling} MESH={mesh}"

    RESPOND PREFIX="info" MSG="喷头温度：{extruder_temp}"
    RESPOND PREFIX="info" MSG="床温：{bed_temp}"

    {% if zprint_leveling == 0 %}
        {% if force_kamp == True %}
            RESPOND PREFIX="info" MSG="KAMP：已启用"
        {% else %}
            RESPOND PREFIX="info" MSG="KAMP：已禁用"
        {% endif %}

        {% if force_leveling == True %}
            RESPOND PREFIX="info" MSG="强制调平：已启用"
        {% else %}
            RESPOND PREFIX="info" MSG="强制调平：已禁用"
        {% endif %}

        {% if skip_leveling == True %}
            RESPOND PREFIX="info" MSG="跳过调平：已启用"
        {% else %}
            RESPOND PREFIX="info" MSG="跳过调平：已禁用"
        {% endif %}

        RESPOND PREFIX="info" MSG="加载床面网格：{mesh}"
    {% endif %}

    {% if screen == False %}
        {% if force_md5 == 1 %}
            RESPOND PREFIX="info" MSG="MD5：已启用"
        {% else %}
            RESPOND PREFIX="info" MSG="MD5：已禁用"
        {% endif %}
    {% endif %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="喷嘴预清洗：已禁用"
    {% else %}
        RESPOND PREFIX="info" MSG="喷嘴预清洗：已启用"
        RESPOND PREFIX="info" MSG="预清洗算法：{zclear}"
    {% endif %}

    {% if disable_skew == 1 %}
        RESPOND PREFIX="info" MSG="SKEW：已禁用"
    {% else %}
        RESPOND PREFIX="info" MSG="SKEW：已启用"
    {% endif %}

    {% set check_md5 = printer.save_variables.variables.check_md5|default(0) | int %}
    {% if ( force_md5 == 1 and check_md5 == 0 ) %}
        RESPOND PREFIX="info" MSG="MD5校验已开始"
        CHECK_MD5 DELETE=True
    {% endif %}

    M140 S{bed_temp}        ; start bed heating
    SET_SKEW CLEAR=1        ; reset skew profile if loaded

    {% if (load_zoffset == 1) and (screen == False) %}
        RESPOND PREFIX="info" MSG="使用全局Z偏移控制。SKIP_ZOFFSET和Z_OFFSET参数已忽略"
        LOAD_GCODE_OFFSET
    {% else %}
        {% if (load_zoffset == 1) and (screen == True) %}
            RESPOND PREFIX="info" MSG="全局Z偏移加载：已忽略（屏幕模式）"
        {% endif %}

        {% if skip_zoffset == True %}
            RESPOND PREFIX="info" MSG="Z偏移设置已跳过，SKIP_ZOFFSET={skip_zoffset}"
        {% else %}
            RESPOND PREFIX="info" MSG="设置Z偏移{zoffset}, SKIP_ZOFFSET={skip_zoffset}"
            SET_GCODE_OFFSET Z={zoffset}
        {% endif %}
    {% endif %}

    _G28

    {% if not client.ad5x %}
        {% set we = printer['temperature_sensor weightValue'].temperature %}
        {% if we != 0 %}
            LOAD_CELL_TARE
        {% endif %}
    {% endif %}

    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="使用原生屏幕每次打印时构建床面网格 // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% else %}
            RESPOND PREFIX="//" MSG="每次打印时构建床面网格 // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
            BED_MESH_CLEAR
            M400
            {% if zuse_kamp == 1 %}
                RESPOND PREFIX="info" MSG="使用全局设置中的KAMP // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
                M400
                KAMP BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
                M400
            {% else %}
                RESPOND PREFIX="info" MSG="正在构建完整床面网格 // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
                M400
                _FULL_BED_LEVEL BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}
                M400
            {% endif %}
        {% endif %}

        RESPOND PREFIX="//" MSG="所有START_PRINT的调平参数将被忽略"
    {% else %}
        {% if mesh != "" %}
            RESPOND PREFIX="info" MSG="尝试加载床面网格：{mesh}"
            BED_MESH_CLEAR
            M400
            {% for mesh_dt in printer['bed_mesh'].profiles %}
                {% if mesh == mesh_dt %}
                    BED_MESH_PROFILE LOAD={mesh}
                    RESPOND PREFIX="info" MSG="床面网格{mesh}已加载"
                {% endif %}
            {% endfor %}
        {% endif %}

        _START_MESH
    {% endif %}

    # load skew profile
    {% if disable_skew == 0 %}
        RESPOND PREFIX="info" MSG="正在加载skew_profile"
        SKEW_PROFILE LOAD=skew_profile
    {% endif %}

    G90                     ; use absolute coordinates
    {% if (zprint_leveling == 0 and force_kamp == True) or (zprint_leveling == 1 and screen == False and zuse_kamp == 1) or (zclear == "LINE_PURGE" and client.ad5x == 0 ) %}
        _SMART_PARK
    {% else %}
        _UGOL_PARK
    {% endif %}

    #M190 S{bed_temp}
    #M109 S{extruder_temp}

    _WAIT_TEMP EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp} NAME=START_PRINT

    {% if client.ad5x %}
        {% if not ( (zprint_leveling == 0 and force_kamp == True ) or ( zprint_leveling == 1 and screen == False and zuse_kamp == 1 ) ) %}
            _PRINT_CLEAR_NOZZLE
        {% endif %}
        M400
        _SMART_PARK
    {% endif %}

    {% if printer.toolhead.position.z < 5 %}
        G1 Z5 F3000
    {% endif %}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}

    {% if disable_priming == 1 %}
        RESPOND PREFIX="info" MSG="喷嘴线性清洗已禁用。DISABLE_PRIMING={disable_priming}"
        _PRINT_MESH
        {% if zmidi_start != "" %}
            PLAY_MIDI FILE={zmidi_start}
        {% endif %}
    {% else %}
        {% set mesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
        {% if mesh_test == 0 or force_kamp == True or zprint_leveling == 1 or force_leveling == True %}
            _PRINT_MESH
        {% else %}
            _MESH_TEST EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
        {% endif %}

        RESPOND PREFIX="info" MSG="喷嘴线性清洗. 算法：{zclear}"

        {% if zmidi_start != "" %}
            PLAY_MIDI FILE={zmidi_start}
        {% endif %}

        {% if ( (force_kamp == True) or (zuse_kamp == 1) ) and (zclear == "_CLEAR1" or zclear == "_CLEAR2" or zclear == "_CLEAR3" or zclear == "_CLEAR4") %}
            RESPOND PREFIX="info" MSG="您正在使用KAMP。建议使用LINE_PURGE： // SAVE_ZMOD_DATA CLEAR=LINE_PURGE"
            RESPOND PREFIX="info" MSG="强制执行LINE_PURGE"
            M400
            LINE_PURGE
            M400
        {% else %}
            _TEST_MIN_MAX
            M400
            SAVE_GCODE_STATE NAME=clear_state
            M400
            RESPOND PREFIX="info" MSG="{zclear}"
            {zclear}
            M400
            RESTORE_GCODE_STATE MOVE=0 NAME=clear_state
        {% endif %}
    {% endif %}
    EXCLUDE_OBJECT_DEFINE RESET=1
    ZEXCLUDE
    RESPOND TYPE=echo MSG="START_PRINT已完成其工作。"

[gcode_macro UPDATE_MCU]
description: 更新MCU
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set current_klipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% set force = params.FORCE|default(0)|int %}

    RESPOND TYPE=error MSG="等待音乐结束后关闭打印机 等待10秒后重新上电。MCU更新将开始"

    {% if (current_klipper13 == 1 and force == 0) or (force == 11) or (force == 12) %}
        RESPOND PREFIX="info" MSG="正在刷写原生Klipper的MCU固件"
        SAVE_VARIABLE VARIABLE=klipper13 VALUE={0|int}
        G4 P5000
        M400
        RUN_SHELL_COMMAND CMD=zmcu PARAMS="0"
    {% else %}
        {% if (current_klipper13 == 0 and force == 0) or (force == 13) %}
            RESPOND PREFIX="info" MSG="Flash MCU Klipper 13"
            SAVE_VARIABLE VARIABLE=klipper13 VALUE={1|int}
            G4 P5000
            M400
            RUN_SHELL_COMMAND CMD=zmcu PARAMS="1"
        {% endif %}
    {% endif %}

[gcode_macro NEW_SAVE_CONFIG]
description: 保存参数时不冻结原生屏幕
gcode:
    {% set screen = printer["gcode_macro _SCREEN"].screen %}
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if screen == False or client.ad5x %}
        SAVE_CONFIG
    {% else %}
        RESPOND PREFIX="info" MSG="NEW_SAVE_CONFIG"
        RUN_SHELL_COMMAND CMD=restart_klipper
    {% endif %}

[gcode_macro CLOSE_DIALOGS]
description: 慢速关闭原生屏幕对话框
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        RESPOND PREFIX="info" MSG="正在慢速关闭原生屏幕对话框"
        RUN_SHELL_COMMAND CMD=close_dialogs
        RESPOND PREFIX="info" MSG="无法关闭窗口？使用快速关闭：FAST_CLOSE_DIALOGS // SAVE_ZMOD_DATA CLOSE_DIALOGS=2"
    {% else %}
        FAST_CLOSE_DIALOGS
    {% endif %}

[gcode_macro FAST_CLOSE_DIALOGS]
description: 快速关闭原生屏幕对话框
gcode:
    RESPOND PREFIX="info" MSG="正在快速关闭原生屏幕对话框"
    RUN_SHELL_COMMAND CMD=zprint PARAMS="CLOSE CLOSE"

[delayed_gcode _STOP_MOTOR]
gcode:
    RESPOND PREFIX="info" MSG="电机已禁用"
    M84                     ; Выключить мотор

[delayed_gcode _ZUPDATE]
gcode:
    RUN_SHELL_COMMAND CMD=zupdate

[delayed_gcode _GOTO_PAUSE]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    {% if not client.ad5x %}
        G90
        RESPOND PREFIX="info" MSG="正在将喷头移至右远角"
        G1 X{client.custom_park_x} F7800
        M400
        G1 Y{client.custom_park_y} F7800
        M400
    {% else %}
        _GOTO_TRASH
    {% endif %}

[delayed_gcode _CLOSE_DIALOGS]
gcode:
    CLOSE_DIALOGS

[delayed_gcode _FAST_CLOSE_DIALOGS]
gcode:
    FAST_CLOSE_DIALOGS

[delayed_gcode _AUTO_REBOOT]
gcode:
    {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% if (zauto_reboot == 2) and (screen == False) %}
        FIRMWARE_RESTART
    {% else %}
        REBOOT
    {% endif %}

[delayed_gcode _PRO_POWEROFF]
gcode:
    SHUTDOWN

[delayed_gcode restart_services]
initial_duration: 180
gcode:
    ZSSH_RELOAD

[delayed_gcode start_led]
initial_duration: 10
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% if client.ad5x %}
        UPDATE_FF_OFFSET
    {% endif %}

    RUN_SHELL_COMMAND CMD=zshaper_new PARAMS="SCV {printer.configfile.settings.printer.square_corner_velocity}"

    SET_GCODE_VARIABLE MACRO=_CANCEL_PRINT VARIABLE=cancel_send VALUE=0
    SET_GCODE_VARIABLE MACRO=_SHUTDOWN VARIABLE=trigger_allowed VALUE=True
    SET_GCODE_VARIABLE MACRO=SET_LED VARIABLE=allowed VALUE=True

    SAVE_VARIABLE VARIABLE=check_md5 VALUE={0|int}

    CAMERA_RESTART

    GET_ZMOD_DATA

    {% set zmidi_on = printer.save_variables.variables.midi_on|default("") | string %}
    {% if zmidi_on != "" %}
        PLAY_MIDI FILE={zmidi_on}
    {% endif %}

    {% set zled = printer.save_variables.variables.led|default(50) | int %}
    LED S={zled}

    RUN_SHELL_COMMAND CMD=zlink PARAMS="start"
    LANG SKIP=0
    GLOBAL START=1
    LOAD_ZOFFSET_NATIVE START=1

[gcode_macro _COLDPULL_LOAD_MATERIAL_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro _GOTO_MID]
gcode:

[gcode_macro _COLDPULL_LOAD_MATERIAL]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    RESPOND TYPE=command MSG=action:prompt_end

    _G28
    _GOTO_MID

    G90
    G1 X{client.min_x+(client.max_x-client.min_x)/2} F7800
    M400
    G1 Y{client.min_y+(client.max_y-client.min_y)/2} F7800
    M400

    {% set extruder_temp = params.TEMP|default(245)|float %}
    RESPOND PREFIX="info" MSG="等待喷头加热至{extruder_temp}"
    M104 S{extruder_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp} MAXIMUM={extruder_temp+10}

    RESPOND PREFIX="info" MSG="正在挤出10厘米耗材"

    G92 E0
    _DISABLE_SENSOR
        G1 E100 F100
        M400
    _ENABLE_SENSOR

    {% set cold_temp = params.COLD|default(245)|float %}
    RESPOND PREFIX="info" MSG="正在冷却至{cold_temp}℃"
    M104 S{cold_temp}
    M106 P0 S255
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={cold_temp-2} MAXIMUM={cold_temp+2}

    RESPOND PREFIX="info" MSG="正在拉出耗材"

    G92 E0
    _DISABLE_SENSOR
        G1 E-70 F1500
        M400
    _ENABLE_SENSOR

    RESPOND PREFIX="info" MSG="手动移除剩余耗材"
    M107
    M104 S0
    G92 E0

[gcode_macro COLDPULL]
description: 冷拉清洁喷嘴（温和模式）
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin 加载耗材类型选择"
    RESPOND TYPE=command MSG="action:prompt_text 选择清洁喷嘴的材料"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button PETG|_COLDPULL_LOAD_MATERIAL TEMP=245 COLD=100|primary"
    RESPOND TYPE=command MSG="action:prompt_button ABS|_COLDPULL_LOAD_MATERIAL TEMP=255 COLD=105|primary"
    RESPOND TYPE=command MSG="action:prompt_button NEYLON|_COLDPULL_LOAD_MATERIAL TEMP=260 COLD=120|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button 取消|_COLDPULL_LOAD_MATERIAL_END"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro SAVE_ZMOD_DATA]
description: 保存ZMOD参数
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set i = params.I|default(0)|int %}

    {% if params.CLOSE_DIALOGS %}
        {% set zclose_dialogs = params.CLOSE_DIALOGS|default(2)|int %}
        {% if client.ad5x and zclose_dialogs == 1 %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
        {% else %}
            SAVE_VARIABLE VARIABLE=close_dialogs VALUE={zclose_dialogs|int}
        {% endif %}
    {% endif %}

    {% if params.STOP_MOTOR %}
        {% set zstop_motor = params.STOP_MOTOR|default(1)|int %}
        SAVE_VARIABLE VARIABLE=stop_motor VALUE={zstop_motor|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.USE_SWAP %}
        {% set zuse_swap = params.USE_SWAP|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE={zuse_swap|int}
    {% endif %}
    {% endif %}

    {% if params.AUTO_REBOOT %}
        {% set zauto_reboot = params.AUTO_REBOOT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=auto_reboot VALUE={zauto_reboot|int}
    {% endif %}

    {% if params.SAVE_RESTORE %}
        {% set save_restore = params.SAVE_RESTORE|default(1)|int %}
        SAVE_VARIABLE VARIABLE=save_restore VALUE={save_restore|int}
    {% endif %}

    {% if params.FIX_SCV %}
        {% set fix_scv = params.FIX_SCV|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_scv VALUE={fix_scv|int}
    {% endif %}

    {% if params.WIFI %}
        {% set wifi = params.WIFI|default(1)|int %}
        SAVE_VARIABLE VARIABLE=wifi VALUE={wifi|int}
    {% endif %}

    {% if client.ad5x %}
    {% if params.SILENT %}
        {% set silent = params.SILENT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=silent VALUE={silent|int}
    {% endif %}
    {% if params.AUTOINSERT %}
        {% set autoinsert = params.AUTOINSERT|default(1)|int %}
        SAVE_VARIABLE VARIABLE=autoinsert VALUE={autoinsert|int}
    {% endif %}
    {% if params.USE_TRASH_ON_PRINT %}
        {% set use_trash_on_print = params.USE_TRASH_ON_PRINT|default(1)|int %}
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE={use_trash_on_print|int}
    {% endif %}
    {% if params.REMOVE_FILAMENT %}
        {% set remove_filament = params.REMOVE_FILAMENT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=remove_filament VALUE={remove_filament|int}
    {% endif %}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.MOTION_SENSOR %}
        {% set motion_sensor = params.MOTION_SENSOR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE={motion_sensor|int}
    {% endif %}
    {% endif %}

    {% if params.FIX_E0011 %}
        {% set fix_e0011 = params.FIX_E0011|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0011 VALUE={fix_e0011|int}
    {% endif %}

    {% if params.FIX_E0017 %}
        {% set fix_e0017 = params.FIX_E0017|default(1)|int %}
        SAVE_VARIABLE VARIABLE=fix_e0017 VALUE={fix_e0017|int}
    {% endif %}

    {% if params.PRINT_LEVELING %}
        {% set zprint_leveling = params.PRINT_LEVELING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}
    {% endif %}

    {% if params.USE_KAMP %}
        {% set zuse_kamp = params.USE_KAMP|default(0)|int %}
        SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}
    {% endif %}

    {% if params.MESH_TEST %}
        {% set zmesh_test = params.MESH_TEST|default(1)|int %}
        SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.NEW_SAVE_CONFIG %}
        {% set znew_save_config = params.NEW_SAVE_CONFIG|default(0)|int %}
        SAVE_VARIABLE VARIABLE=new_save_config VALUE={znew_save_config|int}
    {% endif %}

    {% if params.PRECLEAR %}
        {% set zpreclear = params.PRECLEAR|default(0)|int %}
        SAVE_VARIABLE VARIABLE=preclear VALUE={zpreclear|int}
    {% endif %}
    {% endif %}

    {% if params.FORCE_MD5 %}
        {% set zforce_md5 = params.FORCE_MD5|default(1)|int %}
        SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}
    {% endif %}

    {% if params.DISABLE_SKEW %}
        {% set zdisable_skew = params.DISABLE_SKEW|default(1)|int %}
        SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}
    {% endif %}

    {% if params.LOAD_ZOFFSET %}
        {% set zload_zoffset = params.LOAD_ZOFFSET|default(0)|int %}
        SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}
    {% endif %}

    {% if params.LED %}
        {% set zled = params.LED|default(50)|int %}
        SAVE_VARIABLE VARIABLE=led VALUE={zled|int}
    {% endif %}

    {% if params.DISABLE_PRIMING %}
        {% set zdisable_priming = params.DISABLE_PRIMING|default(0)|int %}
        SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}
    {% endif %}

    {% if params.CLEAR %}
        {% set zclear = params.CLEAR|default("LINE_PURGE")|string %}
        SAVE_VARIABLE VARIABLE=zclear VALUE='"{zclear|string}"'
    {% endif %}

    {% if params.CHINA_CLOUD %}
        {% set zchina_cloud = params.CHINA_CLOUD|default(1)|int %}
        SAVE_VARIABLE VARIABLE=china_cloud VALUE={zchina_cloud|int}
    {% endif %}

    {% if params.SAVE_MOONRAKER %}
        {% set save_moonraker = params.SAVE_MOONRAKER|default(0)|int %}
        SAVE_VARIABLE VARIABLE=save_moonraker VALUE={save_moonraker|int}
    {% endif %}

    {% if params.NICE %}
        {% set znice = params.NICE|default(20)|int %}
        {% if znice > 40 %}
            SAVE_VARIABLE VARIABLE=nice VALUE={40|int}
        {% else %}
            {% if znice < 1 %}
                SAVE_VARIABLE VARIABLE=nice VALUE={1|int}
            {% else %}
                SAVE_VARIABLE VARIABLE=nice VALUE={znice|int}
            {% endif %}
        {% endif %}
    {% endif %}

    {% if params.DISPLAY_OFF_TIMEOUT %}
        {% set display_off_timeout = params.DISPLAY_OFF_TIMEOUT|default(20)|int %}
        SAVE_VARIABLE VARIABLE=display_off_timeout VALUE={display_off_timeout|int}
    {% endif %}

    {% if not client.ad5x %}
    {% if params.PRO_POWEROFF_TIMEOUT %}
        {% set pro_poweroff_timeout = params.PRO_POWEROFF_TIMEOUT|default(0)|int %}
        SAVE_VARIABLE VARIABLE=pro_poweroff_timeout VALUE={pro_poweroff_timeout|int}
    {% endif %}
    {% endif %}

    {% if params.MIDI_ON %}
        {% set zmidi_on = params.MIDI_ON|default("")|string %}
        {% if zmidi_on == "0" %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_on VALUE='"{zmidi_on|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_START %}
        {% set zmidi_start = params.MIDI_START|default("")|string %}
        {% if zmidi_start == "0" %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_PAUSE %}
        {% set zmidi_pause = params.MIDI_PAUSE|default("")|string %}
        {% if zmidi_pause == "0" %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'
        {% endif %}
    {% endif %}

    {% if params.MIDI_END %}
        {% set zmidi_end = params.MIDI_END|default("")|string %}
        {% if zmidi_end == "0" %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='""'
        {% else %}
            SAVE_VARIABLE VARIABLE=midi_end VALUE='"{zmidi_end|string}"'
        {% endif %}
    {% endif %}

    {% if i == 0 %}
        GET_ZMOD_DATA
    {% else %}
        GLOBAL N={i}
    {% endif %}

[gcode_macro GET_ZMOD_DATA]
description: 获取ZMOD参数
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    RESPOND PREFIX="info" MSG="ZMOD参数。通过SAVE_ZMOD_DATA设置"

    {% set guppy = printer.save_variables.variables.guppy|default(1) | int %}
    SAVE_VARIABLE VARIABLE=guppy VALUE={guppy|int}

    {% if screen == True %}
        RESPOND PREFIX="info" MSG="您正在使用原生屏幕 // DISPLAY_ON"
    {% else %}
        {% if guppy == 1 %}
            RESPOND PREFIX="info" MSG="您未使用原生屏幕但启用了GuppyScreen // DISPLAY_OFF GUPPY=1"
        {% else %}
            RESPOND PREFIX="info" MSG="您未使用原生屏幕 // DISPLAY_OFF GUPPY=0"
        {% endif %}
    {% endif %}

    RESPOND PREFIX="info" MSG="打印开始/调平时使用的参数[START_PRINT]"

    {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
    {% if zprint_leveling == 1 %}
        {% if screen == True %}
            RESPOND PREFIX="//" MSG="使用原生屏幕每次打印时构建床面网格 // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% else %}
            RESPOND PREFIX="//" MSG="每次打印时构建床面网格 // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
        {% endif %}
    {% else %}
        RESPOND PREFIX="//" MSG="不要在每次打印时都建立床网 // SAVE_ZMOD_DATA PRINT_LEVELING={zprint_leveling}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=print_leveling VALUE={zprint_leveling|int}

    {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
    {% if zuse_kamp == 1 %}
        RESPOND PREFIX="//" MSG="尽可能使用自适应网格（KAMP）代替完整床面网格 // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
    {% else %}
        RESPOND PREFIX="//" MSG="不使用KAMP替代BED_MESH_CALIBRATE // SAVE_ZMOD_DATA USE_KAMP={zuse_kamp}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=use_kamp VALUE={zuse_kamp|int}

    {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
    {% if zmesh_test == 0 %}
        RESPOND PREFIX="//" MSG="打印前不测试床面网格 // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 1 %}
        RESPOND PREFIX="//" MSG="打印前测试床面网格 // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    {% if zmesh_test == 2 %}
        RESPOND PREFIX="//" MSG="打印前测试床面网格 + KAMP // SAVE_ZMOD_DATA MESH_TEST={zmesh_test}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=mesh_test VALUE={zmesh_test|int}

    {% set zmidi_start = printer.save_variables.variables.midi_start|default("") | string %}
    RESPOND PREFIX="//" MSG="开始打印时播放MIDI：{zmidi_start} // SAVE_ZMOD_DATA MIDI_START={zmidi_start}"
    SAVE_VARIABLE VARIABLE=midi_start VALUE='"{zmidi_start|string}"'

    {% set zmidi_pause = printer.save_variables.variables.midi_pause|default("") | string %}
    RESPOND PREFIX="//" MSG="暂停时播放MIDI：{zmidi_pause} // SAVE_ZMOD_DATA MIDI_PAUSE={zmidi_pause}"
    SAVE_VARIABLE VARIABLE=midi_pause VALUE='"{zmidi_pause|string}"'

    {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
    {% if zforce_md5 == 1 %}
        RESPOND PREFIX="//" MSG="检查文件MD5校验和 // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% else %}
        RESPOND PREFIX="//" MSG="不检查文件MD5 // SAVE_ZMOD_DATA FORCE_MD5={zforce_md5}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=force_md5 VALUE={zforce_md5|int}

    {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
    {% if zdisable_skew == 1 %}
        RESPOND PREFIX="//" MSG="SKEW校正已禁用 // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% else %}
        RESPOND PREFIX="//" MSG="SKEW校正已启用。配置文件skew_profile // SAVE_ZMOD_DATA DISABLE_SKEW={zdisable_skew}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_skew VALUE={zdisable_skew|int}

    {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}
    {% if zload_zoffset == 1 %}
        RESPOND PREFIX="//" MSG="从全局设置加载Z偏移 // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
    {% else %}
        RESPOND PREFIX="//" MSG="不从全局设置加载Z偏移 // SAVE_ZMOD_DATA LOAD_ZOFFSET={zload_zoffset}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=load_zoffset VALUE={zload_zoffset|int}

    {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
    {% if zdisable_priming == 1 %}
        RESPOND PREFIX="//" MSG="禁用喷嘴线性清洗 // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% else %}
        RESPOND PREFIX="//" MSG="启用喷嘴线性清洗 // SAVE_ZMOD_DATA DISABLE_PRIMING={zdisable_priming}"
    {% endif %}
    SAVE_VARIABLE VARIABLE=disable_priming VALUE={zdisable_priming|int}

    {% if not client.ad5x %}
