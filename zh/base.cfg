    RESPOND PREFIX="info" MSG="打印结束/取消时使用的参数[END_PRINT]"

    {% set zmidi_end = printer.save_variables.variables.midi_end|default("") | string %}
    RESPOND PREFIX="//" MSG="打印结束播放MIDI：{zmidi_end} // SAVE_ZMOD_DATA MIDI_END={zmidi_end}"
