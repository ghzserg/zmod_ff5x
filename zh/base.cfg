[gcode_macro BED_TEMP]
gcode:
    RESPOND PREFIX="!!" MSG="起始代码不正确 START_PRINT EXTRUDER_TEMP BED_TEMP 必须写在同一行 !!"

[gcode_macro EXTRUDER_TEMP]
gcode:
    RESPOND PREFIX="!!" MSG="起始代码不正确 START_PRINT EXTRUDER_TEMP BED_TEMP 必须写在同一行 !!"

[gcode_macro _CHECK_VERSION]
gcode:
    {% set zklipper13 = printer.save_variables.variables.klipper13|default(0) | int %}
    {% set version = printer.mcu.mcu_version %}

    {% if zklipper13 == 1 and not "-375-" in version %}
        RESPOND PREFIX="!!" MSG="MCU版本不正确。需要运行 UPDATE_MCU FORCE=13 !!"
    {% endif %}

[gcode_macro _RESET_SPEED]
gcode:
    {% set klipper13 = printer.save_variables.variables.klipper13|default(0) | int %}

    M220 S100
    M221 S100

    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity}
    SET_VELOCITY_LIMIT ACCEL={printer.configfile.settings.printer.max_accel}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={printer.configfile.settings.printer.square_corner_velocity}
    {% if klipper13 == 1 %}
        SET_VELOCITY_LIMIT ACCEL_TO_DECEL={printer.configfile.settings.printer.accell_to_decel}
    {% else %}
        SET_VELOCITY_LIMIT MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}
    {% endif %}

    {% if printer.configfile.settings.extruder is defined %}
        SET_PRESSURE_ADVANCE ADVANCE={printer.configfile.settings.extruder.pressure_advance|default(0)} SMOOTH_TIME={printer.configfile.settings.extruder.pressure_advance_smooth_time|default(0.04)}
    {% endif %}

    {% if printer.configfile.settings.firmware_retraction is defined %}
        SET_RETRACTION RETRACT_LENGTH={printer.configfile.settings.firmware_retraction.retract_length} UNRETRACT_EXTRA_LENGTH={printer.configfile.settings.firmware_retraction.unretract_extra_length} RETRACT_SPEED={printer.configfile.settings.firmware_retraction.retract_speed} UNRETRACT_SPEED={printer.configfile.settings.firmware_retraction.unretract_speed}
    {% endif %}

[gcode_macro LANG]
gcode:
    {% set skip_lang = printer.save_variables.variables.skip_lang|default(0) | int %}

    {% set skip = params.SKIP|default(1)|int %}
    {% set i = params.I|default(0)|int %}
    {% set lang = params.LANG|default("none") %}

    {% if skip == 1 %}
        {% if lang == "none" %}
            {% set show = 1 %}
        {% else %}
            {% set show = 0 %}
        {% endif %}
    {% else %}
        {% if skip_lang == 0 %}
            {% set show = 1 %}
        {% else %}
            {% set show = 0 %}
        {% endif %}
    {% endif %}

    {% if show == 1 %}
        RESPOND TYPE=command MSG="action:prompt_begin Select language"
        RESPOND TYPE=command MSG="action:prompt_text Select language"

        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button EN|LANG LANG=en I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button RU|LANG LANG=ru I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button DE|LANG LANG=de I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button FR|LANG LANG=fr I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button IT|LANG LANG=it I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button ES|LANG LANG=es I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button CS|LANG LANG=cs I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button PT|LANG LANG=pt I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button TR|LANG LANG=tr I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button JA|LANG LANG=ja I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button KO|LANG LANG=ko I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button ZH|LANG LANG=zh I=1|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        {% if i == 1 %}
            SAVE_VARIABLE VARIABLE=skip_lang VALUE=1
            RESPOND TYPE=command MSG="action:prompt_end"
            G4 P1000
        {% endif %}
        {% if lang != "none" %}
            RUN_SHELL_COMMAND CMD=zlang PARAMS="{lang}"
        {% endif %}
    {% endif %}

[gcode_macro _SHOW_MSG]
gcode:
    {% set title = params.TITLE|default("初始设置")|string %}
    {% set msg = params.MSG|default("Ok")|string %}
    {% set command = params.COMMAND|default("RESPOND TYPE=command MSG=action:prompt_end")|string %}
    {% set reboot = params.REBOOT|default(0)|int %}

    RESPOND TYPE=command MSG=action:prompt_end

    RESPOND TYPE=command MSG="action:prompt_begin {title}"
    RESPOND TYPE=command MSG="action:prompt_text {msg}"

    RESPOND TYPE=command MSG="action:prompt_footer_button OK|{command}|primary"
    {% if reboot == 1 %}
        RESPOND TYPE=command MSG="action:prompt_footer_button REBOOT|REBOOT|primary"
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _RECOMMEND]
gcode:
    {% set skip_global = printer.save_variables.variables.skip_global|default(0) | int %}
    {% set skip_lang = printer.save_variables.variables.skip_lang|default(0) | int %}
    {% set skip_recommend = printer.save_variables.variables.skip_recommend|default(0) | int %}

    {% set close = params.CLOSE|default(0)|int %}
    {% set enable = params.ENABLE|default(0)|int %}

    {% if close == 1 %}
        RESPOND TYPE=command MSG=action:prompt_end
        SAVE_VARIABLE VARIABLE=skip_recommend VALUE=1
        {% if enable == 1 %}
            ENABLE_PLUGIN name=recommend
        {% endif %}
    {% else %}
        {% if skip_global == 1 and skip_lang == 1 and skip_recommend == 0 %}
            RESPOND TYPE=command MSG="action:prompt_begin 初始设置"
            RESPOND TYPE=command MSG="action:prompt_text 启用推荐插件？它允许您一键配置基本设置。"
            RESPOND TYPE=command MSG="action:prompt_footer_button Yes|_RECOMMEND CLOSE=1 ENABLE=1|primary"
            RESPOND TYPE=command MSG="action:prompt_footer_button No|_RECOMMEND CLOSE=1 ENABLE=0|primary"
            RESPOND TYPE=command MSG="action:prompt_show"
        {% endif %}
    {% endif %}

[gcode_macro _RESET_ZMOD]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}

    RESPOND TYPE=command MSG="action:prompt_end"

    SAVE_VARIABLE VARIABLE=print_leveling VALUE=0
    SAVE_VARIABLE VARIABLE=use_kamp VALUE=0
    SAVE_VARIABLE VARIABLE=mesh_test VALUE=1
    SAVE_VARIABLE VARIABLE=force_md5 VALUE=1
    SAVE_VARIABLE VARIABLE=disable_skew VALUE=1
    SAVE_VARIABLE VARIABLE=load_zoffset VALUE=0
    SAVE_VARIABLE VARIABLE=disable_priming VALUE=0
    SAVE_VARIABLE VARIABLE=close_dialogs VALUE=2
    SAVE_VARIABLE VARIABLE=stop_motor VALUE=1
    SAVE_VARIABLE VARIABLE=auto_reboot VALUE=0
    SAVE_VARIABLE VARIABLE=save_restore VALUE=1
    SAVE_VARIABLE VARIABLE=fix_scv VALUE=1
    SAVE_VARIABLE VARIABLE=fix_e0011 VALUE=1
    SAVE_VARIABLE VARIABLE=fix_e0017 VALUE=1
    SAVE_VARIABLE VARIABLE=wifi VALUE=1
    SAVE_VARIABLE VARIABLE=china_cloud VALUE=1
    SAVE_VARIABLE VARIABLE=save_moonraker VALUE=0

    {% if not client.ad5x %}
        SAVE_VARIABLE VARIABLE=preclear VALUE=0
        SAVE_VARIABLE VARIABLE=new_save_config VALUE=0
        SAVE_VARIABLE VARIABLE=use_swap VALUE=1
        SAVE_VARIABLE VARIABLE=motion_sensor VALUE=0
    {% else %}
        SAVE_VARIABLE VARIABLE=use_swap VALUE=0
        SAVE_VARIABLE VARIABLE=silent VALUE=0
        SAVE_VARIABLE VARIABLE=autoinsert VALUE=1
        SAVE_VARIABLE VARIABLE=use_trash_on_print VALUE=1
        SAVE_VARIABLE VARIABLE=remove_filament VALUE=0
    {% endif %}

    SAVE_VARIABLE VARIABLE=skip_lang VALUE=0
    SAVE_VARIABLE VARIABLE=skip_global VALUE=0
    SAVE_VARIABLE VARIABLE=skip_recommend VALUE=0

    REBOOT

[gcode_macro GLOBAL]
description: 获取ZMOD参数
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set screen = printer["gcode_macro _SCREEN"].screen %}

    {% set skip_global = printer.save_variables.variables.skip_global|default(0) | int %}
    {% set skip_lang = printer.save_variables.variables.skip_lang|default(0) | int %}

    {% set n = params.N|default(1)|int %}
    {% set start = params.START|default(0)|int %}

    {% if skip_global == 0 and skip_lang == 1 and start == 1 %}
        _SHOW_MSG MSG="如有必要，您可以浏览并更改全局参数。 https://github.com/ghzserg/zmod/wiki/Global_en" COMMAND="GLOBAL"
    {% endif %}

    {% if start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_end"
    {% endif %}

    {% if n == 1 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin 打印开始/调平时使用的参数[START_PRINT]: {n}"

        {% set zprint_leveling = printer.save_variables.variables.print_leveling|default(0) | int %}
        {% if zprint_leveling == 1 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button 使用原生屏幕每次打印时构建床面网格|SAVE_ZMOD_DATA PRINT_LEVELING=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 每次打印时构建床面网格|SAVE_ZMOD_DATA PRINT_LEVELING=0 I={n}|primary"
            {% endif %}
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 不要在每次打印时都建立床网|SAVE_ZMOD_DATA PRINT_LEVELING=1 I={n}|primary"
        {% endif %}

        {% set zuse_kamp = printer.save_variables.variables.use_kamp|default(0) | int %}
        {% if zuse_kamp == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 尽可能使用自适应网格（KAMP）代替完整床面网格|SAVE_ZMOD_DATA USE_KAMP=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 不使用KAMP替代BED_MESH_CALIBRATE|SAVE_ZMOD_DATA USE_KAMP=1 I={n}|primary"
        {% endif %}

        {% set zmesh_test = printer.save_variables.variables.mesh_test|default(1) | int %}
        {% if zmesh_test == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button 打印前不测试床面网格|SAVE_ZMOD_DATA MESH_TEST=1 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 打印前测试床面网格|SAVE_ZMOD_DATA MESH_TEST=2 I={n}|primary"
        {% endif %}
        {% if zmesh_test == 2 %}
            RESPOND TYPE=command MSG="action:prompt_button 打印前测试床面网格 + KAMP|SAVE_ZMOD_DATA MESH_TEST=0 I={n}|primary"
        {% endif %}

        {% set zforce_md5 = printer.save_variables.variables.force_md5|default(1) | int %}
        {% if zforce_md5 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 检查文件MD5校验和|SAVE_ZMOD_DATA FORCE_MD5=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 不检查文件MD5|SAVE_ZMOD_DATA FORCE_MD5=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button 下一步|GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 2 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin 打印开始/调平时使用的参数[START_PRINT]: {n}"

        {% set zdisable_skew = printer.save_variables.variables.disable_skew|default(1) | int %}
        {% if zdisable_skew == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button SKEW校正已禁用|SAVE_ZMOD_DATA DISABLE_SKEW=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button SKEW校正已启用。配置文件skew_profile|SAVE_ZMOD_DATA DISABLE_SKEW=1 I={n}|primary"
        {% endif %}

        {% set zload_zoffset = printer.save_variables.variables.load_zoffset|default(0) | int %}
        {% if zload_zoffset == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 从全局设置加载Z偏移|SAVE_ZMOD_DATA LOAD_ZOFFSET=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 不从全局设置加载Z偏移|SAVE_ZMOD_DATA LOAD_ZOFFSET=1 I={n}|primary"
        {% endif %}

        {% set zdisable_priming = printer.save_variables.variables.disable_priming|default(0) | int %}
        {% if zdisable_priming == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 禁用喷嘴线性清洗|SAVE_ZMOD_DATA DISABLE_PRIMING=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 启用喷嘴线性清洗|SAVE_ZMOD_DATA DISABLE_PRIMING=1 I={n}|primary"
        {% endif %}

        {% if not client.ad5x %}
            {% set zpreclear = printer.save_variables.variables.preclear|default(0) | int %}
            {% if zpreclear == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button 使用喷嘴预清洗|SAVE_ZMOD_DATA PRECLEAR=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 禁用喷嘴预清洗|SAVE_ZMOD_DATA PRECLEAR=1 I={n}|primary"
            {% endif %}
        {% else %}
            {% set silent = printer.save_variables.variables.silent|default(0) | int %}
            {% if silent == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button 打印开始时不要隐藏颜色选择|SAVE_ZMOD_DATA SILENT=1 I={n}|primary"
            {% endif %}
            {% if silent == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button 隐藏颜色选择，使用IFS打印|SAVE_ZMOD_DATA SILENT=2 I={n}|primary"
            {% endif %}
            {% if silent == 2 %}
                RESPOND TYPE=command MSG="action:prompt_button 隐藏颜色选择，不使用IFS打印|SAVE_ZMOD_DATA SILENT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button 下一步|GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 3 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin 打印结束/取消时使用的参数[END_PRINT]: {n}"

        {% set zclose_dialogs = printer.save_variables.variables.close_dialogs|default(2) | int %}
        {% if zclose_dialogs == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button 不自动关闭原生屏幕对话框|SAVE_ZMOD_DATA CLOSE_DIALOGS=1 I={n}|primary"
        {% endif %}
        {% if zclose_dialogs == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 20秒后自动关闭原生屏幕对话框（慢速）|SAVE_ZMOD_DATA CLOSE_DIALOGS=2 I={n}|primary"
        {% endif %}
        {% if zclose_dialogs == 2 %}
            RESPOND TYPE=command MSG="action:prompt_button 20秒后自动关闭原生屏幕对话框（快速）|SAVE_ZMOD_DATA CLOSE_DIALOGS=0 I={n}|primary"
        {% endif %}

        {% set zstop_motor = printer.save_variables.variables.stop_motor|default(1) | int %}
        {% if zstop_motor == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 打印/取消后25秒自动禁用电机|SAVE_ZMOD_DATA STOP_MOTOR=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 打印/取消后不自动禁用电机|SAVE_ZMOD_DATA STOP_MOTOR=1 I={n}|primary"
        {% endif %}

        {% set zauto_reboot = printer.save_variables.variables.auto_reboot|default(0) | int %}
        {% if zauto_reboot == 0 %}
            RESPOND TYPE=command MSG="action:prompt_button 禁用自动重启|SAVE_ZMOD_DATA AUTO_REBOOT=1 I={n}|primary"
        {% endif %}
        {% if zauto_reboot == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 打印完成后1.5分钟后自动重启打印机|SAVE_ZMOD_DATA AUTO_REBOOT=2 I={n}|primary"
        {% endif %}
        {% if zauto_reboot == 2 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button 打印完成后1.5分钟后自动重启打印机|SAVE_ZMOD_DATA AUTO_REBOOT=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 1.5分钟后自动重启固件|SAVE_ZMOD_DATA AUTO_REBOOT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        {% if client.ad5x %}
            {% set remove_filament = printer.save_variables.variables.remove_filament|default(0) | int %}
            {% if remove_filament == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button 打印完成后不要取出耗材|SAVE_ZMOD_DATA REMOVE_FILAMENT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 打印完成后取出耗材|SAVE_ZMOD_DATA REMOVE_FILAMENT==0 I={n}|primary"
            {% endif %}
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button 下一步|GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 4 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin 全局参数: {n}"

        {% set save_restore = printer.save_variables.variables.save_restore|default(1) | int %}
        {% if save_restore == 1 %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button 由原生屏幕控制保存|SAVE_ZMOD_DATA SAVE_RESTORE=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 保存打印恢复数据|SAVE_ZMOD_DATA SAVE_RESTORE=0 I={n}|primary"
            {% endif %}
        {% else %}
            {% if screen == True %}
                RESPOND TYPE=command MSG="action:prompt_button 由原生屏幕控制保存|SAVE_ZMOD_DATA SAVE_RESTORE=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 不保存打印恢复数据|SAVE_ZMOD_DATA SAVE_RESTORE=1 I={n}|primary"
            {% endif %}
        {% endif %}

        {% set fix_scv = printer.save_variables.variables.fix_scv|default(1) | int %}
        {% if fix_scv == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 使用配置中的SCV生成整形器图表|SAVE_ZMOD_DATA FIX_SCV=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 使用SCV=5生成整形器图表|SAVE_ZMOD_DATA FIX_SCV=1 I={n}|primary"
        {% endif %}

        {% set fix_e0011 = printer.save_variables.variables.fix_e0011|default(1) | int %}
        {% if fix_e0011 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 修复E0011错误|SAVE_ZMOD_DATA FIX_E0011=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 不修复E0011错误|SAVE_ZMOD_DATA FIX_E0011=1 I={n}|primary"
        {% endif %}

        {% set fix_e0017 = printer.save_variables.variables.fix_e0017|default(1) | int %}
        {% if fix_e0017 == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 修复E0017错误|SAVE_ZMOD_DATA FIX_E0017=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 不修复E0017错误|SAVE_ZMOD_DATA FIX_E0017=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button 下一步|GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 5 and start == 0 %}
        RESPOND TYPE=command MSG="action:prompt_begin 全局参数: {n}"

        {% set wifi = printer.save_variables.variables.wifi|default(1) | int %}
        {% if wifi == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button Zmod Wifi On|SAVE_ZMOD_DATA WIFI=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button Zmod Wifi Off|SAVE_ZMOD_DATA WIFI=1 I={n}|primary"
        {% endif %}

        {% if not client.ad5x %}
            {% set znew_save_config = printer.save_variables.variables.new_save_config|default(0) | int %}
            {% if znew_save_config == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button 使用替代NEW_SAVE_CONFIG|SAVE_ZMOD_DATA NEW_SAVE_CONFIG=0 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 使用标准SAVE_CONFIG|SAVE_ZMOD_DATA NEW_SAVE_CONFIG=1 I={n}|primary"
            {% endif %}
        {% endif %}

        {% set zchina_cloud = printer.save_variables.variables.china_cloud|default(1) | int %}
        {% if zchina_cloud == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 允许中国云服务|SAVE_ZMOD_DATA CHINA_CLOUD=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 阻止中国云服务|SAVE_ZMOD_DATA CHINA_CLOUD=1 I={n}|primary"
        {% endif %}

        {% set save_moonraker = printer.save_variables.variables.save_moonraker|default(0) | int %}
        {% if save_moonraker == 1 %}
            RESPOND TYPE=command MSG="action:prompt_button 保存Fluidd/Mainsail按钮修改|SAVE_ZMOD_DATA SAVE_MOONRAKER=0 I={n}|primary"
        {% else %}
            RESPOND TYPE=command MSG="action:prompt_button 使用ZMOD的Fluidd/Mainsail按钮设置|SAVE_ZMOD_DATA SAVE_MOONRAKER=1 I={n}|primary"
        {% endif %}

        RESPOND TYPE=command MSG="action:prompt_footer_button 下一步|GLOBAL N={n+1}|red"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

    {% if n == 6 %}
        RESPOND TYPE=command MSG="action:prompt_begin 全局参数: {n}"

        {% if not client.ad5x %}
            {% set motion_sensor = printer.save_variables.variables.motion_sensor|default(0) | int %}
            {% if motion_sensor == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button 正在使用耗材运动传感器|SAVE_ZMOD_DATA MOTION_SENSOR=0 I={n}|primary"
                {% if screen == True %}
                    RESPOND TYPE=command MSG="action:prompt_text 禁用原生屏幕耗材传感器 I={n}|primary"
                {% endif %}
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 正在使用耗材存在传感器|SAVE_ZMOD_DATA MOTION_SENSOR=1 I={n}|primary"
            {% endif %}

            {% set zuse_swap = printer.save_variables.variables.use_swap|default(1) | int %}
            {% if zuse_swap == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button 未使用SWAP|SAVE_ZMOD_DATA USE_SWAP=1 I={n}|primary"
            {% endif %}
            {% if zuse_swap == 1 %}
                RESPOND TYPE=command MSG="action:prompt_button 在EMMC使用SWAP|SAVE_ZMOD_DATA USE_SWAP=2 I={n}|primary"
            {% endif %}
            {% if zuse_swap == 2 %}
                RESPOND TYPE=command MSG="action:prompt_button 在USB闪存使用SWAP|SAVE_ZMOD_DATA USE_SWAP=0 I={n}|primary"
            {% endif %}
        {% else %}
            {% set autoinsert = printer.save_variables.variables.autoinsert|default(1) | int %}
            {% if autoinsert == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button 不要自动装入线材|SAVE_ZMOD_DATA AUTOINSERT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 自动装入线材|SAVE_ZMOD_DATA AUTOINSERT=0 I={n}|primary"
            {% endif %}

            {% set use_trash_on_print = printer.save_variables.variables.use_trash_on_print|default(1) | int %}
            {% if use_trash_on_print == 0 %}
                RESPOND TYPE=command MSG="action:prompt_button 打印时不使用清洗箱|SAVE_ZMOD_DATA USE_TRASH_ON_PRINT=1 I={n}|primary"
            {% else %}
                RESPOND TYPE=command MSG="action:prompt_button 打印时使用清洗箱|SAVE_ZMOD_DATA USE_TRASH_ON_PRINT=0 I={n}|primary"
            {% endif %}
        {% endif %}

        {% set lang = printer.configfile.config.zmod.language|default("en") | string %}
        RESPOND TYPE=command MSG="action:prompt_button Language {lang}|LANG|primary"

        RESPOND TYPE=command MSG="action:prompt_button Reset ZMOD Global| _RESET_ZMOD|orange"

        RESPOND TYPE=command MSG="action:prompt_footer_button OK|_SHOW_MSG MSG='如果任何参数被更改，建议重启打印机. Macro GLOBAL' REBOOT=1|red"
        SAVE_VARIABLE VARIABLE=skip_global VALUE=1

        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}
