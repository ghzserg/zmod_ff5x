[gcode_macro ZRESTORE]
description: 恢复中断的打印
gcode:
    {% set test = params.TEST|default(0)|int %}

    {% set state = printer.print_stats.state %}
    {% set filename = printer.print_stats.filename %}
    {% set progress = printer.display_status.progress * 100 %}

    {% if test == 2 %}
        RESPOND PREFIX="info" MSG="已保存数据已删除"
        RUN_SHELL_COMMAND CMD=rm PARAMS="/opt/config/mod_data/klipper_data.json"
    {% else %}
        {% if test == 1 and state != 'printing' and state != 'paused' %}
            RUN_SHELL_COMMAND CMD=zrestore PARAMS="test"
        {% else %}
            {% if state == 'printing' %}
                RESPOND PREFIX="info" MSG="当前打印：{filename}（{progress | round(1)}%），无法恢复打印"
            {% elif state == 'paused' %}
                RESPOND PREFIX="info" MSG="已暂停：{filename}，无法恢复打印"
            {% elif state == 'complete' %}
                RESPOND PREFIX="info" MSG="打印完成"
                RUN_SHELL_COMMAND CMD=zrestore
            {% elif state == 'error' %}
                RESPOND PREFIX="info" MSG="错误：{printer.print_stats.message}"
                RUN_SHELL_COMMAND CMD=zrestore
            {% else %}
                RESPOND PREFIX="info" MSG="状态：{state}"
                RUN_SHELL_COMMAND CMD=zrestore
            {% endif %}
        {% endif %}
    {% endif %}

[delayed_gcode _TEST_RESTORE]
initial_duration: 0
gcode:
    ZRESTORE TEST=1

[gcode_macro _ZRESTORE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin 检测到中断的打印"
    RESPOND TYPE=command MSG="action:prompt_text 切换到控制台查看恢复阶段"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button 恢复|_ZRESTORE_OK|primary"
    RESPOND TYPE=command MSG="action:prompt_button 删除数据|_ZRESTORE_DEL|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button 取消|_ZRESTORE_CANCEL"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _ZRESTORE_OK]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    ZRESTORE

[gcode_macro _ZRESTORE_DEL]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    ZRESTORE TEST=2

